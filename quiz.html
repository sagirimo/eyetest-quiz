等多种视野缺损", "E": "眼底可见视盘水肿，常伴出血"}, "a": "D", "e": "视神经炎典型表现：中青年突发视力下降+眼球转动痛+RAPD+中心暗点。", "author": "张智翔", "group": "眼科出题第二组"}, {"q": "下列疾病会出现无痛性视力下降，除了（）", "o": {"A": "视神经炎", "B": "视网膜动脉阻塞", "C": "视网膜静脉阻塞", "D": "视网膜静脉周围炎", "E": "高血压性视网膜病变"}, "a": "A", "e": "视神经炎常伴眼球后疼痛或眼球转动时疼痛，不属于无痛性视力下降；而视网膜动静脉阻塞、静脉周围炎及高血压性视网膜病变均为无痛性视力下降。", "author": "张智翔", "group": "眼科出题第二组"}, {"q": "以下哪个不属于眼外伤（）", "o": {"A": "外伤性白内障", "B": "颅底骨折", "C": "眼睑裂伤", "D": "结膜异物", "E": "玻璃体积血"}, "a": "B", "e": "颅底骨折属于颅脑外伤，不属于眼外伤范畴；外伤性白内障、眼睑裂伤、结膜异物及玻璃体积血均直接累及眼部，属于眼外伤。", "author": "张智翔", "group": "眼科出题第二组"}, {"q": "以下关于眼球给药的说法，正确的是", "o": {"A": "药物由眼球表面进入眼球内组织的主要途径是经角膜缘血管及结膜缘血管吸收", "B": "药物一般需具备水溶性，不需具备脂溶性", "C": "白内障手术后患者一般将滴眼液滴入上方结膜囊内", "D": "眼球注射时，药物注射到玻璃体腔内", "E": "在滴眼液中加入甲基纤维素可以直接起到治疗疾病的效果"}, "a": "D", "e": "正确答案：眼球注射时，药物注射到玻璃体腔内。", "author": "赵栩禾", "group": "眼科出题第二组"}, {"q": "房水排出的主要通道是", "o": {"A": "葡萄膜", "B": "瞳孔", "C": "后房角", "D": "虹膜表面隐窝", "E": "前房角"}, "a": "E", "e": "房水主要外流途径：睫状突→后房→瞳孔→前房→小梁网→Schlemm管→集液管→睫状前静脉。次要途径（10-20%）为葡萄膜巩膜途径。", "author": "赵栩禾", "group": "眼科出题第二组"}, {"q": "黄斑病变时视力下降明显，其原因为", "o": {"A": "视锥细胞主要集中在黄斑区", "B": "视杆细胞主要集中在黄斑区", "C": "视神经位于在黄斑区", "D": "双节细胞主要集中在黄斑区", "E": "黄斑区含有丰富的毛细血管"}, "a": "A", "e": "正确答案：视锥细胞主要集中在黄斑区。", "author": "赵栩禾", "group": "眼科出题第二组"}, {"q": "患者女，25岁，因左侧眼睑红肿刺痛1天前来就诊。患者上睑缘广泛红肿，触之有硬结，有明显压痛。以下对于患者的处理最佳的是", "o": {"A": "局部热敷", "B": "抗生素滴眼", "C": "切开排脓", "D": "口服抗生素", "E": "生理盐水清洁睑缘"}, "a": "A", "e": "该患者为睑腺炎（麦粒肿）早期，尚未化脓（硬结未形成脓点），早期首选局部热敷以促进炎症消散；未化脓时禁止切开引流。", "author": "赵栩禾", "group": "眼科出题第二组"}, {"q": "霰粒肿的病因", "o": {"A": "金黄色葡萄球菌感染", "B": "单纯疱疹病毒感染", "C": "睑板腺开口堵塞", "D": "药物过敏", "E": "睑板腺肉芽肿性炎症"}, "a": "C", "e": "霰粒肿（睑板腺囊肿）是睑板腺出口阻塞导致的慢性肉芽肿性炎症，无急性红/热/痛。", "author": "赵栩禾", "group": "眼科出题第二组"}, {"q": "关于眼表疾病，下列说法正确的是", "o": {"A": "干眼症患者泪膜不稳定", "B": "干眼症患者泪液渗透压一定升高", "C": "角膜缘干细胞损伤是干眼症的重要原因", "D": "所有干眼症患者都需要使用人工泪液", "E": "干眼症和免疫性疾病无关"}, "a": "A", "e": "正确答案：干眼症患者泪膜不稳定。", "author": "赵栩禾", "group": "眼科出题第二组"}, {"q": "若患者鼻泪管狭窄，其泪道冲洗的表现", "o": {"A": "进入鼻咽", "B": "下冲上返，上冲下返", "C": "有阻力，部分反流", "D": "冲出脓性分泌物", "E": "原路返流"}, "a": "C", "e": "泪道冲洗：原路返流→泪小管阻塞；下冲上返→泪总管阻塞；返流+脓→慢性泪囊炎（鼻泪管阻塞）。", "author": "赵栩禾", "group": "眼科出题第二组"}, {"q": "患者男，20岁，化学实验时不慎将强酸溅入左眼内，以下最适合的处理是", "o": {"A": "涂抗生素眼膏，闭眼休息", "B": "无菌纱布遮盖后及时送医", "C": "前往医院后生理盐水冲洗眼球", "D": "抗生素滴眼预防感染", "E": "现场用清水冲洗眼球"}, "a": "E", "e": "正确答案：现场用清水冲洗眼球。", "author": "赵栩禾", "group": "眼科出题第二组"}, {"q": "患者男，44岁，工人，行焊接工作时突发右眼刺痛，畏光，流泪1小时。检查发现右眼结膜充血，右眼角膜中央可见点状异物，荧光素染色阳性，异物达角膜上皮层。下列对患者的处理错误的是", "o": {"A": "挑取异物时需注意无菌原则", "B": "需关注结膜囊有无异物残留", "C": "行显微手术摘除异物", "D": "严禁按压眼球", "E": "异物取出后，使用抗生素预防感染"}, "a": "C", "e": "角膜中央厚约0.5mm，周边约1mm。基质层占全层约90%。", "author": "赵栩禾", "group": "眼科出题第二组"}, {"q": "病毒性角膜炎", "o": {"A": "一般由外伤导致", "B": "常常反复发作", "C": "溃疡呈树枝和地图状，边缘不清", "D": "前房聚集大量黄白色脓性分泌物", "E": "不需使用抗生素治疗"}, "a": "B", "e": "正确答案：常常反复发作。", "author": "赵栩禾", "group": "眼科出题第二组"}, {"q": "患者，男，35岁，2月前野外徒步时左眼被树叶划伤，现左眼视力障碍4天。患者左眼角膜中央部有一致密，乳白色浸润灶，表面欠光泽，干燥呈牙膏样外观。患者最可能的诊断是", "o": {"A": "细菌性角膜炎", "B": "真菌性角膜炎", "C": "病毒性角膜炎", "D": "角膜裂伤", "E": "角膜异物"}, "a": "B", "e": "角膜中央厚约0.5mm，周边约1mm。基质层占全层约90%。", "author": "赵栩禾", "group": "眼科出题第二组"}, {"q": "患者，女，15岁，自述近半年双眼视力不佳，左眼更甚，近视度数加深明显，佩戴近视镜无法矫正。眼前节检查：OD：角膜透明，球结膜充血，OS:角膜基质层轻浑浊，基质层条纹。前房晶体未见明显异常。屈光检查：OD：-4.00-8.00*40，矫正视力0.3。OS：无法提高视力，裸眼视力0.05。患者最可能的诊断", "o": {"A": "小角膜", "B": "单纯性大角膜", "C": "圆锥角膜", "D": "颗粒状角膜基质营养不良", "E": "先天性青光眼"}, "a": "C", "e": "角膜透明性依赖上皮完整、基质胶原规则排列、无血管、内皮泵功能。内皮细胞层是维持透明的关键。", "author": "赵栩禾", "group": "眼科出题第二组"}, {"q": "患者，男，34岁，程序员，双眼干涩4月，检查泪河高度0.3 mm, 泪膜破裂时间5s。以下对于患者用药最佳的是", "o": {"A": "左氧氟沙星滴眼液", "B": "地塞米松滴眼液", "C": "维生素A滴眼液", "D": "红霉素软膏", "E": "玻璃酸钠滴眼液"}, "a": "E", "e": "正确答案：玻璃酸钠滴眼液。", "author": "赵栩禾", "group": "眼科出题第二组"}, {"q": "以下不是葡萄膜组成部分的是", "o": {"A": "视网膜", "B": "脉络膜", "C": "虹膜", "D": "睫状体"}, "a": "A", "e": "葡萄膜由虹膜、睫状体和脉络膜三部分组成，视网膜属于神经感觉层，不是葡萄膜的组成部分。", "author": "赵栩禾", "group": "眼科出题第二组"}, {"q": "下列关于葡萄膜炎的说法，错误的是", "o": {"A": "广义的葡萄膜炎是指葡萄膜、视网膜、视网膜血管和玻璃体的炎症", "B": "前葡萄膜炎主要累及虹膜和睫状体", "C": "视乳头或黄斑水肿是前葡萄膜炎的典型体征", "D": "后葡萄膜炎单侧受累者可给予糖皮质激素后Tenon囊下注射治疗", "E": "前葡萄膜炎可能与强直性脊柱炎有关"}, "a": "C", "e": "正确答案：视乳头或黄斑水肿是前葡萄膜炎的典型体征。", "author": "赵栩禾", "group": "眼科出题第二组"}, {"q": "Behcet病最常见的葡萄膜炎类型是", "o": {"A": "前葡萄膜炎", "B": "中间葡萄膜炎", "C": "后葡萄膜炎", "D": "全葡萄膜炎", "E": "以上均可能"}, "a": "D", "e": "白塞病（Behcet病）以反复发作的全葡萄膜炎为最常见类型，可同时或先后累及前段及后段，是其区别于其他葡萄膜炎的重要特征。", "author": "赵栩禾", "group": "眼科出题第二组"}, {"q": "白内障手术最常见的并发症是", "o": {"A": "青光眼", "B": "角膜内皮失代偿", "C": "黄斑囊样水肿", "D": "后囊膜混浊", "E": "视网膜脱离"}, "a": "D", "e": "后囊膜混浊（后发性白内障）是白内障术后最常见的并发症，由残留晶状体上皮细胞增殖迁移至后囊所致，发生率可达20%~50%。", "author": "赵栩禾", "group": "眼科出题第二组"}, {"q": "白内障的核心病理改变是？B", "o": {"A": "角膜基质层混浊", "B": "晶状体蛋白质变性导致的混浊", "C": "玻璃体液化混浊", "D": "视网膜神经上皮层脱落", "E": "眼压升高"}, "a": "B", "e": "正确答案：晶状体蛋白质变性导致的混浊。", "author": "赵栩禾", "group": "眼科出题第二组"}, {"q": "临床上最常见的白内障类型是", "o": {"A": "先天性白内障", "B": "年龄相关性白内障", "C": "并发性白内障", "D": "外伤性白内障", "E": "代谢性白内障"}, "a": "B", "e": "年龄相关性白内障分三型：皮质性（最常见）、核性、后囊下性。", "author": "赵栩禾", "group": "眼科出题第二组"}, {"q": "老年男性，65岁，双眼无痛性视力下降5年，右眼-5.00DS---0.1，左眼-2.00---0.2，检查双眼角膜正常，前房正常，晶状体灰白色浑浊，虹膜投影(+),眼底不能窥入。最可能的临床诊断是", "o": {"A": "青光眼", "B": "前葡萄膜炎", "C": "视网膜脱离", "D": "晶状体全脱位", "E": "白内障"}, "a": "E", "e": "虹膜投影（新月形阴影）：斜照法检查膨胀期白内障时，投照侧虹膜在深层混浊皮质上形成阴影。虹膜投影消失→进入成熟期。", "author": "赵栩禾", "group": "眼科出题第二组"}, {"q": "当前临床治疗白内障最主流的手术方式是", "o": {"A": "白内障囊内摘除术", "B": "白内障囊外摘除术", "C": "超声乳化白内障吸除术联合人工晶状体植入术", "D": "激光乳化白内障摘除术", "E": "膜性切开术"}, "a": "C", "e": "正确答案：超声乳化白内障吸除术联合人工晶状体植入术。", "author": "赵栩禾", "group": "眼科出题第二组"}, {"q": "正常眼压范围一般是", "o": {"A": "4~12mmHg", "B": "12~24mmHg", "C": "15~25mmHg", "D": "8~18mmHg", "E": "10~21mmHg"}, "a": "E", "e": "正常眼压统计学范围10~21mmHg，24h波动<8mmHg，双眼差值<5mmHg。", "author": "赵栩禾", "group": "眼科出题第二组"}, {"q": "下列药物中，属于β肾上腺素能受体阻滞剂的青光眼降眼压药物是", "o": {"A": "布林佐胺滴眼液", "B": "酒石酸溴莫尼定滴眼液", "C": "噻吗洛尔滴眼液", "D": "毛果芸香碱滴眼液", "E": "拉坦前列素滴眼液"}, "a": "C", "e": "正确答案：噻吗洛尔滴眼液。", "author": "赵栩禾", "group": "眼科出题第二组"}, {"q": "以下关于青光眼的说法，错误的是", "o": {"A": "青光眼的视功能进行性丧失都源自神经节细胞损害的后遗变性", "B": "青光眼均有前房浅、房角狭窄的解剖特征", "C": "一眼急性闭角型青光眼发作被确诊后，另一眼即使没有任何临床症状，也可以诊断为急性闭角型青光眼临床前期", "D": "患者在眼压得到控制后，视神经萎缩和视野缺损可能进行性发展", "E": "眼球钝挫伤后可能引发青光眼"}, "a": "B", "e": "正确答案：青光眼均有前房浅、房角狭窄的解剖特征。", "author": "赵栩禾", "group": "眼科出题第二组"}, {"q": "患者女，55岁，1小时前因与他人争吵后出现剧烈头痛，眼痛，视物模糊，恶心呕吐就诊。患者眼睑水肿，眼压50mmHg，裂隙灯检查前房极浅，眼底看不清。下列对于患者处理最佳的是", "o": {"A": "0.005%拉坦前列素滴眼液滴眼", "B": "0.9%生理盐水静脉滴注", "C": "紧急行前房角切开术", "D": "20%甘露醇静脉滴注", "E": "1%布林佐胺滴眼液滴眼"}, "a": "D", "e": "正确答案：20%甘露醇静脉滴注。", "author": "赵栩禾", "group": "眼科出题第二组"}, {"q": "原发性开角型青光眼最常见的早期临床表现是", "o": {"A": "眼部剧烈疼痛伴视力骤降", "B": "进行性视力下降", "C": "结膜充血伴角膜水肿", "D": "虹视及雾视", "E": "无症状视野缺损"}, "a": "E", "e": "正确答案：无症状视野缺损。", "author": "赵栩禾", "group": "眼科出题第二组"}, {"q": "当眼睛调节放松时，平行光线经眼球屈光系统折射后聚焦在视网膜之前，这种屈光状态称为", "o": {"A": "正视", "B": "近视", "C": "远视", "D": "散光", "E": "老视"}, "a": "B", "e": "眼球屈光介质包括：角膜、房水、晶状体、玻璃体。视网膜不是屈光介质（是感光组织）。", "author": "赵栩禾", "group": "眼科出题第二组"}, {"q": "下列哪一项属于屈光不正的类型", "o": {"A": "弱视", "B": "斜视", "C": "散光", "D": "老视", "E": "球形晶状体"}, "a": "C", "e": "屈光不正包括近视、远视和散光三种类型。弱视属于视觉发育障碍，斜视属于眼位偏斜，老视是调节功能生理性减退，球形晶状体是先天发育异常，均不属于屈光不正。", "author": "赵栩禾", "group": "眼科出题第二组"}, {"q": "近视患者验光配镜时，应选用的矫正镜片是", "o": {"A": "凸透镜", "B": "凹透镜", "C": "柱面镜（柱镜）", "D": "三棱镜", "E": "平面镜"}, "a": "B", "e": "近视眼平行光线聚焦于视网膜前，需用凹透镜（负球镜）发散光线，使焦点后移至视网膜上，从而矫正视力。", "author": "赵栩禾", "group": "眼科出题第二组"}, {"q": "一位高度近视的患者，其眼底检查出现下列哪种情况概率最低", "o": {"A": "豹纹状眼底", "B": "视网膜周边格子样变性", "C": "视网膜下新生血管", "D": "后巩膜葡萄肿", "E": "视网膜棉絮斑"}, "a": "E", "e": "近视按程度：轻度<-3.00D，中度-3.00D~-6.00D，高度>-6.00D。按病因分轴性近视和屈光性近视。", "author": "赵栩禾", "group": "眼科出题第二组"}, {"q": "视网膜脱离是指——之间的脱离", "o": {"A": "脉络膜与视网膜", "B": "视网膜神经上皮层与色素上皮层", "C": "全色素膜", "D": "视网膜神经上皮层", "E": "视网膜与视神经"}, "a": "B", "e": "正确答案：视网膜神经上皮层与色素上皮层。", "author": "赵栩禾", "group": "眼科出题第二组"}, {"q": "患者，男，72岁，右眼无痛性急剧视力下降30分钟。高血压病史10年，脑血栓病史2年。查体：VOD光感/眼前，睑球结膜无充血，角膜清，前房清，瞳孔直径6毫米，圆，居中，直接对光反应消失，间接对光反应灵敏；晶状体不完全混浊，眼底：视乳头色淡，境界模糊，后极部网膜灰白色水肿，黄斑 “樱桃红”点；动脉明显变细，管径粗细不均，串珠状。VOS 0.5，眼前节（-），晶状体不完全混浊，眼底：视乳头色微红，境界清，黄斑中心凹反光可见；动脉细，反光增强，A：V约1：3。眼压右18mmHg,左14 mmHg。引起患者症状可能的疾病是", "o": {"A": "视网膜中央动脉阻塞", "B": "视网膜脱离", "C": "黄斑变性", "D": "视网膜静脉阻塞", "E": "视神经炎"}, "a": "A", "e": "黄斑樱桃红斑是CRAO的特征性表现——因脉络膜供血保留红色，与周围苍白水肿的视网膜形成对比。", "author": "赵栩禾", "group": "眼科出题第二组"}, {"q": "湿性年龄相关性黄斑变性（AMD）与干性AMD最主要的区别是", "o": {"A": "玻璃膜疣数量增多", "B": "出现黄斑区地图状萎缩", "C": "出现脉络膜新生血管（CNV）及其引发的出血、渗出", "D": "视力缓慢进行性下降", "E": "黄斑区细胞外沉积物"}, "a": "C", "e": "湿性AMD关键病理改变：脉络膜新生血管（CNV）。一线治疗：玻璃体腔抗VEGF注射。", "author": "赵栩禾", "group": "眼科出题第二组"}, {"q": "中心视野是指距注视点______以内的范围", "o": {"A": "5度", "B": "15度", "C": "20度", "D": "25度", "E": "30度"}, "a": "E", "e": "中心视野定义为距注视点30度以内的视野范围，30度以外则称为周边视野。", "author": "赵栩禾", "group": "眼科出题第二组"}, {"q": "共同性内斜视的患者注视目标时", "o": {"A": "双眼视线偏向鼻侧", "B": "双眼视线偏向颞侧", "C": "一眼偏向颞侧，一眼偏向鼻侧", "D": "一眼注视目标，一眼偏向颞侧", "E": "一眼注视目标，一眼偏向鼻侧"}, "a": "E", "e": "正确答案：一眼注视目标，一眼偏向鼻侧。", "author": "赵栩禾", "group": "眼科出题第二组"}, {"q": "关于视力检查的记录方法，下列哪项是正确的？", "o": {"A": "远视力检查记录范围为0.1-2.0", "B": "视力低于0.1应记录为“指数/30cm”", "C": "视力低于0.01应依次检查指数、手动、光感、无光感", "D": "光定位应检查6个方位", "E": "近视力检查无临床意义"}, "a": "C", "e": "正确答案：视力低于0.01应依次检查指数、手动、光感、无光感。", "author": "唐晔", "group": "眼科出题第二组"}, {"q": "裂隙灯检查中，用于观察角膜上皮水肿、云翳、角膜后沉着物的照明方法是？", "o": {"A": "弥散光照明法", "B": "直接焦点照明法", "C": "间接照明法", "D": "后部反光照明法", "E": "镜面反光照明法"}, "a": "D", "e": "裂隙灯常用照明法：直接焦点（最常用）、间接（观察KP/内皮）、后部反光（透明体细微病变）、镜面反射（内皮细胞）、弥散（全貌）。", "author": "唐晔", "group": "眼科出题第二组"}, {"q": "下列哪项不属于视觉电生理检查？", "o": {"A": "EOG", "B": "ERG", "C": "VEP", "D": "OCT", "E": "以上均是电生理检查"}, "a": "D", "e": "EOG（眼电图）、ERG（视网膜电图）、VEP（视觉诱发电位）均为视觉电生理检查；OCT（光学相干断层扫描）是光学影像学检查，通过光干涉原理成像，不属于电生理检查。", "author": "唐晔", "group": "眼科出题第二组"}, {"q": "关于视野检查，下列描述正确的是？", "o": {"A": "生理盲点位于注视点颞侧10°，水平中线下1.5°", "B": "向心性缩小常见于垂体瘤", "C": "双颞侧偏盲常见于视交叉中部病变", "D": "暗点仅见于青光眼早期", "E": "视野检查不能用于中枢神经系统疾病诊断"}, "a": "C", "e": "正确答案：双颞侧偏盲常见于视交叉中部病变。", "author": "唐晔", "group": "眼科出题第二组"}, {"q": "直接检眼镜检查时，正确的操作是？", "o": {"A": "检查右眼时用右眼，检查左眼时用左眼", "B": "必须散瞳才能检查", "C": "放大倍数约15倍，成像为倒像", "D": "只能检查黄斑区", "E": "不能观察玻璃体"}, "a": "A", "e": "正确答案：检查右眼时用右眼，检查左眼时用左眼。", "author": "唐晔", "group": "眼科出题第二组"}, {"q": "门诊病历书写中，关于主诉的描述正确的是？", "o": {"A": "可写“右眼看不见”", "B": "应简明扼要，不超过30字", "C": "可写“患者右眼红痛3天”", "D": "可不写症状持续时间", "E": "主诉可写为“糖尿病视网膜病变”"}, "a": "C", "e": "眼科门诊病历核心内容记录顺序：主诉（就诊原因+眼别+症状+持续时间）→现病史→既往史→检查→诊断。", "author": "唐晔", "group": "眼科出题第二组"}, {"q": "关于眼部给药途径特点，下列哪项错误？", "o": {"A": "眼科用药以局部给药为主", "B": "局部给药可减少全身副作用", "C": "滴眼时瓶口应接触眼睑以防药液流出", "D": "结膜下注射属于局部给药", "E": "全身给药为辅"}, "a": "C", "e": "正确答案：滴眼时瓶口应接触眼睑以防药液流出。", "author": "唐晔", "group": "眼科出题第二组"}, {"q": "下列哪种药物属于磺胺类碳酸酐酶抑制剂？", "o": {"A": "毛果芸香碱", "B": "布林佐胺", "C": "噻吗洛尔", "D": "曲伏前列素", "E": "溴莫尼定"}, "a": "B", "e": "碳酸酐酶抑制剂（布林佐胺/醋甲唑胺）抑制睫状突碳酸酐酶→减少房水生成。", "author": "唐晔", "group": "眼科出题第二组"}, {"q": "关于激素类眼药水，下列哪项正确？", "o": {"A": "氟米龙眼内浓度高，易升高眼压", "B": "醋酸泼尼松龙眼内浓度低于地塞米松", "C": "0.5%氯替泼诺为“软激素”，副作用小", "D": "激素可用于树枝状角膜炎", "E": "激素使用期间无需监测眼压"}, "a": "C", "e": "正确答案：0.5%氯替泼诺为“软激素”，副作用小。", "author": "唐晔", "group": "眼科出题第二组"}, {"q": "妥布霉素滴眼液主要对下列哪种细菌敏感？", "o": {"A": "厌氧菌", "B": "绿脓杆菌", "C": "结核杆菌", "D": "真菌", "E": "病毒"}, "a": "B", "e": "妥布霉素为氨基糖苷类抗生素，抗菌谱广，对革兰阴性菌（尤其铜绿假单胞菌）效果强，常用于细菌性角膜炎/结膜炎。", "author": "唐晔", "group": "眼科出题第二组"}, {"q": "关于睑腺炎（麦粒肿），下列哪项正确？", "o": {"A": "是睑板腺的无痛性囊肿", "B": "内睑腺炎切开方向应平行睑缘", "C": "急性期可以挤压排脓", "D": "常见致病菌为金黄色葡萄球菌", "E": "不会复发"}, "a": "D", "e": "睑腺炎（麦粒肿）是眼睑腺体急性化脓性炎症，最常见致病菌为金黄色葡萄球菌。", "author": "唐晔", "group": "眼科出题第二组"}, {"q": "关于沙眼的诊断标准（WHO），下列哪项不是必需条件？", "o": {"A": "上睑结膜5个以上滤泡", "B": "角膜血管翳", "C": "典型的睑结膜瘢痕", "D": "角膜缘滤泡或Herbert小凹", "E": "角膜上皮点状脱落"}, "a": "E", "e": "正确答案：角膜上皮点状脱落。", "author": "唐晔", "group": "眼科出题第二组"}, {"q": "慢性泪囊炎最危险的并发症是？", "o": {"A": "角膜溃疡", "B": "内眼手术后眼内炎", "C": "青光眼", "D": "白内障", "E": "视网膜脱离"}, "a": "B", "e": "正确答案：内眼手术后眼内炎。", "author": "唐晔", "group": "眼科出题第二组"}, {"q": "干眼症患者常用的检查方法是？", "o": {"A": "眼压测量", "B": "泪液分泌试验（Schirmer试验）", "C": "视野检查", "D": "眼底照相", "E": "OCT"}, "a": "B", "e": "干眼常用检查：泪膜破裂时间BUT（<10s异常）、Schirmer试验（<10mm/5min异常）、角膜荧光素染色。", "author": "唐晔", "group": "眼科出题第二组"}, {"q": "过敏性结膜炎的特征性表现为？", "o": {"A": "脓性分泌物", "B": "伪膜形成", "C": "结膜乳头呈铺路石样", "D": "耳前淋巴结肿大", "E": "角膜上皮树枝状浸润"}, "a": "C", "e": "正确答案：结膜乳头呈铺路石样。", "author": "唐晔", "group": "眼科出题第二组"}, {"q": "真菌性角膜炎的特征性体征不包括？", "o": {"A": "菌丝苔被", "B": "卫星灶", "C": "前房积脓粘稠", "D": "角膜树枝状浸润", "E": "免疫环"}, "a": "D", "e": "真菌性角膜炎特点：亚急性起病，植物外伤史，症状较体征轻，溃疡呈牙膏状灰白，禁用激素。", "author": "唐晔", "group": "眼科出题第二组"}, {"q": "单纯疱疹病毒性角膜炎中，哪种类型禁用糖皮质激素？", "o": {"A": "上皮型角膜炎", "B": "盘状角膜炎", "C": "坏死性基质角膜炎", "D": "内皮型角膜炎", "E": "神经营养性角膜炎"}, "a": "A", "e": "HSK（单纯疱疹病毒性角膜炎）特征：反复发作、感冒/劳累诱因、角膜知觉减退、树枝/地图状溃疡。上皮型禁用激素。", "author": "唐晔", "group": "眼科出题第二组"}, {"q": "绿脓杆菌性角膜溃疡的典型特点是？", "o": {"A": "起病缓慢", "B": "角膜中央黄白色浸润边界清晰", "C": "淡绿色分泌物", "D": "前房无积脓", "E": "对青霉素高度敏感"}, "a": "C", "e": "铜绿假单胞菌性角膜炎特点：潜伏期短、发展迅猛、淡绿色分泌物、易穿孔、前房积脓。需紧急治疗。", "author": "唐晔", "group": "眼科出题第二组"}, {"q": "角膜组织中可再生的是？", "o": {"A": "上皮细胞层", "B": "前弹力层", "C": "基质层", "D": "内皮细胞层", "E": "后弹力层"}, "a": "A", "e": "角膜中上皮细胞层和后弹力层可再生；前弹力层和内皮细胞层损伤后不能再生。基质层损伤后由瘢痕修复。", "author": "唐晔", "group": "眼科出题第二组"}, {"q": "关于角膜屈光力，下列正确的是？", "o": {"A": "约占眼球总屈光力的50%", "B": "主要依靠晶状体调节", "C": "角膜屈光力约为43D", "D": "角膜透明性依赖血管营养", "E": "角膜内皮细胞负责氧气供应"}, "a": "C", "e": "角膜屈光力约43D，占眼球总屈光力的2/3（约70%），是眼球最主要的屈光介质。", "author": "唐晔", "group": "眼科出题第二组"}, {"q": "关于急性虹膜睫状体炎的特征性体征，下列哪项错误？", "o": {"A": "睫状充血", "B": "角膜后尘状KP", "C": "瞳孔缩小", "D": "前房闪辉（+）", "E": "眼压升高"}, "a": "E", "e": "急性前葡萄膜炎体征：睫状充血+角膜后KP+前房闪辉（Tyndall+）+瞳孔缩小+虹膜后粘连。", "author": "唐晔", "group": "眼科出题第二组"}, {"q": "关于Vogt-小柳-原田综合征，下列哪项正确？", "o": {"A": "单眼发病", "B": "眼底表现为晚霞样眼底", "C": "不伴有听力障碍", "D": "无需激素治疗", "E": "多见于老年人"}, "a": "B", "e": "VKH综合征：双眼渗出性视网膜脱离+晚霞样眼底+头痛耳鸣+皮肤白癜风/毛发变白。自身免疫性全葡萄膜炎。", "author": "唐晔", "group": "眼科出题第二组"}, {"q": "皮质性白内障膨胀期的主要危险是？", "o": {"A": "继发性青光眼", "B": "晶状体脱位", "C": "视网膜脱离", "D": "玻璃体积血", "E": "角膜内皮失代偿"}, "a": "A", "e": "膨胀期：晶状体吸水膨胀→前房变浅+虹膜投影阳性，可能诱发急性闭角型青光眼。", "author": "唐晔", "group": "眼科出题第二组"}, {"q": "目前白内障手术的常规术式是？", "o": {"A": "白内障囊内摘除术", "B": "白内障囊外摘除术", "C": "超声乳化白内障吸除术+人工晶体植入术", "D": "激光辅助囊膜切开术", "E": "晶状体吸除术"}, "a": "C", "e": "正确答案：超声乳化白内障吸除术+人工晶体植入术。", "author": "唐晔", "group": "眼科出题第二组"}, {"q": "交感性眼炎的发生最常见于？", "o": {"A": "白内障术后", "B": "眼球穿通伤后", "C": "角膜异物剔除术后", "D": "视网膜光凝术后", "E": "青光眼滤过术后"}, "a": "B", "e": "六、见习讨论青光眼（5题）", "author": "唐晔", "group": "眼科出题第二组"}, {"q": "关于原发性急性闭角型青光眼急性发作期的临床表现，下列哪项错误？", "o": {"A": "剧烈眼痛伴同侧头痛", "B": "角膜雾状水肿", "C": "前房变深", "D": "瞳孔散大固定", "E": "眼压常＞40mmHg"}, "a": "C", "e": "急性闭角型青光眼发作时，因虹膜膨隆前推、房角关闭，前房变浅而非变深。前房变深是开角型青光眼或正常眼的特征，本题选C为错误项。", "author": "唐晔", "group": "眼科出题第二组"}, {"q": "下列哪种药物禁用于急性闭角型青光眼发作期？", "o": {"A": "毛果芸香碱", "B": "噻吗洛尔", "C": "布林佐胺", "D": "阿托品", "E": "甘露醇"}, "a": "D", "e": "急性闭角型青光眼禁用散瞳药（阿托品、复方托吡卡胺），因散瞳可加重房角关闭、升高眼压。", "author": "唐晔", "group": "眼科出题第二组"}, {"q": "关于青光眼视野损害，下列哪项是最早出现的表现？", "o": {"A": "管状视野", "B": "颞侧视岛", "C": "旁中心暗点", "D": "环形暗点", "E": "鼻侧阶梯"}, "a": "C", "e": "青光眼视野损害最早表现为旁中心暗点，位于Bjerrum区（10～20度范围）。随病情进展逐渐形成弓形暗点、环形暗点，最终仅剩管状视野。", "author": "唐晔", "group": "眼科出题第二组"}, {"q": "前列腺素衍生物降眼压的主要机制是？", "o": {"A": "减少房水生成", "B": "增加葡萄膜巩膜途径房水外流", "C": "收缩瞳孔", "D": "开放小梁网", "E": "脱水降低眼压"}, "a": "B", "e": "正确答案：增加葡萄膜巩膜途径房水外流。", "author": "唐晔", "group": "眼科出题第二组"}, {"q": "下列哪项不是原发性开角型青光眼的特征？", "o": {"A": "房角开放", "B": "眼压升高", "C": "前房浅", "D": "视盘凹陷扩大", "E": "视野缺损"}, "a": "C", "e": "七、见习讨论屈光不正、斜弱视（5题）", "author": "唐晔", "group": "眼科出题第二组"}, {"q": "关于正视眼的定义，下列正确的是？", "o": {"A": "平行光线聚焦于视网膜前", "B": "平行光线聚焦于视网膜后", "C": "平行光线聚焦于视网膜上", "D": "需要调节才能看清远处", "E": "近视力低于远视力"}, "a": "C", "e": "正确答案：平行光线聚焦于视网膜上。", "author": "唐晔", "group": "眼科出题第二组"}, {"q": "关于远视眼的临床表现，下列哪项正确？", "o": {"A": "易形成外斜视", "B": "远视力正常，近视力差", "C": "老年后症状减轻", "D": "不易发生弱视", "E": "眼底无异常"}, "a": "B", "e": "正确答案：远视力正常，近视力差。", "author": "唐晔", "group": "眼科出题第二组"}, {"q": "弱视治疗的关键是？", "o": {"A": "早发现、早治疗", "B": "首选手术治疗", "C": "仅需配镜", "D": "12岁后治疗效果最佳", "E": "无需遮盖治疗"}, "a": "A", "e": "弱视治疗最佳年龄为3-6岁（视觉发育关键期）。超过12岁治疗效果极差。早发现早治疗是关键。", "author": "唐晔", "group": "眼科出题第二组"}, {"q": "下列哪项不属于双眼单视功能的分级？", "o": {"A": "同时视", "B": "融合功能", "C": "立体视", "D": "色觉", "E": "以上均是"}, "a": "D", "e": "双眼单视功能三级：同时视（最低）→融合→立体视（最高）。同视机可检查各级功能。", "author": "唐晔", "group": "眼科出题第二组"}, {"q": "麻痹性斜视与共同性斜视的鉴别要点中，麻痹性斜视的特征是？", "o": {"A": "第一斜视角=第二斜视角", "B": "无复视", "C": "眼球运动不受限", "D": "第二斜视角＞第一斜视角", "E": "无代偿头位"}, "a": "D", "e": "八、见习讨论视神经疾病、眼与全身病（5题）", "author": "唐晔", "group": "眼科出题第二组"}, {"q": "关于视神经炎的临床表现，下列哪项错误？", "o": {"A": "突然视力下降", "B": "眼球转动痛", "C": "RAPD阳性", "D": "视野中心暗点", "E": "眼压升高"}, "a": "E", "e": "视神经炎典型表现：中青年突发视力下降+眼球转动痛+RAPD+中心暗点。", "author": "唐晔", "group": "眼科出题第二组"}, {"q": "糖尿病性视网膜病变（DR）中，重度非增殖期的“4-2-1”原则不包括？", "o": {"A": "4个象限视网膜出血≥20个出血点", "B": "2个象限静脉串珠", "C": "1个象限视网膜内微血管异常（IRMA）", "D": "1个象限新生血管", "E": "以上均包括"}, "a": "D", "e": "重度NPDR的4-2-1原则：4个象限严重出血+2个象限静脉串珠+1个象限IRMA。满足一条可诊断。", "author": "唐晔", "group": "眼科出题第二组"}, {"q": "甲状腺相关眼病（TAO）最常见的眼部体征是？", "o": {"A": "眼球突出", "B": "复视", "C": "眼睑退缩", "D": "视神经病变", "E": "暴露性角膜炎"}, "a": "C", "e": "甲状腺相关眼病（TAO）最常见表现为眼睑退缩+眼球突出。CT可见眼外肌梭形肥大（下直肌最常受累），肌腱不受累（不同于炎性假瘤）。", "author": "唐晔", "group": "眼科出题第二组"}, {"q": "早产儿视网膜病变（ROP）的主要危险因素是？", "o": {"A": "母体糖尿病", "B": "低出生体重、吸氧史", "C": "先天性白内障", "D": "青光眼家族史", "E": "妊娠期高血压"}, "a": "B", "e": "正确答案：低出生体重、吸氧史。", "author": "唐晔", "group": "眼科出题第二组"}, {"q": "白血病眼底病变中，Roth斑的特征是？", "o": {"A": "视网膜出血中心有白芯", "B": "视网膜微血管瘤", "C": "棉绒斑", "D": "黄斑水肿", "E": "视盘水肿"}, "a": "A", "e": "九、见习讨论眼外伤（3题 + 1道病例分析 + 1道简答）", "author": "唐晔", "group": "眼科出题第二组"}, {"q": "关于眼化学伤，急救的首要措施是？", "o": {"A": "立即送医院", "B": "现场立即大量清水冲洗", "C": "滴抗生素眼药水", "D": "包扎双眼", "E": "口服止痛药"}, "a": "B", "e": "正确答案：现场立即大量清水冲洗。", "author": "唐晔", "group": "眼科出题第二组"}, {"q": "电光性眼炎的潜伏期一般为？", "o": {"A": "立即发病", "B": "1-2小时", "C": "3-8小时", "D": "12-24小时", "E": "24小时以上"}, "a": "C", "e": "电光性眼炎（紫外线角膜结膜炎）潜伏期4-6小时，典型症状：剧烈眼痛、畏光、流泪。常见于电焊工未戴防护镜。", "author": "唐晔", "group": "眼科出题第二组"}, {"q": "眼球穿通伤的正确处理是？", "o": {"A": "立即滴眼药水", "B": "冲洗伤口", "C": "无菌纱布遮盖，避免挤压", "D": "热敷促进吸收", "E": "按摩眼球"}, "a": "C", "e": "病例分析题 患者男，45岁，农民。右眼被谷粒击伤后红痛伴视力下降15天。视力：右眼0.02，左眼0.8。裂隙灯检查：混合充血，角膜中央5mm×4mm灰白色致密隆起病灶，边缘沟状凹陷，深基质层羽毛状浸润，前房积脓2mm。角膜刮片见菌丝。 问题： （1）最可能的诊断是什么？（2分） （2）写出该病的典型体征（至少3个）。（3分） （3）简述治疗原则。（5分） 参考答案： （1）真菌性角膜炎。 （2）菌丝苔被、卫星灶、前房积脓粘稠、羽毛状浸润、免疫环等。", "author": "唐晔", "group": "眼科出题第二组"}, {"q": "一患者角膜外伤后出现眼痛、畏光、流泪，裂隙灯下见角膜上皮缺损，荧光素染色阳性。此时最可能损伤的角膜结构是：", "o": {"A": "上皮细胞层", "B": "前弹力层", "C": "基质层", "D": "后弹力层", "E": "内皮细胞层"}, "a": "A", "e": "【答案】A 角膜上皮层是角膜的最外层，容易受损，荧光素染色可显示上皮缺损。上皮层可再生，修复后一般不留瘢痕。", "author": "王中侯", "group": "眼科出题第二组"}, {"q": "下列哪项是房水循环的主要流出通道？", "o": {"A": "虹膜表面隐窝", "B": "葡萄膜巩膜途径", "C": "小梁网Schlemm管系统", "D": "视网膜中央静脉", "E": "脉络膜上腔"}, "a": "C", "e": "【答案】C 约70%的房水通过小梁网Schlemm管系统排出，是房水外流的主要途径。葡萄膜巩膜途径占10-20%。", "author": "王中侯", "group": "眼科出题第二组"}, {"q": "一位老年患者主诉无痛性、渐进性视力下降，裂隙灯下见晶状体核呈黄褐色混浊，皮质楔形混浊。最可能的诊断是：", "o": {"A": "先天性白内障", "B": "年龄相关性白内障", "C": "并发性白内障", "D": "外伤性白内障", "E": "代谢性白内障"}, "a": "B", "e": "【答案】B 年龄相关性白内障最常见于老年人，表现为无痛性、渐进性视力下降，核性及皮质性混浊是典型表现。", "author": "王中侯", "group": "眼科出题第二组"}, {"q": "眼底检查时，见到视网膜深层的小圆形、暗红色出血点，通常提示出血位于：", "o": {"A": "玻璃体", "B": "神经纤维层", "C": "外丛状层", "D": "视网膜下", "E": "脉络膜"}, "a": "C", "e": "【答案】C 深层出血位于外丛状层，呈小圆形或点状；浅层（神经纤维层）出血呈火焰状。", "author": "王中侯", "group": "眼科出题第二组"}, {"q": "急性虹膜睫状体炎患者，局部使用阿托品滴眼液的主要治疗目的是：", "o": {"A": "降低眼压", "B": "抗感染", "C": "防止虹膜后粘连", "D": "促进角膜上皮修复", "E": "减轻睫状充血"}, "a": "C", "e": "【答案】C 散瞳剂的首要目的是预防和拉开虹膜后粘连，避免瞳孔闭锁、继发性青光眼等严重并发症。", "author": "王中侯", "group": "眼科出题第二组"}, {"q": "检查发现患者右眼RAPD阳性。该体征最常提示：", "o": {"A": "右眼屈光不正", "B": "右眼白内障", "C": "右眼视神经病变", "D": "右眼黄斑病变", "E": "右眼角膜斑翳"}, "a": "C", "e": "【答案】C RAPD（相对性传入性瞳孔障碍）提示患侧视神经传导障碍，是视神经疾病的典型体征。", "author": "王中侯", "group": "眼科出题第二组"}, {"q": "一名工人在工厂被碱性液体溅入左眼，现场最紧急的处理措施是：", "o": {"A": "立即送往医院", "B": "用大量清水反复冲洗左眼至少30分钟", "C": "滴用表面麻醉剂止痛", "D": "滴用抗生素眼药水", "E": "包扎双眼后送医"}, "a": "B", "e": "【答案】B 化学性眼烧伤（尤其碱烧伤）应立即用大量清水冲洗至少30分钟，稀释和清除化学物质，这是唯一能减少损伤的现场急救措施。", "author": "王中侯", "group": "眼科出题第二组"}, {"q": "患者有房颤病史，突发右眼无痛性视力降至光感，眼底见黄斑区“樱桃红点”，视网膜动脉极细。最可能的诊断是：", "o": {"A": "视网膜中央静脉阻塞", "B": "视网膜中央动脉阻塞", "C": "缺血性视神经病变", "D": "孔源性视网膜脱离", "E": "玻璃体积血"}, "a": "B", "e": "【答案】B 无痛性、突发视力急剧下降，加上“樱桃红点”是CRAO的典型表现，房颤是栓塞的重要病因。", "author": "王中侯", "group": "眼科出题第二组"}, {"q": "急性闭角型青光眼发作期，静脉滴注20%甘露醇前，必须重点评估患者的哪一项情况？", "o": {"A": "血压水平", "B": "有无磺胺过敏史", "C": "心功能和肾功能", "D": "有无消化道溃疡", "E": "有无哮喘病史"}, "a": "C", "e": "【答案】C 甘露醇是高渗脱水剂，可加重心、肾功能不全患者的负担，使用前必须评估心肾功能。", "author": "王中侯", "group": "眼科出题第二组"}, {"q": "关于晶状体的营养来源，正确的是：", "o": {"A": "主要来自睫状前动脉", "B": "主要来自视网膜中央动脉", "C": "主要来自房水和玻璃体", "D": "主要来自角膜缘血管网", "E": "主要来自脉络膜毛细血管"}, "a": "C", "e": "【答案】C 晶状体无血管，其营养主要来源于房水和玻璃体。", "author": "王中侯", "group": "眼科出题第二组"}, {"q": "原发性开角型青光眼的一线首选降眼压药物是：", "o": {"A": "毛果芸香碱滴眼液", "B": "噻吗洛尔滴眼液", "C": "曲伏前列素滴眼液", "D": "布林佐胺滴眼液", "E": "溴莫尼定滴眼液"}, "a": "C", "e": "【答案】C 前列腺素衍生物（如曲伏前列素、拉坦前列素）降眼压效果强、作用持久、全身副作用小，是目前POAG的一线用药。", "author": "王中侯", "group": "眼科出题第二组"}, {"q": "一眼发生眼球穿通伤后，另一眼在伤后48周出现葡萄膜炎，最可能的诊断是：", "o": {"A": "转移性眼内炎", "B": "外伤性交感性眼炎", "C": "白塞病", "D": "Vogt小柳原田综合征", "E": "虹膜睫状体炎"}, "a": "B", "e": "【答案】B 交感性眼炎的定义：一眼穿通伤或内眼手术后，另一眼出现肉芽肿性全葡萄膜炎，好发于伤后48周。", "author": "王中侯", "group": "眼科出题第二组"}, {"q": "甲状腺相关眼病患者，嘱其双眼向下看时，上眼睑不能随眼球下移，巩膜持续暴露。此体征称为：", "o": {"A": "眼睑退缩", "B": "迟落征", "C": "上睑下垂", "D": "眼睑痉挛", "E": "日落征"}, "a": "B", "e": "【答案】B von Graefe征（迟落征）是TAO的特征性体征，与眼睑退缩共同构成典型表现。", "author": "王中侯", "group": "眼科出题第二组"}, {"q": "下列哪种情况下局部使用糖皮质激素是绝对禁忌的？", "o": {"A": "春季角结膜炎急性发作", "B": "角膜树枝状病毒感染", "C": "急性前葡萄膜炎", "D": "巩膜炎", "E": "甲状腺相关眼病活动期"}, "a": "B", "e": "【答案】B 单纯疱疹病毒性角膜炎（树枝状）使用激素会抑制局部免疫，导致病毒扩散、溃疡加重甚至穿孔，是绝对禁忌。", "author": "王中侯", "group": "眼科出题第二组"}, {"q": "患者右眼球不能向上、向内、向下转动，向外转动正常，伴上睑下垂和瞳孔散大。受损的神经是：", "o": {"A": "动眼神经（III）", "B": "滑车神经（IV）", "C": "外展神经（VI）", "D": "面神经（VII）", "E": "三叉神经眼支"}, "a": "A", "e": "【答案】A 动眼神经支配除上斜肌和外直肌外的所有眼外肌，以及提上睑肌和瞳孔括约肌。其完全性麻痹表现为眼球外斜视、上睑下垂、瞳孔散大。", "author": "王中侯", "group": "眼科出题第二组"}, {"q": "患者有明确的植物性角膜外伤史，亚急性起病，角膜溃疡表面干燥呈“牙膏样”，有卫星灶。最可能的病原体是：", "o": {"A": "金黄色葡萄球菌", "B": "肺炎链球菌", "C": "单纯疱疹病毒", "D": "真菌", "E": "腺病毒"}, "a": "D", "e": "【答案】D 植物外伤史、慢性病程、干燥“牙膏样”溃疡、卫星灶是真菌性角膜炎的典型特征。", "author": "王中侯", "group": "眼科出题第二组"}, {"q": "视网膜中央动脉阻塞（CRAO）患者，下列哪项治疗措施可快速降低眼压、增加视网膜灌注压？", "o": {"A": "球后注射地塞米松", "B": "前房穿刺", "C": "口服乙酰唑胺", "D": "静脉滴注甘露醇", "E": "眼球按摩"}, "a": "B", "e": "【答案】B 前房穿刺能迅速降低眼压，扩张视网膜动脉，增加灌注压，是CRAO急救的常用手段之一。甘露醇和口服药物起效相对较慢。", "author": "王中侯", "group": "眼科出题第二组"}, {"q": "急性前葡萄膜炎患者，若同时存在浅前房，使用阿托品散瞳时应格外谨慎，因为：", "o": {"A": "阿托品可加重房水混浊", "B": "阿托品可诱发闭角型青光眼", "C": "阿托品可导致角膜内皮失代偿", "D": "阿托品可引起晶状体混浊", "E": "阿托品可抑制房水分泌"}, "a": "B", "e": "【答案】B 阿托品是强效散瞳剂，可使房角进一步变窄，在浅前房或房角狭窄患者中可能诱发急性闭角型青光眼。", "author": "王中侯", "group": "眼科出题第二组"}, {"q": "一名25岁女性，感冒后出现右眼视力下降至0.1，眼球转动痛，眼底正常。最有助于诊断的检查是：", "o": {"A": "眼压测量", "B": "荧光素眼底血管造影", "C": "视野检查", "D": "眼部B超", "E": "光学相干断层扫描"}, "a": "C", "e": "【答案】C 年轻患者、感冒前驱史、转动痛、视力下降但眼底正常，首先考虑球后视神经炎，视野检查可显示中心暗点，具有诊断价值。", "author": "王中侯", "group": "眼科出题第二组"}, {"q": "患者突发眼前固定黑影遮挡，伴闪光感，有高度近视史。为明确诊断，首选的检查是：", "o": {"A": "眼压测量", "B": "裂隙灯检查", "C": "散瞳后三面镜检查眼底", "D": "眼部B超", "E": "眼眶CT"}, "a": "C", "e": "【答案】C 高度近视、闪光感、固定黑影高度提示孔源性视网膜脱离，散瞳后三面镜检查可直接发现裂孔和视网膜脱离。", "author": "王中侯", "group": "眼科出题第二组"}, {"q": "患者，男，30岁，电焊工，工作时未戴防护镜，6小时后出现双眼剧痛、畏光、流泪、异物感。裂隙灯下见角膜弥漫性点状上皮缺损，荧光素染色阳性。最可能的诊断是：", "o": {"A": "细菌性角膜炎", "B": "真菌性角膜炎", "C": "电光性眼炎", "D": "暴露性角膜炎", "E": "角膜异物"}, "a": "C", "e": "【答案】C 电焊紫外线照射后出现潜伏期（6-8小时），典型表现为双眼剧痛、畏光、流泪，角膜弥漫性点状上皮脱落，称为电光性眼炎。", "author": "王中侯", "group": "眼科出题第二组"}, {"q": "患者，女，65岁，左眼视物变形、中心暗点1周。为明确黄斑区是否存在新生血管，首选的、最快速的无创检查是：", "o": {"A": "眼底彩色照相", "B": "OCT", "C": "FFA", "D": "B超", "E": "VEP"}, "a": "B", "e": "【答案】B OCT可以快速、无创、高分辨率显示黄斑区结构，判断有无水肿、积液或新生血管，是首选检查。", "author": "王中侯", "group": "眼科出题第二组"}, {"q": "患者，女，58岁，傍晚在暗室看电影后突感左眼胀痛、虹视、视力下降，休息后缓解。查体：左眼前房浅，瞳孔稍大，眼压32mmHg。最可能的诊断是：", "o": {"A": "原发性开角型青光眼", "B": "急性闭角型青光眼先兆期", "C": "急性闭角型青光眼急性发作期", "D": "慢性闭角型青光眼", "E": "高眼压症"}, "a": "B", "e": "【答案】B 有暗室诱因，虹视、眼胀，休息后自行缓解，眼压中度升高，符合急性闭角型青光眼先兆期（小发作）。", "author": "王中侯", "group": "眼科出题第二组"}, {"q": "糖尿病患者，右眼视力0.4，眼底检查：后极部见微血管瘤、点状出血、硬性渗出，未见新生血管。该患者的DR分期是：", "o": {"A": "轻度非增殖期", "B": "中度非增殖期", "C": "重度非增殖期", "D": "增殖早期", "E": "增殖晚期"}, "a": "B", "e": "【答案】B 仅见微血管瘤、少量出血和硬性渗出，无静脉串珠、IRMA或新生血管，属于中度非增殖期。", "author": "王中侯", "group": "眼科出题第二组"}, {"q": "患者，女，75岁，右眼视力渐进性下降3年，近3天出现右眼胀痛、同侧头痛、恶心。查体：右眼视力手动/眼前，角膜水肿，前房极浅，眼压48mmHg，晶状体灰白色混浊。最可能的诊断是：", "o": {"A": "白内障过熟期继发青光眼", "B": "白内障膨胀期继发青光眼", "C": "原发性急性闭角型青光眼", "D": "晶状体溶解性青光眼", "E": "新生血管性青光眼"}, "a": "B", "e": "【答案】B 老年人，有白内障病史，近期出现高眼压、浅前房、晶状体灰白色混浊，符合膨胀期白内障继发青光眼。", "author": "王中侯", "group": "眼科出题第二组"}, {"q": "患者，男，40岁，农民，右眼被玉米叶划伤后10天，出现眼红、畏光、视力下降至0.05。检查：角膜中央灰白色溃疡，表面干燥呈“苔藓样”，周围有卫星灶，前房下方有灰白色粘稠积脓。抗生素治疗无效。最可能的病原体是：", "o": {"A": "金黄色葡萄球菌", "B": "铜绿假单胞菌", "C": "单纯疱疹病毒", "D": "真菌", "E": "棘阿米巴"}, "a": "D", "e": "【答案】D 植物外伤史、抗生素无效、干燥苔藓样溃疡、卫星灶、粘稠积脓是真菌性角膜炎的典型特征。", "author": "王中侯", "group": "眼科出题第二组"}, {"q": "高度近视患者，左眼突然出现闪光感、飞蚊增多，2天后颞侧出现固定黑影遮挡。此时首选的检查是：", "o": {"A": "眼压测量", "B": "裂隙灯检查", "C": "散瞳后三面镜检查眼底", "D": "眼部B超", "E": "视野检查"}, "a": "C", "e": "【答案】C 高度近视、闪光感、飞蚊、固定黑影高度提示孔源性视网膜脱离，散瞳后三面镜检查是诊断关键。", "author": "王中侯", "group": "眼科出题第二组"}, {"q": "患者，女，26岁，1周前“感冒”，2天来右眼视力从1.0降至0.1，眼球转动痛。右眼RAPD阳性，眼底正常。最可能的诊断是：", "o": {"A": "视乳头炎", "B": "球后视神经炎", "C": "前部缺血性视神经病变", "D": "垂体瘤", "E": "视网膜中央动脉阻塞"}, "a": "B", "e": "【答案】B 青年、感冒前驱史、转动痛、视力下降、眼底正常、RAPD阳性，是球后视神经炎的典型表现。", "author": "王中侯", "group": "眼科出题第二组"}, {"q": "患者，男，32岁，右眼红痛、畏光、视力轻度下降3天。查体：睫状充血（+），角膜后见尘状KP，前房闪辉（+），瞳孔缩小。下列哪项治疗措施最关键？", "o": {"A": "立即前房穿刺", "B": "局部使用糖皮质激素", "C": "局部使用阿托品散瞳", "D": "静脉滴注甘露醇", "E": "口服乙酰唑胺"}, "a": "C", "e": "【答案】C 急性前葡萄膜炎治疗的核心是散瞳，防止虹膜后粘连。局部激素是辅助抗炎，但散瞳是首要措施。", "author": "王中侯", "group": "眼科出题第二组"}, {"q": "患者，男，68岁，双眼视力缓慢下降2年，无眼痛。查体：右眼视力0.3，左眼0.4，眼压右眼26mmHg、左眼28mmHg，前房深度正常，房角开放，右眼C/D=0.7，左眼C/D=0.8。该患者最可能的诊断是：", "o": {"A": "急性闭角型青光眼", "B": "慢性闭角型青光眼", "C": "原发性开角型青光眼", "D": "正常眼压性青光眼", "E": "高眼压症"}, "a": "C", "e": "【答案】C 眼压升高、房角开放、视盘凹陷扩大，符合原发性开角型青光眼。", "author": "王中侯", "group": "眼科出题第二组"}, {"q": "一名房角狭窄的患者，准备行眼底检查需要散瞳，为预防急性闭角型青光眼发作，可优先选择：", "o": {"A": "复方托吡卡胺", "B": "阿托品", "C": "后马托品", "D": "不去散瞳，直接检查", "E": "散瞳后立即行激光虹膜周切"}, "a": "A", "e": "【答案】A 复方托吡卡胺是短效散瞳剂，作用时间短，可减少诱发闭角型青光眼的风险。阿托品等长效散瞳剂禁用。", "author": "王中侯", "group": "眼科出题第二组"}, {"q": "患者，男，52岁，右眼被拳头击伤后视力下降，查体：前房下方见约2mm血液平面，眼压32mmHg。首选的治疗是：", "o": {"A": "立即前房冲洗", "B": "半卧位休息，止血，降眼压", "C": "立即行小梁切除术", "D": "大量糖皮质激素冲击", "E": "包扎双眼，绝对卧床"}, "a": "B", "e": "【答案】B 外伤性前房积血，积血量少于1/3前房，无继发性青光眼严重表现时，采取半卧位（利于积血沉降）、止血、降眼压等保守治疗。", "author": "王中侯", "group": "眼科出题第二组"}, {"q": "患者，男，45岁，右眼被铁屑击伤，角膜缘全层裂伤，虹膜脱出。下列哪项急诊处理是正确的？", "o": {"A": "立即用抗生素眼药水冲洗结膜囊", "B": "用棉签将脱出的虹膜还纳", "C": "无菌纱布轻盖，加眼罩保护，尽快手术", "D": "局部热敷促进吸收", "E": "立即行前房穿刺放液"}, "a": "C", "e": "【答案】C 眼球穿通伤严禁挤压、冲洗、还纳脱出组织，应用无菌纱布轻盖加眼罩保护，尽快手术。", "author": "王中侯", "group": "眼科出题第二组"}, {"q": "糖尿病患者，OCT显示黄斑中心凹下积液（CIDME），最佳治疗方法是：", "o": {"A": "全视网膜激光光凝", "B": "玻璃体腔注射抗VEGF药物", "C": "口服大剂量维生素C", "D": "眼球后注射曲安奈德", "E": "严格控制血糖并观察6个月"}, "a": "B", "e": "【答案】B 累及中心凹的糖尿病黄斑水肿，抗VEGF玻璃体腔注射是一线治疗方案。", "author": "王中侯", "group": "眼科出题第二组"}, {"q": "最可能的诊断是：", "o": {"A": "细菌性角膜炎", "B": "真菌性角膜炎", "C": "单纯疱疹病毒性角膜炎", "D": "棘阿米巴角膜炎", "E": "暴露性角膜炎"}, "a": "B", "e": "【答案】B 植物外伤史、抗生素无效、干燥苔藓样溃疡、卫星灶、粘稠积脓是真菌性角膜炎的典型特征。", "author": "王中侯", "group": "眼科出题第二组"}, {"q": "为快速明确病原体，首选的检查是：", "o": {"A": "角膜刮片镜检", "B": "角膜共焦显微镜", "C": "真菌培养", "D": "眼部B超", "E": "前房穿刺"}, "a": "A", "e": "【答案】A 角膜刮片镜检（KOH湿片或革兰染色）操作简单，可快速发现真菌菌丝。", "author": "王中侯", "group": "眼科出题第二组"}, {"q": "下列哪项治疗措施是错误的？", "o": {"A": "局部使用那他霉素滴眼液", "B": "局部使用两性霉素B滴眼液", "C": "联合使用糖皮质激素滴眼液减轻炎症", "D": "必要时行角膜移植", "E": "禁用糖皮质激素"}, "a": "C", "e": "【答案】C 真菌性角膜炎绝对禁用糖皮质激素，否则会加重真菌繁殖，导致病情恶化甚至角膜穿孔。 病例二（眼球穿通伤） 患者，男，28岁，建筑工人。右眼被铁钉弹伤后剧痛、视力丧失30分钟。查体：右眼无光感，角膜缘4点钟方位见一约4mm全层裂伤口，虹膜脱出嵌顿，前房消失，眼压低。", "author": "王中侯", "group": "眼科出题第二组"}, {"q": "急诊处理中，下列哪项操作绝对禁止？", "o": {"A": "用无菌纱布轻盖伤眼", "B": "全身应用广谱抗生素", "C": "尝试将脱出的虹膜还纳", "D": "注射破伤风抗毒素", "E": "完善术前检查，尽快手术"}, "a": "C", "e": "【答案】C 严禁还纳脱出的眼内组织，应在手术室清创后处理，以免加重感染和损伤。", "author": "王中侯", "group": "眼科出题第二组"}, {"q": "该患者远期最需要警惕的严重并发症是：", "o": {"A": "外伤性白内障", "B": "继发性青光眼", "C": "交感性眼炎", "D": "角膜白斑", "E": "眼球萎缩"}, "a": "C", "e": "【答案】C 交感性眼炎是穿通伤最严重的远期并发症，可导致健眼失明，好发于伤后2周至2个月。 病例三（孔源性视网膜脱离） 患者，男，22岁，双眼高度近视（-8.0D）。主诉左眼眼前固定黑影遮挡1天。2天前有闪光感和飞蚊症。查体：左眼视力0.08，眼压10mmHg。散瞳后三面镜检查：玻璃体腔内可见色素颗粒（“烟草粉尘”），视盘颞上方马蹄形裂孔，相应区域视网膜青灰色隆起。", "author": "王中侯", "group": "眼科出题第二组"}, {"q": "该患者最可能的诊断是：", "o": {"A": "玻璃体后脱离", "B": "孔源性视网膜脱离", "C": "渗出性视网膜脱离", "D": "牵拉性视网膜脱离", "E": "黄斑裂孔"}, "a": "B", "e": "【答案】B 高度近视、闪光感、固定黑影、色素颗粒、裂孔、视网膜隆起，符合孔源性视网膜脱离。", "author": "王中侯", "group": "眼科出题第二组"}, {"q": "为进一步评估裂孔位置、范围及有无累及黄斑，下列哪项检查最有价值？", "o": {"A": "眼部B超", "B": "光学相干断层扫描（OCT）", "C": "荧光素眼底血管造影（FFA）", "D": "视野检查", "E": "视觉诱发电位"}, "a": "B", "e": "【答案】B OCT可清晰显示黄斑区是否受累，以及视网膜脱离的范围和高度。B超在屈光间质混浊时有用，但本例能看清眼底，OCT更精确。", "author": "王中侯", "group": "眼科出题第二组"}, {"q": "该患者首选的治疗方法是：", "o": {"A": "绝对卧床休息，促进自行吸收", "B": "激光光凝封闭裂孔", "C": "巩膜扣带术或玻璃体切除术", "D": "玻璃体腔注气术", "E": "口服止血药物"}, "a": "C", "e": "【答案】C 孔源性视网膜脱离一旦发生，必须手术封闭裂孔，根据裂孔位置、范围、有无黄斑脱离选择外路（巩膜扣带）或内路（玻璃体切除）。 第二部分：简答题 试述原发性急性闭角型青光眼急性发作期的急诊处理原则及主要措施。 【答案要点】 原则：争分夺秒，多管齐下，迅速降低眼压，保护视神经，为后续手术治疗创造条件。 主要措施：", "author": "王中侯", "group": "眼科出题第二组"}, {"q": "关于年龄相关性（老年性）白内障，目前最成熟有效的治疗方法是？", "o": {"A": "药物治疗", "B": "激光治疗", "C": "手术治疗", "D": "中医针灸治疗"}, "a": "C", "e": "目前尚无药物能有效阻止或逆转白内障进展，手术摘除混浊晶状体并植入人工晶状体是唯一经证实的成熟有效治疗方法。", "author": "林炜杰", "group": "眼科出题第二组"}, {"q": "根据现代的手术时机观点，当白内障导致患者视力低于多少，且影响工作与生活时即可考虑手术？", "o": {"A": "0.1", "B": "0.3", "C": "0.5", "D": "0.8"}, "a": "C", "e": "白内障手术时机：视力低于0.5且影响工作生活即可手术，不必等到成熟期。", "author": "林炜杰", "group": "眼科出题第二组"}, {"q": "以下哪项是皮质性白内障膨胀期的典型体征？", "o": {"A": "虹膜投影（+）", "B": "囊膜皱缩", "C": "晶体核下沉", "D": "角膜后色素性KP"}, "a": "A", "e": "正确答案：虹膜投影（+）。", "author": "林炜杰", "group": "眼科出题第二组"}, {"q": "青光眼特征性的视盘改变是：", "o": {"A": "视盘充血", "B": "视盘水肿", "C": "视盘凹陷扩大", "D": "视盘苍白"}, "a": "C", "e": "正确答案：视盘凹陷扩大。", "author": "林炜杰", "group": "眼科出题第二组"}, {"q": "关于眼压，以下哪项描述是正确的？", "o": {"A": "正常人眼压是绝对恒定的", "B": "正常眼压范围是10-21mmHg", "C": "眼压高于21mmHg即可诊断为青光眼", "D": "眼压主要受晶状体变化影响"}, "a": "B", "e": "正确答案：正常眼压范围是10-21mmHg。", "author": "林炜杰", "group": "眼科出题第二组"}, {"q": "对于原发性急性闭角型青光眼急性发作期，以下哪项处理是首选且最紧急的？", "o": {"A": "立即行小梁切除术", "B": "联合使用降眼压药物、高渗剂等控制眼压", "C": "行激光周边虹膜切除术", "D": "口服营养神经药物"}, "a": "B", "e": "急救：甘露醇iv快速脱水+局部β阻滞剂/碳酸酐酶抑制剂缩瞳+前房穿刺。眼压控制后行激光虹膜周切术。", "author": "林炜杰", "group": "眼科出题第二组"}, {"q": "毛果芸香碱降低眼压的主要机制是？", "o": {"A": "减少房水生成", "B": "增加巩膜葡萄膜途径的房水外流", "C": "缩小瞳孔，开放房角，增加房水外流", "D": "高渗作用，使玻璃体浓缩"}, "a": "C", "e": "毛果芸香碱（缩瞳药）收缩瞳孔括约肌→牵拉小梁网→促进房水外流，主要用于闭角型青光眼。", "author": "林炜杰", "group": "眼科出题第二组"}, {"q": "以下哪种视野缺损是青光眼非常特征性的早期表现？", "o": {"A": "双颞侧偏盲", "B": "管状视野", "C": "旁中心暗点或弓形暗点", "D": "中心暗点"}, "a": "C", "e": "正确答案：旁中心暗点或弓形暗点。", "author": "林炜杰", "group": "眼科出题第二组"}, {"q": "视神经炎患者查体时，典型的瞳孔改变是？", "o": {"A": "双侧瞳孔散大", "B": "阿罗瞳孔（光反射消失，调节反射存在）", "C": "相对性传入性瞳孔障碍（RAPD，+）", "D": "双侧瞳孔缩小"}, "a": "C", "e": "视神经炎典型表现：中青年突发视力下降+眼球转动痛+RAPD+中心暗点。", "author": "林炜杰", "group": "眼科出题第二组"}, {"q": "特发性视神经炎急性期的一线治疗药物是？", "o": {"A": "神经营养药物（如维生素B族）", "B": "糖皮质激素冲击治疗", "C": "抗生素", "D": "扩血管药物"}, "a": "B", "e": "特发性（脱髓鞘性）视神经炎首选糖皮质激素冲击治疗。", "author": "林炜杰", "group": "眼科出题第二组"}, {"q": "视交叉中部的病变，如垂体瘤，最典型的视野改变是？", "o": {"A": "同侧偏盲", "B": "双颞侧偏盲", "C": "同向性象限盲", "D": "中心暗点"}, "a": "B", "e": "（四、眼底病）", "author": "林炜杰", "group": "眼科出题第二组"}, {"q": "视网膜中央动脉阻塞（CRAO）最特征性的眼底表现是？", "o": {"A": "视网膜火焰状出血", "B": "黄斑区樱桃红斑", "C": "视盘水肿", "D": "棉绒斑"}, "a": "B", "e": "CRAO典型表现：视网膜苍白水肿+黄斑樱桃红斑。属眼科急诊，抢救黄金窗口90-120分钟。", "author": "林炜杰", "group": "眼科出题第二组"}, {"q": "视网膜静脉阻塞（RVO）最常引起的、需要积极治疗的并发症是？", "o": {"A": "视网膜下新生血管", "B": "黄斑水肿", "C": "视神经萎缩", "D": "并发性白内障"}, "a": "B", "e": "黄斑水肿是RVO最常见且最主要的并发症，直接导致中心视力显著下降，需及时采用抗VEGF治疗或激光光凝等积极干预。", "author": "林炜杰", "group": "眼科出题第二组"}, {"q": "以下哪种眼底病变是典型的“硬性渗出”？", "o": {"A": "边界不清的灰白色斑", "B": "黄白色、边界清楚的蜡样斑点", "C": "视网膜浅层的线状出血", "D": "视盘边缘的火焰状出血"}, "a": "B", "e": "正确答案：黄白色、边界清楚的蜡样斑点。", "author": "林炜杰", "group": "眼科出题第二组"}, {"q": "以下哪种药物是湿性年龄相关性黄斑变性（wAMD）的一线治疗方法？", "o": {"A": "玻璃体腔注射抗VEGF药物", "B": "口服维生素C、E", "C": "全视网膜激光光凝", "D": "玻璃体切割术"}, "a": "A", "e": "湿性AMD关键病理改变：脉络膜新生血管（CNV）。一线治疗：玻璃体腔抗VEGF注射。", "author": "林炜杰", "group": "眼科出题第二组"}, {"q": "孔源性视网膜脱离的手术核心目的是？", "o": {"A": "清除玻璃体积血", "B": "封闭视网膜裂孔", "C": "取出眼内异物", "D": "降低眼压"}, "a": "B", "e": "正确答案：封闭视网膜裂孔。", "author": "林炜杰", "group": "眼科出题第二组"}, {"q": "关于糖尿病视网膜病变（DR），以下哪项描述是正确的？", "o": {"A": "非增殖期（NPDR）最典型的改变是新生血管", "B": "病程是DR发生发展的独立危险因素", "C": "严格控制血糖不能延缓DR的进展", "D": "全视网膜激光光凝（PRP）是治疗黄斑水肿的首选方法"}, "a": "B", "e": "正确答案：病程是DR发生发展的独立危险因素。", "author": "林炜杰", "group": "眼科出题第二组"}, {"q": "高血压性视网膜病变中，表现为视网膜小动脉急性痉挛、狭窄，可有片状出血和棉绒斑，最可能处于哪个阶段？", "o": {"A": "血管痉挛期", "B": "硬化期", "C": "恶性期", "D": "单纯期"}, "a": "C", "e": "恶性高血压视网膜病变（恶性期）表现为视网膜小动脉急性痉挛、狭窄，伴有片状出血、棉绒斑甚至视盘水肿，是高血压视网膜病变中最严重的阶段。", "author": "林炜杰", "group": "眼科出题第二组"}, {"q": "早产儿视网膜病变（ROP）的主要病因与以下哪项因素最相关？", "o": {"A": "母亲妊娠期糖尿病", "B": "早产、低出生体重和不恰当的吸氧史", "C": "遗传因素", "D": "出生时感染"}, "a": "B", "e": "正确答案：早产、低出生体重和不恰当的吸氧史。", "author": "林炜杰", "group": "眼科出题第二组"}, {"q": "甲状腺相关眼病（TAO）最常见的眼部表现是？", "o": {"A": "眼球内陷", "B": "上眼睑退缩和眼球突出", "C": "瞳孔散大", "D": "角膜知觉减退"}, "a": "B", "e": "甲状腺相关眼病（TAO）最常见表现为眼睑退缩+眼球突出。CT可见眼外肌梭形肥大（下直肌最常受累），肌腱不受累（不同于炎性假瘤）。", "author": "林炜杰", "group": "眼科出题第二组"}, {"q": "真菌性角膜炎患者典型的角膜病灶形态是？", "o": {"A": "树枝状或地图状溃疡", "B": "角膜病灶呈灰白色表面粗糙，伴菌丝苔被、卫星灶", "C": "黄白色、边界清晰的圆形溃疡，伴大量脓性分泌物", "D": "角膜深层的灰白色盘状水肿"}, "a": "B", "e": "真菌性角膜炎特点：亚急性起病，植物外伤史，症状较体征轻，溃疡呈牙膏状灰白，禁用激素。", "author": "林炜杰", "group": "眼科出题第二组"}, {"q": "下列哪项是病毒性角膜炎的禁忌药物？", "o": {"A": "阿昔洛韦滴眼液", "B": "更昔洛韦滴眼液", "C": "糖皮质激素类药物", "D": "干扰素滴眼剂"}, "a": "C", "e": "正确答案：糖皮质激素类药物。", "author": "林炜杰", "group": "眼科出题第二组"}, {"q": "绿脓杆菌性角膜溃疡的典型特征之一是？", "o": {"A": "大量的浆液性分泌物", "B": "前房为粘稠的黄色积脓，不易流动", "C": "角膜溃疡进展迅速，可伴有前房淡黄色积脓", "D": "角膜上皮呈树枝状浸润"}, "a": "C", "e": "铜绿假单胞菌性角膜炎特点：潜伏期短、发展迅猛、淡绿色分泌物、易穿孔、前房积脓。需紧急治疗。", "author": "林炜杰", "group": "眼科出题第二组"}, {"q": "角膜的屈光力大约占眼球总屈光力的多少？", "o": {"A": "20%", "B": "40%", "C": "70%", "D": "90%"}, "a": "C", "e": "角膜屈光力约43D（占总屈光力约2/3），晶状体约19D（约占1/3）。总屈光力约58-60D。", "author": "林炜杰", "group": "眼科出题第二组"}, {"q": "以下哪项检查是诊断角膜上皮缺损的“金标准”？", "o": {"A": "裂隙灯下直接观察", "B": "荧光素钠染色后在钴蓝光下观察", "C": "角膜地形图", "D": "眼压测量"}, "a": "B", "e": "（七、屈光与调节及斜弱视）", "author": "林炜杰", "group": "眼科出题第二组"}, {"q": "一个-6.50D的近视眼患者，其屈光状态属于？", "o": {"A": "轻度近视", "B": "中度近视", "C": "高度近视", "D": "超高度近视"}, "a": "C", "e": "近视分级标准：<-3.00D为轻度，-3.00D～-6.00D为中度，>-6.00D为高度，>-10.00D为超高度近视。-6.50D超过-6.00D，属于高度近视。", "author": "林炜杰", "group": "眼科出题第二组"}, {"q": "老视（老花眼）产生的主要原因是？", "o": {"A": "角膜曲率变平", "B": "眼轴变短", "C": "晶状体硬化，睫状肌力量减弱，调节力下降", "D": "房水折射率改变"}, "a": "C", "e": "正确答案：晶状体硬化，睫状肌力量减弱，调节力下降。", "author": "林炜杰", "group": "眼科出题第二组"}, {"q": "规则散光矫正应选用：", "o": {"A": "凹透镜", "B": "凸透镜", "C": "圆柱透镜", "D": "棱镜"}, "a": "C", "e": "散光是眼球在不同子午线上屈光力不一致，导致平行光线不能聚焦于单一焦点。规则散光可用柱镜矫正。", "author": "林炜杰", "group": "眼科出题第二组"}, {"q": "关于弱视的治疗，下列哪项是最关键的？", "o": {"A": "使用高级神经营养药物", "B": "尽早发现，尽早治疗，尤其是在视觉发育敏感期（12岁前）", "C": "仅配戴合适的眼镜即可", "D": "必须进行手术矫正"}, "a": "B", "e": "弱视治疗最佳年龄为3-6岁（视觉发育关键期）。超过12岁治疗效果极差。早发现早治疗是关键。", "author": "林炜杰", "group": "眼科出题第二组"}, {"q": "下列不是共同性斜视与麻痹性斜视主要的鉴别点是？", "o": {"A": "眼球运动是否受限", "B": "第二斜视角是否大于第一斜视角", "C": "发病年龄", "D": "是否有复视"}, "a": "C", "e": "（八、眼表疾患与干眼）", "author": "林炜杰", "group": "眼科出题第二组"}, {"q": "睑腺炎（麦粒肿）与睑板腺囊肿（霰粒肿）的核心鉴别点是？", "o": {"A": "发生在上睑还是下睑", "B": "有无急性红、肿、热、痛的炎症表现", "C": "肿块的大小", "D": "患者年龄"}, "a": "B", "e": "睑腺炎（麦粒肿）是眼睑腺体急性化脓性炎症，最常见致病菌为金黄色葡萄球菌。", "author": "林炜杰", "group": "眼科出题第二组"}, {"q": "泪道冲洗时，从下泪点进针，冲洗液由上泪点返流，提示阻塞部位可能在？", "o": {"A": "鼻泪管", "B": "泪小管", "C": "泪总管", "D": "泪囊"}, "a": "C", "e": "泪道冲洗：原路返流→泪小管阻塞；下冲上返→泪总管阻塞；返流+脓→慢性泪囊炎（鼻泪管阻塞）。", "author": "林炜杰", "group": "眼科出题第二组"}, {"q": "沙眼是由哪种病原体引起的？", "o": {"A": "腺病毒", "B": "金黄色葡萄球菌", "C": "肺炎衣原体", "D": "沙眼衣原体"}, "a": "D", "e": "沙眼由沙眼衣原体A、B、C血清型引起。我国汤飞凡、张晓楼1955年世界首次分离成功。", "author": "林炜杰", "group": "眼科出题第二组"}, {"q": "诊断干眼症常用的两个客观检查是？", "o": {"A": "裂隙灯检查和眼压测量", "B": "泪液分泌试验（Schirmer试验）和泪膜破裂时间（BUT）", "C": "角膜荧光素染色和眼底照相", "D": "眼部B超和OCT"}, "a": "B", "e": "正确答案：泪液分泌试验（Schirmer试验）和泪膜破裂时间（BUT）。", "author": "林炜杰", "group": "眼科出题第二组"}, {"q": "使用直接检眼镜检查时，记录病变大小常以什么为单位？", "o": {"A": "毫米（mm）", "B": "屈光度（D）", "C": "视盘直径（PD）", "D": "角度（°）"}, "a": "C", "e": "正确答案：视盘直径（PD）。", "author": "林炜杰", "group": "眼科出题第二组"}, {"q": "测量Goldmann压平眼压计时，正常眼压范围是多少mmHg？", "o": {"A": "1-5", "B": "5-10", "C": "10-21", "D": "21-30"}, "a": "C", "e": "正常眼压统计学范围10~21mmHg，24h波动<8mmHg，双眼差值<5mmHg。", "author": "林炜杰", "group": "眼科出题第二组"}, {"q": "裂隙灯检查的“直接焦点照明法”是指？", "o": {"A": "灯光焦点和显微镜焦点完全重合", "B": "用弥散光线观察整体", "C": "灯光照射在病变旁，显微镜观察病变", "D": "利用反射光线观察"}, "a": "A", "e": "裂隙灯常用照明法：直接焦点（最常用）、间接（观察KP/内皮）、后部反光（透明体细微病变）、镜面反射（内皮细胞）、弥散（全貌）。", "author": "林炜杰", "group": "眼科出题第二组"}, {"q": "视野检查中，生理盲点位于？", "o": {"A": "注视点正中心", "B": "注视点鼻侧", "C": "注视点颞侧约15.5°", "D": "下方周边"}, "a": "C", "e": "（十、眼科病历书写与用药）", "author": "林炜杰", "group": "眼科出题第二组"}, {"q": "一份规范的眼科门诊病历，其“主诉”的书写应突出？", "o": {"A": "患者的全部症状", "B": "主要症状或体征+持续时间", "C": "医生的初步诊断", "D": "患者的既往病史"}, "a": "B", "e": "眼科门诊病历核心内容记录顺序：主诉（就诊原因+眼别+症状+持续时间）→现病史→既往史→检查→诊断。", "author": "林炜杰", "group": "眼科出题第二组"}, {"q": "对于细菌性结膜炎，临床最常用的、经验性的一线抗生素滴眼液是？", "o": {"A": "阿昔洛韦滴眼液", "B": "氟康唑滴眼液", "C": "左氧氟沙星滴眼液", "D": "色甘酸钠滴眼液"}, "a": "C", "e": "正确答案：左氧氟沙星滴眼液。", "author": "林炜杰", "group": "眼科出题第二组"}, {"q": "患者有支气管哮喘病史，以下哪种降眼压药物应避免使用？", "o": {"A": "曲伏前列素滴眼液", "B": "布林佐胺滴眼液", "C": "毛果芸香碱滴眼液", "D": "噻吗洛尔滴眼液"}, "a": "D", "e": "正确答案：噻吗洛尔滴眼液。", "author": "林炜杰", "group": "眼科出题第二组"}, {"q": "眼部被生石灰（强碱）烧伤后，现场首要的、最关键的急救措施是？", "o": {"A": "立即送往医院", "B": "立即用大量清水反复冲洗眼部至少30分钟", "C": "涂抹抗生素眼膏", "D": "滴用表面麻醉剂止痛"}, "a": "B", "e": "正确答案：立即用大量清水反复冲洗眼部至少30分钟。", "author": "林炜杰", "group": "眼科出题第二组"}, {"q": "交感性眼炎是一种严重威胁视力的眼病，其定义是？", "o": {"A": "眼球穿通伤后，伤眼自身发生的慢性炎症", "B": "眼球穿通伤后，对侧健康眼发生的肉芽肿性葡萄膜炎", "C": "双眼同时发生的化学性烧伤", "D": "眼外伤后引起的顽固性高眼压"}, "a": "B", "e": "第二部分：简答题 (共2题) 简答题1：请简述原发性急性闭角型青光眼急性发作期的典型临床表现。", "author": "林炜杰", "group": "眼科出题第二组"}, {"q": "巩膜最厚处位于", "o": {"A": "赤道部", "B": "后极部", "C": "眼直肌附着处", "D": "角膜缘", "E": "眼斜肌附着处"}, "a": "D", "e": "巩膜最厚处位于视神经周围及角巩膜缘。", "author": "罗智谦", "group": "眼科出题第二组"}, {"q": "以下巩膜特征正确的是", "o": {"A": "质地坚韧，各处厚度均为1mm左右", "B": "向后全部移行为视神经鞘膜", "C": "巩膜内血管丰富", "D": "巩膜厚度各处不一，在视神经周围及角巩膜缘最薄", "E": "筛板为巩膜的一部分"}, "a": "E", "e": "巩膜质地坚韧，厚度各处不一（视神经周围最厚，肌附着处最薄），筛板为巩膜薄弱区。", "author": "罗智谦", "group": "眼科出题第二组"}, {"q": "以下关于虹膜的描述，错误的是", "o": {"A": "为一圆盘状膜，自睫状体伸展到晶状体前面，将眼球前部腔隙隔成前房与后房", "B": "虹膜的中央有一2.5~4mm的圆孔称为瞳孔", "C": "虹膜周边与睫状体连接处为虹膜根部，此部很薄，当眼球受钝挫伤时，易从睫状体上离断", "D": "瞳孔开大肌和括约肌分布于瞳孔缘部的虹膜基质内，受副交感神经支配，司缩瞳作用", "E": "在瞳孔开大肌为平滑肌，受交感神经支配，司散瞳作用"}, "a": "D", "e": "瞳孔开大肌受交感神经支配（散瞳），瞳孔括约肌受副交感神经（动眼神经）支配（缩瞳）。", "author": "罗智谦", "group": "眼科出题第二组"}, {"q": "以下关于睫状体的描述，错误的是", "o": {"A": "扁平部与脉络膜连接处呈锯齿状称锯齿缘，为睫状体后界", "B": "主要由睫状肌和睫状上皮细胞组成", "C": "睫状肌由外侧的纵行、中间的放射状和内侧的环形三组肌纤维构成", "D": "睫状肌是平滑肌，受交感神经支配", "E": "睫状上皮细胞层由外层的色素上皮和内层的无色素上皮二层细胞组成"}, "a": "D", "e": "睫状肌为平滑肌，受副交感神经（动眼神经）支配，而非交感神经。睫状肌收缩→悬韧带松弛→晶状体变凸。", "author": "罗智谦", "group": "眼科出题第二组"}, {"q": "视网膜脱离指的是", "o": {"A": "视网膜神经上皮层与色素上皮层的分离", "B": "视网膜色素上皮层与脉络膜的分离", "C": "视网膜内五层与外五层的分离", "D": "视网膜内核层与内丛状层分离", "E": "视网膜神经纤维层与节细胞层之间的分离"}, "a": "A", "e": "正确答案：视网膜神经上皮层与色素上皮层的分离。", "author": "罗智谦", "group": "眼科出题第二组"}, {"q": "视网膜中央静脉阻塞的典型出血方式是", "o": {"A": "视网膜前出血", "B": "黄斑中心凹区域出血并形成液平面", "C": "围绕视盘的火焰状出血", "D": "鼻上象限弥漫性出血", "E": "颞下象限点状出血"}, "a": "C", "e": "CRVO典型表现：视网膜静脉迂曲扩张+广泛火焰状出血（暴风雨样）。缺血型易继发新生血管性青光眼。", "author": "罗智谦", "group": "眼科出题第二组"}, {"q": "病人男,78岁,多饮、多食、多尿15年,双眼视力下降4个月。查体:BP 180/110mmHg,右眼视力0.2,左眼视力0.4,双眼后极部及中周部视网膜多处出血、微血管瘤、脂质渗出和棉绒班; FFA示双眼视网膜静脉扩张渗漏，中周部可见视网膜毛细血管无灌注区，左眼颞侧视盘附近可见新生血管渗漏;血糖20mmol/L。该病人的诊断是", "o": {"A": "视网膜中央动脉阻塞", "B": "中心性浆液性脉络膜视网膜病变", "C": "高血压性视网膜病变", "D": "视网膜分支静脉阻塞", "E": "糖尿病性视网膜病变"}, "a": "E", "e": "正确答案：糖尿病性视网膜病变。", "author": "罗智谦", "group": "眼科出题第二组"}, {"q": "病人女,26岁，左眼视力突降5天，上方有黑幕感。双眼均为高度近视。左眼视力指数/35cm,眼压13mmHg,眼底见下方视网膜呈灰白色隆起，其上有暗红色视网膜血管，可见一马蹄形裂孔。该病人诊断孔源性视网膜脱离。治疗原则是", "o": {"A": "静卧休息，降颅压，促进视网膜下液体吸收", "B": "手术封闭裂孔", "C": "视网膜光凝封闭裂孔", "D": "切除玻璃体，解除牵引", "E": "查找原发病因，无需特殊治疗"}, "a": "B", "e": "近视按程度：轻度<-3.00D，中度-3.00D~-6.00D，高度>-6.00D。按病因分轴性近视和屈光性近视。", "author": "罗智谦", "group": "眼科出题第二组"}, {"q": "病人男，65岁,既往冠心病史20年,高血压病史10年，左眼3小时前视力突发无痛性丧失，2个月前有阵发性黑矇史。查体左眼视力指数，瞳孔散大，直接对光反射极度迟缓，间接对光反射存在，眼底视网膜弥漫性水肿混浊，后极部显著，呈苍白色或乳白色，中心凹呈樱桃红斑，视网膜动静脉变细，可见节段性血柱。FFA显示视网膜动脉充盈时间明显延迟，视网膜动脉管腔内荧光素流变细，部分黄斑周围小动脉充盈突然中断，形成无灌注区。该病人首先考虑的诊断为", "o": {"A": "中心性浆液性脉络膜视网膜病变", "B": "视网膜动脉阻塞", "D": "糖尿病性视网膜病变", "C": "视网膜中央静脉阻塞", "E": "小柳原田综合征"}, "a": "B", "e": "黄斑樱桃红斑是CRAO的特征性表现——因脉络膜供血保留红色，与周围苍白水肿的视网膜形成对比。", "author": "罗智谦", "group": "眼科出题第二组"}, {"q": "30岁女,左眼视力下降(0.5)3周,下方视物遮挡感,逐渐扩大.不伴眼痛，血压正常。最常见的疾病是", "o": {"A": "视网膜中央动脉阻塞", "B": "中心性浆液性脉络膜视网膜脱离", "C": "糖尿病视网膜病变", "D": "湿性年龄相关性黄斑变性", "E": "视网膜脱离"}, "a": "E", "e": "视网膜脱离典型表现为无痛性视野遮挡感并逐渐扩大（幕布感）伴视力下降，下方遮挡提示上方视网膜脱离，与本例描述完全吻合，是年轻患者最常见的病因。", "author": "罗智谦", "group": "眼科出题第二组"}, {"q": "病人女，65岁，主诉左眼急性视力下降5天，眼底检查视网膜广泛出血，呈火焰状,视网膜静脉扩张迂曲，最先考虑的是", "o": {"A": "视网膜中央静脉阻塞", "B": "中心性浆液性脉络膜视网膜脱离", "C": "糖尿病视网膜病变", "D": "小柳原田综合征", "E": "视网膜脱离"}, "a": "A", "e": "眼科门诊病历核心内容记录顺序：主诉（就诊原因+眼别+症状+持续时间）→现病史→既往史→检查→诊断。", "author": "罗智谦", "group": "眼科出题第二组"}, {"q": "有视神经炎的病人对何种检查最敏感", "o": {"A": "VEP", "B": "ERG", "C": "对比敏感度", "D": "视野", "E": "EOG"}, "a": "A", "e": "视神经炎典型表现：中青年突发视力下降+眼球转动痛+RAPD+中心暗点。", "author": "罗智谦", "group": "眼科出题第二组"}, {"q": "视神经炎的视野改变是", "o": {"A": "扇形缺损", "B": "中心暗点", "C": "生理盲点扩大", "D": "象限性缺损", "E": "黃斑回避"}, "a": "B", "e": "视神经炎典型表现：中青年突发视力下降+眼球转动痛+RAPD+中心暗点。", "author": "罗智谦", "group": "眼科出题第二组"}, {"q": "视神经炎的临床特征描述错误是", "o": {"A": "发病1周时视力损害最严重", "B": "眼球转动时疼痛", "C": "成人双眼累及率较儿童高", "D": "有中心暗点或视野向心性缩小", "E": "VEP表现为P100波(P1波)潜伏期延长，振幅降低"}, "a": "C", "e": "视神经炎典型表现：中青年突发视力下降+眼球转动痛+RAPD+中心暗点。", "author": "罗智谦", "group": "眼科出题第二组"}, {"q": "某男，55岁，高血压病史15年，右眼无痛性急剧视力障碍，眼底检查视乳头充血、水肿，无黄斑樱桃红点。下方弓形视野缺损，与生理盲点相连。应首先考虑", "o": {"A": "缺血性视神经病变", "B": "视网膜中央静脉阻塞", "C": "视网膜中央动脉阻塞", "D": "视乳头炎", "E": "球后视神经炎"}, "a": "A", "e": "黄斑樱桃红斑是CRAO的特征性表现——因脉络膜供血保留红色，与周围苍白水肿的视网膜形成对比。", "author": "罗智谦", "group": "眼科出题第二组"}, {"q": "原发性急性闭角型青光眼的眼球解剖特点，不包括", "o": {"A": "房角狭窄", "B": "角膜较小", "C": "玻璃体液化", "D": "晶状体较厚", "E": "眼轴较短"}, "a": "C", "e": "原发性急性闭角型青光眼解剖特征为前段拥挤：眼轴短、角膜小、前房浅、房角窄、晶状体厚。玻璃体液化属于玻璃体退行性变，与闭角机制无关，不属于其解剖特点。", "author": "罗智谦", "group": "眼科出题第二组"}, {"q": "青光眼典型视野损害，不包括", "o": {"A": "旁中心暗点", "B": "鼻侧阶梯", "C": "弓形暗点", "D": "环形暗点", "E": "生理盲点扩大"}, "a": "E", "e": "正确答案：生理盲点扩大。", "author": "罗智谦", "group": "眼科出题第二组"}, {"q": "急性闭角型青光眼慢性期的临床特点，不包括", "o": {"A": "眼压高", "B": "视野缺损", "C": "C/D增大", "D": "单用缩瞳剂可控制眼压", "E": "房角广泛粘连"}, "a": "D", "e": "正确答案：单用缩瞳剂可控制眼压。", "author": "罗智谦", "group": "眼科出题第二组"}, {"q": "原发性急性闭角型青光眼急性发作期的典型表现，不包括", "o": {"A": "复视", "B": "虹视", "C": "眼睑水肿", "D": "角膜水肿", "E": "房水混浊"}, "a": "A", "e": "急性闭角型青光眼发作时因眼压骤升，可出现虹视、眼痛头痛、角膜水肿、房水混浊、眼睑水肿等表现。复视是眼外肌或神经病变的表现，不是急性闭角型青光眼的典型症状。", "author": "罗智谦", "group": "眼科出题第二组"}, {"q": "急性闭角型青光眼间歇期的主要诊断标准，不包括", "o": {"A": "有明确的小发作史", "B": "房角开放", "C": "房角大部分开放", "D": "不用药，眼压不能稳定在正常水平", "E": "单用少量缩瞳剂，眼压能稳定在正常水平"}, "a": "D", "e": "正确答案：不用药，眼压不能稳定在正常水平。", "author": "罗智谦", "group": "眼科出题第二组"}, {"q": "病人女性，60岁，右眼突然胀痛、视力骤降，伴患侧头痛、恶心3小时。眼部检查:右眼视力0.02,左眼视力1.0,右眼眼压56mmHg,左眼眼压15mmHg,右眼眼睑红肿，混合性充血，角膜雾状水肿，周边前房近消失，瞳孔呈竖椭圆形，直径约6mm，对光反射消失。左眼前房浅。颅脑MRI检查未见异常。其最可能的诊断是", "o": {"A": "急性角膜内皮炎", "B": "急性虹膜睫状体炎", "C": "大泡性角膜病变", "D": "急性闭角型青光眼", "E": "急性胃肠炎"}, "a": "D", "e": "正确答案：急性闭角型青光眼。", "author": "罗智谦", "group": "眼科出题第二组"}, {"q": "病人女性，18岁，发现双眼视物范围变小2个月。既往史:因过敏性紫癜全身应用糖皮质激素1年余。为明确诊断，需要进一步进行的最基本检查项目，不包括", "o": {"A": "眼压", "B": "视盘", "C": "视野", "D": "黄斑", "E": "前房角"}, "a": "D", "e": "长期使用糖皮质激素出现视野缩小，高度怀疑激素性青光眼。青光眼基本检查为眼压、视盘、视野及前房角检查。黄斑检查不是青光眼诊断的必要基本项目。", "author": "罗智谦", "group": "眼科出题第二组"}, {"q": "病人女性,56岁，因情绪激动后引起左眼眼痛、视力下降伴头痛不适1天。眼部检查:左眼视力0.1,眼压46mmHg,左眼混合性充血，角膜雾状水肿，周边前房近消失，瞳孔散大，对光反射消失。需要进行的处理，不包括", "o": {"A": "糖皮质激素滴眼液", "C": "毛果芸香碱滴眼液", "B": "布林佐胺滴眼液", "D": "阿托品滴眼液", "E": "噻吗洛尔滴眼液"}, "a": "D", "e": "正确答案：阿托品滴眼液。", "author": "罗智谦", "group": "眼科出题第二组"}, {"q": "关于眼压的描述，错误的是", "o": {"A": "正常值在 10~21mmHg", "B": "24小时波动范围不应>6mmHg", "C": "双眼差异不应>5mmHg", "D": "眼压测量与中央角膜厚度有关", "E": "眼压差≥8mmHg，为暗室试验阳性"}, "a": "B", "e": "眼压升高不一定是青光眼（如高眼压症），正常眼压也不能排除青光眼（如正常眼压性青光眼）。诊断需结合视盘和视野。", "author": "罗智谦", "group": "眼科出题第二组"}, {"q": "以下所列的哪种组织是眼部自身免疫病的最好发部位", "o": {"A": "结膜", "B": "葡萄膜", "C": "角膜", "D": "视网膜", "E": "巩膜"}, "a": "B", "e": "葡萄膜（虹膜、睫状体、脉络膜）血管丰富、色素细胞密集，是眼内免疫特赦区的主要部位，也是眼部自身免疫性疾病最常发生的组织。", "author": "罗智谦", "group": "眼科出题第二组"}, {"q": "前葡萄膜炎时不会出现的并发症是", "o": {"A": "黄斑水肿", "B": "虹膜后粘连", "C": "视乳头水肿", "D": "周边视网膜血管闭塞"}, "a": "D", "e": "正确答案：周边视网膜血管闭塞。", "author": "罗智谦", "group": "眼科出题第二组"}, {"q": "葡葡膜炎最常见的种类为", "o": {"A": "前葡萄膜炎", "B": "交感性眼炎", "C": "中间葡萄膜炎", "D": "视网膜脉络膜炎", "E": "后葡萄膜炎"}, "a": "A", "e": "前葡萄膜炎（虹膜睫状体炎）是葡萄膜炎中最常见的类型，占所有葡萄膜炎的50%以上，表现为眼红、眼痛、畏光、KP等前节炎症体征。", "author": "罗智谦", "group": "眼科出题第二组"}, {"q": "前葡萄膜炎晚期并发眼球萎缩是由于", "o": {"A": "瞳孔闭锁、增加虹膜张力、房角开放、房水排出过多", "B": "炎症所致、房水分泌过多", "C": "炎症反复发作、睫状体萎缩", "D": "视功能丧失", "E": "眼内容物机化浓缩"}, "a": "C", "e": "正确答案：炎症反复发作、睫状体萎缩。", "author": "罗智谦", "group": "眼科出题第二组"}, {"q": "前葡萄膜炎急性发作的临床表现包括", "o": {"A": "结膜充血、无KP、虹膜纹理清、瞳孔无变化", "B": "睫状充血、色素性KP、虹膜节段性萎缩、瞳孔开大", "C": "睫状充血、尘状KP、瞳孔缩小", "D": "睫状充血、羊脂状KP、虹膜纹理可见、瞳孔正常", "E": "混合充血、角膜无KP、虹膜破孔、瞳孔异位"}, "a": "C", "e": "正确答案：睫状充血、尘状KP、瞳孔缩小。", "author": "罗智谦", "group": "眼科出题第二组"}, {"q": "对于Vogt-小柳原田综合征，下列说法错误的是", "o": {"A": "是国内常见的葡萄膜炎类型之一", "B": "以双侧肉芽肿性全葡萄膜炎为特征", "C": "常伴有脑膜刺激征，听力障碍，白癜风，毛发变白或脱落", "D": "常有眼底晚霞样改变和D-F结节", "E": "是反复发作的非肉芽肿性全葡萄膜炎"}, "a": "E", "e": "VKH综合征：双眼渗出性视网膜脱离+晚霞样眼底+头痛耳鸣+皮肤白癜风/毛发变白。自身免疫性全葡萄膜炎。", "author": "罗智谦", "group": "眼科出题第二组"}, {"q": "交感性眼炎与Vogt-小柳原田病主要鉴别点为", "o": {"A": "视力下降", "B": "有无眼球穿通伤或内眼手术史", "C": "房水闪辉", "D": "出现 Dalen-Fuchs 结节", "E": "眼底晚霞状改变"}, "a": "C", "e": "VKH综合征：双眼渗出性视网膜脱离+晚霞样眼底+头痛耳鸣+皮肤白癜风/毛发变白。自身免疫性全葡萄膜炎。", "author": "罗智谦", "group": "眼科出题第二组"}, {"q": "31岁男性,双眼反复交替眼红、眼痛1年,检查右眼睫状充血、角膜透明、尘状KP(++)、前房闪辉(++)、前房细胞(+++),虹膜部分后粘连，眼底未见明确异常，病人有强直性脊柱炎病史10年，病人最可能诊断是", "o": {"A": "白内障", "B": "青光眼", "C": "全葡萄膜炎", "D": "强直性脊柱炎伴发的急性前葡萄膜炎", "E": "视盘炎"}, "a": "D", "e": "角膜透明性依赖上皮完整、基质胶原规则排列、无血管、内皮泵功能。内皮细胞层是维持透明的关键。", "author": "罗智谦", "group": "眼科出题第二组"}, {"q": "37岁男性病人，因“双眼视物下降、眼前黑影飘动”来诊，双眼前节未见炎症反应，散瞳可见睫状体平坦部雪堤样改变，该病人最可能的诊断是", "o": {"A": "缺血性视神经病变", "B": "视网膜脉络膜炎", "C": "视网膜炎", "D": "视盘炎", "E": "中间葡萄膜炎"}, "a": "E", "e": "正确答案：中间葡萄膜炎。", "author": "罗智谦", "group": "眼科出题第二组"}, {"q": "34岁女性病人,右眼前葡萄膜炎反复发作4年，1年前出现并发性白内障。最近在1个月前再次发作，给予局部糖皮质激素后前房炎症消失已有1周，检查晶状体皮质性混浊(+++),视力0.1,病人在什么情况下可考虑行白内障手术", "o": {"A": "前房无活动性炎症3个月后", "B": "近期尽快行白内障手术", "C": "前房无活动性炎症3年后", "D": "前房无活动性炎症1年后", "E": "视力降至光感时"}, "a": "A", "e": "正确答案：前房无活动性炎症3个月后。", "author": "罗智谦", "group": "眼科出题第二组"}, {"q": "最为常见的白内障类型是", "o": {"A": "先天性白内障", "B": "代谢性白内障", "C": "年龄相关性白内障", "D": "放射性白内障", "E": "外伤性白内障"}, "a": "C", "e": "正确答案：年龄相关性白内障。", "author": "罗智谦", "group": "眼科出题第二组"}, {"q": "皮质性白内障出现前房加深，虹膜震颤，是哪一期的表现", "o": {"A": "膨胀期", "B": "初发期", "C": "未成熟期", "D": "成熟期", "E": "过熟期"}, "a": "E", "e": "过熟期白内障皮质液化，晶状体体积缩小，导致前房加深；液化皮质中晶状体核下沉，晶状体对虹膜支撑减弱，出现虹膜震颤。", "author": "罗智谦", "group": "眼科出题第二组"}, {"q": "葡萄膜炎可引起哪种类型的白内障", "o": {"A": "糖尿病性白内障", "B": "中毒性白内障", "C": "并发性白内障", "D": "手足搐搦性白内障", "E": "半乳糖性白内障"}, "a": "C", "e": "正确答案：并发性白内障。", "author": "罗智谦", "group": "眼科出题第二组"}, {"q": "可诱发急性闭角型青光眼的是", "o": {"A": "皮质性白内障的初发期", "B": "皮质性白内障的成熟期", "C": "皮质性白内障的膨胀期", "D": "皮质性白内障的过熟期", "E": "核性白内障"}, "a": "C", "e": "正确答案：皮质性白内障的膨胀期。", "author": "罗智谦", "group": "眼科出题第二组"}, {"q": "病人，男性,65岁，双眼视力渐进性下降1年，检查视力:右0.1,左眼前手动;眼压:右15mmHg,左17mmHg;散瞳后检查右眼晶状体皮质不均匀混浊，左眼晶状体白色混浊，虹膜投影阴性，眼底看不见。该病人应诊断为", "o": {"A": "双眼老年性白内障，未成熟期", "B": "双眼老年性白内障，右眼未成熟期，左眼成熟期", "C": "双眼老年性白内障，右眼未成熟期，左眼过熟期", "D": "双眼核性白内障", "E": "并发性白内障"}, "a": "B", "e": "正确答案：双眼老年性白内障，右眼未成熟期，左眼成熟期。", "author": "罗智谦", "group": "眼科出题第二组"}, {"q": "结膜是覆盖于眼睑后和眼球前的黏膜组织，由哪三部分构成", "o": {"A": "球结膜、睑结膜和穹窿部结膜", "B": "前结膜、后结膜和穹窿部结膜", "C": "上结膜、下结膜和穹窿部结膜", "D": "内结膜、外结膜和穹窿部结膜", "E": "球结膜、黏膜和穹窿部结膜"}, "a": "A", "e": "结膜由三部分构成：球结膜、睑结膜、穹窿部结膜。", "author": "罗智谦", "group": "眼科出题第二组"}, {"q": "一先天性白内障患儿，在行白内障摘除术后，患儿的屈光状态为", "o": {"A": "高度远视", "B": "高度近视", "C": "老视", "D": "病理性近视", "E": "高度散光"}, "a": "A", "e": "先天性白内障患儿行白内障摘除术后（未植入IOL时），屈光状态为高度远视（因失去了晶状体的屈光力约+19D）。", "author": "罗智谦", "group": "眼科出题第二组"}, {"q": "病人，女性，58岁，右眼反复流泪1年,不伴眼红痛，否认全身系统性疾病史和头面部外伤史。双眼视力0.8,双眼压在正常范围,双眼前节和眼底未见异常。为其冲洗泪道，左眼冲洗通畅，冲洗右眼时冲洗液自下泪点注入，全部从上泪点反流，伴大量脓性分泌物，提示阻塞部位在", "o": {"A": "泪总管", "B": "上泪小管", "C": "下泪小管", "D": "鼻泪管", "E": "上泪小管和下泪小管"}, "a": "D", "e": "正常眼压统计学范围10~21mmHg，24h波动<8mmHg，双眼差值<5mmHg。", "author": "罗智谦", "group": "眼科出题第二组"}, {"q": "正常成年人的眼轴长度约为：", "o": {"A": "21mm", "B": "24mm", "C": "26mm", "D": "28mm", "E": "30mm"}, "a": "B", "e": "正常成年人的前后眼轴长度平均约为 24mm。眼轴每延长 1mm，近视度数大约增加 300 度。", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "构成角膜的主要部分，占角膜全厚约 90% 的是：", "o": {"A": "上皮细胞层", "B": "前弹力层", "C": "基质层", "D": "后弹力层", "E": "内皮细胞层"}, "a": "C", "e": "角膜共分 5 层，其中基质层由规则排列的胶原纤维构成，厚度占了整个角膜的 90%。", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "临床上常说的“白眼球”，在医学术语上指的是：", "o": {"A": "角膜", "B": "结膜", "C": "巩膜", "D": "虹膜", "E": "视网膜"}, "a": "C", "e": "巩膜是不透明的、质地坚韧的质地，呈乳白色，主要起保护眼球内部组织的作用，就是俗称的“白眼球”。", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "负责支配眼球向外转动的脑神经是：", "o": {"A": "动眼神经", "B": "滑车神经", "C": "外展神经", "D": "三叉神经", "E": "面神经"}, "a": "C", "e": "外展神经（第Ⅵ脑神经）专门支配外直肌，外直肌收缩时会使眼球向外侧转动。", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "眼球内容物中没有血管、具有屈光作用且不可再生的是：", "o": {"A": "房水", "B": "晶状体", "C": "玻璃体", "D": "角膜", "E": "脉络膜"}, "a": "B", "e": "晶状体没有血管和神经，具有弹性和重要的屈光、调节功能。一旦受损混浊就无法再生，即为白内障。", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "临床上最常见、多见于老年人的白内障类型是：", "o": {"A": "先天性白内障", "B": "年龄相关性白内障（老年性白内障）", "C": "外伤性白内障", "D": "并发性白内障", "E": "代谢性白内障"}, "a": "B", "e": "年龄相关性白内障（老年性白内障）是临床上发病率最高、最常见的白内障类型。", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "老年性皮质性白内障按病程发展，最适合进行传统或现代手术治疗的时期是：", "o": {"A": "初发期", "B": "未熟期（膨胀期）", "C": "成熟期", "D": "过熟期", "E": "任何时期都一样"}, "a": "C", "e": "在成熟期，晶状体完全混浊，视力降至眼前手动或光感，此时晶状体囊膜较为坚固，最适合进行手术摘除。", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "某老年患者，双眼无痛性、渐进性视力下降 2 年，检查发现晶状体混浊，眼底未见明显异常。最可能的诊断是：", "o": {"A": "急性闭角型青光眼", "B": "老年性白内障", "C": "视网膜中央动脉阻塞", "D": "视网膜脱离", "E": "视神经炎"}, "a": "B", "e": "“双眼”、“无痛性”、“渐进性”视力下降，结合“晶状体混浊”，是老年性白内障最经典的临床表现。", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "老年性皮质性白内障的膨胀期（未熟期），最易引起的并发症是：", "o": {"A": "继发性开角型青光眼", "B": "急性闭角型青光眼", "C": "葡萄膜炎", "D": "晶状体脱位", "E": "视网膜脱离"}, "a": "B", "e": "膨胀期晶状体吸收水分体积增大，导致前房变浅，房角变窄。在有解剖基础的患者中，极易堵塞房角诱发急性闭角型青光眼。", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "目前临床上白内障最主流、最常用的手术方式是：", "o": {"A": "白内障囊内摘除术（ICCE）", "B": "白内障针拨术", "C": "白内障超声乳化吸除联合人工晶状体植入术", "D": "晶状体切除术", "E": "激光全角膜切削术"}, "a": "C", "e": "超声乳化技术切口小、恢复快，是目前国内外公认的最先进、最主流的白内障复明手术。", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "正常人眼压的正常范围是：", "o": {"A": "5～10 mmHg", "B": "10～21 mmHg", "C": "21～30 mmHg", "D": "15～25 mmHg", "E": "10～15 mmHg"}, "a": "B", "e": "统计学上，正常人的眼压范围通常在 10 mmHg 到 21 mmHg 之间。", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "诊断青光眼的三大临床特征不包括：", "o": {"A": "眼压升高", "B": "视盘凹陷增大（C/D比值增大）", "C": "视野缺损", "D": "视力突然丧失到无光感", "E": "视神经萎缩"}, "a": "D", "e": "青光眼的诊断三要素（三大特征）是：眼压升高、视盘凹陷（C/D比值增大）或视神经萎缩、视野缺损。D选项属于部分眼底血管突发阻塞的症状。", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "急性闭角型青光眼急性发作期的典型临床表现不包括：", "o": {"A": "剧烈眼痛伴同侧头痛", "B": "恶心、呕吐", "C": "眼压明显升高，眼球坚硬如石", "D": "瞳孔缩小", "E": "角膜水肿，呈雾状混浊"}, "a": "D", "e": "急性闭角型青光眼发作时，瞳孔是“散大”的（通常呈中度散大，且多为竖椭圆形），绝对不是缩小。", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "急性闭角型青光眼急性发作时，临床上首选的、最常用的缩瞳降压药是：", "o": {"A": "毛果芸香碱滴眼液（匹罗卡品）", "B": "阿托品滴眼液", "C": "噻吗洛尔滴眼液", "D": "酒石酸溴莫尼定滴眼液", "E": "地塞米松滴眼液"}, "a": "A", "e": "毛果芸香碱（匹罗卡品）是M胆碱受体激动剂，能缩瞳、拉开房角、使房水重新排出，是青光眼急救的经典首选药。", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "青光眼急性发作或有潜在发作风险时，严禁使用的药物是：", "o": {"A": "甘露醇", "B": "毛果芸香碱", "C": "阿托品", "D": "醋氮酰胺", "E": "噻吗洛尔"}, "a": "C", "e": "阿托品是强效扩瞳药，会使前房角进一步关闭，房水彻底无法排出，导致眼压暴增，是青光眼患者的绝对禁忌。", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "急性前葡萄膜炎（虹膜睫状体炎）的典型瞳孔表现是：", "o": {"A": "瞳孔散大", "B": "瞳孔正常", "C": "瞳孔缩小、常呈不规则状", "D": "瞳孔垂直扁平", "E": "双侧瞳孔一大一小"}, "a": "C", "e": "炎症刺激使瞳孔括约肌痉挛，导致瞳孔缩小；同时由于渗出物影响，容易发生虹膜后粘连，使瞳孔变得不规则（如梅花状）。", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "下列哪项不是急性前葡萄膜炎的常见体征：", "o": {"A": "睫状充血", "B": "角膜后沉着物（KP）", "C": "房水闪辉", "D": "虹膜后粘连", "E": "结膜大量脓性分泌物"}, "a": "E", "e": "葡萄膜炎属于自身免疫反应或非感染性炎症，没有细菌感染，因此绝对不会出现“结膜大量脓性分泌物”（那是急性细菌性结膜炎的特征）。", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "治疗急性前葡萄膜炎（虹膜睫状体炎）最首要、最核心的治疗原则是：", "o": {"A": "立即手术", "B": "迅速使用缩瞳剂", "C": "立即扩瞳（散瞳），放松睫状肌", "D": "给予口服抗生素", "E": "全身大量应用甘露醇"}, "a": "C", "e": "散瞳是治疗前葡萄膜炎的重中之重！它能拉开已形成的粘连，防止虹膜后粘连导致青光眼，同时能放松睫状肌，缓解剧烈的眼痛。", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "葡萄膜炎引起的角膜后沉着物（KP），其形成的主要成分是：", "o": {"A": "角膜上皮细胞", "B": "变性的晶状体蛋白", "C": "炎症细胞", "D": "红细胞", "E": "细菌菌落"}, "a": "C", "e": "房水中的炎症细胞（如淋巴细胞、中性粒细胞等）受温差和对流影响，沉积在角膜内皮表面，形成 KP。", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "强直性脊柱炎患者最容易合并发生的眼部疾病是：", "o": {"A": "老年性白内障", "B": "急性前葡萄膜炎", "C": "视网膜脱离", "D": "真菌性角膜炎", "E": "急性闭角型青光眼"}, "a": "B", "e": "强直性脊柱炎属于强烈的 HLA-B27 阳性相关自身免疫病，在眼部最常表现为经常反复发作的急性前葡萄膜炎。", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "糖尿病视网膜病变（DR）最早期的典型眼底体征是：", "o": {"A": "视网膜硬性渗出", "B": "微血管瘤", "C": "视网膜前出血", "D": "新生血管形成", "E": "牵拉性视网膜脱离"}, "a": "B", "e": "视网膜毛细血管周细胞丧失，局部管壁向外凸出形成微血管瘤。这是临床检眼镜下能够发现的糖尿病视网膜病变最早的特征。", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "临床上将糖尿病视网膜病变分为两大类，它们是：", "o": {"A": "充血性与缺血性", "B": "良性与恶性", "C": "非增生性（单纯型）与增生性", "D": "渗出性与增殖性", "E": "急性与慢性"}, "a": "C", "e": "临床上根据眼底有无“新生血管”形成，将其严密地分为非增生性（NPDR）和增生性（PDR）两大类。", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "一位 55 岁高血压患者，突发单眼无痛性视力急剧下降，仅剩眼前手动。眼底检查见视网膜后极部苍白、水肿，黄斑中心凹呈“樱桃红点”。最可能的诊断是：", "o": {"A": "视网膜中央静脉阻塞", "B": "视网膜中央动脉阻塞", "C": "急性视神经炎", "D": "视网膜脱离", "E": "老年黄斑变性"}, "a": "B", "e": "突发无痛性视力暴盲、视网膜后极部苍白、黄斑区“樱桃红点”是视网膜中央动脉阻塞（CRAO）绝对经典的特征，属于眼科极其危急的急症。", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "眼底检查发现视网膜沿静脉走行出现大量火焰状、片状出血，视盘和视网膜水肿，最可能的诊断是：", "o": {"A": "视网膜中央动脉阻塞", "B": "视网膜中央静脉阻塞", "C": "糖尿病视网膜病变", "D": "高血压视网膜病变", "E": "视网膜脱离"}, "a": "B", "e": "血管回流受阻导致血液沿静脉暴发性渗出，眼底呈现大片“火焰状出血”，这是视网膜中央静脉阻塞（CRVO）的典型表现。", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "视网膜脱离是指视网膜哪两层之间的分离：", "o": {"A": "视网膜神经上皮层与脉络膜", "B": "视网膜色素上皮层与脉络膜", "C": "视网膜神经上皮层与色素上皮层", "D": "巩膜与脉络膜", "E": "视网膜内层与外层"}, "a": "C", "e": "在胚胎发育上，视网膜的神经上皮层和色素上皮层之间存在一个潜在间隙，临床上的视网膜脱离就是指这两层之间的裂开。", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "严重高血压患者眼底病变按 Keith-Wagener 分级法，当出现视盘水肿时，属于：", "o": {"A": "Ⅰ级", "B": "Ⅱ级", "C": "Ⅲ级", "D": "Ⅳ级", "E": "Ⅴ级"}, "a": "D", "e": "根据 K-W 分级：Ⅰ级为视网膜动脉变细；Ⅱ级为动静脉交叉压迫征；Ⅲ级出现视网膜出血、渗出；Ⅳ级（最严重）的标志即是伴随出现视盘水肿。", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "世界卫生组织（WHO）1973年确定的盲目标准是，单眼中较好眼的最好矫正视力低于：", "o": {"A": "0.3", "B": "0.1", "C": "0.05", "D": "0.02", "E": "0.01"}, "a": "C", "e": "根据 WHO 标准，双眼中较好眼、经过各种镜片全力矫正后的最好视力仍低于 0.05 时，即诊断为盲目。", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "平行光线进入调节放松的眼球内，聚焦在视网膜之后，这种屈光状态称为：", "o": {"A": "正视", "B": "近视", "C": "远视", "D": "散光", "E": "老视"}, "a": "C", "e": "平行光线聚焦在视网膜之前叫近视；聚焦在视网膜之后，则称为远视。", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "近视眼矫正应该配戴的镜片类型是：", "o": {"A": "凸透镜", "B": "凹透镜", "C": "柱镜", "D": "双光镜", "E": "棱镜"}, "a": "B", "e": "近视眼由于焦点在视网膜前方，需要配戴具有发散光线作用的“凹透镜”，使焦点后移到视网膜上。", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "远视眼矫正应该配戴的镜片类型是：", "o": {"A": "凸透镜", "B": "凹透镜", "C": "柱镜", "D": "棱镜", "E": "平光镜"}, "a": "A", "e": "远视眼焦点在视网膜后方，需要配戴具有汇聚光线作用的“凸透镜”将焦点前移。", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "随着年龄增长，由于晶状体硬化、调节力减退，导致近距离阅读困难的现象称为：", "o": {"A": "近视", "B": "远视", "C": "散光", "D": "老视（老花）", "E": "弱视"}, "a": "D", "e": "这属于中老年人正常的生理退化现象，称为老视，即俗称的“老花眼”。", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "临床上用于排查和测量儿童斜视度数最简单、常用的初步检查方法是：", "o": {"A": "视野检查法", "B": "裂隙灯检查法", "C": "角膜映光法（Hirschberg法）", "D": "检眼镜检查法", "E": "视网膜电图（ERG）"}, "a": "C", "e": "角膜映光法是用手电筒照射患者双眼，通过观察瞳孔表面角膜反光点（光斑）偏离中心的距离，快速初步判断有无斜视及斜视度数。", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "弱视治疗的最佳年龄段通常是：", "o": {"A": "3～6岁儿童期", "B": "12～15岁青春期", "C": "18岁以上成年期", "D": "40岁以后", "E": "任何年龄效果都一样"}, "a": "A", "e": "儿童视觉发育的敏感期在 9 岁以内，因此 3～6 岁是治疗弱视的黄金年龄。一旦超过 12 岁或发育成熟，治疗效果会大打折扣。", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "麦粒肿（睑腺炎）最核心的临床处理原则是：", "o": {"A": "早期热敷，切忌挤压", "B": "必须立即手术切开", "C": "全身大剂量激素", "D": "频繁散瞳", "E": "局部冷敷并用力挤压脓头"}, "a": "A", "e": "麦粒肿是眼睑腺体的急性化脓性炎症。早期可以热敷促进炎症消退或局限，但绝对不能用手挤压，否则细菌容易逆行沿面静脉进入颅内海绵窦，引起危及生命的并发症。", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "沙眼的病原体是：", "o": {"A": "金黄色葡萄球菌", "B": "腺病毒", "C": "沙眼衣原体", "D": "真菌", "E": "单纯疱疹病毒"}, "a": "C", "e": "沙眼是由沙眼衣原体（Chlamydia trachomatis）引起的慢性传染性结膜角膜炎。", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "真菌性角膜炎病灶的典型形态学特征不包括：", "o": {"A": "溃疡表面呈毛玻璃样或“牙膏样”干燥外观", "B": "有伪足、菌丝", "C": "常常伴有前房积脓", "D": "溃疡边缘非常光滑、透明", "E": "卫星灶"}, "a": "D", "e": "真菌性角膜炎因为菌丝浸润，表现为浸润灶表面干燥、不平、不透明，呈现毛玻璃或牙膏状，边缘多不整齐，有伪足或卫星灶。D选项是错误的描述。", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "酸碱化学伤后，现场急救最首要、最关键的措施是：", "o": {"A": "迅速送往最近的医院", "B": "寻找抗生素滴眼液点眼", "C": "争分夺秒，就地用大量清水或干净水源彻底冲洗眼部", "D": "用酸碱中和剂严格中和", "E": "包扎双眼，保持安静"}, "a": "C", "e": "化学伤的预后完全取决于冲洗是否及时！不要因为找药、找中和剂或坐车去医院而耽误时间，必须立即就地用清水彻底冲洗 15~30 分钟。", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "眼球钝挫伤最容易引起前房积血，前房积血患者最核心的卧位要求是：", "o": {"A": "俯卧位", "B": "半卧位（或头高位）", "C": "去枕平卧位", "D": "左侧卧位", "E": "右侧卧位"}, "a": "B", "e": "前房积血患者必须取半卧位或头高位，这样能利用重力让血液沉积在前房的下方，防止血液遮挡瞳孔或向上方房角蔓延导致继发青光眼。", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "眼球穿通伤的急救处理原则，下列哪项是错误的：", "o": {"A": "严禁用力挤压眼球", "B": "不要自行拔出眼内的异物", "C": "现场涂红霉素眼膏并用力清洗眼球", "D": "加盖清洁眼罩，迅速送医", "E": "禁食禁饮，做好急诊手术准备"}, "a": "C", "e": "眼球穿通伤绝对严禁冲洗眼球或涂抹眼膏！因为这会造成眼球内部的化学污染，且用力揉擦或清洗容易挤出眼内物。", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "结膜充血与睫状充血的区别在于：", "o": {"A": "结膜充血颜色较深，睫状充血颜色较浅", "B": "结膜充血越靠近角膜缘越明显，睫状充血越远离角膜缘越明显", "C": "结膜充血呈鲜红色，滴用肾上腺素后充血消退；睫状充血呈暗红色，滴用肾上腺素后不消退", "D": "睫状充血血管可随结膜推移而移动", "E": "结膜充血见于深层角膜炎，睫状充血见于普通结膜炎"}, "a": "C", "e": "结膜充血浅、鲜红，周边明显，滴肾上腺素后缩血管会明显消退；睫状充血深、暗红，角膜缘周围明显，滴肾上腺素不消退。", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "关于黄斑的叙述，正确的是：", "o": {"A": "位于视盘颞侧约3mm处", "B": "是视网膜上唯一的感光区域", "C": "中心凹处有视网膜血管通过", "D": "黄斑区不含视锥细胞", "E": "黄斑病变不会影响中心视力"}, "a": "A", "e": "黄斑位于视盘颞侧约3mm处，是视网膜后极部的一个重要区域，中心凹处只有视锥细胞、无血管分布，负责精细的中心视力，一旦病变会严重影响中心视力。", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "霰粒肿（睑板腺囊肿）的临床特点是：", "o": {"A": "急性化脓性炎症，有明显红、肿、痛", "B": "睑板上可触及无痛性圆形硬结，相应结膜面呈紫红色", "C": "多由金黄色葡萄球菌感染引起", "D": "必须立即手术切除", "E": "好发于睫毛毛囊"}, "a": "B", "e": "霰粒肿是睑板腺出口阻塞、分泌物潴留形成的慢性肉芽肿性炎症，表现为无痛性硬结，结膜面呈紫红色，无急性炎症表现。继发感染时可出现麦粒肿样表现。", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "高血压性视网膜病变中，“动静脉交叉压迫征”最常见的眼底表现是：", "o": {"A": "视网膜静脉在动脉交叉处变细或被压呈笔尖状", "B": "视网膜动脉明显扩张", "C": "视网膜新生血管形成", "D": "黄斑樱桃红点", "E": "视网膜色素上皮萎缩"}, "a": "A", "e": "动静脉交叉压迫征是高血压视网膜病变Ⅱ级的典型表现，因动脉硬化增厚，在动静脉交叉处压迫下方的静脉，使静脉变细或被压呈笔尖状、远端扩张。", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "以下哪项不是急性细菌性结膜炎的典型表现：", "o": {"A": "结膜明显充血", "B": "大量粘脓性分泌物", "C": "晨起时上下眼睑常被分泌物粘住", "D": "角膜后沉着物（KP）", "E": "常有双眼发病，传染性强"}, "a": "D", "e": "角膜后沉着物（KP）是前葡萄膜炎的特征性体征，由炎症细胞沉积于角膜内皮形成。急性细菌性结膜炎病变局限于结膜，不会出现KP。 第二部分：眼科学期末必考核心大题 简述急性闭角型青光眼急性发作期的临床表现。 【参考答案要点】 临床症状： 剧烈眼痛、畏光、流泪，伴有同侧三叉神经分布区域的偏头痛。 视力急剧下降，严重者仅剩眼前手动或光感。 因高眼压刺激眼内感觉神经纤维，通过迷走神经反射引起恶心、呕吐等全身症状。 体征表现：", "author": "周圣淞", "group": "眼科出题第三组"}, {"q": "以下哪项不属于既往史的内容", "o": {"A": "患者做过哪些检查和治疗", "B": "传染病史", "C": "类似病史", "D": "既往眼病", "E": "既往眼病史与全身疾病的关系"}, "a": "A", "e": "正确答案：患者做过哪些检查和治疗。", "author": "曾宇桐", "group": "眼科出题第三组"}, {"q": "下列不属于主诉的内容的是", "o": {"A": "就诊的原因", "B": "眼别", "C": "症状", "D": "过敏史", "E": "体征"}, "a": "D", "e": "眼科门诊病历核心内容记录顺序：主诉（就诊原因+眼别+症状+持续时间）→现病史→既往史→检查→诊断。", "author": "曾宇桐", "group": "眼科出题第三组"}, {"q": "严重的巩膜炎或出现无血管区慎用的治疗是", "o": {"A": "口服糖皮质激素", "B": "糖皮质激素局部点眼", "C": "球结膜下注射糖皮质激素", "D": "静脉注射糖皮质激素", "E": "静脉点滴糖皮质激素"}, "a": "C", "e": "正确答案：球结膜下注射糖皮质激素。", "author": "曾宇桐", "group": "眼科出题第三组"}, {"q": "患者，男，19 岁，左眼睑胀痛一天。检查后见右眼睑外上方近眦角处皮肤红、肿，触之有硬结，压痛明显，结膜面局限性充血，诊断为内睑腺炎。此患者已患过两次睑腺炎， 健康指导中不用要求", "o": {"A": "勿吃辛辣刺激性食物", "B": "保持大便通畅", "C": "定期检查", "D": "注意个人卫生", "E": "锻炼身体，增强体质"}, "a": "C", "e": "睑腺炎（麦粒肿）是眼睑腺体急性化脓性炎症，最常见致病菌为金黄色葡萄球菌。", "author": "曾宇桐", "group": "眼科出题第三组"}, {"q": "以下关于视力检查的描述，错误的是", "o": {"A": "视力属于主观检查", "B": "视力属于客观检查", "C": "视力是分辨二维物体形状大小的能力", "D": "中心视力反映黄斑中心凹视觉敏感度", "E": "黄斑中心部分是视网膜视觉最敏锐的部位"}, "a": "B", "e": "正确答案：视力属于客观检查。", "author": "曾宇桐", "group": "眼科出题第三组"}, {"q": "通常正常眼压定义在", "o": {"A": "15～21mmHg", "B": "10～21mmHg", "C": "（16±3）mmHg", "D": "＜21mmHg", "E": "＞10mmHg"}, "a": "B", "e": "正常眼压统计学范围10~21mmHg，24h波动<8mmHg，双眼差值<5mmHg。", "author": "曾宇桐", "group": "眼科出题第三组"}, {"q": "患者，女，38 岁，因左眼时有流泪来诊。行泪道冲洗，冲洗时有阻力，冲洗液部分反流、部分进入鼻腔，说明", "o": {"A": "泪小管阻塞", "B": "泪总管阻塞", "C": "鼻泪管阻塞", "D": "鼻泪管狭窄", "E": "慢性泪囊炎"}, "a": "D", "e": "泪道冲洗：原路返流→泪小管阻塞；下冲上返→泪总管阻塞；返流+脓→慢性泪囊炎（鼻泪管阻塞）。", "author": "曾宇桐", "group": "眼科出题第三组"}, {"q": "有“脓漏眼”之称的是", "o": {"A": "成人淋球菌性结膜炎", "B": "新生儿脑膜炎球菌性结膜炎", "C": "成人脑膜炎球菌性结膜炎", "D": "新生儿淋球菌性结膜炎", "E": "各种类型的急性结膜炎"}, "a": "D", "e": "正确答案：新生儿淋球菌性结膜炎。", "author": "曾宇桐", "group": "眼科出题第三组"}, {"q": "下列哪项不是泪道的组成部分", "o": {"A": "泪小点", "B": "泪小管", "C": "泪囊", "D": "鼻泪管", "E": "泪阜"}, "a": "E", "e": "泪道由泪小点、泪小管、泪囊和鼻泪管依次组成，负责引流泪液至鼻腔。泪阜是内眦部结膜软组织隆起，属于结膜组织，不是泪道的组成部分。", "author": "曾宇桐", "group": "眼科出题第三组"}, {"q": "眼球壁从外向内分为", "o": {"A": "纤维膜、虹膜、葡萄膜", "B": "纤维膜、葡萄膜、视网膜", "C": "纤维膜、巩膜、视网膜", "D": "纤维膜、角膜、视网膜", "E": "纤维膜、虹膜、视网膜"}, "a": "B", "e": "正确答案：纤维膜、葡萄膜、视网膜。", "author": "曾宇桐", "group": "眼科出题第三组"}, {"q": "出现耳前淋巴结肿大、压痛的是", "o": {"A": "泡性结膜炎", "B": "超急性结膜炎", "C": "慢性结膜炎", "D": "春季角结膜炎", "E": "急性卡他性结膜炎"}, "a": "B", "e": "正确答案：超急性结膜炎。", "author": "曾宇桐", "group": "眼科出题第三组"}, {"q": "结膜炎患者结膜充血的原因是", "o": {"A": "结膜富含血管", "B": "结膜上的新生血管增多", "C": "结膜血管扩张", "D": "结膜血液循环受阻", "E": "结膜血管怒张"}, "a": "C", "e": "正确答案：结膜血管扩张。", "author": "曾宇桐", "group": "眼科出题第三组"}, {"q": "新生儿泪囊炎的主要原因是", "o": {"A": "泪囊部的原发感染", "B": "鼻泪管下段发育不全所致的泪囊继发感染", "C": "先天性泪小管闭锁", "D": "产道感染", "E": "先天性泪小点闭"}, "a": "B", "e": "正确答案：鼻泪管下段发育不全所致的泪囊继发感染。", "author": "曾宇桐", "group": "眼科出题第三组"}, {"q": "Dalen-Fuchs 结节可见于以下哪种葡萄膜炎", "o": {"A": "Fuchs 虹膜异色性葡萄膜炎", "B": "急性视网膜坏死", "C": "Behcet 病", "D": "交感性眼炎", "E": "Reiter 综合征"}, "a": "D", "e": "Dalen-Fuchs结节是位于视网膜色素上皮与Bruch膜之间的肉芽肿性病灶，是交感性眼炎的特征性病理表现，也可见于Vogt-小柳-原田病。", "author": "曾宇桐", "group": "眼科出题第三组"}, {"q": "先天性白内障发生率最高的是", "o": {"A": "点状白内障", "B": "缝性白内障", "C": "绕核性白内障", "D": "先天性全白内障", "E": "后极性白内障"}, "a": "C", "e": "正确答案：绕核性白内障。", "author": "曾宇桐", "group": "眼科出题第三组"}, {"q": "高度近视引起的并发性白内障混浊部位多为", "o": {"A": "前囊", "B": "后囊", "C": "核", "D": "后囊下皮质", "E": "前囊下皮质"}, "a": "C", "e": "近视按程度：轻度<-3.00D，中度-3.00D~-6.00D，高度>-6.00D。按病因分轴性近视和屈光性近视。", "author": "曾宇桐", "group": "眼科出题第三组"}, {"q": "葡萄膜的组成由前到后为", "o": {"A": "虹膜、瞳孔、睫状体", "B": "虹膜、脉络膜、睫状体", "C": "虹膜、巩膜突、脉络膜", "D": "虹膜、后房、脉络膜", "E": "虹膜、睫状体、脉络膜"}, "a": "E", "e": "正确答案：虹膜、睫状体、脉络膜。", "author": "曾宇桐", "group": "眼科出题第三组"}, {"q": "后发性白内障是指", "o": {"A": "玻璃体炎症导致后囊膜混浊", "B": "眼底退行性病变引起晶状体混浊", "C": "代谢障碍引起的晶状体混浊", "D": "白内障摘除术后残留的晶状体上皮细胞增生引起后囊膜混浊", "E": "房水浮游细胞附着在后囊膜上导致的后囊膜混浊"}, "a": "D", "e": "后发性白内障是白内障术后最常见的并发症，因残留晶状体上皮细胞增殖迁移所致。", "author": "曾宇桐", "group": "眼科出题第三组"}, {"q": "患者，男，34 岁，诊断右眼外伤性白内障，行右眼白内障囊内摘除术后，其屈光状态 变成", "o": {"A": "高度远视", "B": "轻度远视", "C": "高度近视", "D": "轻度近视", "E": "高度散光"}, "a": "A", "e": "白内障囊内摘除术后晶状体完全缺失，眼球屈光力损失约+19D，术后呈高度远视状态（需约+10D~+12D的凸透镜矫正）。", "author": "曾宇桐", "group": "眼科出题第三组"}, {"q": "一侧眼急性闭角型青光眼急性发作，对侧没发作眼为", "o": {"A": "临床前期", "B": "先兆期", "C": "间歇期", "D": "慢性期", "E": "正常眼"}, "a": "A", "e": "急性闭角型青光眼一眼发作时，对侧眼虽无症状，但具有同样的解剖特征（浅前房、窄房角），属于临床前期，随时有急性发作的风险。", "author": "曾宇桐", "group": "眼科出题第三组"}, {"q": "房水的生成部位是", "o": {"A": "视网膜", "B": "小梁网", "C": "睫状突", "D": "晶状体", "E": "虹膜"}, "a": "C", "e": "房水由睫状突非色素上皮细胞主动分泌产生。", "author": "曾宇桐", "group": "眼科出题第三组"}, {"q": "急性闭角型青光眼好发于", "o": {"A": "青壮年", "B": "老年男性", "C": "老年女性", "D": "青少年", "E": "婴幼儿"}, "a": "C", "e": "急性闭角型青光眼好发于老年女性，因女性眼轴较短、前房浅、晶状体相对较大，老年后晶状体膨胀加重瞳孔阻滞，易诱发房角关闭。", "author": "曾宇桐", "group": "眼科出题第三组"}, {"q": "原发性开角型青光眼，早期诊断较有意义的是", "o": {"A": "24小时眼压测量", "B": "标准视野", "C": "单次眼压测量高于正常", "D": "查房角", "E": "视盘改变"}, "a": "A", "e": "POAG诊断依据：眼压升高+青光眼性视盘改变（C/D扩大）+特征性视野缺损，房角开放。", "author": "曾宇桐", "group": "眼科出题第三组"}, {"q": "晶状体的厚度为", "o": {"A": "2～3mm", "B": "3～4mm", "C": "4～5mm", "D": "5～6mm", "E": "6～7mm"}, "a": "C", "e": "成人晶状体厚度约为4～5mm，直径约9～10mm，为双凸透镜形态，其厚度随年龄增长及调节状态而变化。", "author": "曾宇桐", "group": "眼科出题第三组"}, {"q": "导致弱视的原因不包括", "o": {"A": "先天性白内障", "B": "先天性黄斑缺损", "C": "斜视", "D": "屈光不正", "E": "不恰当的遮盖治疗"}, "a": "B", "e": "正确答案：先天性黄斑缺损。", "author": "曾宇桐", "group": "眼科出题第三组"}, {"q": "眼的屈光介质不包括", "o": {"A": "角膜", "B": "房水", "C": "晶状体", "D": "玻璃体", "E": "视网膜"}, "a": "E", "e": "眼球屈光介质包括：角膜、房水、晶状体、玻璃体。视网膜不是屈光介质（是感光组织）。", "author": "曾宇桐", "group": "眼科出题第三组"}, {"q": "屈光参差性弱视的叙述不正确的是", "o": {"A": "屈光度较高的眼可以形成弱视", "B": "屈光度低的眼可以形成弱视", "C": "屈光参差性弱视是单眼弱视", "D": "屈光参差性弱视是由于两眼异常相互作用和形觉剥夺引起的", "E": "中度的近视性屈光参差一般不形成弱视"}, "a": "B", "e": "屈光参差性弱视：双眼屈光度数差异>2.50D时，屈光度较高的一眼因成像模糊易发生弱视。屈光不正性弱视多双眼发病。", "author": "曾宇桐", "group": "眼科出题第三组"}, {"q": "患儿，男，5 岁，自幼右眼向内偏斜 2 年，散瞳验光发现 OD＋2.0DS，OS＋1.5DS， 矫正视力 OD 0.2，OS 0.8，裂隙灯与眼底检查没有明显异常。正确诊断是", "o": {"A": "双眼屈光不正性弱视", "B": "双眼斜视性弱视", "C": "右眼屈光参差性弱视", "D": "右眼斜视性弱视", "E": "右眼屈光不正性弱视"}, "a": "D", "e": "正确答案：右眼斜视性弱视。", "author": "曾宇桐", "group": "眼科出题第三组"}, {"q": "增生性糖尿病性视网膜病变，最主要的标志是", "o": {"A": "视网膜新生血管形成", "B": "视网膜硬性渗出", "C": "视网膜水肿", "D": "视网膜前膜", "E": "视网膜内出血"}, "a": "A", "e": "正确答案：视网膜新生血管形成。", "author": "曾宇桐", "group": "眼科出题第三组"}, {"q": "按照国际临床分类法，糖尿病性视网膜病变在第（ ）期出现增殖性病变", "o": {"A": "1", "B": "2", "C": "3", "D": "4", "E": "5"}, "a": "E", "e": "按国际临床糖尿病视网膜病变分类（ICDR），共分5期，第5期为增殖期糖尿病视网膜病变，以新生血管形成为标志性改变。", "author": "曾宇桐", "group": "眼科出题第三组"}, {"q": "黄斑中心凹处的细胞组成是", "o": {"A": "多数视锥细胞和少量视杆细胞", "B": "只有视锥细胞", "C": "只有视杆细胞", "D": "多数视杆细胞和少量视锥细胞", "E": "等量的视锥细胞和视杆细胞"}, "a": "B", "e": "正确答案：只有视锥细胞。", "author": "曾宇桐", "group": "眼科出题第三组"}, {"q": "以下对视神经炎的临床特征描述错误的是", "o": {"A": "发病 1 周时视力损害最严重", "B": "成人双眼累及率较儿童高", "C": "眼球转动时疼痛", "D": "有中心暗点或视野向心性缩小", "E": "VEP 表现为 P 波（P1 波）潜伏期延长，振幅降低"}, "a": "B", "e": "视神经炎典型表现：中青年突发视力下降+眼球转动痛+RAPD+中心暗点。", "author": "曾宇桐", "group": "眼科出题第三组"}, {"q": "球后视神经炎可有", "o": {"A": "视力明显下降", "B": "早期眼底正常", "C": "视野有中心或旁中心暗点", "D": "VEP 的 P 延缓或消失异常", "E": "以上都对"}, "a": "E", "e": "视神经炎典型表现：中青年突发视力下降+眼球转动痛+RAPD+中心暗点。", "author": "曾宇桐", "group": "眼科出题第三组"}, {"q": "临床上最早出现的、比较确切的糖尿病性视网膜病变的体征是", "o": {"A": "微动脉瘤", "B": "硬性渗出", "C": "视网膜内出血", "D": "视网膜水肿", "E": "新生血管形成"}, "a": "A", "e": "微动脉瘤是糖尿病视网膜病变最早出现且最具诊断意义的体征，由毛细血管壁局灶性膨出所致，眼底荧光素血管造影可早期发现。", "author": "曾宇桐", "group": "眼科出题第三组"}, {"q": "眼底发现有棉絮斑软性渗出，说明糖尿病视网膜病变进展到", "o": {"A": "Ⅱ期", "B": "Ⅲ期", "C": "Ⅳ期", "D": "Ⅴ期", "E": "Ⅵ期"}, "a": "B", "e": "按我国糖尿病视网膜病变六期分类法，棉絮斑（软性渗出）为视网膜神经纤维层缺血梗死所致，出现于Ⅲ期（中度非增殖期）。", "author": "曾宇桐", "group": "眼科出题第三组"}, {"q": "患者，男，58 岁，多饮、多食、多尿 15 年，左眼突发视力下降 7 天。查体：血压 145/85mmHg，右眼视力 0.8，左眼视力手动，双眼晶体皮质轻度混浊，右眼后极部及中 周部视网膜多处出血、微血管瘤及硬性渗出，左眼眼底窥不入。B 超：左眼玻璃体积血， 未见视网膜脱离。该患者最可能的诊断是", "o": {"A": "视网膜静脉阻塞", "B": "高血压性视网膜病变", "C": "视网膜静脉周围炎", "D": "糖尿病性视网膜病变", "E": "视网膜血管炎"}, "a": "D", "e": "正确答案：糖尿病性视网膜病变。", "author": "曾宇桐", "group": "眼科出题第三组"}, {"q": "患者，男，摔伤后 6 小时就诊，检查可见右眼前房血细胞漂浮，此时哪项治疗不正确", "o": {"A": "卧床休息，取半卧位，可用镇静剂", "B": "止血剂与糖皮质激素联合应用", "C": "立即散瞳，以减轻虹膜刺激症状", "D": "注意眼压，酌情使用降压药物", "E": "经药物治疗眼压仍不能控制，应做前房冲洗术"}, "a": "C", "e": "正确答案：立即散瞳，以减轻虹膜刺激症状。", "author": "曾宇桐", "group": "眼科出题第三组"}, {"q": "患者，男，18岁，篮球比赛时被肘部撞击右眼，视力下降至0.3。裂隙灯检查见角膜水肿、前房积血，积血高度约占前房的1/2。该患者前房积血的分级是", "o": {"A": "0级", "B": "I级", "C": "II级", "D": "III级", "E": "IV级"}, "a": "C", "e": "前房积血分级：I级<1/3前房，II级1/3-2/3前房，III级>2/3前房。处理：半卧位+双眼遮盖+监测眼压。", "author": "曾宇桐", "group": "眼科出题第三组"}, {"q": "患者，女，40岁，被玻璃杯碎片划伤右眼，视力消失伴剧痛。检查见右眼睑裂伤3cm，角膜中央可见2mm穿通口，前房消失。现场急救处理错误的是", "o": {"A": "无菌纱布遮盖伤眼", "B": "禁止冲洗和滴药", "C": "避免挤压眼球", "D": "立即清除眼内脱出的虹膜组织", "E": "尽快转诊行清创缝合"}, "a": "D", "e": "角膜中央厚约0.5mm，周边约1mm。基质层占全层约90%。", "author": "曾宇桐", "group": "眼科出题第三组"}, {"q": "患者，男，30岁，右眼穿通伤术后1个月，左眼出现视力下降、畏光。眼底检查见黄斑区水肿及渗出。最可能的诊断是", "o": {"A": "电光性眼炎", "B": "交感性眼炎", "C": "角膜异物", "D": "前房积血", "E": "眶壁骨折"}, "a": "B", "e": "穿通伤后1个月对侧眼出现葡萄膜炎症状，符合交感性眼炎的典型表现——受伤眼为激发眼，对侧眼为交感眼，是一种自身免疫性肉芽肿性葡萄膜炎。", "author": "曾宇桐", "group": "眼科出题第三组"}, {"q": "组成眼眶的骨骼共有多少块？", "o": {"A": "5块", "B": "6块", "C": "7块", "D": "8块"}, "a": "C", "e": "眼眶由7块骨骼组成：额骨、颧骨、上颌骨、腭骨、蝶骨、筛骨和泪骨，共同构成锥形骨腔。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "眼眶各壁中最薄的是", "o": {"A": "外壁", "B": "上壁", "C": "下壁", "D": "内侧壁"}, "a": "D", "e": "眶内侧壁最薄，最易发生爆裂性骨折。眶下壁也较薄弱，钝挫伤可致击出性骨折。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "眶外壁主要由哪两块骨组成？", "o": {"A": "额骨和筛骨", "B": "泪骨和上颌骨", "C": "颧骨和蝶骨大翼", "D": "额骨和蝶骨小翼"}, "a": "C", "e": "正确答案：颧骨和蝶骨大翼。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "支配眼轮匝肌的是", "o": {"A": "动眼神经", "B": "滑车神经", "C": "三叉神经", "D": "面神经"}, "a": "D", "e": "眼轮匝肌由面神经（Ⅶ）支配，负责眼睑闭合。提上睑肌由动眼神经（Ⅲ）支配，Müller肌由交感神经支配。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "提上睑肌的神经支配是", "o": {"A": "面神经", "B": "动眼神经", "C": "滑车神经", "D": "外展神经"}, "a": "B", "e": "提上睑肌由动眼神经（Ⅲ）支配。Horner综合征时Müller肌麻痹致轻度上睑下垂。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "Muller肌主要受哪种神经支配？", "o": {"A": "副交感神经", "B": "动眼神经", "C": "交感神经", "D": "面神经"}, "a": "C", "e": "Müller肌（睑板肌）为平滑肌，受交感神经支配。收缩时使睑裂开大。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "泪膜脂质层主要来源于", "o": {"A": "泪腺", "B": "副泪腺", "C": "杯状细胞", "D": "睑板腺"}, "a": "D", "e": "泪膜脂质层由睑板腺分泌，位于最外层，作用是延缓泪液蒸发、增加泪膜稳定性。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "泪膜水液层主要来源于", "o": {"A": "睑板腺", "B": "泪腺及副泪腺", "C": "杯状细胞", "D": "角膜上皮"}, "a": "B", "e": "正确答案：泪腺及副泪腺。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "泪膜黏蛋白层主要来源于", "o": {"A": "睑板腺", "B": "泪腺", "C": "结膜杯状细胞", "D": "睫状体"}, "a": "C", "e": "正确答案：结膜杯状细胞。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "关于眼睑静脉特点正确的是", "o": {"A": "有丰富静脉瓣", "B": "仅有浅层静脉", "C": "深浅静脉均无瓣膜", "D": "不与海绵窦交通"}, "a": "C", "e": "正确答案：深浅静脉均无瓣膜。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "支配外直肌的神经是", "o": {"A": "动眼神经", "B": "滑车神经", "C": "三叉神经", "D": "外展神经"}, "a": "D", "e": "外直肌由展神经（Ⅵ）支配。内直肌、上下直肌、下斜肌、提上睑肌由动眼神经（Ⅲ）支配。上斜肌由滑车神经（Ⅳ）支配。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "上斜肌受哪条脑神经支配？", "o": {"A": "II", "B": "III", "C": "IV", "D": "VI"}, "a": "C", "e": "上斜肌由滑车神经（Ⅳ）支配，是唯一由滑车神经支配的眼外肌。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "内直肌的主要作用是", "o": {"A": "外转", "B": "内转", "C": "上转", "D": "下转"}, "a": "B", "e": "内直肌起自总腱环，止于角膜缘鼻侧巩膜，收缩时使眼球向鼻侧转动，主要作用为内转（内收）。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "下斜肌的主要作用不包括", "o": {"A": "外旋", "B": "上转", "C": "外转", "D": "内旋"}, "a": "D", "e": "下斜肌的主要功能为外旋、上转和外转；内旋是上斜肌的主要功能，故内旋不属于下斜肌的作用。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "除哪条眼外肌外，其余直肌均起自总腱环？", "o": {"A": "上直肌", "B": "下直肌", "C": "外直肌", "D": "下斜肌"}, "a": "D", "e": "4条直肌及上斜肌均起自眶尖总腱环（Zinn环），而下斜肌起自眶内壁前部泪骨处，不起自总腱环。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "视神经属于第几对脑神经？", "o": {"A": "I", "B": "II", "C": "III", "D": "IV"}, "a": "B", "e": "视神经为第II对脑神经，传导视觉信息，实质上是大脑白质的延伸，由视网膜神经节细胞轴突汇聚而成。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "面神经支配", "o": {"A": "外直肌", "B": "上斜肌", "C": "眼轮匝肌", "D": "提上睑肌"}, "a": "C", "e": "面神经（第VII对脑神经）支配眼轮匝肌，负责闭眼动作；面神经麻痹时出现眼睑闭合不全（兔眼）。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "视路不包括", "o": {"A": "视神经", "B": "视交叉", "C": "外侧膝状体", "D": "上丘"}, "a": "D", "e": "视路从视网膜→视神经→视交叉→视束→外侧膝状体→视放射→枕叶视皮质。晶状体不属于视路。视路不包括屈光介质。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "视泡出现于胚胎发育", "o": {"A": "14天", "B": "22天", "C": "35天", "D": "8周"}, "a": "B", "e": "胚胎发育第22天，前脑两侧向外膨出形成视泡，是眼球发育的起始标志。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "视杯形成时间约为", "o": {"A": "22天", "B": "28天", "C": "6周", "D": "8周"}, "a": "B", "e": "约第28天（胚胎第4周末），视泡远端内陷形成视杯，同时晶状体板开始增厚，为眼球早期发育的关键阶段。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "胚裂闭合时间约为", "o": {"A": "4周", "B": "5周", "C": "6周", "D": "8周"}, "a": "D", "e": "胚裂（脉络膜裂）在胚胎第8周前后完全闭合，血管和神经由此进入眼球；若闭合不全则形成眼组织缺损。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "胚裂闭合不全最易导致", "o": {"A": "白内障", "B": "青光眼", "C": "虹膜缺损", "D": "睑裂狭小"}, "a": "C", "e": "胚裂位于视杯下方偏鼻侧，闭合不全时最常影响虹膜，导致虹膜缺损（通常位于下方），是最常见的眼组织缺损类型。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "晶状体来源于", "o": {"A": "神经外胚层", "B": "表皮外胚层", "C": "中胚层", "D": "神经嵴"}, "a": "B", "e": "晶状体来源于胚胎期表皮外胚层（表面外胚层）。视网膜和RPE来源于神经外胚层；巩膜和葡萄膜来源于神经嵴/中胚层。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "先天性白内障常与哪种发育异常有关？", "o": {"A": "视泡未形成", "B": "晶状体泡未脱离", "C": "胚裂闭合", "D": "玻璃体血管退化"}, "a": "B", "e": "正确答案：晶状体泡未脱离。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "PHPV的主要病因是", "o": {"A": "胚裂闭合失败", "B": "晶状体泡异常", "C": "玻璃体血管持续存在并增生", "D": "小梁网发育异常"}, "a": "C", "e": "正确答案：玻璃体血管持续存在并增生。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "白内障是全球第几位致盲眼病？", "o": {"A": "第一位", "B": "第二位", "C": "第三位", "D": "第四位"}, "a": "A", "e": "白内障是全球首位致盲原因，约占全球盲人的51%，尤以发展中国家为甚，手术复明效果确切。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "白内障最典型症状是", "o": {"A": "眼痛", "B": "渐进性视力下降", "C": "畏光", "D": "飞蚊症"}, "a": "B", "e": "正确答案：渐进性视力下降。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "年龄相关性白内障最常见类型是", "o": {"A": "外伤性", "B": "代谢性", "C": "老年性", "D": "并发性"}, "a": "C", "e": "年龄相关性白内障分三型：皮质性（最常见）、核性、后囊下性。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "按混浊部位分类不包括", "o": {"A": "皮质性", "B": "核性", "C": "后囊下性", "D": "膨胀性"}, "a": "D", "e": "按混浊部位分类，白内障分为皮质性、核性和后囊下性三类；膨胀性白内障是按形态/病程阶段的分类，不属于部位分类。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "皮质性白内障初发期特点为", "o": {"A": "晶体全混浊", "B": "核下沉", "C": "楔形车轮样混浊", "D": "前房变浅"}, "a": "C", "e": "初发期：晶状体周边皮质楔形、车轮样混浊，向中央发展。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "膨胀期白内障特点不包括", "o": {"A": "前房变浅", "B": "视力下降明显", "C": "虹膜投影阳性", "D": "核下沉"}, "a": "D", "e": "膨胀期：晶状体吸水膨胀→前房变浅+虹膜投影阳性，可能诱发急性闭角型青光眼。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "成熟期白内障表现为", "o": {"A": "晶体全混浊", "B": "核下沉", "C": "前房变浅", "D": "虹膜投影阳性"}, "a": "A", "e": "成熟期：晶状体全混浊，虹膜投影消失，视力严重下降。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "过熟期白内障特点是", "o": {"A": "前房变浅", "B": "晶体全混浊", "C": "核下沉", "D": "虹膜投影阳性"}, "a": "C", "e": "过熟期：囊膜皱缩，核下沉，皮质液化，可发生晶状体溶解性青光眼。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "白内障目前最有效治疗方法是", "o": {"A": "激光治疗", "B": "药物治疗", "C": "中药治疗", "D": "手术治疗"}, "a": "D", "e": "白内障为晶状体混浊，药物和激光均无法恢复晶状体透明度，手术摘除混浊晶状体并植入人工晶状体是目前唯一有效的根治方法。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "目前推荐白内障手术时机为", "o": {"A": "视力<1.0", "B": "视力<0.8", "C": "视力<0.5并影响生活", "D": "必须成熟后手术"}, "a": "C", "e": "白内障手术时机：视力低于0.5且影响工作生活即可手术，不必等到成熟期。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "青光眼最主要的共同特征是", "o": {"A": "晶状体混浊", "B": "角膜水肿", "C": "视神经凹陷性萎缩及视野缺损", "D": "玻璃体混浊"}, "a": "C", "e": "青光眼以视神经凹陷性萎缩+视野缺损为共同特征，病理性眼压升高是主要危险因素。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "正常眼压范围是", "o": {"A": "5～15mmHg", "B": "10～21mmHg", "C": "15～25mmHg", "D": "20～30mmHg"}, "a": "B", "e": "正常眼压统计学范围10~21mmHg，24h波动<8mmHg，双眼差值<5mmHg。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "房水主要经何处排出？", "o": {"A": "玻璃体", "B": "脉络膜", "C": "小梁网-Schlemm管", "D": "视神经"}, "a": "C", "e": "房水主要外流途径：睫状突→后房→瞳孔→前房→小梁网→Schlemm管→集液管→睫状前静脉。次要途径（10-20%）为葡萄膜巩膜途径。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "正常视盘杯盘比(C/D)一般", "o": {"A": "<0.2", "B": "<0.3", "C": "<0.4", "D": "<0.6"}, "a": "C", "e": "正常成人杯盘比（C/D）通常≤0.3，双眼C/D差≤0.2。C/D≥0.6需高度怀疑青光眼。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "青光眼典型视野改变不包括", "o": {"A": "旁中心暗点", "B": "弓形暗点", "C": "管状视野", "D": "中心暗点"}, "a": "D", "e": "青光眼损伤视乳头周围神经纤维，典型视野改变为旁中心暗点、弓形暗点及管状视野；中心暗点多见于黄斑病变，不属于青光眼典型表现。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "急性闭角型青光眼最常见诱因是", "o": {"A": "外伤", "B": "情绪波动", "C": "运动", "D": "感染"}, "a": "B", "e": "情绪激动可引起交感神经兴奋、瞳孔散大，使具有浅前房窄房角解剖基础的患者房角急速关闭，眼压骤升，是急性闭角型青光眼最常见诱因。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "急性闭角型青光眼急性发作期眼压通常", "o": {"A": "＜21mmHg", "B": "21～30mmHg", "C": "＞40mmHg", "D": "＞25mmHg"}, "a": "C", "e": "正确答案：＞40mmHg。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "急性闭角型青光眼发作时瞳孔表现为", "o": {"A": "缩小", "B": "散大", "C": "正常", "D": "不规则缩小"}, "a": "B", "e": "急性闭角型青光眼发作时眼压极高，瞳孔括约肌缺血麻痹，加之交感神经兴奋，导致瞳孔散大固定，呈竖椭圆形。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "急性发作后三联征不包括", "o": {"A": "色素性KP", "B": "虹膜节段性萎缩", "C": "青光眼斑", "D": "角膜溃疡"}, "a": "D", "e": "急性闭角型青光眼发作缓解后三联征为：色素性KP、虹膜节段性萎缩（括约肌缺血坏死）和晶状体前囊下青光眼斑；角膜溃疡不属于其中。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "原发性开角型青光眼的一线药物是", "o": {"A": "毛果芸香碱", "B": "甘露醇", "C": "前列腺素衍生物", "D": "阿托品"}, "a": "C", "e": "正确答案：前列腺素衍生物。", "author": "刘子越", "group": "眼科出题第三组"}, {"q": "眼的屈光系统中，哪个结构的屈光力最大？", "o": {"A": "晶状体", "B": "角膜", "C": "玻璃体", "D": "房水"}, "a": "B", "e": "眼球屈光介质包括：角膜、房水、晶状体、玻璃体。视网膜不是屈光介质（是感光组织）。", "author": "陈宣仁", "group": "眼科出题第三组"}, {"q": "正视眼在调节松弛的状态下，来自5m以外的平行光线会聚焦在哪里？", "o": {"A": "视网膜之前", "B": "视网膜之后", "C": "视网膜上", "D": "晶状体上"}, "a": "C", "e": "正视眼的定义即调节放松时，来自5m以外的平行光线经眼屈光系统折射后恰好聚焦在视网膜上，形成清晰像。", "author": "陈宣仁", "group": "眼科出题第三组"}, {"q": "婴幼儿时期由于眼球较小，通常表现为哪种生理性屈光状态？", "o": {"A": "生理性近视", "B": "生理性远视", "C": "正视眼", "D": "散光"}, "a": "B", "e": "婴幼儿眼轴短、眼球小，平行光线聚焦在视网膜后，呈生理性远视状态；随眼球发育眼轴增长，逐渐趋向正视化。", "author": "陈宣仁", "group": "眼科出题第三组"}, {"q": "形成近视眼的两个主要内因是什么？", "o": {"A": "眼屈光力增加和眼轴超长", "B": "眼屈光力减弱和眼轴变短", "C": "角膜变平和房水减少", "D": "晶体硬化和睫状肌麻痹"}, "a": "A", "e": "正确答案：眼屈光力增加和眼轴超长。", "author": "陈宣仁", "group": "眼科出题第三组"}, {"q": "调节力的单位通常是什么？", "o": {"A": "勒克斯(Lx)", "B": "毫米(mm)", "C": "屈光度(D)", "D": "米角"}, "a": "C", "e": "调节力的单位为屈光度（D），1D=1/焦距(米)。", "author": "陈宣仁", "group": "眼科出题第三组"}, {"q": "根据近视程度分类，轻度近视是指屈光度数在什么范围？", "o": {"A": "-3.00D以下", "B": "-3.00D～-6.00D", "C": "-6.00D～-9.00D", "D": "-10.00D以上"}, "a": "A", "e": "近视按程度：轻度<-3.00D，中度-3.00D~-6.00D，高度>-6.00D。按病因分轴性近视和屈光性近视。", "author": "陈宣仁", "group": "眼科出题第三组"}, {"q": "正常状态下，Gullstrand模型眼中眼球总屈光力在调节静止时约为多少？", "o": {"A": "19.11D", "B": "43.05D", "C": "58.64D", "D": "70.57D"}, "a": "C", "e": "Gullstrand模型眼中，调节静止时眼球总屈光力约58.64D。", "author": "陈宣仁", "group": "眼科出题第三组"}, {"q": "高度近视常会引起眼底退行性改变，下列哪项属于高度近视的眼底并发症表现？", "o": {"A": "豹纹状眼底", "B": "樱桃红斑", "C": "视神经炎", "D": "视盘水肿"}, "a": "A", "e": "近视按程度：轻度<-3.00D，中度-3.00D~-6.00D，高度>-6.00D。按病因分轴性近视和屈光性近视。", "author": "陈宣仁", "group": "眼科出题第三组"}, {"q": "临床上造成单眼失明的最主要原因是什么？", "o": {"A": "白内障", "B": "青光眼", "C": "眼外伤", "D": "黄斑病变"}, "a": "C", "e": "眼外伤尤其是穿孔伤可造成严重不可逆损伤，是临床上导致单眼失明的最主要原因，在青壮年中尤为突出。", "author": "陈宣仁", "group": "眼科出题第三组"}, {"q": "眼外伤按致病因素可分为机械性、物理性和什么类型的外来因素？", "o": {"A": "化学性", "B": "细菌性", "C": "病毒性", "D": "免疫性"}, "a": "A", "e": "眼外伤按致病因素分为机械性、物理性和化学性三大类；化学性外伤（酸碱烧伤）是第三类，细菌/病毒属感染性疾病，不在此分类之列。", "author": "陈宣仁", "group": "眼科出题第三组"}, {"q": "眼球钝挫伤后引起的继发性青光眼，通常多发生在伤后多久以内？", "o": {"A": "1周内", "B": "1个月内", "C": "半年内", "D": "1年内"}, "a": "D", "e": "眼球钝挫伤可损伤房角结构并引起迁延性炎症反应，继发性青光眼可在伤后数周至1年内逐渐发生，故观察期为伤后1年内。", "author": "陈宣仁", "group": "眼科出题第三组"}, {"q": "钝挫伤导致房水排出通道阻塞，最直接会导致什么临床后果？", "o": {"A": "眼压降低", "B": "眼压升高", "C": "角膜溃疡", "D": "屈光度增加"}, "a": "B", "e": "房水主要外流途径：睫状突→后房→瞳孔→前房→小梁网→Schlemm管→集液管→睫状前静脉。次要途径（10-20%）为葡萄膜巩膜途径。", "author": "陈宣仁", "group": "眼科出题第三组"}, {"q": "若眼外伤患者发生严重的眼内出血现象，眼前常伴有活动黑影，可能的情况是？", "o": {"A": "结膜下出血", "B": "玻璃体积血", "C": "角膜新生血管", "D": "房水生成减少"}, "a": "B", "e": "玻璃体积血时血液弥散于玻璃体腔，患者可见眼前活动性黑影或红色浮云，严重时视力骤降；结膜下出血不影响玻璃体，不会产生此症状。", "author": "陈宣仁", "group": "眼科出题第三组"}, {"q": "一名25岁男性右眼钝挫伤后6个月眼压急剧升高，房角镜检查最可能观察到什么典型改变？", "o": {"A": "房角完全闭合", "B": "房角后退", "C": "房角大量新生血管", "D": "前房极度变浅"}, "a": "B", "e": "房角镜检查是鉴别开角型和闭角型青光眼的关键手段。Scheie分级法评估房角宽度。", "author": "陈宣仁", "group": "眼科出题第三组"}, {"q": "国际标准视力表检查时，标准亮度应设定为多少？", "o": {"A": "100Lx", "B": "500Lx", "C": "1000Lx(勒克斯)", "D": "2000Lx"}, "a": "C", "e": "正确答案：1000Lx(勒克斯)。", "author": "陈宣仁", "group": "眼科出题第三组"}, {"q": "在视力检查中，对于“盲”的临床诊断标准，是指好眼的矫正视力小于多少？", "o": {"A": "0.3", "B": "0.1", "C": "0.05", "D": "0.01"}, "a": "C", "e": "依据WHO及我国盲的诊断标准，好眼最佳矫正视力低于0.05（1/20）即诊断为盲，0.05是盲与低视力的分界线。", "author": "陈宣仁", "group": "眼科出题第三组"}, {"q": "视角的单位“1分角(1')”大约对应视网膜上多大的距离，与一个视锥细胞的直径相近？", "o": {"A": "1.0 um", "B": "4.96 um", "C": "10 um", "D": "60 um"}, "a": "B", "e": "正确答案：4.96 um。", "author": "陈宣仁", "group": "眼科出题第三组"}, {"q": "测量眼压时，若施加的压力适中，在视野中看到的两个半圆形圆弧会呈现什么状态？", "o": {"A": "相互远离", "B": "交叉相交", "C": "内侧相切", "D": "外侧相切"}, "a": "C", "e": "Goldmann压平眼压计测量时，施加压力适中时视野中两个荧光素染色半圆弧的内侧缘恰好相切，此时读取的刻度值即为实际眼压。", "author": "陈宣仁", "group": "眼科出题第三组"}, {"q": "小儿视力检查中，将不同大小的目标置于患儿前方，观察其眼球是否跟随目标移动的方法称为什么？", "o": {"A": "遮盖试验", "B": "追随试验", "C": "暗适应检查", "D": "视野检查"}, "a": "B", "e": "追随试验是将目标置于患儿面前，观察其眼球是否跟随目标运动，用于评估婴幼儿有无注视和追随能力，是小儿视力的基本检查方法。", "author": "陈宣仁", "group": "眼科出题第三组"}, {"q": "裂隙灯检查时，将灯光焦点调节到与显微镜焦点完全一致的方法叫做什么？", "o": {"A": "直接焦点照明法", "B": "弥散光照明法", "C": "间接照明法", "D": "后部反光照明法"}, "a": "A", "e": "正确答案：直接焦点照明法。", "author": "陈宣仁", "group": "眼科出题第三组"}, {"q": "临床上界定“低视力（残）”的标准，是好眼的矫正视力小于多少？", "o": {"A": "1.0", "B": "0.8", "C": "0.5", "D": "0.3"}, "a": "D", "e": "根据WHO标准，好眼最佳矫正视力小于0.3但不低于0.05者诊断为低视力（视力残疾），0.3是低视力与正常视力的分界线。", "author": "陈宣仁", "group": "眼科出题第三组"}, {"q": "下列哪项通常引起“无痛性”的慢性视力下降？", "o": {"A": "角膜炎", "B": "白内障", "C": "虹膜睫状体炎", "D": "巩膜炎"}, "a": "B", "e": "白内障为晶状体缓慢混浊，视力逐渐下降，全程无眼部疼痛；角膜炎、虹膜睫状体炎、巩膜炎均伴有明显眼痛或刺激症状。", "author": "陈宣仁", "group": "眼科出题第三组"}, {"q": "患者主诉“中心性视野缺损”，最可能提示眼睛的哪个部位发生了病变？", "o": {"A": "角膜", "B": "黄斑", "C": "晶状体", "D": "视盘"}, "a": "B", "e": "眼科门诊病历核心内容记录顺序：主诉（就诊原因+眼别+症状+持续时间）→现病史→既往史→检查→诊断。", "author": "陈宣仁", "group": "眼科出题第三组"}, {"q": "“夜盲”的常见原因包括视杆细胞功能不良及哪种营养素缺乏？", "o": {"A": "维生素A缺乏症", "B": "维生素B缺乏症", "C": "维生素C缺乏症", "D": "维生素D缺乏症"}, "a": "A", "e": "夜盲常见病因：视网膜色素变性（最常见）、维生素A缺乏症。", "author": "陈宣仁", "group": "眼科出题第三组"}, {"q": "以下哪种情况常会引起“视物变形”？", "o": {"A": "视网膜脱离累及黄斑", "B": "急性结膜炎", "C": "视神经炎", "D": "癔症"}, "a": "A", "e": "正确答案：视网膜脱离累及黄斑。", "author": "陈宣仁", "group": "眼科出题第三组"}, {"q": "患者视力下降但眼底检查完全正常，不可能是下列哪种情况？", "o": {"A": "弱视", "B": "视神经挫伤早期", "C": "癔症", "D": "糖尿病视网膜病变"}, "a": "D", "e": "正确答案：糖尿病视网膜病变。", "author": "陈宣仁", "group": "眼科出题第三组"}, {"q": "散瞳药的临床适应症主要包括眼底检查、屈光检查以及什么疾病的治疗？", "o": {"A": "青
