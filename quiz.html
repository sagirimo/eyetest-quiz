 "a": "A", "e": "「孔大夫」笔画=11，÷5余1→A", "author": "梁瑞博", "group": "眼科出题第一组"}, {"q": "准教授正为他的学生准备眼科教案。请问以下哪个概念他不该放到“屈光不正”那一章", "o": {"A": "调节远点", "B": "调节近点", "C": "调节范围", "D": "调节幅度", "E": "调节时间"}, "a": "A", "e": "「孔大夫」笔画=11，÷5余1→A", "author": "梁瑞博", "group": "眼科出题第一组"}, {"q": "小夏打算用中等预算去给自己配一副近视镜，请问他该使用哪种镜片", "o": {"A": "偏光镜片", "B": "墨镜片", "C": "凹透镜片", "D": "凸透镜片", "E": "智能镜片"}, "a": "A", "e": "「孔大夫」笔画=11，÷5余1→A", "author": "梁瑞博", "group": "眼科出题第一组"}, {"q": "很快，刚满十八岁的李宁就要做飞秒激光近视手术了，对手术本身不够了解的他感到很不安。为了消除他的不安，你会如何安慰他", "o": {"A": "“这个手术可以走医保的，不用担心。”", "B": "“这个手术是一种微创手术，对人体伤害不大，术后恢复也会平稳落地的。”", "C": "“这个手术会极大的改善你的近视情况，以后你就不用戴眼镜了。”", "D": "“这个手术用时不长，很快我们就能处理好你的问题。”", "E": "“这个手术适合成年人做，你已经不是个未成年人了，没问题的。”"}, "a": "A", "e": "「孔大夫」笔画=11，÷5余1→A", "author": "梁瑞博", "group": "眼科出题第一组"}, {"q": "在眼科的手术室外，龙大主任听到了患者们在杂七杂八的聊天，请问以下内容中哪个是错的最明显的", "o": {"A": "“得了近视眼可真不好受，不过遵循医嘱，说不定还有机会缓解。”", "B": "“别老让你家孩子挑灯夜战了！你要等他得了高度近视才后悔吗？”", "C": "“我家孩子最近总是看着看着书就犯恶心，但他测视力没啥大问题啊？是不是得了远视眼？”", "D": "“我老爹得了老花，看不清楚近处的东西，正好不用担心困扰他大半辈子的高度近视了！”", "E": "“老师说我家孩子老是眯着眼看东西，我估计他是得散光眼了。”"}, "a": "A", "e": "「孔大夫」笔画=11，÷5余1→A", "author": "梁瑞博", "group": "眼科出题第一组"}, {"q": "长大夫正在为患者准备镜片，请问哪种镜片是不需要为屈光不正和斜视的患者准备的", "o": {"A": "太阳镜片", "B": "凹透镜", "C": "凸透镜", "D": "圆柱透镜", "E": "三棱镜"}, "a": "A", "e": "「孔大夫」笔画=11，÷5余1→A", "author": "梁瑞博", "group": "眼科出题第一组"}, {"q": "京女士患有多发性硬化，近日她突然出现了急性单眼视力下降，伴色觉异常，请问她最可能得了什么病", "o": {"A": "一过性单眼功能紊乱", "B": "缺血性视神经病变", "C": "硬脑膜下血肿", "D": "视神经损伤", "E": "视神经炎"}, "a": "A", "e": "「孔大夫」笔画=11，÷5余1→A", "author": "梁瑞博", "group": "眼科出题第一组"}, {"q": "如果你是医生，你会用什么药来治疗患有视神经炎的上树一郎", "o": {"A": "糖皮质激素", "B": "多能干细胞", "C": "抗菌素", "D": "非淄体类消炎药", "E": "神经毒性药物"}, "a": "A", "e": "「孔大夫」笔画=11，÷5余1→A", "author": "梁瑞博", "group": "眼科出题第一组"}, {"q": "30岁左右的李占良患有糖尿病，如果你是他的眼科医生，你会让他优先小心哪种眼科疾病", "o": {"A": "近视眼", "B": "远视眼", "C": "老花眼", "D": "缺血性视神经病变", "E": "视神经炎"}, "a": "A", "e": "「孔大夫」笔画=11，÷5余1→A", "author": "梁瑞博", "group": "眼科出题第一组"}, {"q": "长期患有青光眼的灵梦近日感到视野愈发缩小，她最可能患有什么疾病", "o": {"A": "白内障", "B": "老花眼", "C": "青光眼性视神经病变", "D": "青光眼合并角膜炎", "E": "青光眼合并眼部肿瘤"}, "a": "A", "e": "「孔大夫」笔画=11，÷5余1→A", "author": "梁瑞博", "group": "眼科出题第一组"}, {"q": "立克白患有Leber遗传性视神经病变，身为她的妇产科医生，你在对她进行产检的时候会对胎儿体细胞的哪一部分进行重点筛查", "o": {"A": "细胞核", "B": "线粒体", "C": "细胞质", "D": "高尔基体", "E": "内质网"}, "a": "A", "e": "「孔大夫」笔画=11，÷5余1→A", "author": "梁瑞博", "group": "眼科出题第一组"}, {"q": "富含血管和丰富的神经分布", "o": {"B": "是一种不透明的组织", "C": "由晶体囊、蛋白含量丰富的晶体纤维组成", "D": "主要营养来源于角膜", "E": "主要作用是维持眼内压"}, "a": "C", "e": "正确答案：由晶体囊、蛋白含量丰富的晶体纤维组成。", "author": "邓敏智", "group": "眼科出题第一组"}, {"q": "患者，女，60岁，近期查体发现双眼晶状体周边部皮质呈“楔形、车轮样混浊”，混浊正由周边向中心发展。该患者的皮质性白内障处于哪一期？", "o": {"A": "初发期", "B": "膨胀期", "C": "成熟期", "D": "过熟期", "E": "绝对期"}, "a": "A", "e": "皮质性白内障初发期表现为晶状体周边部皮质出现楔形或车辐状混浊，由周边向中央发展，尚未累及视轴，视力影响不明显，符合题目描述。", "author": "邓敏智", "group": "眼科出题第一组"}, {"q": "患者，男，65岁，主诉近期视力下降明显。眼科专科检查发现晶状体混浊，前房变浅，以斜照法检查晶状体时，投照侧虹膜在深层混浊皮质上形成新月形阴影。该患者最可能处于皮质性白内障的哪个分期？", "o": {"A": "初发期", "B": "膨胀期", "C": "成熟期", "D": "过熟期", "E": "晚期"}, "a": "B", "e": "眼科门诊病历核心内容记录顺序：主诉（就诊原因+眼别+症状+持续时间）→现病史→既往史→检查→诊断。", "author": "邓敏智", "group": "眼科出题第一组"}, {"q": "超声乳化及人工晶体植入术", "o": {"A": "患者，男，68岁，主诉近半年来出现渐进性的视力下降，并且觉得对比敏感度下降，偶尔有单眼复视和眩光的现象。这最符合以下哪种疾病的典型临床症状？ A. 青光眼", "B": "结膜炎", "C": "白内障", "D": "角膜炎", "E": "视神经炎"}, "a": "C", "e": "超声乳化白内障吸除+IOL植入术（Phaco）特点：切口小、时间短、表麻无痛、恢复快、术后散光小。", "author": "邓敏智", "group": "眼科出题第一组"}, {"q": "统计学上，正常眼压的范围是？", "o": {"A": "10~21mmHg", "B": "15~25mmHg", "C": "8~15mmHg", "D": "21~30mmHg"}, "a": "A", "e": "正常眼压统计学范围10~21mmHg，24h波动<8mmHg，双眼差值<5mmHg。", "author": "邓敏智", "group": "眼科出题第一组"}, {"q": "患者女，57岁，左眼红痛、视力下降12小时。眼压左眼50mmHg，角膜雾状水肿，上皮可见小水泡，前房极浅，瞳孔不规则散大。根据上述表现，最可能的诊断是？", "o": {"A": "晶状体膨胀继发性青光眼", "B": "原发性急性闭角型青光眼", "C": "急性虹膜睫状体炎", "D": "急性结膜炎"}, "a": "B", "e": "正确答案：原发性急性闭角型青光眼。", "author": "邓敏智", "group": "眼科出题第一组"}, {"q": "布林佐胺（碳酸酐酶抑制剂）", "o": {"C": "卡替洛尔（β-受体阻滞剂）", "D": "阿法根（α-受体激动剂）", "E": "毛果芸香碱（拟胆碱能药物）"}, "a": "C", "e": "碳酸酐酶抑制剂（布林佐胺/醋甲唑胺）抑制睫状突碳酸酐酶→减少房水生成。", "author": "邓敏智", "group": "眼科出题第一组"}, {"q": "根据解剖特征，视神经可以分为哪几段？", "o": {"A": "眼内段", "B": "眶内段", "C": "管内段", "D": "颅内段", "E": "视交叉段"}, "a": "A", "e": "视神经按解剖位置分为四段：眼内段（视盘至巩膜筛板）、眶内段、管内段（视神经管内）和颅内段，共四段，视交叉不属于视神经本身。", "author": "邓敏智", "group": "眼科出题第一组"}, {"q": "患者，男，40岁，右眼被铁丝扎伤发生角膜穿通伤1个月，未行正规手术缝合。近3天左眼出现眼痛、畏光，视力下降。左眼查体可见睫状充血，羊脂状KP。针对该患者左眼的病变，最可能的诊断是？", "o": {"A": "感染性眼内炎", "B": "晶状体诱导的葡萄膜炎", "C": "Vogt-小柳-原田综合征", "D": "中间葡萄膜炎", "E": "交感性眼炎"}, "a": "E", "e": "交感性眼炎是指一眼穿通伤后，对侧未受伤眼发生的肉芽肿性葡萄膜炎。该患者右眼穿通伤1个月未正规处理，左眼出现睫状充血和羊脂状KP，典型符合交感性眼炎表现。", "author": "邓敏智", "group": "眼科出题第一组"}, {"q": "渗出性（湿性）年龄相关性黄斑变性（AMD）最核心的病理特点是？", "o": {"A": "A. 视网膜动脉痉挛闭塞", "B": "视网膜静脉血栓形成", "C": "玻璃膜（Bruch膜）变薄破裂", "D": "脉络膜新生血管（CNV）形成", "E": "视网膜周边部裂孔形成"}, "a": "D", "e": "湿性AMD关键病理改变：脉络膜新生血管（CNV）。一线治疗：玻璃体腔抗VEGF注射。", "author": "邓敏智", "group": "眼科出题第一组"}, {"q": "患者诉眼前出现“闪电样”闪光感，尤其在眼球转动时明显，最可能的原因", "o": {"A": "视网膜色素变性", "B": "玻璃体液化对视网膜的牵拉", "C": "急性闭角型青光眼发作", "D": "视网膜中央动脉阻塞", "E": "视网膜静脉周围炎"}, "a": "B", "e": "正确答案：玻璃体液化对视网膜的牵拉。", "author": "宋娟范", "group": "眼科出题第二组"}, {"q": "关于“视物变形”的描述，下列哪项是错误的", "o": {"A": "常见于黄斑病变", "B": "换着可能感到直线变弯", "C": "首选检查是Amsler Grid", "D": "主要由视网膜色素变性引起", "E": "可见于中心性浆液性脉络膜视网膜病变"}, "a": "D", "e": "正确答案：主要由视网膜色素变性引起。", "author": "宋娟范", "group": "眼科出题第二组"}, {"q": "患者视野呈“管状视野”，最可能的诊断是", "o": {"A": "垂体瘤", "B": "视网膜脱离", "C": "晚期青光眼或视网膜色素变性", "D": "球后视神经炎", "E": "缺血性视神经病变"}, "a": "C", "e": "正确答案：晚期青光眼或视网膜色素变性。", "author": "宋娟范", "group": "眼科出题第二组"}, {"q": "眼科用药中，关于“散瞳药”的使用，下列说法错误的是", "o": {"A": "复方托吡卡胺常用于青少年散瞳验光", "B": "阿托品凝胶点眼后需压迫内眦以减少全身吸收", "C": "虹膜睫状体炎患者禁用散瞳药", "D": "散瞳药可用于缓解虹膜睫状体炎的疼痛", "E": "散瞳药有助于拉开虹膜后粘连"}, "a": "C", "e": "正确答案：虹膜睫状体炎患者禁用散瞳药。", "author": "宋娟范", "group": "眼科出题第二组"}, {"q": "下列哪种滴眼液在点用后可能导致睫毛增长和眼周皮肤色素沉着", "o": {"A": "Timolol", "B": "Brinzolamide", "C": "前列腺素衍生物", "D": "Pilocarpine", "E": "Brimonidine"}, "a": "C", "e": "正确答案：前列腺素衍生物。", "author": "宋娟范", "group": "眼科出题第二组"}, {"q": "在眼科门诊，若患者视力检查结果为“指数/20cm”，其含义是", "o": {"A": "患者在20cm处能看到国际标准视力表0.1", "B": "患者在20cm处仅能辨认检查者的手指数量", "C": "患者仅有光感，无法数指", "D": "患者患有20cm的视野缺损", "E": "患者矫正视力为20/20"}, "a": "B", "e": "正确答案：患者在20cm处仅能辨认检查者的手指数量。", "author": "宋娟范", "group": "眼科出题第二组"}, {"q": "关于视野检查的临床意义，下列配对正确的是", "o": {"A": "双颞侧偏盲 —— 视网膜色素变性", "B": "同向性偏盲 —— 垂体瘤", "C": "双颞侧偏盲 —— 垂体瘤", "D": "弓形暗点 —— 白内障", "E": "鼻侧阶梯 —— 视网膜脱离"}, "a": "C", "e": "正确答案：双颞侧偏盲 —— 垂体瘤。", "author": "宋娟范", "group": "眼科出题第二组"}, {"q": "在使用裂隙灯显微镜检查时，若观察到角膜呈现“瓷白色”混浊，最可能对应的是", "o": {"A": "角膜上皮剥脱", "B": "白内障", "C": "角膜白斑", "D": "虹膜后粘连", "E": "角膜基质炎"}, "a": "C", "e": "角膜白斑是角膜全层致密瘢痕性混浊，外观呈瓷白色，为角膜严重炎症或外伤后遗留的不透明瘢痕组织，裂隙灯下呈典型的瓷白色混浊。", "author": "宋娟范", "group": "眼科出题第二组"}, {"q": "患者因“眼痛”就诊，检查发现按压眉弓中外1/3处有显著压痛，最可能的诊断是", "o": {"A": "急性结膜炎", "B": "急性闭角型青光眼", "C": "眶上神经痛", "D": "麦粒肿", "E": "鼻窦炎"}, "a": "C", "e": "眶上神经从眶上切迹穿出，该切迹位于眉弓中内1/3与外2/3交界处，按压此处出现明显压痛是眶上神经痛的特征性体征。", "author": "宋娟范", "group": "眼科出题第二组"}, {"q": "15 患者，55岁，女性，右眼下睑无痛性硬结1个月。查体：右眼下睑皮下可触及一约黄豆大小硬结，无压痛，与皮肤无粘连。翻转眼睑可见结膜面相应处呈紫红色隆起。最可能的诊断是", "o": {"A": "外睑腺炎", "B": "内睑腺炎", "C": "睑板腺癌", "D": "霰粒肿（睑板腺囊肿）", "E": "眼睑血管瘤"}, "a": "D", "e": "正确答案：霰粒肿（睑板腺囊肿）。", "author": "宋娟范", "group": "眼科出题第二组"}, {"q": "患者，45岁，女性，左眼流泪伴黏液脓性分泌物半年。挤压泪囊区有黏液脓性分泌物自泪小点溢出。下列对该患者的处理中，错误的是", "o": {"A": "首先应进行泪道冲洗检查", "B": "急性期应积极行泪道探通术", "C": "可行泪囊鼻腔吻合术或泪道置管术", "D": "慢性泪囊炎是内眼手术的绝对禁忌症", "E": "治疗原则为恢复泪道通畅及消除炎症"}, "a": "B", "e": "正确答案：急性期应积极行泪道探通术。", "author": "宋娟范", "group": "眼科出题第二组"}, {"q": "患者，20岁，男性，双眼红肿、异物感、大量黄色脓性分泌物1天。晨起时上下睑被分泌物粘住。最可能的诊断是", "o": {"A": "流行性角结膜炎", "B": "急性卡他性结膜炎", "C": "春季角结膜炎", "D": "淋菌性结膜炎", "E": "沙眼"}, "a": "B", "e": "正确答案：急性卡他性结膜炎。", "author": "宋娟范", "group": "眼科出题第二组"}, {"q": "患者，30岁，男性，右眼红、畏光、流泪3天，伴有同侧耳前淋巴结肿大。既往有感冒史。裂隙灯检查示右眼角膜上皮呈树枝状缺损，荧光素染色阳性。该患者最可能的病原体是", "o": {"A": "金黄色葡萄球菌", "B": "铜绿假单胞菌", "C": "单纯疱疹病毒", "D": "腺病毒", "E": "镰刀菌"}, "a": "C", "e": "正确答案：单纯疱疹病毒。", "author": "宋娟范", "group": "眼科出题第二组"}, {"q": "前葡萄膜炎眼压变化可能机制，下列哪项不正确", "o": {"A": "发病初期即表现为持续性低眼压", "B": "炎症高峰期眼压降低，晚期升高", "C": "早期因炎症反应可出现高眼压，晚期因睫状突萎缩可导致低眼压", "D": "整个病程中眼压始终保持正常", "E": "眼压呈波动性变化，与体温平行"}, "a": "C", "e": "正确答案：早期因炎症反应可出现高眼压，晚期因睫状突萎缩可导致低眼压。", "author": "宋娟范", "group": "眼科出题第二组"}, {"q": "葡萄膜炎患者若出现顽固性低眼压，最可能的病理生理基础是", "o": {"A": "房水生成动力不足", "B": "睫状突发生萎缩和功能丧失", "C": "脉络膜渗漏导致液体分流", "D": "瞳孔膜闭导致房水流出受阻", "E": "晶状体溶解导致渗透压改变"}, "a": "B", "e": "正确答案：睫状突发生萎缩和功能丧失。", "author": "宋娟范", "group": "眼科出题第二组"}, {"q": "在裂隙灯检查中，观察KP（角膜后沉着物）时，不需要重点记录的特征是", "o": {"A": "分布的位置（如三角形分布）", "B": "数量的多少", "C": "色素的深浅（颜色）", "D": "形态特征（如尘状、羊脂状）", "E": "基底膜的厚度"}, "a": "E", "e": "正确答案：基底膜的厚度。", "author": "宋娟范", "group": "眼科出题第二组"}, {"q": "白内障超声乳化手术中，对前囊膜撕囊（Capsulorhexis）的质量要求是", "o": {"A": "撕囊口边缘越不规则越好，以增加摩擦力", "B": "撕囊口应尽量圆滑且直径适中，以便固定人工晶体", "C": "撕囊口应大于人工晶体光学部，防止遮挡", "D": "撕囊口应位于颞侧，避开视轴", "E": "撕囊口应呈锯齿状，利于房水流通"}, "a": "B", "e": "超声乳化白内障吸除+IOL植入术（Phaco）特点：切口小、时间短、表麻无痛、恢复快、术后散光小。", "author": "宋娟范", "group": "眼科出题第二组"}, {"q": "现代白内障超声乳化手术常用的主切口长度通常为", "o": {"A": "1.0 - 3.0 mm", "B": "5.0 - 6.0 mm", "C": "8.0 - 10.0 mm", "D": "12.0 - 14.0 mm", "E": "无需切口，经角膜缘隧道进入"}, "a": "A", "e": "超声乳化白内障吸除+IOL植入术（Phaco）特点：切口小、时间短、表麻无痛、恢复快、术后散光小。", "author": "宋娟范", "group": "眼科出题第二组"}, {"q": "前房闪辉（Tyndall phenomenon）的出现，主要是因为哪种屏障功能的破坏", "o": {"A": "血-房水屏障", "B": "血-视网膜屏障", "C": "角膜内皮屏障", "D": "虹膜色素上皮屏障", "E": "晶状体囊膜屏障"}, "a": "A", "e": "正确答案：血-房水屏障。", "author": "宋娟范", "group": "眼科出题第二组"}, {"q": "若白内障术中连续环形撕囊（CCC）的囊口过大，最可能导致以下哪种后果", "o": {"A": "人工晶体缺乏支撑，发生偏心或倾斜", "B": "术中后囊膜破裂风险显著降低", "C": "术后角膜内皮失代偿", "D": "前房出血难以控制", "E": "晶状体悬韧带断裂"}, "a": "A", "e": "正确答案：人工晶体缺乏支撑，发生偏心或倾斜。", "author": "宋娟范", "group": "眼科出题第二组"}, {"q": "关于角膜透明性的维持机制，下列说法错误的是", "o": {"A": "上皮细胞和泪膜形成光滑光学界面", "B": "基质胶原纤维规则排列可减少光散射", "C": "角膜无血管有利于维持透明", "D": "内皮细胞Na⁺-K⁺泵维持基质半脱水状态", "E": "角膜透明主要依赖房角结构完整"}, "a": "E", "e": "角膜透明性依赖上皮完整、基质胶原规则排列、无血管、内皮泵功能。内皮细胞层是维持透明的关键。", "author": "宋娟范", "group": "眼科出题第二组"}, {"q": "角膜炎病理过程的正确顺序是", "o": {"A": "愈合期→浸润期→溃疡形成期→消退期", "B": "浸润期→溃疡形成期→消退期→愈合期", "C": "浸润期→消退期→溃疡形成期→愈合期", "D": "溃疡形成期→浸润期→消退期→愈合期", "E": "浸润期→溃疡形成期→愈合期→消退期"}, "a": "B", "e": "正确答案：浸润期→溃疡形成期→消退期→愈合期。", "author": "宋娟范", "group": "眼科出题第二组"}, {"q": "32患者角膜中央区溃疡逐渐加深，变薄区接近后弹力层，在眼压作用下形成透明水珠样膨出。该病变称为", "o": {"A": "角膜葡萄肿", "B": "角膜白斑", "C": "后弹力层膨出", "D": "角膜云翳", "E": "角膜瘘"}, "a": "C", "e": "角膜中央厚约0.5mm，周边约1mm。基质层占全层约90%。", "author": "宋娟范", "group": "眼科出题第二组"}, {"q": "下列哪项最符合铜绿假单胞菌性角膜炎的特点", "o": {"A": "病程缓慢，疼痛轻", "B": "中央椭圆形匍行性溃疡", "C": "圆形局灶性脓肿，边界清楚", "D": "广泛液化性坏死，大量黄绿色脓性分泌物", "E": "卵圆形下方溃疡，前房积脓少"}, "a": "D", "e": "铜绿假单胞菌性角膜炎特点：潜伏期短、发展迅猛、淡绿色分泌物、易穿孔、前房积脓。需紧急治疗。", "author": "宋娟范", "group": "眼科出题第二组"}, {"q": "关于细菌性角膜炎的初始治疗原则，正确的是", "o": {"A": "等待培养结果后再开始治疗", "B": "首选糖皮质激素滴眼", "C": "广谱抗生素或联合抗菌治疗", "D": "所有患者均需全身抗生素", "E": "首选抗病毒药物"}, "a": "C", "e": "正确答案：广谱抗生素或联合抗菌治疗。", "author": "宋娟范", "group": "眼科出题第二组"}, {"q": "35患者农忙季节被稻草划伤后出现角膜溃疡。检查见乳白色致密浸润灶，表面干燥呈牙膏样外观，伴卫星灶。最可能诊断为", "o": {"A": "铜绿假单胞菌性角膜炎", "B": "真菌性角膜炎", "C": "单纯疱疹病毒性角膜炎", "D": "棘阿米巴角膜炎", "E": "摩拉菌性角膜炎"}, "a": "B", "e": "正确答案：真菌性角膜炎。", "author": "宋娟范", "group": "眼科出题第二组"}, {"q": "真菌性角膜炎最具诊断价值的病史是", "o": {"A": "长期高血压", "B": "白内障术后", "C": "植物性角膜外伤", "D": "既往葡萄膜炎", "E": "高度近视"}, "a": "C", "e": "真菌性角膜炎特点：亚急性起病，植物外伤史，症状较体征轻，溃疡呈牙膏状灰白，禁用激素。", "author": "宋娟范", "group": "眼科出题第二组"}, {"q": "37关于上皮型单纯疱疹病毒性角膜炎（HSK），下列哪项最具有特征性", "o": {"A": "环形浸润", "B": "盘状角膜水肿", "C": "树枝状角膜溃疡", "D": "羽毛状浸润", "E": "匍行性角膜溃疡"}, "a": "C", "e": "HSK（单纯疱疹病毒性角膜炎）特征：反复发作、感冒/劳累诱因、角膜知觉减退、树枝/地图状溃疡。上皮型禁用激素。", "author": "宋娟范", "group": "眼科出题第二组"}, {"q": "38下列关于上皮型HSK的描述，错误的是", "o": {"A": "病变主要位于角膜上皮", "B": "病毒直接破坏上皮细胞", "C": "常有角膜知觉减退", "D": "免疫炎症反应非常明显", "E": "可发展为地图状溃疡"}, "a": "D", "e": "HSK（单纯疱疹病毒性角膜炎）特征：反复发作、感冒/劳累诱因、角膜知觉减退、树枝/地图状溃疡。上皮型禁用激素。", "author": "宋娟范", "group": "眼科出题第二组"}, {"q": "39患者长期佩戴角膜接触镜，出现剧烈眼痛数月。检查发现角膜中央环状浸润。最可能诊断为", "o": {"A": "真菌性角膜炎", "B": "细菌性角膜炎", "C": "单纯疱疹病毒性角膜炎", "D": "棘阿米巴角膜炎", "E": "过敏性角膜炎"}, "a": "D", "e": "角膜中央厚约0.5mm，周边约1mm。基质层占全层约90%。", "author": "宋娟范", "group": "眼科出题第二组"}, {"q": "40关于正视眼（emmetropia）的定义，正确的是", "o": {"A": "平行光线聚焦于视网膜之前", "B": "平行光线聚焦于视网膜之后", "C": "平行光线经调节后聚焦于视网膜", "D": "调节放松时平行光线聚焦于视网膜", "E": "近距离物体光线聚焦于视网膜"}, "a": "D", "e": "正确答案：调节放松时平行光线聚焦于视网膜。", "author": "宋娟范", "group": "眼科出题第二组"}, {"q": "关于眼球总屈光力的组成，下列说法正确的是", "o": {"A": "晶状体贡献约2/3屈光力", "B": "房水贡献最大", "C": "角膜贡献眼球总屈光力的2/3以上", "D": "玻璃体是主要屈光介质", "E": "各屈光介质贡献相同"}, "a": "C", "e": "正确答案：角膜贡献眼球总屈光力的2/3以上。", "author": "宋娟范", "group": "眼科出题第二组"}, {"q": "42正视眼注视40 cm处目标时，其调节需求约为", "o": {"A": "1.00D", "B": "2.00D", "C": "2.50D", "D": "3.00D", "E": "4.00D"}, "a": "C", "e": "调节需求等于注视距离（米）的倒数，注视40cm（0.4m）处目标时，调节需求 = 1÷0.4 = 2.5D，正视眼无需额外补偿，故答案为2.50D。", "author": "宋娟范", "group": "眼科出题第二组"}, {"q": "43关于调节机制，下列描述正确的是", "o": {"A": "睫状肌收缩时悬韧带张力增加", "B": "睫状肌收缩时晶状体变平", "C": "睫状肌松弛时晶状体前移", "D": "睫状肌收缩时晶状体因自身弹性变凸", "E": "调节主要依赖角膜曲率改变"}, "a": "D", "e": "看近物时：睫状肌收缩→悬韧带松弛→晶状体借自身弹性变凸→屈光力增加。看远时睫状肌松弛。", "author": "宋娟范", "group": "眼科出题第二组"}, {"q": "44近反射三联动现象不包括", "o": {"A": "调节", "B": "集合", "C": "瞳孔缩小", "D": "眼压下降", "E": "双眼会聚"}, "a": "D", "e": "近反射三联征：调节+集合（双眼会聚）+瞳孔缩小。眼压下降不属于近反射。", "author": "宋娟范", "group": "眼科出题第二组"}, {"q": "45关于近视的分类，下列属于高度近视的是", "o": {"A": "-1.50D", "B": "-2.75D", "C": "-4.50D", "D": "-5.75D", "E": "-7.00D"}, "a": "E", "e": "近视按程度：轻度<-3.00D，中度-3.00D~-6.00D，高度>-6.00D。按病因分轴性近视和屈光性近视。", "author": "宋娟范", "group": "眼科出题第二组"}, {"q": "下列哪项症状不属于视力障碍", "o": {"A": "眼红", "B": "复视", "C": "视力下降", "D": "视物变小", "E": "视物变形"}, "a": "A", "e": "视力障碍包括视力下降、视物变形、视物变小、复视等视觉功能异常症状。眼红是眼部充血的体征，属于刺激症状，不属于视力障碍的范畴。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "下列哪种药物对晶状体没有毒性作用", "o": {"A": "糖皮质激素", "B": "毛果芸香碱", "C": "丁卡因", "D": "阿托品", "E": "氯丙嗪"}, "a": "C", "e": "丁卡因为表面麻醉药，仅作用于角膜、结膜上皮的神经末梢，对晶状体无毒性。糖皮质激素、毛果芸香碱、阿托品和氯丙嗪长期使用均可导致晶状体混浊。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "视网膜血管是否均匀", "o": {"A": "视盘颜色", "B": "视盘是否有荧光素渗漏", "C": "视盘病理凹陷"}, "a": "B", "e": "正确答案：视盘是否有荧光素渗漏。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "以下关于裂隙灯显微镜的描述错误的是", "o": {"A": "裂隙灯包含光源投射系统", "B": "裂隙灯包含观察用放大系统", "C": "裂隙灯可以测量角膜厚度", "D": "裂隙灯可以用来检查眼部表浅的病变", "E": "裂隙灯可以用来检查眼部较深的病变"}, "a": "C", "e": "正确答案：裂隙灯可以测量角膜厚度。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "如眼前手动不能识别，则改查", "o": {"A": "指数", "B": "光定位", "C": "光感", "D": "针孔视力", "E": "色觉"}, "a": "C", "e": "视力检查由高到低依次为：视力表→手动→光感→光定位。眼前手动不能识别时，下一步应检查光感，以判断视网膜及视路是否尚有基本功能。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "下列关于应用直接检眼镜透照法检查的描述错误的是", "o": {"A": "用于观察眼的屈光间质有无混浊", "B": "须将镜片转盘拨到+8-+10D", "C": "距受检眼20cm", "D": "正常时瞳孔区呈橘红色反射", "E": "距受检眼30cm"}, "a": "E", "e": "正确答案：距受检眼30cm。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "患者在距视力表3米处可清楚辨认最大视标﹙0.1﹚，该患者的实际视力为", "o": {"A": "0.05", "B": "0.6", "C": "0.08", "D": "0.06", "E": "0.1"}, "a": "D", "e": "标准视力表检查距离为5米，患者在3米处才能辨认0.1视标，实际视力按公式计算：0.1×（3/5）= 0.06，故实际视力为0.06。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "角膜干燥症", "o": {"A": "易患翼状胬肉", "B": "暴露性角膜炎", "C": "溢泪"}, "a": "B", "e": "正确答案：暴露性角膜炎。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "泪道冲洗时清水完全沿原路返回，则说明", "o": {"A": "泪小管阻塞", "B": "泪小点阻塞", "C": "泪总管阻塞", "D": "鼻泪管阻塞", "E": "鼻泪管阻塞合并慢性泪囊炎"}, "a": "A", "e": "泪道冲洗：原路返流→泪小管阻塞；下冲上返→泪总管阻塞；返流+脓→慢性泪囊炎（鼻泪管阻塞）。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "泪液的排出通道，不包括", "o": {"A": "上下泪小点", "B": "泪囊", "C": "泪腺", "D": "泪小管", "E": "鼻泪管"}, "a": "C", "e": "泪腺是分泌泪液的器官，不属于泪液排出通道。泪液排出通道由上下泪小点、泪小管、泪囊和鼻泪管依次组成，最终引流入鼻腔。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "春季角结膜炎多见于", "o": {"A": "婴幼儿", "B": "20岁以下的青少年", "C": "20-30岁的成年人", "D": "30-40岁的成年人", "E": "50岁以上的老年人"}, "a": "B", "e": "春季角结膜炎：儿童青少年、双眼奇痒、黏丝状分泌物、上睑结膜铺路石样乳头。变态反应性疾病。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "角膜上皮缺损", "o": {"A": "长期大量用糖皮质激素", "B": "佩戴角膜接触镜"}, "a": "B", "e": "正确答案：佩戴角膜接触镜。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "角膜的感觉神经纤维是从﹙﹚发出的分支", "o": {"A": "三叉神经下颌支", "B": "泪腺神经", "C": "睫状长神经", "D": "睫状短神经", "E": "视神经"}, "a": "C", "e": "角膜的感觉神经来源于三叉神经眼支，其分支睫状长神经穿过巩膜进入角膜，负责传导角膜的痛、温、触觉，故角膜感觉灵敏。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "慢性期", "o": {"A": "正常眼", "B": "正常眼压性青光眼", "C": "视神经萎缩"}, "a": "C", "e": "急性闭角型青光眼慢性期由于反复发作或持续高眼压，视神经长期受压缺血，最终导致视神经萎缩，表现为视盘苍白、视野缺损进行性加重。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "患者男性，70歳，左眼突然胀痛，视力下降明显，伴同侧头痛、恶心、呕吐。检查﹕左眼角膜水肿，虹膜前移，前房浅，晶状体混浊，体积增大，眼压高。诊断为白内障引起的青光眼大发作，目前患者的白内障处于哪一期", "o": {"A": "初发期", "B": "膨胀期", "C": "成熟期", "D": "过熟期", "E": "以上均不是"}, "a": "B", "e": "皮质性白内障膨胀期晶状体大量吸水，体积增大，虹膜被推向前方，前房变浅，房角关闭，引发急性继发性闭角型青光眼，出现眼胀痛、头痛、恶心呕吐等症状。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "虹膜震颤", "o": {"A": "继发青光眼", "B": "视力严重下降", "C": "楔形混浊", "D": "晶体全混"}, "a": "A", "e": "虹膜震颤是晶状体脱位的典型体征，脱位晶状体可堵塞瞳孔或房角，导致房水循环障碍，引发继发性青光眼，这是晶状体脱位最严重的并发症之一。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "患者男性，30歳，右眼拳击伤后晶状体全脱位到玻璃体中，右眼原为正视眼，目前的屈光状态为", "o": {"A": "正视", "B": "高度近视", "C": "高度远视", "D": "轻度近视", "E": "轻度远视"}, "a": "C", "e": "晶状体提供约+20D的屈光力，全脱位后眼球失去晶状体屈光，变为无晶状体眼，屈光状态转变为高度远视（约+10～+12D）。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "男，50岁，以复视就诊，复视像检查﹕左下方复像分离最大，周边物象是右眼，最可能的诊断是", "o": {"A": "左上直肌痹", "B": "右上直肌麻痹", "C": "右上斜肌麻痹", "D": "右外直肌麻痹", "E": "左外直肌麻痹"}, "a": "C", "e": "正确答案：右上斜肌麻痹。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "患者，男68岁，右眼视力下降6个月，有糖尿病史12年。眼检﹕右眼视力0.5，晶体皮质混浊，视盘不水肿，后极部偶见点状出血、微动脉瘤，黄斑区硬性渗出。FFA示后极部微动脉瘤。此患者最可能的诊断是", "o": {"A": "单纯性糖尿病性视网膜病变", "B": "老年性黄斑变性", "C": "高血压性视网膜病变", "D": "增殖性糖尿病性视网膜病变", "E": "高度近视性视网膜病变"}, "a": "A", "e": "正确答案：单纯性糖尿病性视网膜病变。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "患儿，12岁，左眼视力模糊1周并有眼球转动时疼痛感，之前有感冒病史，瞳孔对光反射略迟钝，眼底无明显异常，此患儿最可能的诊断为", "o": {"A": "缺血性视神经病变", "B": "球后视神经炎", "C": "屈光不正", "D": "巩膜炎"}, "a": "B", "e": "正确答案：球后视神经炎。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "视网膜中央动脉阻塞", "o": {"A": "缺血性视神经病变", "B": "视盘水肿"}, "a": "A", "e": "CRAO典型表现：视网膜苍白水肿+黄斑樱桃红斑。属眼科急诊，抢救黄金窗口90-120分钟。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "患者，男，36岁，双眼球无痛性突岀5月余。CT未见眶内占位，下直肌梭形肿大。应诊断为", "o": {"A": "甲状腺相关性眼病", "B": "肌炎型炎性假瘤", "C": "眼眶海绵状血管瘤", "D": "眶内脑膜瘤", "E": "眶内淋巴瘤"}, "a": "A", "e": "正确答案：甲状腺相关性眼病。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "某男，28歳，右眼被石灰烧伤早期治疗原则是", "o": {"A": "控制感染", "B": "防止瞳孔后粘连", "C": "抑制胶原合成", "D": "抑制新生血管形成", "E": "促进角膜修复"}, "a": "B", "e": "石灰为碱性物质，碱烧伤引起严重虹膜睫状体炎，早期需散瞳（防止瞳孔后粘连），以避免虹膜-晶状体粘连导致瞳孔闭锁等严重并发症，这是碱烧伤早期治疗的特异性原则。控制感染为一般眼外伤的通用措施，并非化学烧伤的特异性早期治疗原则。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "某女，36歳，右眼被玻璃溅伤1天。检查﹕全身情况尚可，右眼视力﹕手动，左眼视力﹕1.2﹔颞侧角膜可见穿通伤口。如果异物位于晶体内且已混浊，应采取何种治疗措施", "o": {"A": "原伤口取出异物", "B": "先缝合伤口，1月后再取异物", "C": "经睫状体平坦部切口取异物", "D": "摘除晶体的同时取异物"}, "a": "D", "e": "正确答案：摘除晶体的同时取异物。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "下列哪种抗青光眼药物通过增加葡萄膜巩膜旁道的房水流出降低眼压，且常见副作用包括虹膜色素加深、睫毛变长变粗？", "o": {"A": "噻吗洛尔滴眼液", "B": "布林佐胺滴眼液", "C": "毛果芸香碱滴眼液", "D": "曲伏前列素滴眼液", "E": "卡替洛尔滴眼液"}, "a": "D", "e": "正确答案：曲伏前列素滴眼液。", "author": "邬清杨", "group": "眼科出题第三组"}, {"q": "糖皮质激素的禁忌症包括：", "o": {"A": "虹膜睫状体炎", "B": "黄斑水肿", "C": "过敏性结膜炎", "D": "树枝状角膜炎", "E": "春季角结膜炎"}, "a": "D", "e": "糖皮质激素眼部禁忌证：树枝状角膜炎（HSK上皮型）、真菌性角膜炎——可抑制免疫导致感染扩散、角膜穿孔。", "author": "邬清杨", "group": "眼科出题第三组"}, {"q": "一过性视力丧失（24小时内恢复正常）的常见原因不包括下列哪项？", "o": {"A": "体位性低血压", "B": "一过性脑缺血发作", "C": "视网膜动脉痉挛", "D": "视网膜中央动脉阻塞", "E": "偏头痛"}, "a": "D", "e": "一过性视力丧失（24h内恢复）常见原因：一过性脑缺血发作（TIA）、视网膜动脉痉挛、偏头痛、体位性低血压。视网膜中央动脉阻塞通常持续超过24h。", "author": "邬清杨", "group": "眼科出题第三组"}, {"q": "溢泪的主要原因是：", "o": {"A": "炎症刺激", "B": "外因刺激", "C": "泪液分泌过多", "D": "泪道排出受阻", "E": "结膜炎"}, "a": "D", "e": "溢泪主要原因：泪道排出受阻（如鼻泪管阻塞），需与流泪（分泌过多）区分。", "author": "邬清杨", "group": "眼科出题第三组"}, {"q": "下列哪项是“昼盲”的常见病因？", "o": {"A": "视网膜色素变性", "B": "维生素A缺乏症", "C": "先天性视网膜锥体细胞功能不良", "D": "开角型青光眼", "E": "高度近视"}, "a": "C", "e": "昼盲常见病因：先天性视网膜锥体细胞功能不良（锥细胞主司明视觉）。夜盲见于视网膜色素变性（杆细胞病变）和维生素A缺乏。", "author": "邬清杨", "group": "眼科出题第三组"}, {"q": "泪膜的组成成分包括：", "o": {"A": "脂质层、水样层、粘蛋白层", "B": "脂质层、浆液层、黏蛋白层", "C": "水样层、黏蛋白层、纤维层", "D": "脂质层、水样层、上皮层", "E": "黏蛋白层、水样层、角膜基质层"}, "a": "A", "e": "泪膜三层：脂质层（睑板腺）、水样层（泪腺）、粘蛋白层（结膜杯状细胞）。", "author": "邬清杨", "group": "眼科出题第三组"}, {"q": "急性闭角型青光眼急性发作时，下列哪项不是其典型临床表现？", "o": {"A": "剧烈眼胀痛伴同侧头痛", "B": "眼压突然升高，常在40mmHg以上", "C": "瞳孔缩小", "D": "混合充血", "E": "角膜雾状水肿"}, "a": "C", "e": "急性闭角型青光眼发作时，眼压急剧升高导致瞳孔括约肌缺血瘫痪，瞳孔呈中等散大（竖椭圆形），而非瞳孔缩小，故C项不是典型表现。", "author": "邬清杨", "group": "眼科出题第三组"}, {"q": "眼球光学系統的主要成分不包括", "o": {"A": "角膜", "B": "房水", "C": "瞳孔", "D": "晶状体", "E": "玻璃体"}, "a": "C", "e": "眼球光学系统（屈光系统）由角膜、房水、晶状体和玻璃体四种屈光介质组成；瞳孔是虹膜中央孔洞，仅调节进光量，本身不是屈光介质。", "author": "邬清杨", "group": "眼科出题第三组"}, {"q": "关于白血病眼底病变，Roth斑的特点是：", "o": {"A": "视网膜出血灶中央可见一白芯", "B": "视网膜棉绒斑", "C": "黄斑樱桃红斑", "D": "视网膜微血管瘤", "E": "视网膜新生血管"}, "a": "A", "e": "正确答案：视网膜出血灶中央可见一白芯。", "author": "邬清杨", "group": "眼科出题第三组"}, {"q": "下列哪项属于视神经炎的典型表现？", "o": {"A": "老年人多见", "B": "无眼球转动痛", "C": "视野扇形缺损", "D": "视盘水肿常伴出血", "E": "中青年多见，伴眼球转动痛，视野中心暗点"}, "a": "E", "e": "视神经炎典型表现：中青年突发视力下降+眼球转动痛+RAPD+中心暗点。", "author": "邬清杨", "group": "眼科出题第三组"}, {"q": "RAPD阳性是指：", "o": {"A": "同时照射双眼，观察瞳孔对光反射", "B": "快速交替照射双眼，患侧瞳孔先轻微收缩，继而散大", "C": "快速交替照射双眼，健侧瞳孔先散大后收缩", "D": "单眼照射，记录瞳孔收缩速度", "E": "暗适应后照射双眼，观察瞳孔大小变化"}, "a": "B", "e": "RAPD（相对性瞳孔传入障碍）：患眼传入通路受损→交替光照时患侧瞳孔先收缩继而散大。提示视神经或视网膜病变。", "author": "邬清杨", "group": "眼科出题第三组"}, {"q": "关于前房积血的分级，II级的标准是：", "o": {"A": "<1/3前房", "B": "1/3-2/3前房", "C": ">2/3前房", "D": "前房充满血液", "E": "无前房积血"}, "a": "B", "e": "前房积血分级：I级<1/3前房，II级1/3-2/3前房，III级>2/3前房。处理：半卧位+双眼遮盖+监测眼压。", "author": "邬清杨", "group": "眼科出题第三组"}, {"q": "眼球穿通伤的急救处理，下列哪项是正确的？", "o": {"A": "立即冲洗伤口", "B": "滴用抗生素眼药水后包扎", "C": "无菌纱布遮盖，禁止冲洗滴药，避免挤压眼球", "D": "按压眼球以止血", "E": "立即取出眼内异物"}, "a": "C", "e": "眼球穿通伤急救：无菌纱布遮盖→禁止冲洗/滴药→避免挤压眼球→禁取脱出的眼内容物→尽快转诊手术。", "author": "邬清杨", "group": "眼科出题第三组"}, {"q": "关于强碱与强酸对眼球的损伤特点，下列哪项描述符合PPT内容？", "o": {"A": "强酸渗透力强，易致深层组织坏死", "B": "强碱使蛋白质凝固变性，形成屏障", "C": "强碱与组织蛋白形成可溶性皂化物，渗透力强", "D": "强酸可在30秒内穿透角膜进入眼内", "E": "强碱损伤后愈合后不易留瘢痕"}, "a": "C", "e": "正确答案：强碱与组织蛋白形成可溶性皂化物，渗透力强。", "author": "邬清杨", "group": "眼科出题第三组"}, {"q": "关于交感性眼炎，下列哪项是正确的？", "o": {"A": "发生于双眼同时外伤后", "B": "潜伏期为1-2天", "C": "一眼穿通伤后，对侧眼发生肉芽肿性全葡萄膜炎", "D": "治疗首选抗病毒药物", "E": "仅发生于眼球钝挫伤后"}, "a": "C", "e": "交感性眼炎：一眼穿通伤后对侧眼发生肉芽肿性全葡萄膜炎。潜伏期2周~2年，最危险期伤后4-6周。", "author": "邬清杨", "group": "眼科出题第三组"}, {"q": "化学性眼烧伤现场急救的首要步骤是：", "o": {"A": "立即送医院", "B": "滴抗生素眼药水", "C": "立即用大量生理盐水冲洗至少15分钟，翻开眼睑转动眼球", "D": "包扎双眼", "E": "滴表面麻醉剂"}, "a": "C", "e": "化学性眼烧伤急救首要步骤：立即用大量生理盐水/清水冲洗至少15-30分钟，翻转眼睑转动眼球彻底冲洗。不可等待！", "author": "邬清杨", "group": "眼科出题第三组"}, {"q": "下列哪项不属于视心理物理学检查的范畴？", "o": {"A": "上泪小管阻塞", "B": "泪总管阻塞", "C": "鼻泪管阻塞合并慢性泪囊炎", "D": "功能性溢泪"}, "a": "C", "e": "正确答案：鼻泪管阻塞合并慢性泪囊炎。", "author": "梁颖欣", "group": "眼科出题第三组"}, {"q": "糖尿病患者眼底出现微血管瘤、硬性渗出、点片状出血及棉绒斑，应首先考虑：", "o": {"A": "高血压性视网膜病变", "B": "非增殖性糖尿病视网膜病变", "C": "Coat病", "D": "视网膜中央动脉阻塞"}, "a": "B", "e": "正确答案：非增殖性糖尿病视网膜病变。", "author": "梁颖欣", "group": "眼科出题第三组"}, {"q": "翻转上眼睑检查睑结膜时，为避免压迫和损伤角膜，应嘱咐患者：", "o": {"A": "用力闭紧双眼", "B": "向上注视", "C": "向下注视", "D": "向检查对侧注视", "E": "向正前方注视"}, "a": "C", "e": "翻转上眼睑时嘱患者向下注视，使角膜随眼球向下转动，远离翻转操作区，可避免压迫或损伤角膜，同时便于充分暴露上睑结膜。", "author": "梁颖欣", "group": "眼科出题第三组"}, {"q": "红眼、有大量黄白色分泌物，医生诊断为“细菌性结膜炎”，最可能开的药是：", "o": {"A": "抗病毒滴眼液", "B": "抗生素滴眼液", "C": "降眼压滴眼液", "D": "散瞳滴眼液", "E": "人工泪液"}, "a": "B", "e": "正确答案：抗生素滴眼液。", "author": "梁颖欣", "group": "眼科出题第三组"}, {"q": "“拉坦前列素滴眼液”（前列腺素类）最主要的作用是：", "o": {"A": "消炎", "B": "降低眼压", "C": "缩小瞳孔", "D": "抗病毒", "E": "润滑眼球"}, "a": "B", "e": "拉坦前列素为前列腺素F2α衍生物，通过促进葡萄膜巩膜途径的房水外流，显著降低眼内压，是青光眼治疗的一线降眼压药物。", "author": "梁颖欣", "group": "眼科出题第三组"}, {"q": "病毒性角膜炎（如单纯疱疹病毒引起）应使用：", "o": {"A": "妥布霉素滴眼液", "B": "阿昔洛韦滴眼液", "C": "地塞米松滴眼液", "D": "毛果芸香碱滴眼液", "E": "人工泪液"}, "a": "B", "e": "正确答案：阿昔洛韦滴眼液。", "author": "梁颖欣", "group": "眼科出题第三组"}, {"q": "麦粒肿与霰粒肿最主要的区别是：", "o": {"A": "包块大小不同", "B": "有无红肿热痛", "C": "发病年龄不同", "D": "是否影响视力", "E": "单眼还是双眼发病"}, "a": "B", "e": "睑腺炎（麦粒肿）是眼睑腺体急性化脓性炎症，最常见致病菌为金黄色葡萄球菌。", "author": "梁颖欣", "group": "眼科出题第三组"}, {"q": "关于睑腺炎切开引流的切口方向，以下描述正确的是：", "o": {"A": "外睑腺炎切口应与睑缘垂直，内睑腺炎切口应与睑缘平行", "B": "外睑腺炎和内睑腺炎切口均应与睑缘平行", "C": "外睑腺炎切口应与睑缘平行，内睑腺炎切口应与睑缘垂直", "D": "外睑腺炎和内睑腺炎切口均应与睑缘垂直", "E": "无论内外睑腺炎，均可任意方向切开"}, "a": "C", "e": "睑腺炎（麦粒肿）是眼睑腺体急性化脓性炎症，最常见致病菌为金黄色葡萄球菌。", "author": "梁颖欣", "group": "眼科出题第三组"}, {"q": "诊断泪道阻塞最常用、最简便的检查方法是：", "o": {"A": "上泪小管阻塞", "B": "鼻泪管阻塞伴慢性泪囊炎", "C": "泪点闭塞", "D": "泪道通畅", "E": "泪总管阻塞"}, "a": "B", "e": "正确答案：鼻泪管阻塞伴慢性泪囊炎。", "author": "梁颖欣", "group": "眼科出题第三组"}, {"q": "过敏性结膜炎治疗首选的是：", "o": {"A": "上皮层、内皮层、前弹力层、基质层、后弹力层", "B": "内皮层、后弹力层、基质层、前弹力层、上皮层", "C": "上皮层、前弹力层、基质层、后弹力层、内皮层", "D": "前弹力层、上皮层、基质层、内皮层、后弹力层", "E": "上皮层、基质层、前弹力层、后弹力层、内皮层"}, "a": "C", "e": "正确答案：上皮层、前弹力层、基质层、后弹力层、内皮层。", "author": "梁颖欣", "group": "眼科出题第三组"}, {"q": "关于角膜炎的病理过程，以下顺序正确的是：", "o": {"A": "浸润期 → 溃疡期 → 进行期 → 瘢痕修复期", "B": "进行期 → 浸润期 → 溃疡期 → 瘢痕修复期", "C": "浸润期 → 进行期 → 溃疡期 → 瘢痕修复期", "D": "溃疡期 → 浸润期 → 进行期 → 瘢痕修复期", "E": "进行期 → 溃疡期 → 浸润期 → 瘢痕修复期"}, "a": "C", "e": "正确答案：浸润期 → 进行期 → 溃疡期 → 瘢痕修复期。", "author": "梁颖欣", "group": "眼科出题第三组"}, {"q": "患者女，28岁。双眼痒、异物感3天。发病前一天有染发史。检查:双眼视力正常，眼睑红肿，皮肤可见小水泡，已有破溃，伴少许渗液，质黏稠，双眼睑结膜充血，余无异常发现。最可能的诊断是", "o": {"A": "眦部睑缘炎", "B": "溃疡性睑缘炎", "C": "接触性睑皮炎", "D": "单纯疱疹病毒性睑皮炎", "E": "带状疱疹病毒性睑皮炎"}, "a": "C", "e": "正确答案：接触性睑皮炎。", "author": "梁颖欣", "group": "眼科出题第三组"}, {"q": "患者女，58岁，诉右眼溢泪、分泌物1月。查体:右眼视力正常，右侧泪道冲洗时有阻力，冲洗液反流伴中等量脓性分泌物，余未见异常。应考虑", "o": {"A": "急性泪囊炎", "B": "鼻泪管阻塞合并慢性泪囊炎", "C": "泪小管炎", "D": "泪总管炎", "E": "泪小点炎"}, "a": "B", "e": "泪道冲洗：原路返流→泪小管阻塞；下冲上返→泪总管阻塞；返流+脓→慢性泪囊炎（鼻泪管阻塞）。", "author": "梁颖欣", "group": "眼科出题第三组"}, {"q": "目前治疗开角型青光眼的一线用药是：", "o": {"A": "前列腺素类药物；", "B": "拟胆碱能药物：", "C": "缩瞳类药物：", "D": "碳酸酐酶抑制剂", "E": "高豫剂"}, "a": "A", "e": "前列腺素衍生物（拉坦前列素、曲伏前列素）为POAG一线用药，增加葡萄膜巩膜途径房水外流。", "author": "梁颖欣", "group": "眼科出题第三组"}, {"q": "关于正常眼压，以下描述正确的是：", "o": {"A": "正常眼压固定为15 mmHg", "B": "正常眼压范围为10～21 mmHg", "C": "眼压超过21 mmHg一定诊断为青光眼", "D": "眼压低于10 mmHg属于高眼压症", "E": "正常眼压昼夜无波动"}, "a": "B", "e": "正常眼压统计学范围10~21mmHg，24h波动<8mmHg，双眼差值<5mmHg。", "author": "梁颖欣", "group": "眼科出题第三组"}, {"q": "患者男性，36岁。发现右眼视物模糊1个月。右眼视力0.6，左眼视力1.5;眼压:右眼29mmHg，左眼22mmHg;双眼角膜透明，前房适中，周边前房约1CT，瞳孔未异常，晶状体透明。视盘:右眼C/D约0.6,左眼C/D约0.4。为了更准确地诊断该患者的病情，以下哪项检查是不必要的", "o": {"A": "房角", "B": "矫正眼压", "C": "视野", "D": "24小时眼压", "E": "暗室试验"}, "a": "E", "e": "角膜透明性依赖上皮完整、基质胶原规则排列、无血管、内皮泵功能。内皮细胞层是维持透明的关键。", "author": "梁颖欣", "group": "眼科出题第三组"}, {"q": "管状视野最易出在哪种疾病", "o": {"A": "原发性开角型青光眼", "B": "正常眼压青光眼", "C": "垂体瘤", "D": "Leber遗传性视神经病变", "E": "视束损害"}, "a": "A", "e": "正确答案：原发性开角型青光眼。", "author": "梁颖欣", "group": "眼科出题第三组"}, {"q": "属于非选择性的β受体阻滞剂，有心动过缓或支气管哮喘的患者禁用的是", "o": {"A": "溴莫尼定滴眼液", "B": "拉坦前列腺素滴眼液", "C": "毛果芸香碱滴眼液", "D": "布林佐胺滴眼液", "E": "噻吗洛尔滴眼液"}, "a": "E", "e": "正确答案：噻吗洛尔滴眼液。", "author": "梁颖欣", "group": "眼科出题第三组"}, {"q": "1%毛果芸香碱滴眼液属于", "o": {"A": "α受体激动剂，主要通过抑制房水的生成起到降眼压作用", "B": "拟胆碱作用药物，降眼压机制是增加小梁途径的房水外流", "C": "β受体阻滞剂，通过减少房水的生成降低眼压", "D": "β受体激动药，可降低小梁网房水流出阻力，及增加葡萄膜巩膜途径房水外流", "E": "碳酸酐酶抑制剂，可减少房水的生成"}, "a": "B", "e": "毛果芸香碱（匹罗卡品）为拟胆碱/缩瞳药，通过缩瞳牵拉小梁网促进房水外流，用于闭角型青光眼。虹膜睫状体炎禁用。", "author": "梁颖欣", "group": "眼科出题第三组"}, {"q": "患者男性，50岁。左眼突发视力下降，伴头晕，恶心。查体：左角膜混浊，前房不清，指测眼压T+3。问题：该患者最可能的诊断为", "o": {"A": "急性结膜炎", "B": "急性角膜炎", "C": "急性闭角型青光眼", "D": "慢性闭角型青光眼", "E": "慢性开角型青光眼"}, "a": "C", "e": "正确答案：急性闭角型青光眼。", "author": "梁颖欣", "group": "眼科出题第三组"}, {"q": "急性闭角型青光眼的眼压增高导致损害的神经主要是", "o": {"A": "视神经", "B": "三叉神经", "C": "外展神经", "D": "滑车神经", "E": "面神经"}, "a": "A", "e": "青光眼眼压持续升高直接压迫并损害视神经乳头及其轴突，导致视神经萎缩和视野缺损，视神经是青光眼眼压升高损害的主要靶组织。", "author": "梁颖欣", "group": "眼科出题第三组"}, {"q": "患者男性，37岁，右眼视力下降4天，伴耳鸣头痛，4个月前被剪刀划伤左眼，曾行左眼角膜巩膜伤口修补术。眼部检查右眼混合充血，角膜轻度水肿，羊脂样KP（++），Tyn（++），瞳孔呈梅花状，后粘连，晶状体轻度混浊，玻璃体混浊，视网膜反光弥散；左眼混合充血角膜瞳孔区至巩膜6mm线性混浊，余角膜大致透明，羊脂KP（+），Tyn（++），瞳孔欠圆，晶状体混浊，眼底窥不见。该患者右眼最可能的诊断是", "o": {"A": "急性前葡萄膜炎", "B": "感染性眼内炎", "C": "交感性眼炎", "D": "慢性葡萄膜炎急性发作", "E": "VKH病"}, "a": "C", "e": "患者左眼穿通伤修补术后4个月，健眼（右眼）出现非化脓性葡萄膜炎，符合交感性眼炎典型表现：眼穿通伤后数周至数年，对侧眼发生双侧肉芽肿性葡萄膜炎。", "author": "梁颖欣", "group": "眼科出题第三组"}, {"q": "患者男性，26岁，反复双眼虹膜睫状体炎与前房积脓，且有复发性口腔溃疡和阴部溃疡史。问题：可能性最大的诊断是", "o": {"A": "天疱疮", "B": "Behcet病", "C": "急性风湿热", "D": "Reiter综合征", "E": "Graves病"}, "a": "B", "e": "正确答案：Behcet病。", "author": "梁颖欣", "group": "眼科出题第三组"}, {"q": "下列哪一项是后葡萄膜炎不常出现的体征", "o": {"A": "玻璃体内炎性细胞和混浊", "B": "视网膜血管炎", "C": "眼红、眼痛", "D": "黄斑水肿或视网膜水肿", "E": "视网膜色素上皮改变"}, "a": "C", "e": "后葡萄膜炎主要累及脉络膜、视网膜等眼后节，症状以视力下降、玻璃体混浊为主；眼红、眼痛为前节刺激症状，后葡萄膜炎通常不明显。", "author": "梁颖欣", "group": "眼科出题第三组"}, {"q": "对于急性前葡萄膜炎的诊断，不正确的是", "o": {"A": "睫状充血、KP、前房闪辉", "B": "瞳孔散大，虹膜后粘连", "C": "眼痛、红、畏光、流泪", "D": "查血常规、血沉有助于诊断", "E": "询问有无关节疼痛、红肿"}, "a": "B", "e": "正确答案：瞳孔散大，虹膜后粘连。", "author": "梁颖欣", "group": "眼科出题第三组"}, {"q": "下面哪项不是前葡萄膜炎的体征", "o": {"A": "睫状充血", "B": "房水细胞", "C": "房水闪辉", "D": "角膜后沉着物", "E": "视网膜血管炎"}, "a": "E", "e": "急性前葡萄膜炎体征：睫状充血+角膜后KP+前房闪辉（Tyndall+）+瞳孔缩小+虹膜后粘连。", "author": "梁颖欣", "group": "眼科出题第三组"}, {"q": "青年男性患者，右眼红痛，畏光，视力下降4天。眼部检查：右眼视力0.8，矫正无提高，右眼结膜睫状充血+，尘状KP（++），Tyn（+），房水细胞（+），瞳孔圆，直径约2.5mm，晶状体透明，玻璃体未见混浊，眼底未见异常。左眼视力1.0，无充血，角膜透明，KP（-），Tyn（-），瞳孔3.5mm，晶状体透明，眼底未见异常。眼压正常。问题：其最可能的诊断是", "o": {"A": "右眼急性结膜炎", "B": "右眼急性虹膜睫状体炎", "C": "右眼角膜炎", "D": "右眼巩膜炎", "E": "青-睫综合征"}, "a": "B", "e": "角膜透明性依赖上皮完整、基质胶原规则排列、无血管、内皮泵功能。内皮细胞层是维持透明的关键。", "author": "梁颖欣", "group": "眼科出题第三组"}, {"q": "大多数共同性斜视的治疗方法是", "o": {"A": "视力剧降", "B": "视力渐降", "C": "周边黑幕遮挡感", "D": "视物变形", "E": "夜盲"}, "a": "A", "e": "共同性斜视：眼球运动正常、无复视、第一斜视角=第二斜视角。麻痹性斜视反之。", "author": "梁颖欣", "group": "眼科出题第三组"}, {"q": "某男，65岁，高血压病史20年，突然出现右眼视物模糊1小时，眼部检查:右眼视力:眼前手动，左眼视力:0.6，右眼角膜透明，前房深浅正常，瞳孔散大，对光反射迟钝，晶体轻度混浊，眼底检查:视乳头色淡、边缘模糊，动脉、静脉管径均变细，后极部视网膜呈乳白色，黄斑区可见樱桃红斑。该患者首选考虑", "o": {"A": "视网膜中央动脉阻塞", "B": "缺血性视神经病变", "C": "玻璃体出血", "D": "视网膜脱离", "E": "视神经炎"}, "a": "A", "e": "角膜透明性依赖上皮完整、基质胶原规则排列、无血管、内皮泵功能。内皮细胞层是维持透明的关键。", "author": "梁颖欣", "group": "眼科出题第三组"}, {"q": "增殖性糖尿病性视网膜病变最主要的标志是", "o": {"A": "视网膜的新生血管形成", "B": "视网膜硬性渗出", "C": "视网膜水肿", "D": "视网膜前膜", "E": "视网膜内出血"}, "a": "A", "e": "正确答案：视网膜的新生血管形成。", "author": "梁颖欣", "group": "眼科出题第三组"}, {"q": "糖尿病性视网膜病变可导致", "o": {"A": "裂孔性视网膜脱离", "B": "渗出性视网膜脱离", "C": "牵拉性视网膜脱离", "D": "盘状视网膜脱离", "E": "大泡性视网膜脱离"}, "a": "B", "e": "正确答案：渗出性视网膜脱离。", "author": "梁颖欣", "group": "眼科出题第三组"}, {"q": "视神经是由视网膜()细胞的轴突组成", "o": {"A": "神经节", "B": "视锥", "C": "双极", "D": "神经胶质", "E": "视杆"}, "a": "A", "e": "视网膜神经节细胞是视觉传导通路的第三级神经元，其轴突在视乳头处汇集穿出眼球，构成视神经，向后传导至外侧膝状体及视觉皮层。", "author": "梁颖欣", "group": "眼科出题第三组"}, {"q": "某男，55岁，高血压病史15年，右眼无痛性急剧视力障碍，眼底检查视乳头充血、水肿，无斑樱桃红点。下方弓形视野缺损，与生理盲点相连。请问最可能的诊断是什么", "o": {"A": "缺血性视神经病变", "B": "视网膜中央动脉阻塞", "C": "视网膜中央静脉阻塞", "D": "视盘炎", "E": "视神经炎"}, "a": "A", "e": "黄斑樱桃红斑是CRAO的特征性表现——因脉络膜供血保留红色，与周围苍白水肿的视网膜形成对比。", "author": "梁颖欣", "group": "眼科出题第三组"}, {"q": "患者，男性，65岁，双眼视力渐进性下降1年，检查视力:右0.1，左眼前手动;眼压:右15mmHg，左17mmHg;散瞳后检查右眼晶状体皮质不均匀混浊，左眼晶状体白色混浊，虹膜投影阴性，眼底看不见。应诊断为", "o": {"A": "视力剧降", "B": "视力渐降", "C": "周边黑幕遮挡感", "D": "视物变形", "E": "夜盲"}, "a": "B", "e": "患者双眼晶状体渐进性混浊（老年性白内障），病程长达1年，眼压正常，主要表现为双眼无痛性、缓慢进行性视力下降，即视力渐降。", "author": "梁颖欣", "group": "眼科出题第三组"}, {"q": "下面哪种方法可以明确诊断白内障", "o": {"A": "验光", "B": "视觉诱发电位", "C": "干涉光断层扫描", "D": "裂隙灯显微镜", "E": "视野检查"}, "a": "D", "e": "正确答案：裂隙灯显微镜。", "author": "梁颖欣", "group": "眼科出题第三组"}, {"q": "37岁男性病人，因\"双眼视物下降、眼前黑影飘动\"来诊，双眼前节未见炎症反应，散瞳可见睫状体平坦部雪堤样改变，基于这些信息，最可能的诊断是", "o": {"A": "视网膜炎", "B": "视网膜脉络膜炎", "C": "缺血性视神经病变", "D": "中间葡萄膜炎", "E": "视盘炎"}, "a": "D", "e": "正确答案：中间葡萄膜炎。", "author": "梁颖欣", "group": "眼科出题第三组"}, {"q": "31岁男性患者，双眼反复交替眼红、眼痛1年，检查右眼睫状充血、角膜透明、尘状KP(++)、房闪辉(++)、前房细胞(+++),虹膜部分后粘连，眼底未见明确异常，病人有强直性脊柱炎病史10年，基于这些信息，最可能的诊断是", "o": {"A": "白内障", "B": "青光眼", "C": "全葡萄膜炎", "D": "强直性脊柱炎伴发的急性前葡萄膜炎", "E": "视盘炎"}, "a": "D", "e": "角膜透明性依赖上皮完整、基质胶原规则排列、无血管、内皮泵功能。内皮细胞层是维持透明的关键。", "author": "梁颖欣", "group": "眼科出题第三组"}, {"q": "由于角膜内皮损伤和炎症细胞或色素的同时存在形成的产物", "o": {"A": "瞳孔区晶体前表面环行色素", "B": "KP", "C": "瞳孔膜闭", "D": "房水中大量炎症细胞"}, "a": "B", "e": "角膜内皮细胞几乎不进行有丝分裂，损伤后依靠邻近细胞扩张移行填补，不能真正再生。", "author": "梁颖欣", "group": "眼科出题第三组"}, {"q": "睑腺炎最常见的病原体是", "o": {"A": "金黄色葡萄球菌", "B": "表皮葡萄球菌", "C": "溶血性链球菌", "D": "流感嗜血杆菌", "E": "淋病奈瑟菌"}, "a": "A", "e": "睑腺炎（麦粒肿）是眼睑腺体急性化脓性炎症，最常见致病菌为金黄色葡萄球菌。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "某类型结膜炎常通过生殖器-眼接触传播，其病原体是", "o": {"A": "金黄色葡萄球菌", "B": "表皮葡萄球菌", "C": "溶血性链球菌", "D": "流感嗜血杆菌", "E": "淋病奈瑟菌"}, "a": "E", "e": "淋病奈瑟菌可通过性接触分泌物污染眼部（生殖器-眼途径）传播，引起超急性化脓性结膜炎（淋球菌性结膜炎），分泌物大量脓性，可迅速穿透角膜。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "儿童细菌性结膜炎最常见的病原体是", "o": {"A": "金黄色葡萄球菌", "B": "表皮葡萄球菌", "C": "溶血性链球菌", "D": "流感嗜血杆菌", "E": "淋病奈瑟菌"}, "a": "D", "e": "细菌性结膜炎最常见致病菌为表皮葡萄球菌和金黄色葡萄球菌。儿童常见的为流感嗜血杆菌。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "以下哪项不属于既往史的内容", "o": {"A": "患者做过的检查和治疗", "B": "传染病史", "C": "类似病史", "D": "既往眼病", "E": "既往眼病史与全身疾病的关系"}, "a": "A", "e": "既往史主要记录过去疾病史，患者做过的检查属于辅助检查，不属于既往史范畴。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "下列哪项症状不属于视力障碍", "o": {"A": "眼红", "B": "复视", "C": "视力下降", "D": "视物变小", "E": "视物变形"}, "a": "A", "e": "眼红是外观体征（充血），属于体征而非视力障碍症状。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "下列哪种药物对晶状体没有毒性作用", "o": {"A": "糖皮质激素", "B": "毛果芸香碱", "C": "丁卡因", "D": "阿托品", "E": "氯丙嗪"}, "a": "C", "e": "丁卡因为表面局麻药，不渗透至晶状体，对晶状体无毒性作用。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "眼部滴用的糖皮质激素的适应症不包括", "o": {"A": "泡性结膜角膜炎", "B": "角膜基质炎", "C": "病毒性角膜炎", "D": "春季卡他性结膜炎", "E": "膜睫状体炎"}, "a": "C", "e": "病毒性角膜炎（如单纯疱疹病毒）是糖皮质激素的禁忌症，用后会导致病毒扩散。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "视力丧失达24小时可能是", "o": {"A": "偏头痛", "B": "一过性脑缺血作", "C": "视网膜动脉痉挛", "D": "视网膜央央动脉阻塞", "E": "体位性低血压"}, "a": "D", "e": "视网膜中央动脉阻塞导致持续性视力丧失，超过24小时不能恢复。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "直接检眼镜眼底检查需记录的内容不包括", "o": {"A": "视盘大小", "B": "视网膜血管是否均匀", "C": "视盘颜色", "D": "视盘是否有荧光素渗漏", "E": "视盘病理凹陷"}, "a": "D", "e": "荧光素渗漏需要眼底荧光血管造影（FFA）检查，直接检眼镜无法检测。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "以下关于裂隙灯显微镜的描述错误的是", "o": {"A": "裂隙灯包含光源投射系统", "B": "裂隙灯包含观察用放大系统", "C": "裂隙灯可以测量角膜厚度", "D": "裂隙灯可以用来检查眼部表浅的病变", "E": "裂隙灯可以用来检查眼部较深的病变"}, "a": "C", "e": "标准裂隙灯不能直接测量角膜厚度，需要附加角膜厚度仪。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "如眼前手动不能识别，则改查", "o": {"A": "指数", "B": "光定位", "C": "光感", "D": "针孔视力", "E": "色觉"}, "a": "C", "e": "眼前手动不能识别时，下一步检查光感。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "下列关于应用直接检眼镜透照法检查的描述错误的是", "o": {"A": "用于观察眼的屈光间质有无混浊", "B": "须将镜片转盘拨到+8-+10D", "C": "距受检眼20cm", "D": "正常时瞳孔区呈橘红色反射", "E": "距受检眼30cm"}, "a": "E", "e": "透照法检查距离应为20cm，而非30cm。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "患者在距视力表3米处可清楚辨认最大视标﹙0.1﹚，该患者的实际视力为", "o": {"A": "0.05", "B": "0.6", "C": "0.08", "D": "0.06", "E": "0.1"}, "a": "D", "e": "3/5×0.1 = 0.06，在3m处看清5m视标的视力计算。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "眼睑闭合不全最大的危害是", "o": {"A": "结膜干燥症", "B": "角膜干燥症", "C": "易患翼状胬肉", "D": "暴露性角膜炎", "E": "溢泪"}, "a": "D", "e": "暴露性角膜炎是眼睑闭合不全最常见也最严重的并发症。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "泪道冲洗时清水完全沿原路返回，则说明", "o": {"A": "泪小管阻塞", "B": "泪小点阻塞", "C": "泪总管阻塞", "D": "鼻泪管阻塞", "E": "鼻泪管阻塞合并慢性泪囊炎"}, "a": "A", "e": "冲洗液原路返回（从注入泪小点反流）说明该泪小管阻塞。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "泪液的排出通道，不包括", "o": {"A": "上下泪小点", "B": "泪囊", "C": "泪腺", "D": "泪小管", "E": "鼻泪管"}, "a": "C", "e": "泪腺是分泌泪液的器官，不属于泪液排出通道（排出通道包括泪点、泪小管、泪总管、泪囊、鼻泪管）。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "春季角结膜炎多见于", "o": {"A": "婴幼儿", "B": "20岁以下的青少年", "C": "20-30岁的成年人", "D": "30-40岁的成年人", "E": "50岁以上的老年人"}, "a": "B", "e": "春季角结膜炎好发于20岁以下青少年，男性多见。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "慢性泪囊炎最常见的有效治疗是", "o": {"A": "泪道置管术", "B": "泪囊鼻腔吻合术", "C": "泪道激光术", "D": "泪道探通术", "E": "泪囊摘除术"}, "a": "B", "e": "泪囊鼻腔吻合术（DCR）是慢性泪囊炎的根治性手术，为首选治疗。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "圆锥角膜早期有效的诊断方法是", "o": {"A": "裂隙灯检查", "B": "眼底检查", "C": "角膜地形图分析", "D": "角膜曲率检查", "E": "验光"}, "a": "C", "e": "角膜地形图分析能在早期检测到圆锥角膜特征性的角膜前表面曲率异常（下方陡峭化），是早期诊断圆锥角膜最敏感有效的方法，可发现裂隙灯及角膜曲率检查尚未发现的亚临床病变。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "引起真菌性角膜炎最常见的原因不包括", "o": {"A": "温热潮湿的气候环境", "B": "植物性角膜外伤后", "C": "角膜上皮缺损", "D": "长期大量用糖皮质激素", "E": "佩戴角膜接触镜"}, "a": "C", "e": "角膜上皮缺损是各类角膜感染的共同途径，并非真菌性角膜炎的特定独立病因；真菌性角膜炎最常见的原因是植物性外伤、温热潮湿环境、长期使用糖皮质激素及佩戴角膜接触镜等。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "角膜组织学上从外到内分为", "o": {"A": "前弹力层-上皮细胞层-基质层-内皮细胞层-后弹力层", "B": "上皮细胞层-基质层-前弹力层-后弹力层-内皮细胞层", "C": "上皮细胞层-前弹力层-后弹力层-基质层-内皮细胞层", "D": "上皮细胞层-前弹力层-基质层-后弹力层-内皮细胞层", "E": "上皮细胞层-前弹力层-基质层-内皮细胞层-后弹力层"}, "a": "D", "e": "角膜由外到内依次为：上皮细胞层、前弹力层（Bowman膜）、基质层（占角膜厚度约90%）、后弹力层（Descemet膜）、内皮细胞层，共五层。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "角膜的感觉神经纤维是从﹙﹚发出的分支", "o": {"A": "三叉神经下颌支", "B": "泪腺神经", "C": "睫状长神经", "D": "睫状短神经", "E": "视神经"}, "a": "C", "e": "角膜的感觉神经纤维来自睫状长神经，睫状长神经是三叉神经眼支（V1）鼻睫状神经的分支，负责角膜丰富的感觉神经支配。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "细菌性角膜炎治疗的关键是", "o": {"A": "全身大剂量的抗生素", "B": "敏感的抗生素滴眼液频繁滴眼", "C": "胶原酶抑制剂", "D": "散朣", "E": "治疗性角膜移植"}, "a": "B", "e": "细菌性角膜炎治疗的关键是根据药敏结果选用敏感抗生素滴眼液，高频率（如每15~30分钟一次）局部滴眼以维持有效药物浓度，是控制感染的最核心措施。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "急性闭角型青光眼好发于", "o": {"A": "青壮年", "B": "老年男性", "C": "老年女性", "D": "青少年", "E": "婴幼儿"}, "a": "C", "e": "急性闭角型青光眼好发于老年女性，女性前房较浅、晶状体较厚、房角较窄，发病率约为男性的3~4倍，多见于50~70岁人群。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "一女性患者，58歳，近一周左眼视力下降，头痛、恶心、呕吐、眼红，到医院就诊，检查左眼视力0.2，结膜充血，无分泌物，角膜水肿，瞳孔中度散大，眼底看不清。最有可能的诊断是", "o": {"A": "原发开角型青光眼", "B": "急性结膜炎", "C": "原发急性闭角型青光眼", "D": "虹膜睫状体炎", "E": "老年性白内障"}, "a": "C", "e": "该患者为老年女性，急性眼痛、视力下降伴头痛、恶心、呕吐，查体见角膜水肿、瞳孔中度散大、无分泌物，是原发急性闭角型青光眼急性发作的典型表现。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "一女性患者，58歳，近一周左眼视力下降，头痛、恶心、呕吐、眼红，到医院就诊，检查左眼视力0.2，结膜充血，无分泌物，角膜水肿，瞳孔中度散大，眼底看不清。下列哪项处理最恰当", "o": {"A": "尽快行激素眼液消除炎症", "B": "抗生素眼液", "C": "尽快行小梁切除手术", "D": "尽快行白内障手术", "E": "匹罗卡品眼液缩瞳，口服乙酰唑胺"}, "a": "E", "e": "急性闭角型青光眼急性期应立即用匹罗卡品滴眼液缩瞳以开放房角，同时口服乙酰唑胺抑制房水生成，尽快降低眼压，保护视神经功能。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "一眼急性闭角型青光眼急性发作，对侧没发作眼为", "o": {"A": "临床前期", "B": "先兆期", "C": "间歇期", "D": "慢性期", "E": "正常眼"}, "a": "A", "e": "一眼发生急性闭角型青光眼急性发作时，对侧未发作眼具有相同的解剖结构（前房浅、房角窄），但尚无症状，属于临床前期，需预防性处理。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "正常眼压性青光眼", "o": {"A": "视神经萎缩", "B": "眼压升高", "C": "视野完整", "D": "眼球转动痛", "E": "色觉异常"}, "a": "A", "e": "正常眼压性青光眼眼压在正常范围内，但存在典型的青光眼性视神经萎缩（视杯扩大、盘沿变薄）和视野缺损，视野并不完整，也无眼球转动痛。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "皮质性白内障的混浊常表现为", "o": {"A": "棒状", "B": "楔形", "C": "点状", "D": "块状", "E": "哑铃状"}, "a": "B", "e": "皮质性白内障的早期混浊从周边皮质开始，呈楔形（辐轮状）向中央延伸，裂隙灯下可见典型的楔形灰白色混浊。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "年龄相关性白内障的最好治疗方法是", "o": {"A": "手术治疗", "B": "药物治疗", "C": "放射治疗", "D": "验光戴镜", "E": "补充营养"}, "a": "A", "e": "年龄相关性白内障目前尚无确切有效的药物，手术治疗（超声乳化联合人工晶体植入）是唯一有效的治疗方法，可恢复有用视力。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "白内障的主要症状是什么", "o": {"A": "视力障碍", "B": "眼痛", "C": "眼充血", "D": "压痛", "E": "眼分泌物"}, "a": "A", "e": "白内障的主要症状是无痛性进行性视力下降（视力障碍），无眼红、眼痛、分泌物等炎症表现，与其他眼病相鉴别的关键在于无痛性视物模糊。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "患者男性，70歳，左眼突然胀痛，视力下降明显，伴同侧头痛、恶心、呕吐。检查﹕左眼角膜水肿，虹膜前移，前房浅，晶状体混浊，体积增大，眼压高。诊断为白内障引起的青光眼大发作，目前患者的白内障处于哪一期", "o": {"A": "初发期", "B": "膨胀期", "C": "成熟期", "D": "过熟期", "E": "以上均不是"}, "a": "B", "e": "患者晶状体混浊伴体积增大、虹膜前移、前房变浅并继发高眼压，为皮质性白内障膨胀期的典型特征，此期晶状体吸水膨胀、体积增大，可诱发晶状体性（瞳孔阻滞型）继发性青光眼。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "年龄相关性皮质性白内障膨胀期", "o": {"A": "虹膜震颤", "B": "继发青光眼", "C": "视力严重下降", "D": "楔形混浊", "E": "晶体全混"}, "a": "B", "e": "年龄相关性皮质性白内障膨胀期晶状体体积增大，向前推挤虹膜使前房变浅，房角狭窄，易继发急性闭角型青光眼；虹膜震颤见于过熟期，楔形混浊见于初发期。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "轴性近视主要与何有关", "o": {"A": "角膜曲率过大", "B": "晶状体曲率过大", "C": "前房过深", "D": "玻璃体曲率过大", "E": "眼轴过长"}, "a": "E", "e": "轴性近视是由于眼轴过长导致，光线聚焦于视网膜前方，与角膜或晶状体曲率无关。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "患者男性，30歳，右眼拳击伤后晶状体全脱位到玻璃体中，右眼原为正视眼，目前的屈光状态为", "o": {"A": "正视", "B": "高度近视", "C": "高度远视", "D": "轻度近视", "E": "轻度远视"}, "a": "C", "e": "晶状体完全脱位后眼失去约+10D的折射力，原正视眼将变为高度远视状态。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "上斜肌", "o": {"A": "内旋", "B": "上转", "C": "下转", "D": "外旋", "E": "左转"}, "a": "A", "e": "上斜肌的主要作用是使眼球内旋，其次为下转（眼球内转时）和外展。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "男，50岁，以复视就诊，复视像检查﹕左下方复像分离最大，周边物象是右眼，最可能的诊断是", "o": {"A": "左上直肌痹", "B": "右上直肌麻痹", "C": "右上斜肌麻痹", "D": "右外直肌麻痹", "E": "左外直肌麻痹"}, "a": "C", "e": "左下方复视像分离最大提示该方向拮抗肌麻痹，周边像属于患眼（右眼），右上斜肌主要负责眼球内转位时的下转，故诊断为右上斜肌麻痹。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "适于远视外斜视者", "o": {"A": "阿托品", "B": "毛果芸香碱", "C": "全屈光矫正远视镜", "D": "类肉毒杆菌毒素A", "E": "低矫远视镜"}, "a": "E", "e": "远视外斜视应给予低矫远视镜，保留一定调节刺激，通过调节性集合来控制外斜视。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "患者，男68岁，右眼视力下降6个月，有糖尿病史12年。眼检﹕右眼视力0.5，晶体皮质混浊，视盘不水肿，后极部偶见点状出血、微动脉瘤，黄斑区硬性渗出。FFA示后极部微动脉瘤。此患者最可能的诊断是", "o": {"A": "单纯性糖尿病性视网膜病变", "B": "老年性黄斑变性", "C": "高血压性视网膜病变", "D": "增殖性糖尿病性视网膜病变", "E": "高度近视性视网膜病变"}, "a": "A", "e": "患者有12年糖尿病史，眼底仅见微动脉瘤、点状出血和硬性渗出，无新生血管，符合单纯性（非增殖性）糖尿病性视网膜病变。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "增生性糖尿病性视网膜病变，最主要的标志是", "o": {"A": "视网膜新生血管形成", "B": "视网膜硬性渗出", "C": "视网膜水肿", "D": "视网膜前膜", "E": "视网膜内出血"}, "a": "A", "e": "增殖性糖尿病性视网膜病变的最主要标志是视网膜新生血管形成，这是与非增殖期区分的关键特征。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "患儿，12岁，左眼视力模糊1周并有眼球转动时疼痛感，之前有感冒病史，瞳孔对光反射略迟钝，眼底无明显异常，此患儿最可能的诊断为", "o": {"A": "缺血性视神经病变", "B": "球后视神经炎", "C": "屈光不正", "D": "巩膜炎", "E": "虹膜炎"}, "a": "B", "e": "青少年患者，感冒后出现视力下降、眼球转动痛、相对性传入瞳孔障碍、眼底正常，是球后视神经炎的典型表现。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "患者，男，60岁。右眼视力下降3日，检查视力为0.2。眼底检查﹕视盘水肿，边界不清，可有局限性颜色变淡区域，视野检查见与生理盲点相连的水平性视野缺损。此患者最可能的诊断为", "o": {"A": "视神经乳头炎", "B": "开角型青光眼", "C": "视网膜中央动脉阻塞", "D": "缺血性视神经病变", "E": "视盘水肿"}, "a": "D", "e": "老年男性急性视力下降，视盘水肿伴局限性苍白，视野出现与生理盲点相连的水平性缺损，是前部缺血性视神经病变的典型表现。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "患者，男，36岁，双眼球无痛性突岀5月余。CT未见眶内占位，下直肌梭形肿大。应诊断为", "o": {"A": "甲状腺相关性眼病", "B": "肌炎型炎性假瘤", "C": "眼眶海绵状血管瘤", "D": "眶内脑膜瘤", "E": "眶内淋巴瘤"}, "a": "A", "e": "双眼无痛性突出、CT无眶内占位但下直肌呈梭形肿大，是甲状腺相关性眼病（Graves眼病）的典型CT表现。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "角膜损伤最常见的临床表现是", "o": {"A": "角膜上皮擦伤、基质层水肿", "B": "角膜后羊脂状KP", "C": "角膜血染", "D": "角膜后色素沉着", "E": "角膜为浅点状混浊"}, "a": "A", "e": "角膜损伤最常见的临床表现是角膜上皮擦伤和基质层水肿，这是钝性或擦伤性角膜损伤后的直接病理改变。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "玻璃体积血是由于", "o": {"A": "玻璃体本身血管破裂", "B": "睫状体、视网膜或脉络膜的血管损伤引起", "C": "前房角挫伤", "D": "房角后退", "E": "玻璃体变性"}, "a": "B", "e": "玻璃体本身无血管，玻璃体积血来源于周围组织，即睫状体、视网膜或脉络膜的血管损伤破裂出血进入玻璃体腔。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "某男，28歳，右眼被石灰烧伤早期治疗原则是", "o": {"A": "控制感染", "B": "防止瞳孔后粘连", "C": "抑制胶原合成", "D": "抑制新生血管形成", "E": "促进角膜修复"}, "a": "E", "e": "石灰（碱性）烧伤早期治疗原则是促进角膜修复，包括应用维生素C促进胶原合成以对抗碱性物质引起的胶原溶解，加速上皮愈合。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "虹膜根部离断最常见的原因是", "o": {"A": "虹膜睫状体挫伤", "B": "睫状体剥离术后", "C": "房角后退", "D": "虹膜周边切除术后", "E": "先天性虹膜缺损"}, "a": "A", "e": "虹膜根部离断最常见原因是眼球钝挫伤（虹膜睫状体挫伤），钝力作用使虹膜根部从睫状体附着处撕裂离断。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "某女，36歳，右眼被玻璃溅伤1天。检查﹕全身情况尚可，右眼视力﹕手动，左眼视力﹕1.2﹔颞侧角膜可见穿通伤口。如果异物位于晶体内且已混浊，应采取何种治疗措施", "o": {"A": "原伤口取出异物", "B": "先缝合伤口，1月后再取异物", "C": "经睫状体平坦部切口取异物", "D": "摘除晶体的同时取异物"}, "a": "D", "e": "异物已位于晶状体内且晶状体已混浊时，应在摘除晶状体的同时取出异物，一次手术完成以减少手术次数和并发症。", "author": "黄婉雯", "group": "眼科出题第三组"}, {"q": "眼科门诊病历书写及用药原则 下列哪种抗青光眼药物通过增加葡萄膜巩膜旁道的房水流出降低眼压，且常见副作用包括虹膜色素加深、睫毛变长变粗？", "o": {"A": "噻吗洛尔滴眼液", "B": "布林佐胺滴眼液", "C": "毛果芸香碱滴眼液", "D": "曲伏前列素滴眼液", "E": "卡替洛尔滴眼液"}, "a": "D", "e": "曲伏前列素（Travoprost）是前列腺素类似物，通过增加葡萄膜巩膜旁道的房水流出来降低眼压，其常见局部副作用包括虹膜色素加深、睫毛变长变粗变密。", "author": "邬清杨", "group": "眼科出题第三组"}, {"q": "眼科检查法 下列关于国际标准视力表检查，下列说法错误的是： 如果在5m处无法识别最大的视标，则嘱被检者逐步向视力表走近，直到识别视标为止 如在3m处才看清50m的视标，其实际视力应为0.05 检查者伸出不同数目的手指，嘱被检者说明手指数目，检查距离从1m开始，逐渐移近，到30cm能正确辨认，记录为“指数/30cm” 指数在5cm处仍不能识别，则在被检者眼前方摆动检查者的手，在20cm处能识别，记录为“手动/20cm” 眼前手动不能识别，则检查光感 眼压测量的金标准是： 指测法 Goldmann压平眼压计 非接触式眼压计 Schiötz眼压计 Tono-Pen眼压计 指测眼压正常记为： Tn T-1 T-3 T+1 T+3 视交叉病变： 同侧上象限偏盲 同侧下象限偏盲 黄斑分裂 黄斑回避 颞侧偏盲 脑皮质疾患： 同侧上象限偏盲 同侧下象限偏盲 黄斑分裂 黄斑回避 颞侧偏盲 外眼及眼表疾病 外麦粒肿手术时，其手术切口应 与皮肤面垂直 与睑板面垂直 与睑缘垂直 与睑缘平行 与眶缘垂直 经下泪小点注入冲洗液，若口咽部有液体的感觉，则说明： 泪总管阻塞 鼻泪管阻塞 鼻泪管狭窄阻塞 泪道通畅 泪小管阻塞 细菌性结膜炎患者的结膜分泌物为： 浆液性、粘液性和脓性 浆液性或水性 浆液性、粘液性和粘稠丝状 浆液性、粘稠丝状和脓性 水样、粘液性和脓性 泪膜的组成成分包括：", "o": {"A": "脂质层、水样层、粘蛋白层", "B": "脂质层、浆液层、黏蛋白层", "C": "水样层、黏蛋白层、纤维层", "D": "脂质层、水样层、上皮层", "E": "黏蛋白层、水样层、角膜基质层"}, "a": "A", "e": "泪膜由外至内由三层组成：脂质层（由睑板腺分泌，防止泪液蒸发）、水样层（由泪腺分泌，提供营养）、黏蛋白层（由结膜杯状细胞分泌，使泪膜均匀附着于角膜表面）。", "author": "邬清杨", "group": "眼科出题第三组"}, {"q": "简述抗青光眼药物及其作用机制。 该患者最可能的诊断是什么？诊断依据有哪些？ 该病急性发作后，可能出现的三联征是什么？ 屈光不正、斜弱视 眼球光学系統的主要成分不包括", "o": {"A": "角膜", "B": "房水", "C": "瞳孔", "D": "晶状体", "E": "玻璃体"}, "a": "C", "e": "眼球光学系统（屈光系统）的主要成分包括角膜、房水、晶状体和玻璃体；瞳孔是控制入眼光量的光圈（孔隙），本身不是屈光介质，不属于光学系统的主要成分。", "author": "邬清杨", "group": "眼科出题第三组"}, {"q": "简述视神经炎与缺血性视神经病变的鉴别要点。 眼外伤 关于前房积血的分级，II级的标准是：", "o": {"A": "<1/3前房", "B": "1/3-2/3前房", "C": ">2/3前房", "D": "前房充满血液", "E": "无前房积血"}, "a": "B", "e": "前房积血分级：I级＜1/3前房，II级为1/3～2/3前房，III级＞2/3前房，IV级为前房完全充满血液（八球形前房）。", "author": "邬清杨", "group": "眼科出题第三组"}, {"q": "女，32岁，因“左眼睑局限性红肿3天”就诊，局部剧烈压痛，可见睑缘处黄白色脓点，无波动感，首选治疗 是", "o": {"A": "左氧氟沙星滴眼液", "B": "热敷", "C": "垂直睑缘切开脓肿排脓", "D": "平行睑缘切开脓肿排脓", "E": "妥布霉素地塞米松眼膏"}, "a": "D", "e": "该病例为外麦粒肿，脓点已形成，应及时切开排脓；外麦粒肿皮肤切口应与睑缘平行，以顺皮纹方向切开，减少瘢痕形成并避免损伤眼轮匝肌纤维。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "某患者欲行ICL晶体植入术，术前泪道冲洗发现冲洗液自泪小点返流，伴有少量脓性分泌物，下一步应采取的 措施是", "o": {"A": "行泪囊鼻腔吻合术后择期进行ICL晶体植入", "B": "泪道探通后择期进行ICL晶体植入", "C": "使用抗生素滴眼液3～5天后进行ICL晶体植入", "D": "按原计划进行ICL晶体植入", "E": "口服抗生素1周后进行ICL晶体植入"}, "a": "A", "e": "冲洗液自泪小点返流伴脓性分泌物，提示慢性泪囊炎，为内眼手术的绝对禁忌证；必须先行泪囊鼻腔吻合术彻底根治泪囊炎，消除眼内感染隐患，再择期行ICL晶体植入术。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "下列体征中属于流行性角膜结膜炎与其他类型结膜炎鉴别点的是", "o": {"A": "耳前淋巴结压痛于眼开始受累侧较为明显", "B": "耳前淋巴结肿大", "C": "结膜滤泡形成、乳头增生、结膜下出血", "D": "弥漫性垂帘状角膜血管翳", "E": "结膜充血、水肿伴黏液性分泌物"}, "a": "A", "e": "流行性角结膜炎（EKC）通常先侵犯一侧眼，耳前淋巴结压痛在先受累侧更为明显，这种不对称性是区别于其他类型结膜炎（多为双侧对称）的重要鉴别点。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "下列病变中于迟发型超敏反应无关的是", "o": {"A": "季节性过敏性结膜炎", "B": "春季过敏性结膜炎", "C": "特应性角膜结膜炎", "D": "流行性角膜结膜炎", "E": "单纯疱疹病毒性角膜炎内皮型"}, "a": "A", "e": "季节性过敏性结膜炎属于I型（速发型/IgE介导型）超敏反应，与IV型迟发型超敏反应无关；而春季过敏性结膜炎、特应性角结膜炎及HSK内皮型均有IV型超敏反应参与。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "有关单纯疱疹病毒性角膜炎，下列说法正确的是", "o": {"A": "坏死性基质性角膜炎可有多条新生血管从周边角膜伸入中央基质浸润区", "B": "神经营养性角膜炎多发生于单纯疱疹病毒感染的活动期，抗病毒药物治疗有效", "C": "上皮型角膜炎的特征包括角膜知觉减退，因此该型患者少有显著疼痛、摩擦感或流泪等临床表现", "D": "治疗内皮型角膜炎的首选药物是阿昔洛韦滴眼液", "E": "原发HSK常见于幼儿，多数患儿有畏光、疼痛、眼睑痉挛等眼部症状"}, "a": "A", "e": "坏死性基质性角膜炎表现为角膜基质密集坏死性浸润，常伴有从角膜周边向中央浸润区延伸的多条新生血管，此为其病理特征；而选项B、D、E均有明显错误（神经营养性角膜炎非活动期，内皮型首选糖皮质激素，原发感染多无症状）。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "男，58岁，农民，两周前于田间收割玉米时右眼不慎被玉米叶划伤，当时仅感到轻微刺痛，用手揉搓后继续劳 作，后续几日逐渐出现右眼异物感、畏光、流泪等症状，自行购买“左氧氟沙星滴眼液”滴眼未缓解。近1周 以来，患者眼部疼痛加剧，视力进行性下降，出现头痛，现于我院就诊。 若对患者进行眼科检查，最有可能观察到以下哪种表现", "o": {"A": "角膜中央部可见乳白色牙膏样浸润灶，周围可见伪足，前房积脓呈糊状", "B": "角膜表面可见溃疡，其上大量黄绿色黏液脓性分泌物，周围可见黄白色浸润环", "C": "角膜中央部溃疡呈树枝状，树枝末端可见分叉和结节性膨大", "D": "角膜基质水肿、混浊，边缘有新生血管长入", "E": "角膜呈毛玻璃样，裂隙灯下可见内皮面沉积物"}, "a": "A", "e": "农业性植物性外伤（玉米叶划伤）后抗生素治疗无效，病情进行性加重，高度提示真菌性角膜炎；其典型裂隙灯表现为乳白色牙膏样浸润灶伴菌丝向周围形成的伪足，前房积脓呈糊状而非液平。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "关于上述病情的治疗，说法正确的是", "o": {"A": "那他霉素治疗反应好，为一线用药", "B": "若并发虹膜睫状体炎，可使用糖皮质激素", "C": "若发生角膜穿孔，应行穿透性角膜移植术，不使用药物治疗", "D": "评估药物治疗有效后，继续用药2周后可停药", "E": "所有该疾病患者均需全身用药"}, "a": "A", "e": "那他霉素（Natamycin）是目前唯一获批的局部抗真菌滴眼液，对丝状真菌（如镰刀菌、曲霉菌）效果较好，是治疗真菌性角膜炎的一线局部用药；真菌性角膜炎禁用糖皮质激素，疗程通常需要6～12周。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "女，45 岁，因“双眼干涩，视物疲劳1 年”就诊，该患者5 年前曾检查发现抗SSA（Ro）抗体阳性。关于该 患者的诊疗，下列说法错误的是 2", "o": {"A": "该患者干眼的分型为蒸发过强型", "B": "在未进行局部麻醉的情况下，将Schirmer试纸头端5mm置于患者下睑中外1/3交界处的结膜囊，5min内试", "C": "若患者BUT结果为8秒，还需进行角膜荧光素染色才可明确诊断", "D": "针对该患者的病因治疗可用免疫抑制剂", "E": "评估临床症状时应按从非接触到接触的顺序进行检查"}, "a": "A", "e": "抗SSA抗体阳性提示原发性干燥综合征，该病因自身免疫损伤泪腺导致泪液分泌减少，干眼类型为水液缺乏型（非蒸发过强型），选项A的分型错误。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "男，27岁，因“右眼痛、畏光、流泪3天伴轻度视力下降”就诊，查体可见角膜缘周围巩膜充血，裂隙灯下见 前房尘状KP在角膜下方呈三角形分布，前房闪辉（+），大量前 房 细 胞 ， 瞳 孔缩 小 有关该患者的查体结果，下列说法正确的是", "o": {"A": "所见巩膜充血的血供来自睫状前动脉", "B": "尘状KP的主要成分为单核巨噬细胞", "C": "病情缓解后前房闪辉现象会迅速转阴", "D": "前房细胞大小一致，近角膜面的向上运动，近虹膜面的向下运动", "E": "瞳孔缩小的原因为睫状肌痉挛，与瞳孔括约肌的收缩无关"}, "a": "A", "e": "睫状充血（角膜缘周围深层充血）的血液供应来自睫状前动脉（眼动脉的分支），此点正确；选项D方向相反（近虹膜面温度高，房水上升；近角膜面温度低，房水下降），选项E瞳孔缩小主要由瞳孔括约肌痉挛引起，均为错误描述。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "补充问病史得知，患者近2年数次晨起腰背部僵硬，活动后缓解。 关于该患者的诊疗，下列说法错误的是", "o": {"A": "抗生素治疗重要", "B": "应完善血沉、HLA-B27抗原分型等检查", "C": "使用睫状肌麻痹剂对于预防虹膜后粘连有重要作用", "D": "可考虑糖皮质激素联合其他免疫抑制剂进行治疗", "E": "需密切关注患者的眼压情况"}, "a": "A", "e": "结合晨僵病史及HLA-B27相关性，该患者为强直性脊柱炎并发的自身免疫性前葡萄膜炎，病因为自身免疫反应而非细菌感染，抗生素治疗无效且无必要，故选项A「抗生素治疗重要」为错误说法。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "关于葡萄膜炎，下列说法错误的是", "o": {"A": "Vogt-小柳原田病常单眼受累", "B": "Busacca结节常见于肉芽肿性前葡萄膜炎", "C": "眼球穿通伤对诊断交感性眼炎有重要意义", "D": "睫状体扁平部雪堤状改变是中间葡萄膜炎的特征性改变", "E": "色素性KP常见于陈旧性前葡萄膜炎"}, "a": "A", "e": "Vogt-小柳原田综合征（VKH）是典型的双眼受累的肉芽肿性全葡萄膜炎，常对称性双眼同时或先后发病，「常单眼受累」的描述错误；选项B、C、D、E均为正确表述。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "从以下哪一角度最难鉴别急性前葡萄膜炎与急性闭角型青光眼", "o": {"A": "前房闪辉", "B": "瞳孔大小", "C": "眼压", "D": "前房深度", "E": "以上均可有效鉴别"}, "a": "A", "e": "急性前葡萄膜炎与急性闭角型青光眼均可出现前房闪辉，从这一角度最难鉴别。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "关于青光眼，下列说法正确的是", "o": {"A": "高眼压并非都是青光眼，正常眼压也不能排除青光眼", "B": "房水循环仅有睫状突-后房-瞳孔-前房-小梁网-Schlemm管-集合管-睫状前静脉-血循环这一条途径", "C": "统计学上眼压的正常值是10～21 mmHg，因此当一患者左、右眼眼压分别是12 mmHg、19 mmHg时，可判", "D": "大多数青光眼眼压升高的原因是睫状突生成房水速率过快", "E": "以上均错误"}, "a": "A", "e": "高眼压不一定是青光眼（高眼压症），正常眼压也不能排除青光眼（正常眼压性青光眼）。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "关于急性闭角型青光眼急性发作期的临床表现，下列说法错误的是", "o": {"A": "患者患侧瞳孔对光反射存在", "B": "角膜上皮呈小水珠状", "C": "角膜后有色素性KP", "D": "晶状体前囊下可有青光眼斑", "E": "患者剧烈头痛、眼痛、视力减退"}, "a": "A", "e": "急性闭角型青光眼发作期眼压急剧升高，瞳孔中等散大固定，对光反射消失，而非存在。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "原发性开角型青光眼的一线用药是", "o": {"A": "毛果芸香碱", "B": "甘露醇", "C": "α 受体激动剂", "D": "碳酸酐酶抑制剂", "E": "前列腺素衍生物"}, "a": "E", "e": "前列腺素衍生物（如拉坦前列素）每日一次，降眼压幅度大（可达25%～35%），全身副作用少，是原发性开角型青光眼首选的一线局部用药。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "主要通过减小玻璃体体积从而减少眼内容物量的是", "o": {"A": "毛果芸香碱", "B": "甘露醇", "C": "α 受体激动剂", "D": "碳酸酐酶抑制剂", "E": "前列腺素衍生物"}, "a": "B", "e": "甘露醇为高渗脱水剂，静脉滴注后利用渗透压差使玻璃体水分脱出，缩小玻璃体体积，减少眼内容物量，迅速降低眼内压，常用于青光眼急性发作。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "通过抑制房水生成降低眼内压的是", "o": {"A": "毛果芸香碱", "B": "甘露醇", "C": "α 受体激动剂", "D": "碳酸酐酶抑制剂", "E": "前列腺素衍生物"}, "a": "D", "e": "碳酸酐酶抑制剂（如乙酰唑胺、布林佐胺）抑制睫状体上皮细胞碳酸酐酶活性，减少HCO₃⁻生成，从而抑制房水分泌，降低眼内压。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "可以解除周边虹膜对小梁网堵塞的是", "o": {"A": "毛果芸香碱", "B": "甘露醇", "C": "α 受体激动剂", "D": "碳酸酐酶抑制剂", "E": "前列腺素衍生物"}, "a": "A", "e": "毛果芸香碱为M胆碱受体激动剂，使瞳孔括约肌收缩、瞳孔缩小，牵拉周边虹膜离开小梁网，开放房角，解除虹膜对小梁网的堵塞，促进房水排出。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "女，68岁，因“右眼渐进性视力下降5个月，加重伴右眼胀痛、头痛1天”前来就诊，检查如下： 4 矫正视力：左眼 0.8，右眼 0.2；眼压：左眼 16 mmHg，右眼 25 mmHg；裂隙灯下见右眼前房变浅，晶状体呈 灰白色混浊。 患者右眼眼压升高的主要原因是", "o": {"A": "晶状体皮质吸水肿胀，体积增大，使虹膜前移、房角关闭", "B": "炎症、纤维素性渗出物及组织阻塞小梁网", "C": "大分子晶状体蛋白阻塞小梁网", "D": "小梁网胶原纤维和弹性纤维变性，小梁网增厚，网眼变窄或闭塞", "E": "虹膜上新生血管的纤维微血管膜牵拉使房角关闭"}, "a": "A", "e": "膨胀期白内障体积增大，虹膜前移，房角关闭，导致眼压升高。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "若此时以斜照法检查，可见到什么特征性表现", "o": {"A": "虹膜投影", "B": "Morgagnian白内障", "C": "轮辐状混浊", "D": "Elschnig珠样小体", "E": "晶状体堵塞于瞳孔区"}, "a": "A", "e": "斜照法可见虹膜投影（新月形阴影），说明前房浅，为膨胀期白内障特征。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "下列不属于视网膜中央动脉阻塞的临床表现是", "o": {"A": "无光感", "B": "患侧眼直接对光反射消失，间接对光反射存在", "C": "视网膜苍白水肿", "D": "黄斑区樱桃红斑", "E": "瞳孔散大"}, "a": "E", "e": "视网膜中央动脉阻塞表现为RAPD阳性（相对性传入瞳孔障碍），而非瞳孔散大。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "男，68岁，高血压病史13年，因“右眼突发视力下降2h”前来就诊。查体视力：左眼0.8，右眼手动；瞳孔直 径左眼3.0 mm，右眼 5.0 mm；右眼瞳孔直接对光反射消失，眼底情况如图 若为患者进行荧光素眼底血管造影，最有可能发生的情况是", "o": {"A": "视网膜动脉后充盈时间约45秒", "B": "视网膜微血管异常扩张，末端瘤样膨大", "C": "大片边界清晰的无灌注区，面积约10个视盘大小", "D": "黄斑区结节状强荧光，其周围荧光素渗漏", "E": "一荧光素渗漏点呈墨渍样扩大"}, "a": "A", "e": "视网膜中央动脉阻塞时，FFA示动脉充盈严重延迟。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "以下哪种治疗措施对该患者的病情而言不合适", "o": {"A": "介入取栓", "B": "降眼压", "C": "高压氧治疗", "D": "全身应用血管扩张剂", "E": "全身应用抗凝剂"}, "a": "A", "e": "中央视网膜动脉管径极细，不适合介入取栓，应采用其他扩血管降眼压等措施。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "关于年龄相关性黄斑变性，下列说法正确的是", "o": {"A": "可表现为视力进行性损害、视物变形", "B": "多单眼发病", "C": "干性AMD的首选治疗是玻璃体腔注射抗VEGF药物", "D": "玻璃体疣不可见于湿性AMD", "E": "隐匿型湿性AMD早期可见高荧光新生血管形态"}, "a": "A", "e": "AMD可同时有进行性视力损害和视物变形，这是正确的描述。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "以下哪种视网膜变性最易发生裂孔", "o": {"A": "格子样变性", "B": "蜗牛迹样变性", "C": "铺路石样变性", "D": "霜样变性", "E": "非压迫白"}, "a": "A", "e": "格子样变性区域视网膜变薄，最易发生裂孔，是孔源性视网膜脱离的危险因素。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "关于孔源性视网膜脱离，下列说法错误的是", "o": {"A": "黄斑脱离2周后行手术者视力预后较好", "B": "脱离发生于视网膜神经上皮与色素上皮之间", "C": "高度近视是常见危险因素", "D": "眼部B超可能见到V形高回声条带", "E": "治疗原则是封闭裂孔，复位视网膜"}, "a": "A", "e": "黄斑脱离越久，术后视力预后越差，非\"2周后预后较好\"。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "女，62岁，11年糖尿病病史，因“双眼视力逐渐减退3月”前来就诊。眼底像可见大量点状出血及微动脉瘤、 散在黄白色边界清楚的蜡样斑点，颞上、颞下象限可见静脉呈串珠样改变，未见新生血管，未见黄斑明显水肿。 该患者糖尿病视网膜病变的分期是", "o": {"A": "I期", "B": "II期", "C": "III期", "D": "IV期", "E": "V期"}, "a": "C", "e": "颞上、颞下2个象限可见静脉串珠样改变，满足4-2-1规则中\"≥2个象限静脉串珠\"的标准，可单独诊断为重度非增殖性糖尿病视网膜病变（III期，重度NPDR）。未见新生血管，排除增殖期（IV期及以上）。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "关于该患者的治疗，说法正确的是", "o": {"A": "①②（控制血糖＋激光治疗）", "B": "①③（控制血糖＋玻璃体切割术）", "C": "①④（控制血糖＋每年复查）", "D": "②④（激光治疗＋每年复查）", "E": "③④（玻璃体切割术＋每年复查）"}, "a": "A", "e": "重度NPDR治疗：①应注意控制血糖（基础），②应行激光治疗（全视网膜光凝PRP，重度NPDR的标准治疗）。③玻璃体切割术适用于增殖期DR（PDR）合并玻璃体积血或牵引性视网膜脱离，不适用于重度NPDR。④重度NPDR随访间隔应为3～6个月，而非每年一次。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "女，37岁，因“右眼视力下降1天”就诊。患者自述右眼眶后方胀痛，眼球转动时加重。查体视力左眼：0.9， 右眼：指数；RAPD（+）。该 患者最可 能 的诊 断 是", "o": {"A": "视神经炎", "B": "视网膜中央动脉阻塞", "C": "视网膜中央静脉阻塞", "D": "视网膜静脉周围炎", "E": "孔源性视网膜脱离"}, "a": "A", "e": "年轻女性+急性视力下降+眼球转动痛+RAPD阳性，最符合视神经炎诊断。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "不属于眼球屈光介质的是", "o": {"A": "视网膜", "B": "角膜", "C": "房水", "D": "晶状体", "E": "玻璃体"}, "a": "A", "e": "视网膜是感光组织，不属于眼球屈光介质（屈光介质为角膜、房水、晶状体、玻璃体）。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "关于双眼的调节，下列说法正确的是", "o": {"A": "视远物时，睫状肌松弛，悬韧带拉紧，晶状体变扁", "B": "视远物时，睫状肌松弛，悬韧带松弛，晶状体变扁", "C": "视远物时，睫状肌松弛，悬韧带松弛，晶状体变凸", "D": "视近物时，睫状肌松弛，悬韧带松弛，晶状体变扁", "E": "视近物时，睫状肌收缩，悬韧带拉紧，晶状体变凸"}, "a": "A", "e": "视远物时睫状肌松弛，悬韧带拉紧，晶状体被动变扁；选项A描述正确。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "近反射所涉及的眼肌包括", "o": {"A": "1 2 5", "B": "1 2 4", "C": "1 3 5", "D": "1 3 4", "E": "2 3 4"}, "a": "B", "e": "近反射三联动涉及睫状肌（调节）、内直肌（集合）、瞳孔括约肌（缩瞳）。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "关于双眼单视，下列描述正确的是", "o": {"A": "双眼见到的物像大小、形态、色彩可有细微差异，但大脑可将其融合成具有立体感的单一图像", "B": "需两眼的视野完全相同", "C": "功能分级由低到高为同时视→立体视→融合", "D": "隐性斜视的患者两眼单视功能与正位眼者无明显差异", "E": "使用同视机检查时，向患者右眼呈现“熊猫”，左眼呈现“笼子”，若患者汇报“熊猫关进笼子里”，可说明其"}, "a": "A", "e": "双眼物像有细微差异，大脑可将其融合成具立体感的单一图像，这是正常双眼单视的基础。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "下列说法错误的是", "o": {"A": "麻痹性斜视第一斜视角 > 第二斜视角", "B": "共同性斜视常无复视或代偿头位", "C": "眼球运动是否受限是共同性斜视与麻痹性斜视的重要鉴别点", "D": "对斜视患者使用角膜映光法进行检查，若发现当光点位于一眼瞳孔中央时，另一眼光点位于瞳孔的颞侧，可", "E": "共同性斜视有可能通过戴镜矫正"}, "a": "A", "e": "麻痹性斜视第二斜视角大于第一斜视角，而非第一大于第二。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "关于弱视，下列说法错误的是", "o": {"A": "屈光不正性弱视多单眼发病", "B": "斜视性弱视发病与黄斑功能抑制有关", "C": "双眼屈光参差时，屈光度较大的一眼易发生弱视", "D": "先天性白内障的儿童易发生形觉剥夺性弱视", "E": "弱视发病越早，治疗越晚，疗效越差"}, "a": "A", "e": "屈光不正性弱视通常为双眼发病；单眼弱视多见于屈光参差性弱视。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "下列属于开放性眼外伤的是", "o": {"A": "1 2 3", "B": "1 2 4", "C": "2 3 4", "D": "2 3 5", "E": "1 2 5"}, "a": "A", "e": "开放性眼外伤包括眼球破裂伤、眼球穿通伤和眼内异物（均有眼球壁全层裂伤）。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "女，16 岁，因“踢球时被足球砸中右眼后视力下降1 小时”前来就诊，可见右眼前房1/2 高度处有一液平面， 液体呈血性。下列说法错误的是", "o": {"A": "为防止血液长期接触角膜导致角膜血染，该患者宜仰卧位静养", "B": "该患者前房积血分级为II级", "C": "积血及小梁网的直接损伤易致外伤性青光眼，因此需密切关注眼压", "D": "用纱布遮盖双眼是为了避免光线刺激引起瞳孔变化", "E": "还需评估该患者有无玻璃体积血、晶状体脱位等情况"}, "a": "A", "e": "前房积血患者需取半卧位（头部抬高30-45度），仰卧位会导致积血接触角膜，增加角膜血染风险。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "关于交感性眼炎，下列说法正确的是", "o": {"A": "交感眼可表现为肉芽肿性全葡萄膜炎", "B": "诱发眼的症状主要由外伤后的细菌感染引起", "C": "交感眼发病最危险的时间为外伤或手术后1周内", "D": "双眼症状相同，多同时出现", "E": "摘除诱发眼是治疗的关键"}, "a": "A", "e": "交感性眼炎表现为健侧眼（交感眼）出现肉芽肿性全葡萄膜炎，非细菌感染。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "下列说法正确的是", "o": {"A": "酸烧伤比碱烧伤后果更严重", "B": "冲洗眼部时不应转动眼球，以免化学物质可接触的眼球范围扩大", "C": "冲洗满10分钟即可", "D": "眼化学烧伤多不影响视力", "E": "以上均错误"}, "a": "E", "e": "以上4项均有误：碱烧伤比酸烧伤后果更重；冲洗时需转动眼球；需冲洗至少30分钟；化学伤常影响视力。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "可再生的角膜层次有 9", "o": {"A": "1 4", "B": "1 2", "C": "1 3", "D": "4 5", "E": "2 5"}, "a": "A", "e": "角膜中可再生的结构为上皮细胞层（来自角膜缘干细胞）和后弹力层（内皮细胞分泌），其余层不能再生。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "符合由内到外顺序出现的视网膜组织学层次是（不一定相邻）", "o": {"A": "神经纤维层 神经节细胞层 外丛状层 外核层 视杆与视锥细胞层", "B": "内丛状层 内核层 神经纤维层 外丛状层 外核层", "C": "内界膜 内核层 内丛状层 外丛状层 外核层 色素上皮层", "D": "内界膜 外界膜 神经纤维层 神经节细胞层 视杆与视锥细胞层", "E": "外界膜 视杆与视锥细胞层 色素上皮层 脉络膜毛细血管层 脉络膜"}, "a": "A", "e": "由内到外视网膜层次：神经纤维层-神经节细胞层-内丛状层-内核层-外丛状层-外核层-视锥视杆层-色素上皮层。", "author": "孙晟佳", "group": "眼科出题第二组"}, {"q": "关于正常晶状体的解剖生理特点，以下描述正确的是？ 富含血管和丰富的神经分布", "o": {"B": "是一种不透明的组织", "C": "由晶体囊、蛋白含量丰富的晶体纤维组成", "D": "主要营养来源于角膜", "E": "主要作用是维持眼内压"}, "a": "C", "e": "正常晶状体无血管、无神经，为透明双凸体，由晶体囊及富含可溶性蛋白的晶体纤维（皮质和核）组成；其主要营养来自房水，主要功能是屈光和调节。", "author": "邓敏智", "group": "眼科出题第一组"}, {"q": "患者，男，70岁，确诊为年龄相关性白内障，准备接受具有“时间短、切口小、表麻无痛、无需缝线、恢复快、术后散光小”等特点的现代外科手术。他将要接受的手术方式是：", "o": {"A": "白内障囊内摘除术(ICCE)", "B": "白内障囊外摘除术(ECCE)", "C": "超声乳化及人工晶体植入术", "D": "玻璃体切除术", "E": "角膜移植术"}, "a": "C", "e": "超声乳化及人工晶体植入术切口仅2～3mm，采用超声波乳化晶核、吸除皮质后植入人工晶体，具有切口小、无需缝线、恢复快、散光小等优点，是目前白内障手术的主流术式。", "author": "邓敏智", "group": "眼科出题第一组"}, {"q": "简述皮质性白内障发展的四个分期，并分别列出“膨胀期”与“成熟期”的核心临床特点。", "o": {"A": "皮质性白内障发展的四个分期为：初发期、膨胀期、成熟期、过熟期。", "B": "膨胀期特点：①前房变浅；②视力下降明显；③虹膜投影(+)。", "C": "成熟期特点：①晶体全混；②视力严重下降。", "D": "统计学上，正常眼压的范围是？", "E": "10~21mmHg B. 15~25mmHg C. 8~15mmHg D. 21~30mmHg"}, "a": "A", "e": "皮质性白内障标准分期为初发期、膨胀期、成熟期、过熟期四期，选项A完整准确列出；B和C仅描述部分分期特点，D/E内容与题目无关。", "author": "邓敏智", "group": "眼科出题第一组"}, {"q": "房水循环经过的正常途径依次为？", "o": {"A": "睫状体→后房→瞳孔→前房→小梁网→Schlemm管", "B": "睫状体→前房→瞳孔→后房→小梁网", "C": "Schlemm管→小梁网→前房→后房→睫状体", "D": "睫状体→小梁网→前房→后房→巩膜静脉"}, "a": "A", "e": "房水由睫状体分泌后进入后房，经瞳孔流入前房，再通过小梁网引流至Schlemm管，最终汇入巩膜静脉丛，此为房水循环的正常生理途径，任何环节受阻均可引起眼压升高。", "author": "邓敏智", "group": "眼科出题第一组"}, {"q": "患者男，60岁，患有慢阻肺和哮喘病史。今日确诊为原发性开角型青光眼。在为其选择降眼压滴眼液时，必须绝对禁用的药物是？ 曲伏前列素（前列腺素衍生物） 布林佐胺（碳酸酐酶抑制剂）", "o": {"C": "卡替洛尔（β-受体阻滞剂）", "D": "阿法根（α-受体激动剂）", "E": "毛果芸香碱（拟胆碱能药物）"}, "a": "C", "e": "β受体阻滞剂（如卡替洛尔）可阻断支气管平滑肌的β2受体，诱发支气管痉挛，对慢阻肺和哮喘患者属绝对禁忌，即使局部点眼也因全身吸收而存在风险，其余几类降眼压药无此禁忌。", "author": "邓敏智", "group": "眼科出题第一组"}, {"q": "根据降压机制的不同，青光眼常用的降眼压药物分为哪几大类？请至少列出五类，并为每一类写出一个代表药物的名称。 高渗剂：甘露醇 。 碳酸酐酶抑制剂：醋甲唑胺（或布林佐胺） 。 拟胆碱能药物：毛果芸香碱 。 β-受体阻滞剂：卡替洛尔（或噻吗洛尔、倍他洛尔等） 。 α-受体激动剂：阿法根（溴莫尼定） 。 前列腺素衍生物：曲伏前列素（或拉坦前列素等） 。 (注：答出以上任意五类及其代表药物即可) 急性闭角型青光眼的先兆期常表现为间歇性的小发作，可出现轻度眼部酸胀、头痛、雾视、虹视，休息或睡眠后多能好转。 ( ) 糖尿病视网膜病变（DR）分期中，重度非增生期（重度NPDR）的“4、2、1”原则中，“2”代表的是？", "o": {"A": "2个象限视网膜内微血管异常（IRMA）", "B": "2个象限静脉串珠", "C": "2个象限内视网膜出血≥20个出血点", "D": "2个象限出现棉绒斑", "E": "2个象限出现硬性渗出"}, "a": "B", "e": "重度NPDR的4-2-1原则指：4个象限视网膜内出血、2个象限静脉串珠样改变、1个象限出现IRMA，满足任一即可诊断，其中第2条专指2个象限出现静脉串珠。", "author": "邓敏智", "group": "眼科出题第一组"}, {"q": "白血病眼底病变中典型的Roth's斑，其视网膜出血灶中央的白芯主要与什么成分聚集有关？", "o": {"A": "巨噬细胞和淋巴细胞", "B": "脂质和蛋白质渗出", "C": "坏死的视网膜色素上皮细胞", "D": "白细胞、成纤维蛋白和血小板", "E": "视神经轴索断裂肿胀"}, "a": "D", "e": "Roth斑为视网膜出血灶中央有白色中心的特征性改变，其白芯由聚集的白细胞、成纤维蛋白和血小板构成的微血栓组成，是白血病高黏滞状态下血管内血栓形成的病理表现。", "author": "邓敏智", "group": "眼科出题第一组"}, {"q": "某老年男性患者，因“左眼突然无痛性视力丧失30分钟”就诊，有高血压病史10年 。测血压为210/115mmHg 。眼底检查发现视盘水肿、动脉细、有片状出血和Elsching斑 。该患者最可能的眼底病变是？", "o": {"A": "糖尿病性黄斑水肿", "B": "高血压性视网膜病变（恶性病变期）", "C": "糖尿病视网膜病变增生晚期", "D": "甲状腺相关眼病视神经病变", "E": "白血病眼底病变"}, "a": "B", "e": "患者血压极高（210/115mmHg），眼底出现视盘水肿、动脉细、片状出血及Elsching斑（视网膜色素上皮梗死灶），是恶性高血压视网膜病变（四期）的典型三联征表现。", "author": "邓敏智", "group": "眼科出题第一组"}, {"q": "糖尿病黄斑水肿（DME）分为未累及黄斑中心凹的DME（NCI-DME）和累及黄斑中心凹的DME（CI-DME），其中CI-DME的定义是黄斑视网膜增厚累及中心凹直径1mm范围内。 视网膜中的硬性渗出是由毛细血管闭塞、神经轴索断裂肿胀引起的，表现为边界不清的灰白色斑。答案：错误 视神经外面覆盖的三层脑膜，从外向内依次为？", "o": {"A": "硬脑膜、软脑膜、蛛网膜", "B": "软脑膜、蛛网膜、硬脑膜", "C": "硬脑膜、蛛网膜、软脑膜", "D": "蛛网膜、硬脑膜、软脑膜", "E": "软脑膜、硬脑膜、蛛网膜"}, "a": "C", "e": "视神经外包绕的三层脑膜由外向内依次为硬脑膜、蛛网膜、软脑膜，与颅内脑膜结构完全一致，硬脑膜最坚韧居外，软脑膜最薄紧贴视神经表面。", "author": "邓敏智", "group": "眼科出题第一组"}, {"q": "视交叉中部发生损伤时，其典型的视野缺损类型是？", "o": {"A": "同侧盲", "B": "同侧鼻侧偏盲", "C": "双颞侧偏盲", "D": "双对侧同向性偏盲", "E": "中心暗点"}, "a": "C", "e": "视交叉中部含双眼鼻侧交叉纤维，负责传递双眼颞侧视野信息，该处损伤（如垂体瘤压迫）导致双眼颞侧视野均缺失，形成典型的双颞侧偏盲。", "author": "邓敏智", "group": "眼科出题第一组"}, {"q": "视神经炎患者常伴有眼球胀痛或转动痛，其解剖学机制是？", "o": {"A": "视神经鞘膜与眼外肌的筋膜有粘连炎症反应", "B": "睫状肌炎症痉挛", "C": "眼压急剧升高压迫角膜神经", "D": "视网膜组织缺血坏死", "E": "视盘严重水肿压迫巩膜筛板"}, "a": "A", "e": "视神经鞘膜与眼外肌的筋膜（Tenon囊）在球后紧密粘连，视神经炎症时鞘膜充血水肿，眼球转动牵拉炎性组织即产生疼痛，这是视神经炎眼球转动痛的解剖学基础。", "author": "邓敏智", "group": "眼科出题第一组"}, {"q": "医生在半暗环境下为某视力骤降的患者进行眼部查体，用手电筒快速交替照射双眼，发现光线照射患侧眼时，瞳孔先轻微收缩，继而散大。这一阳性体征被称为？ A. 绝对性瞳孔传入障碍", "o": {"A": "相对性瞳孔传入障碍", "B": "瞳孔近反射异常", "C": "瞳孔光反射消失", "D": "调节反射痉挛"}, "a": "B", "e": "摆动手电筒试验中，照射患侧眼时瞳孔先缩后散，说明患眼传入光觉的视神经功能受损，传入冲动弱于健眼，此体征称为相对性瞳孔传入障碍（RAPD，即Marcus Gunn瞳孔），是视神经炎的重要体征。", "author": "邓敏智", "group": "眼科出题第一组"}, {"q": "缺血性视神经病变的典型视野改变通常为中心暗点。 以下哪一项是视网膜中央动脉阻塞（CRAO）最典型的眼底体征？", "o": {"A": "视网膜静脉迂曲扩张", "B": "广泛的火焰状出血", "C": "黄斑区樱桃红斑（cherry-red spot）", "D": "视盘充血水肿", "E": "视网膜色素上皮脱离"}, "a": "C", "e": "CRAO后视网膜内层缺血水肿变白，而黄斑区视网膜最薄（缺乏内核层），其下脉络膜血供来自睫状动脉仍正常，橘红色脉络膜透过薄透明的黄斑显现，形成典型的樱桃红斑。", "author": "邓敏智", "group": "眼科出题第一组"}, {"q": "患者男，65岁。患有高血压、动脉硬化。突发右眼无痛性视力丧失1小时，就诊时视力仅存光感。查体发现瞳孔散大，直接对光反射迟钝；眼底可见视网膜苍白水肿，动脉极细呈节段性血流，黄斑区可见樱桃红斑。对于该患者首选的处理原则是？", "o": {"A": "择期行玻璃体切除术", "B": "立即进行全视网膜激光光凝（PRP）", "C": "争分夺秒进行急诊抢救，采取降眼压、扩血管、溶栓等改善缺氧状态", "D": "局部点用抗生素和糖皮质激素眼药水", "E": "玻璃体腔内注射抗VEGF药物"}, "a": "C", "e": "视网膜中央动脉阻塞是眼科急症，视网膜耐受缺血时间极短（约90分钟），必须争分夺秒降眼压（按摩眼球、前房穿刺）、扩血管、溶栓以尽快恢复血供，延误则导致不可逆视力丧失。", "author": "邓敏智", "group": "眼科出题第一组"}, {"q": "患者女，62岁，高血压病史10年。右眼无痛性视力下降1周。眼底检查示：视盘充血水肿，边界模糊，视网膜静脉迂曲、扩张，满布火焰状出血，部分区域可见棉绒斑。该患者最可能的诊断是？", "o": {"A": "视网膜中央静脉阻塞（CRVO）", "B": "视网膜中央动脉阻塞（CRAO）", "C": "糖尿病视网膜病变", "D": "视网膜脱离", "E": "萎缩性年龄相关性黄斑变性"}, "a": "A", "e": "眼底满布火焰状出血（沿神经纤维层走行）、视网膜静脉迂曲扩张、视盘充血水肿，是视网膜中央静脉阻塞（CRVO）的典型三联征，与高血压动脉硬化压迫中央静脉导致回流障碍密切相关。", "author": "邓敏智", "group": "眼科出题第一组"}, {"q": "患者男，45岁，高度近视。近期感觉右眼前有黑影飘动，伴有闪光感。今日突然发现右眼上方视物遮挡。眼底检查可见下方周边部视网膜呈灰白色隆起，并可见一萎缩孔。该疾病发生的核心机制是？", "o": {"A": "脉络膜新生血管穿破Bruch膜", "B": "静脉血流瘀滞导致毛细血管闭塞", "C": "视网膜变性合并玻璃体液化及后脱离", "D": "全身免疫性炎症累及葡萄膜", "E": "糖尿病引起的微血管病变"}, "a": "C", "e": "高度近视患者视网膜周边变性，加之玻璃体液化及后脱离对视网膜产生牵拉力，形成裂孔或萎缩孔后液化玻璃体经孔进入视网膜下，导致孔源性视网膜脱离，视网膜变性合并玻璃体液化牵拉是核心机制。", "author": "邓敏智", "group": "眼科出题第一组"}];
const GROUP_AUTHORS = {"第一组": ["刘昶铄", "刘霁影", "周智睿", "战鹏宇", "李明准", "梁瑞博", "王雨涵", "谭饮骏", "邓敏智", "陈栐洁"], "第二组": ["唐晔", "孙晟佳", "宋娟范", "张智翔", "斋藤真梨惠", "李庚午", "林炜杰", "王中侯", "窦锡傲", "罗智谦", "赵栩禾"], "第三组": ["刘子越", "周圣淞", "崔旭", "曾宇桐", "梁颖欣", "邬清杨", "陈宣仁", "陳揆文", "韦鹏昊", "黄婉雯"]};

const S = {
  mode: 'study',
  idx: 0,
  pool: [],
  answered: false,
  shuffle: false,
  history: {},
  starred: {},

  init() {
    try{this.history=JSON.parse(localStorage.eyetest_h||'{}')}catch(e){}
    try{this.starred=JSON.parse(localStorage.eyetest_s||'{}')}catch(e){}

    // build author dropdown with optgroups
    const sel=document.getElementById('selAuthor');
    for(const [groupName, authors] of Object.entries(GROUP_AUTHORS)){
      // Add a group separator option
      const og = document.createElement('option');
      og.textContent = '── ' + groupName + ' ──';
      og.value = 'group:' + groupName;
      og.className = 'optgroup';
      og.style.fontWeight = '700';
      og.style.color = 'var(--accent2)';
      sel.appendChild(og);
      // Add author options
      authors.forEach(a => {
        const o = document.createElement('option');
        o.value = a;
        o.textContent = '  ' + a;
        sel.appendChild(o);
      });
    }

    this.apply();
    this.kbd();
  },

  save(){localStorage.eyetest_h=JSON.stringify(this.history);localStorage.eyetest_s=JSON.stringify(this.starred)},

  apply(){
    let pool=QS.map((q,i)=>({...q,orig:i}));
    const author=document.getElementById('selAuthor').value;
    const scope=document.getElementById('selScope').value;

    if(author!=='all'){
      if(author.startsWith('group:')){
        // Filter by group
        const groupLabel = author.replace('group:', '');
        const reverseMap = {'第一组':'眼科出题第一组','第二组':'眼科出题第二组','第三组':'眼科出题第三组'};
        const realGroup = reverseMap[groupLabel] || groupLabel;
        pool=pool.filter(q=>q.group===realGroup);
      } else {
        pool=pool.filter(q=>q.author===author);
      }
    }

    if(scope==='unanswered') pool=pool.filter(q=>!(q.orig in this.history));
    else if(scope==='wrong') pool=pool.filter(q=>this.history[q.orig]&&!this.history[q.orig].ok);
    else if(scope==='starred') pool=pool.filter(q=>q.orig in this.starred);

    if(this.shuffle){for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]]}}

    this.pool=pool;this.idx=0;
    if(pool.length===0){this.renderEmpty()}else{this.render()}
    this.updateProg();
  },

  toggleShuffle(){
    this.shuffle=!this.shuffle;
    document.getElementById('btnShuffle').classList.toggle('on',this.shuffle);
    this.apply();
  },

  setMode(m){
    this.mode=m;
    document.querySelectorAll('#modePill button').forEach(b=>b.classList.toggle('on',b.dataset.m===m));
    if(this.pool.length&&this.answered)this.render();
  },

  // ── render ──
  render(){
    if(this.idx>=this.pool.length){this.idx=0;if(this.shuffle)return this.apply()}
    const q=this.pool[this.idx];
    const oKeys=Object.keys(q.o).sort();
    const star=this.starred[q.orig];
    const prev=this.history[q.orig];
    const grp = q.group ? q.group.replace('眼科出题','') : '';

    let prevBadge='';
    if(prev){prevBadge=prev.ok
      ?'<span style="color:var(--success)">✓ 上次对</span>'
      :'<span style="color:var(--danger)">✗ 上次错</span>'}

    let opts='';
    oKeys.forEach((l,i)=>{
      opts+=`<div class="opt" data-l="${l}" onclick="S.pick('${l}')">
        <div class="opt-letter">${l}</div>
        <div class="opt-text">${this.esc(q.o[l])}</div></div>`;
    });

    document.getElementById('main').innerHTML=`
      <div class="card">
        <div class="qmeta">
          <span>${this.idx+1}/${this.pool.length} · ${this.esc(q.author)}</span>
          <span class="grp">${this.esc(grp)}</span>
          <span class="star" onclick="S.toggleStar(${q.orig})">${star?'⭐':'☆'}</span>
          ${prevBadge}
        </div>
        <div class="qtext">${this.esc(q.q)}</div>
        <div class="opts">${opts}</div>
        <div class="fb" id="fb"></div>
        <div class="acts">
          <button class="act go" id="btnNext" style="display:none" onclick="S.next()">
            下一题 <kbd>Space</kbd>
          </button>
          <button class="act" onclick="S.toggleStar(${q.orig})">${star?'⭐':'☆'} 收藏 <kbd>S</kbd></button>
        </div>
      </div>`;
    this.answered=false;
    this.updateProg();
    window.scrollTo({top:0,behavior:'smooth'});
  },

  renderEmpty(){
    document.getElementById('main').innerHTML=`
      <div class="empty">
        <h2>🎉 ${this.pool.length===0?'没有匹配的题目':'完成!'}</h2>
        <p>当前筛选条件下暂无题目，换个筛选试试</p>
        <button class="act go" onclick="S.apply()">🔄 刷新</button>
      </div>`;
    this.updateProg();
  },

  // ── answer ──
  pick(letter){
    if(this.answered)return;
    this.answered=true;

    const q=this.pool[this.idx];
    const correct=q.a.toUpperCase();
    const ok=letter===correct;

    document.querySelectorAll('.opt').forEach(el=>{
      el.classList.add('dim');
      const l=el.dataset.l;
      if(l===correct)el.classList.add('ok');
      if(l===letter&&!ok)el.classList.add('bad');
    });

    this.history[q.orig]={ok,ts:Date.now(),chosen:letter};
    this.save();

    const fb=document.getElementById('fb');
    fb.className='fb on '+(ok?'good':'bad');
    let html=ok?`<div class="fb-title">✅ 正确!</div>`:`<div class="fb-title">❌ 错误 — 答案是 <b>${correct}</b></div>`;
    if(q.e)html+=`<div class="fb-expl">💡 ${this.esc(q.e)}</div>`;
    fb.innerHTML=html;

    document.getElementById('btnNext').style.display='inline-block';
    document.getElementById('btnNext').focus();

    this.updateProg();
    this.toast(ok?'✅ 正确!':'❌ 错误',ok);

    if(this.mode==='speed'&&ok)setTimeout(()=>this.next(),650);
  },

  next(){
    this.idx++;
    if(this.idx>=this.pool.length){
      this.idx=0;
      if(this.shuffle)return this.apply();
    }
    this.render();
  },

  toggleStar(orig){
    this.starred[orig]=!(orig in this.starred);
    this.save();
    if(this.pool.length&&this.pool[this.idx].orig===orig)this.render();
  },

  reset(){
    if(!confirm('清除所有做题记录？不可撤销。'))return;
    this.history={};this.starred={};this.save();this.apply();
  },

  // ── progress ──
  updateProg(){
    const t=this.pool.length;
    if(!t){
      document.getElementById('progFill').style.width='0%';
      document.getElementById('progLabel').textContent='没有题目';
      document.getElementById('progCount').textContent='0/0';
      return;
    }
    let done=0,ok=0;
    this.pool.forEach(q=>{if(q.orig in this.history){done++;if(this.history[q.orig].ok)ok++}});
    document.getElementById('progFill').style.width=Math.round(done/t*100)+'%';
    document.getElementById('progLabel').textContent=`完成 ${done}/${t} · 正确率 ${done?Math.round(ok/done*100):0}%`;
    document.getElementById('progCount').textContent=`${this.idx+1}/${t}`;
  },

  // ── keyboard ──
  kbd(){
    document.addEventListener('keydown',e=>{
      if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
      const k=e.key.toUpperCase();

      if(!this.answered&&this.pool.length){
        const letters=Object.keys(this.pool[this.idx].o).sort();
        if(k>='1'&&k<='5'){const idx=parseInt(k)-1;if(idx<letters.length)this.pick(letters[idx])}
        else if(k>='A'&&k<='E')this.pick(k);
      }

      if(k===' '||k==='ENTER'||k==='ARROWRIGHT'){e.preventDefault();if(this.answered)this.next()}
      if(k==='M')this.setMode(this.mode==='study'?'speed':'study');
      if(k==='S'&&this.pool.length){const q=this.pool[this.idx];this.toggleStar(q.orig)}
      if(k==='ARROWLEFT'&&this.idx>0){this.idx--;this.render()}
    });
  },

  esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML},

  toast(msg,ok){
    const t=document.getElementById('toast');
    t.textContent=msg;t.className='toast on '+(ok?'ok':'ng');
    clearTimeout(this._tt);this._tt=setTimeout(()=>t.className='toast',1200);
  }
};

S.init();
</script>
</body>
</html>
