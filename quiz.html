光眼", "B": "虹膜睫状体炎", "C": "结膜炎", "D": "干眼症"}, "a": "B", "e": "正确答案：虹膜睫状体炎。", "author": "陈宣仁", "group": "眼科出题第三组"}, {"q": "对于干眼症患者，临床上为了延长人工泪液的作用时间，常选用哪种剂型？", "o": {"A": "滴眼液水剂", "B": "卡波姆凝胶", "C": "药片", "D": "静脉注射液"}, "a": "B", "e": "卡波姆凝胶黏稠度高，在眼表停留时间显著长于水剂滴眼液，能有效延长润滑时间，是干眼症患者延长人工泪液作用时间的首选剂型。", "author": "陈宣仁", "group": "眼科出题第三组"}, {"q": "儿童视觉系统逐渐发育成熟，其发育的“关键期”是指哪个年龄段？", "o": {"A": "0-3岁", "B": "3-6岁", "C": "6-12岁", "D": "12-18岁"}, "a": "A", "e": "视觉发育关键期为出生后0-3岁，此阶段视觉皮层可塑性最强，剥夺性弱视若在此期内及时干预，视力恢复效果最佳。", "author": "陈宣仁", "group": "眼科出题第三组"}, {"q": "儿童视觉发育的“敏感期”是指哪个年龄段？", "o": {"A": "0-3岁", "B": "0-6岁", "C": "0-12岁", "D": "0-18岁"}, "a": "C", "e": "儿童视觉发育敏感期为0-12岁，此阶段视觉系统仍具可塑性，弱视在12岁前经治疗均可获得不同程度的改善。", "author": "陈宣仁", "group": "眼科出题第三组"}, {"q": "屈光不正性弱视通常是单眼发病还是双眼发病？", "o": {"A": "仅右眼发病", "B": "仅左眼发病", "C": "单眼发病", "D": "双眼发病"}, "a": "D", "e": "屈光参差性弱视：双眼屈光度数差异>2.50D时，屈光度较高的一眼因成像模糊易发生弱视。屈光不正性弱视多双眼发病。", "author": "陈宣仁", "group": "眼科出题第三组"}, {"q": "若患儿具有较大的屈光参差，导致视皮层抑制屈光度较高眼的视力，这种弱视属于？", "o": {"A": "斜视性弱视", "B": "屈光不正性弱视", "C": "屈光参差性弱视", "D": "形觉剥夺性弱视"}, "a": "C", "e": "屈光参差性弱视：双眼屈光度数差异>2.50D时，屈光度较高的一眼因成像模糊易发生弱视。屈光不正性弱视多双眼发病。", "author": "陈宣仁", "group": "眼科出题第三组"}, {"q": "双眼视觉的发育在中枢水平存在什么现象，一旦受到异常视觉经验影响就会导致弱视？", "o": {"A": "相互竞争", "B": "相互排斥", "C": "绝对独立", "D": "互不干扰"}, "a": "A", "e": "双眼视觉发育的关键期内，两眼在视皮层神经元水平存在相互竞争关系。一旦出现异常视觉经验（如斜视、屈光参差），竞争中处于劣势的眼视觉通路发育受抑制，从而导致弱视。", "author": "陈宣仁", "group": "眼科出题第三组"}, {"q": "角膜的屈光力极大，大约占了眼球总屈光力的多少？", "o": {"A": "30%", "B": "50%", "C": "70%", "D": "90%"}, "a": "C", "e": "角膜屈光力约43D（占总屈光力约2/3），晶状体约19D（约占1/3）。总屈光力约58-60D。", "author": "陈宣仁", "group": "眼科出题第三组"}, {"q": "角膜组织由于具有重要的光学特性，任何病变都会直接影响视力，它是导致什么的主要原因之一？", "o": {"A": "色盲", "B": "夜盲", "C": "致盲", "D": "白内障"}, "a": "C", "e": "角膜是眼球重要的屈光介质，病变后透明度下降直接影响视力。角膜疾病（如感染、外伤、营养不良等）是全球可避免致盲的主要原因之一。", "author": "陈宣仁", "group": "眼科出题第三组"}, {"q": "角膜的解剖结构由前向后共分为五层，其中最外层称为什么？", "o": {"A": "基质层", "B": "内皮层", "C": "上皮层", "D": "前弹力层"}, "a": "C", "e": "角膜由前向后依次为上皮层、前弹力层（Bowman层）、基质层、后弹力层（Descemet膜）、内皮层，共五层。上皮层位于最外侧，具有修复再生能力。", "author": "陈宣仁", "group": "眼科出题第三组"}, {"q": "角膜的五层解剖结构中，哪一层是不包含在内的？", "o": {"A": "前弹力层", "B": "基质层", "C": "后弹力层", "D": "脉络膜层"}, "a": "D", "e": "角膜的五层结构为上皮层、前弹力层、基质层、后弹力层、内皮层，脉络膜层属于眼球壁中层（葡萄膜），不属于角膜组织结构。", "author": "陈宣仁", "group": "眼科出题第三组"}, {"q": "圆锥角膜在形态上具有什么典型的特征表现？", "o": {"A": "角膜周边变薄", "B": "角膜中央变薄并呈锥状前突", "C": "角膜整体水肿增厚", "D": "角膜表面极其平坦"}, "a": "B", "e": "圆锥角膜特征：角膜中央变薄呈锥状前突→高度近视+不规则散光。常染色体隐性遗传。角膜地形图可见下方变陡。", "author": "陈宣仁", "group": "眼科出题第三组"}, {"q": "圆锥角膜常会导致何种类型的屈光异常？", "o": {"A": "高度远视与规则散光", "B": "高度近视与不规则散光", "C": "轻度远视", "D": "远视性散光"}, "a": "B", "e": "圆锥角膜特征：角膜中央变薄呈锥状前突→高度近视+不规则散光。常染色体隐性遗传。角膜地形图可见下方变陡。", "author": "陈宣仁", "group": "眼科出题第三组"}, {"q": "在裂隙灯下观察圆锥角膜，其深基质层常可见到什么典型的体征？", "o": {"A": "树枝状溃疡", "B": "盘状混浊", "C": "垂直细小条纹", "D": "大量新生血管网"}, "a": "C", "e": "圆锥角膜特征：角膜中央变薄呈锥状前突→高度近视+不规则散光。常染色体隐性遗传。角膜地形图可见下方变陡。", "author": "陈宣仁", "group": "眼科出题第三组"}, {"q": "下列关于角膜（cornea）的描述，正确的是", "o": {"A": "角膜内含有丰富的血管，营养主要由血管供给", "B": "角膜屈光力约为 43D，约占眼球总屈光力的 2/3", "C": "角膜中央厚度约 1mm，周边约 0.5mm", "D": "上皮细胞层约占角膜全层厚度的 90%", "E": "内皮细胞层损伤后可以再生修复"}, "a": "B", "e": "正确答案：角膜屈光力约为 43D，约占眼球总屈光力的 2/3。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "房水（aqueous humor）排出的主要途径（约 70%）是", "o": {"A": "经葡萄膜巩膜途径排出", "B": "经虹膜表面隐窝吸收", "C": "经前房角小梁网→Schlemm 管→集液管和房水静脉排出", "D": "经视网膜中央静脉回流", "E": "经涡静脉回流脉络膜"}, "a": "C", "e": "房水主要外流途径：睫状突→后房→瞳孔→前房→小梁网→Schlemm管→集液管→睫状前静脉。次要途径（10-20%）为葡萄膜巩膜途径。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "下列关于视网膜（retina）的描述，正确的是", "o": {"A": "黄斑中心凹只含视杆细胞，是视觉最敏锐处", "B": "视盘又称视乳头，是生理盲点，无感光细胞", "C": "视网膜周边部以视锥细胞为主，主管暗视觉", "D": "视锥细胞主管暗视觉、周边视野", "E": "视网膜内 5 层由脉络膜毛细血管供血"}, "a": "B", "e": "正确答案：视盘又称视乳头，是生理盲点，无感光细胞。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "下列关于眼外肌及其神经支配的叙述，正确的是", "o": {"A": "外直肌由动眼神经（Ⅲ）支配", "B": "上斜肌由滑车神经（Ⅳ）支配", "C": "4 条直肌均起自眶下壁", "D": "内直肌由展神经（Ⅵ）支配", "E": "下斜肌由滑车神经（Ⅳ）支配"}, "a": "B", "e": "正确答案：上斜肌由滑车神经（Ⅳ）支配。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "下列关于眼眶（orbit）的描述，正确的是", "o": {"A": "眶外壁最薄，最易发生爆裂性骨折", "B": "眼眶由 5 块骨组成", "C": "眶内侧壁最薄，最易发生爆裂性骨折", "D": "眶外壁主要由上颌骨构成", "E": "眶下壁最坚固，可抵御外力"}, "a": "C", "e": "正确答案：眶内侧壁最薄，最易发生爆裂性骨折。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "视神经全长可分为四段，下列哪一段最长？", "o": {"A": "眼内段（约1mm）", "B": "眶内段（约25mm）", "C": "管内段（约9mm）", "D": "颅内段（约16mm）", "E": "巩膜筛板段"}, "a": "B", "e": "视神经分四段：眼内段1mm→眶内段25mm（最长）→管内段9mm→颅内段16mm。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "当病变累及视交叉中部（交叉纤维）时，最典型的视野缺损是？", "o": {"A": "患侧单眼全盲", "B": "同侧鼻侧偏盲", "C": "双眼颞侧偏盲", "D": "双眼对侧同向性偏盲", "E": "双眼中心暗点"}, "a": "C", "e": "正确答案：双眼颞侧偏盲。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "关于相对性瞳孔传入障碍（RAPD）的检查方法及意义，下列叙述正确的是？", "o": {"A": "应在明亮光线环境下进行检查", "B": "半暗环境下手电筒快速交替照射双眼，患侧瞳孔先轻微收缩、继而散大", "C": "提示瞳孔运动（传出）通路受损", "D": "最常见于动眼神经麻痹", "E": "健侧瞳孔对光反应较患侧明显减弱"}, "a": "B", "e": "RAPD（相对性瞳孔传入障碍）：患眼传入通路受损→交替光照时患侧瞳孔先收缩继而散大。提示视神经或视网膜病变。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "患者女性，28岁，突发右眼视力急剧下降，伴眼球转动痛，色觉异常，查体RAPD阳性，视野见中心暗点。最可能的诊断是？", "o": {"A": "前部缺血性视神经病变", "B": "视神经炎", "C": "视网膜中央动脉阻塞", "D": "原发性开角型青光眼", "E": "视交叉部肿瘤"}, "a": "B", "e": "RAPD（相对性瞳孔传入障碍）：患眼传入通路受损→交替光照时患侧瞳孔先收缩继而散大。提示视神经或视网膜病变。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "视神经炎（视乳头炎）与缺血性视神经病变的鉴别，下列哪项更支持视神经炎？", "o": {"A": "好发于老年人", "B": "通常无眼球转动痛", "C": "视野多呈扇形缺损", "D": "中青年多见，常伴眼球转动痛，视野多为中心暗点", "E": "视盘水肿常伴明显出血"}, "a": "D", "e": "视神经炎（中青年、眼球转动痛、中心暗点）vs 缺血性视神经病变（老年、不痛、扇形缺损、视盘出血）。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "对于特发性（脱髓鞘性）视神经炎，下列治疗中最主要的是？", "o": {"A": "广谱抗生素治疗", "B": "糖皮质激素冲击治疗", "C": "尽早手术减压切除", "D": "单纯密切观察、不予用药", "E": "长期口服抗病毒药物"}, "a": "B", "e": "特发性（脱髓鞘性）视神经炎首选糖皮质激素冲击治疗。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "角膜的屈光力约占眼球总屈光力的多少？", "o": {"A": "约30%", "B": "约50%", "C": "约70%", "D": "约90%", "E": "约100%"}, "a": "C", "e": "角膜屈光力约43D（占总屈光力约2/3），晶状体约19D（约占1/3）。总屈光力约58-60D。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "角膜由前向后的组织学分层顺序，正确的是？", "o": {"A": "上皮层、基质层、前弹力层、后弹力层、内皮层", "B": "上皮层、前弹力层、基质层、后弹力层、内皮层", "C": "内皮层、后弹力层、基质层、前弹力层、上皮层", "D": "上皮层、前弹力层、后弹力层、基质层、内皮层", "E": "上皮层、基质层、内皮层、前弹力层、后弹力层"}, "a": "B", "e": "正确答案：上皮层、前弹力层、基质层、后弹力层、内皮层。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "关于铜绿假单胞菌（绿脓杆菌）性角膜溃疡，下列描述正确的是？", "o": {"A": "潜伏期长、病程进展缓慢", "B": "分泌物清亮无色，量极少", "C": "潜伏期短、发展迅猛，分泌物呈淡绿色，易致角膜穿孔", "D": "前房一般无积脓", "E": "属于真菌感染所致"}, "a": "C", "e": "铜绿假单胞菌性角膜炎特点：潜伏期短、发展迅猛、淡绿色分泌物、易穿孔、前房积脓。需紧急治疗。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "关于感染性角膜炎治疗中糖皮质激素的应用，下列说法正确的是？", "o": {"A": "单纯疱疹病毒性（上皮型）角膜炎应首选激素治疗", "B": "真菌性角膜炎可常规使用激素以促进溃疡愈合", "C": "病毒性角膜炎与真菌性角膜炎均应禁用糖皮质激素", "D": "糖皮质激素是细菌性角膜溃疡的一线用药", "E": "激素可安全用于所有类型的感染性角膜炎"}, "a": "C", "e": "病毒性角膜炎（上皮型HSK）和真菌性角膜炎均禁用糖皮质激素，会抑制免疫导致病情恶化穿孔。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "关于晶状体的解剖生理特点，以下描述错误的是：", "o": {"A": "晶状体由晶体囊和蛋白含量丰富的晶体纤维组成", "B": "晶状体无血管和神经，是透明的", "C": "晶状体营养主要来自房水和玻璃体", "D": "晶状体具有构成屈光系统与调节功能", "E": "晶状体富含血管，血运丰富"}, "a": "E", "e": "晶状体无血管和神经，透明，营养来自房水和玻璃体，由晶体囊+晶体纤维组成。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "白内障的定义是：", "o": {"A": "眼压升高导致视神经损害的退行性改变", "B": "晶状体透明度降低或者颜色改变所导致的光学质量下降的退行性改变", "C": "角膜混浊导致视力下降的病变", "D": "视网膜脱落引起的视力障碍", "E": "玻璃体混浊导致的视力模糊"}, "a": "B", "e": "白内障是晶状体透明度降低或颜色改变导致光学质量下降的退行性改变。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "老年性白内障（年龄相关性白内障）皮质性白内障膨胀期的特征性表现是：", "o": {"A": "楔形、车轮样混浊，周边向中心发展", "B": "晶体全混，视力严重下降", "C": "前房变浅、虹膜投影阳性", "D": "囊膜皱缩、核下沉", "E": "皮质液化外溢、晶体脱位"}, "a": "C", "e": "膨胀期：晶状体吸水膨胀→前房变浅+虹膜投影阳性，可能诱发急性闭角型青光眼。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "关于白内障的手术时机，目前普遍认为：", "o": {"A": "视力低于0.1时才可手术", "B": "必须等到成熟期才能手术", "C": "视力低于0.5，影响工作与生活者即可手术", "D": "必须等到过熟期才能手术", "E": "只有在视力完全丧失后才手术"}, "a": "C", "e": "白内障手术时机：视力低于0.5且影响工作生活即可手术，不必等到成熟期。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "超声乳化白内障吸除术的特点不包括：", "o": {"A": "时间短", "B": "切口小", "C": "表麻无痛", "D": "无需缝线", "E": "术后散光大"}, "a": "E", "e": "超声乳化白内障吸除+IOL植入术（Phaco）特点：切口小、时间短、表麻无痛、恢复快、术后散光小。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "葡萄膜炎按炎症部位分类，前葡萄膜炎主要累及：", "o": {"A": "脉络膜、视网膜", "B": "睫状体平坦部、周边视网膜", "C": "虹膜、睫状冠", "D": "所有葡萄膜组织", "E": "玻璃体基底部"}, "a": "C", "e": "正确答案：虹膜、睫状冠。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "急性虹膜睫状体炎的特征性体征是：", "o": {"A": "眼压升高", "B": "前房积血", "C": "瞳孔缩小", "D": "角膜溃疡", "E": "玻璃体出血"}, "a": "C", "e": "急性前葡萄膜炎体征：睫状充血+角膜后KP+前房闪辉（Tyndall+）+瞳孔缩小+虹膜后粘连。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "睫状充血与结膜充血鉴别时，使用0.1%肾上腺素后，正确的结果是：", "o": {"A": "睫状充血消失，结膜充血不变", "B": "两种充血均消失", "C": "睫状充血不变，结膜充血消失", "D": "两种充血均不变", "E": "两种充血程度均减轻"}, "a": "C", "e": "睫状充血vs结膜充血：滴肾上腺素后睫状充血不变，结膜充血消失。睫状充血来自睫状前动脉。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "Vogt-小柳-原田综合征（VKH）的眼底特征性改变是：", "o": {"A": "视网膜动脉变细、动静脉交叉压迹", "B": "多灶性、渗出性视网膜脱离及晚霞样眼底改变", "C": "视乳头新生血管", "D": "黄斑区星形渗出", "E": "视网膜色素上皮萎缩"}, "a": "B", "e": "VKH综合征：双眼渗出性视网膜脱离+晚霞样眼底+头痛耳鸣+皮肤白癜风/毛发变白。自身免疫性全葡萄膜炎。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "关于交感性眼炎，以下说法正确的是：", "o": {"A": "属于非肉芽肿性全葡萄膜炎", "B": "穿通伤后发生交感性眼炎，摘除诱发眼可改善交感眼的病程", "C": "诱发眼是指发生交感性眼炎的健眼", "D": "穿通伤后6周，若伤眼仍有活动性炎症且健眼出现葡萄膜炎，应高度怀疑交感性眼炎", "E": "潜伏期最危险时间为伤后1年"}, "a": "D", "e": "交感性眼炎：一眼穿通伤后对侧眼发生肉芽肿性全葡萄膜炎。潜伏期2周~2年，最危险期伤后4-6周。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "关于眼压，下列说法错误的是", "o": {"A": "眼压是眼球内容物作用于眼球壁的压力", "B": "统计学上正常眼压值为10～21 mmHg", "C": "正常人24小时内眼压波动小于8 mmHg", "D": "正常人双眼眼压差值小于5 mmHg", "E": "眼压升高一定可以诊断为青光眼"}, "a": "E", "e": "眼压升高不一定是青光眼（如高眼压症），正常眼压也不能排除青光眼（如正常眼压性青光眼）。诊断需结合视盘和视野。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "青光眼的定义中，作为各类青光眼共同特征的是", "o": {"A": "病理性眼压升高", "B": "视神经凹陷性萎缩及视野缺损", "C": "房角关闭", "D": "角膜水肿", "E": "瞳孔散大"}, "a": "B", "e": "青光眼以视神经凹陷性萎缩+视野缺损为共同特征，病理性眼压升高是主要危险因素。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "正常房水循环的途径，下列排列正确的是", "o": {"A": "睫状体→前房→瞳孔→后房→小梁网→Schlemm管→静脉系统", "B": "睫状体→后房→瞳孔→前房→小梁网→Schlemm管→静脉系统", "C": "睫状体→后房→小梁网→瞳孔→前房→Schlemm管→静脉系统", "D": "前房→后房→瞳孔→睫状体→小梁网→Schlemm管→静脉系统", "E": "睫状体→前房→小梁网→后房→瞳孔→Schlemm管→静脉系统"}, "a": "B", "e": "房水主要外流途径：睫状突→后房→瞳孔→前房→小梁网→Schlemm管→集液管→睫状前静脉。次要途径（10-20%）为葡萄膜巩膜途径。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "下列降眼压药物中，主要通过增加葡萄膜巩膜途径房水外流而降低眼压，且为原发性开角型青光眼一线用药的是", "o": {"A": "毛果芸香碱（拟胆碱能药物）", "B": "卡替洛尔（β-受体阻滞剂）", "C": "布林佐胺（碳酸酐酶抑制剂）", "D": "曲伏前列素（前列腺素衍生物）", "E": "甘露醇（高渗剂）"}, "a": "D", "e": "房水主要外流途径：睫状突→后房→瞳孔→前房→小梁网→Schlemm管→集液管→睫状前静脉。次要途径（10-20%）为葡萄膜巩膜途径。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "急性闭角型青光眼急性发作期的典型表现，下列哪项不符合", "o": {"A": "剧烈眼胀痛伴同侧头痛、恶心呕吐", "B": "眼压突然升高，常在40 mmHg以上", "C": "角膜雾状水肿、混合充血", "D": "瞳孔缩小、对光反射灵敏", "E": "前房浅，房角关闭"}, "a": "D", "e": "正确答案：瞳孔缩小、对光反射灵敏。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "视网膜感光换能功能主要由哪种细胞承担？", "o": {"A": "神经节细胞", "B": "双极细胞", "C": "视杆细胞和视锥细胞", "D": "色素上皮细胞（RPE）", "E": "Muller细胞"}, "a": "C", "e": "正确答案：视杆细胞和视锥细胞。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "视网膜中央动脉阻塞（CRAO）最具特征性的眼底表现是？", "o": {"A": "视盘充血水肿，边界模糊", "B": "视网膜静脉迂曲、扩张伴火焰状出血", "C": "视网膜苍白水肿，黄斑区樱桃红斑（cherry-red spot）", "D": "全视网膜大范围火焰状出血", "E": "视网膜前大片积血"}, "a": "C", "e": "CRAO典型表现：视网膜苍白水肿+黄斑樱桃红斑。属眼科急诊，抢救黄金窗口90-120分钟。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "以下关于视网膜中央动脉阻塞（CRAO）急诊处理措施，哪项是正确的？", "o": {"A": "升高眼内压以增加视网膜灌注压", "B": "溶栓（tPA）、降低眼内压、吸氧/高压氧、扩张血管", "C": "立即予玻璃体腔抗VEGF注射", "D": "口服糖皮质激素，静待观察即可", "E": "只需控制血压，无需其他紧急处理"}, "a": "B", "e": "CRAO典型表现：视网膜苍白水肿+黄斑樱桃红斑。属眼科急诊，抢救黄金窗口90-120分钟。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "根据流行病学数据，视网膜静脉阻塞（RVO）最常合并的全身疾病是？", "o": {"A": "肾脏疾病（约80%合并）", "B": "高血压（约80%合并）", "C": "糖尿病（约80%合并）", "D": "高脂血症（约80%合并）", "E": "自身免疫性疾病（约80%合并）"}, "a": "B", "e": "正确答案：高血压（约80%合并）。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "缺血型视网膜中央静脉阻塞（CRVO）在荧光素血管造影（FFA）中最重要的特征是？", "o": {"A": "动脉充盈时间延长，阻塞区无荧光灌注", "B": "脉络膜毛细血管大片渗漏", "C": "大片无灌注区（NP），视网膜毛细血管闭塞", "D": "黄斑区花瓣样高荧光", "E": "视乳头强荧光渗漏"}, "a": "C", "e": "CRVO典型表现：视网膜静脉迂曲扩张+广泛火焰状出血（暴风雨样）。缺血型易继发新生血管性青光眼。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "黄斑水肿（Macular Edema）在OCT上的典型表现是？", "o": {"A": "RPE层下高反射灶伴神经上皮下低反射积液", "B": "视网膜前增殖膜形成，牵拉视网膜皱褶", "C": "外丛状层和内核层出现低反射囊腔", "D": "视网膜内层弥漫性高反射水肿增厚", "E": "视网膜劈裂，形成内外两层分离"}, "a": "C", "e": "黄斑水肿OCT表现：外丛状层和内核层出现低反射囊腔（囊样水肿）。FFA呈花瓣样高荧光。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "关于年龄相关性黄斑变性（AMD）的治疗，以下叙述正确的是？", "o": {"A": "干性AMD和湿性AMD均首选激光光凝治疗", "B": "湿性AMD首选玻璃体腔抗VEGF注射，为一线治疗方案", "C": "干性AMD以脉络膜新生血管（CNV）形成为主要病理特征", "D": "湿性AMD通常进展缓慢，可观察等待", "E": "AMD的发生与遗传因素、吸烟、日光照射无关"}, "a": "B", "e": "AMD是老年人中心视力丧失主要原因。干性以玻璃膜疣/萎缩为主；湿性以CNV为特征需抗VEGF治疗。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "视网膜静脉周围炎（Eales病）的典型发病特点是？", "o": {"A": "多见于50岁以上老年女性，单眼发病，累及黄斑中心区", "B": "多为20~30岁青年男性，双眼发病，反复发生视网膜玻璃体出血", "C": "多见于儿童，单眼发病，以大量视网膜硬性渗出为主", "D": "多见于高血压患者，单眼发病，以视网膜动脉变细为主", "E": "多见于糖尿病患者，双眼发病，以视网膜新生血管为主"}, "a": "B", "e": "Eales病（视网膜静脉周围炎）：青年男性、双眼发病、反复视网膜玻璃体出血。与结核相关。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "关于孔源性视网膜脱离（RRD）的高危因素，以下哪项不属于其危险因素？", "o": {"A": "高度近视", "B": "眼外伤", "C": "无晶体眼或人工晶体眼", "D": "糖尿病视网膜病变（增殖期）", "E": "家族史"}, "a": "D", "e": "正确答案：糖尿病视网膜病变（增殖期）。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "以下关于OCTA（光学相干断层血管成像）的描述，哪项是错误的？", "o": {"A": "OCTA无需注射造影剂，为无创检查", "B": "OCTA通过信号时域变化区分血流与静态组织", "C": "OCTA可分层显示视网膜及脉络膜血管形态", "D": "OCTA可直接清晰显示血管荧光渗漏情况", "E": "OCTA能显示视网膜浅层和深层毛细血管网"}, "a": "D", "e": "OCT（光学相干断层扫描）为无创高分辨率视网膜断层成像，广泛用于黄斑疾病、青光眼评估。OCTA无需造影剂即可显示血管。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "化学性眼烧伤的现场急救，最关键、最首要的处理措施是：", "o": {"A": "立即包扎双眼后转送医院", "B": "立即用大量生理盐水或清水冲洗结膜囊至少15分钟", "C": "立即滴用抗生素眼药水预防感染", "D": "立即应用大剂量糖皮质激素", "E": "先测定结膜囊pH值，再决定是否冲洗"}, "a": "B", "e": "化学性眼烧伤急救首要步骤：立即用大量生理盐水/清水冲洗至少15-30分钟，翻转眼睑转动眼球彻底冲洗。不可等待！", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "外伤性前房积血按积血量分级，Ⅱ级前房积血是指积血量约为：", "o": {"A": "少于前房的1/3", "B": "占前房的1/3～2/3", "C": "超过前房的2/3", "D": "充满整个前房", "E": "仅见房水内浮游红细胞，无明显积血"}, "a": "B", "e": "前房积血分级：I级<1/3前房，II级1/3-2/3前房，III级>2/3前房。处理：半卧位+双眼遮盖+监测眼压。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "关于交感性眼炎，下列描述错误的是：", "o": {"A": "多发生于一眼穿通伤或内眼手术之后", "B": "表现为双眼肉芽肿性全葡萄膜炎", "C": "发生穿通伤或手术的眼称为诱发眼", "D": "潜伏期通常为受伤后2周至2年", "E": "一旦发生应首选立即摘除健眼以阻止病变进展"}, "a": "E", "e": "交感性眼炎：一眼穿通伤后对侧眼发生肉芽肿性全葡萄膜炎。潜伏期2周~2年，最危险期伤后4-6周。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "关于沙眼，下列说法正确的是：", "o": {"A": "由沙眼衣原体D～K血清型引起", "B": "病变以下睑结膜及下穹窿最为显著", "C": "角膜血管翳多位于角膜下方", "D": "WHO诊断需至少符合“上睑结膜5个以上滤泡、典型睑结膜瘢痕、角膜缘滤泡或Herbert小凹、广泛角膜血管翳”中的2条", "E": "沙眼衣原体对四环素、大环内酯类抗生素天然耐药"}, "a": "D", "e": "正确答案：WHO诊断需至少符合“上睑结膜5个以上滤泡、典型睑结膜瘢痕、角膜缘滤泡或Herbert小凹、广泛角膜血管翳”中的2条。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "关于慢性泪囊炎，下列说法正确的是：", "o": {"A": "属于急性化脓性炎症，起病急骤", "B": "常继发于鼻泪管狭窄或阻塞", "C": "因脓液不接触眼球，故为内眼手术的相对适应证", "D": "泪道冲洗时液体可顺利进入鼻咽部", "E": "内眼手术前一般无须行泪道冲洗检查"}, "a": "B", "e": "正确答案：常继发于鼻泪管狭窄或阻塞。", "author": "韦鹏昊", "group": "眼科出题第三组"}, {"q": "在眼球壁与内容的解剖结构中，关于角膜的特性，下列哪一项叙述是正确的？", "o": {"A": "角膜内含有丰富的血管网", "B": "角膜是眼球内负责感光的组织", "C": "角膜具有透明且无血管的特性", "D": "角膜呈现乳白色以阻挡强光", "E": "角膜负责分泌大量的房水"}, "a": "C", "e": "正确答案：角膜具有透明且无血管的特性。", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "关于眼球内部房水的产生部位，下列何者正确？", "o": {"A": "角膜内皮细胞", "B": "视网膜色素上皮", "C": "睫状体内的睫状肌相关组织", "D": "玻璃体", "E": "泪腺"}, "a": "C", "e": "房水由睫状突非色素上皮细胞主动分泌产生。", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "眼球内的房水循环对维持眼压非常重要，房水主要的排出结构是由什么围成的？", "o": {"A": "黄斑部", "B": "视神经盘", "C": "房角", "D": "巩膜静脉", "E": "脉络膜"}, "a": "C", "e": "房水主要外流途径：睫状突→后房→瞳孔→前房→小梁网→Schlemm管→集液管→睫状前静脉。次要途径（10-20%）为葡萄膜巩膜途径。", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "关于泪道的组成，下列哪一个构造不属于泪道系统？", "o": {"A": "泪小点", "B": "泪小管", "C": "泪囊", "D": "鼻泪管", "E": "泪腺"}, "a": "E", "e": "泪道系统：泪小点→泪小管→泪总管→泪囊→鼻泪管→下鼻道。泪腺不属于泪道系统（泪腺分泌泪液而非排出）。", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "在进行眼科视力检查时，标准视力表通常要求患者站在几米的距离外进行测量？", "o": {"A": "1米", "B": "2米", "C": "5米", "D": "10米", "E": "20米"}, "a": "C", "e": "国际及中国标准视力表（如标准对数视力表）要求被检者站在距视力表5米处进行远视力检测，此距离下平行光线入眼近似于无穷远，符合检测要求。", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "在视野检查中，若发现患者出现典型的偏盲现象，通常代表哪一部分可能出现了病变？", "o": {"A": "角膜表皮", "B": "晶状体", "C": "视神经或视交叉等视觉传导路径", "D": "泪囊", "E": "睫状肌"}, "a": "C", "e": "正确答案：视神经或视交叉等视觉传导路径。", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "进行冲洗泪道检查时，若注入的液体发生返流，这在临床上的主要意义是什么？", "o": {"A": "代表视网膜脱离", "B": "代表屈光不正", "C": "提示可能有眼表疾病或泪道阻塞", "D": "证明视力非常健康", "E": "代表发生了白内障"}, "a": "C", "e": "正确答案：提示可能有眼表疾病或泪道阻塞。", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "眼睑病中常见的睑板腺囊肿与睑板腺炎，在鉴别诊断上最明显的差异通常为何？", "o": {"A": "囊肿一定是恶性肿瘤", "B": "囊肿会剧烈疼痛，发炎则无感", "C": "睑板腺炎通常有明显的红肿热痛急性发炎症状，囊肿则偏向慢性无痛硬结", "D": "睑板腺囊肿只会发生在老年人", "E": "睑板腺炎只会引发青光眼"}, "a": "C", "e": "睑板腺囊肿（霰粒肿）是慢性非感染性肉芽肿，与急性化脓性睑腺炎不同。", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "关于眼部带状疱疹病毒感染，最典型的临床表现之一为何？", "o": {"A": "全身长满水泡", "B": "沿着三叉神经分布区域出现单侧皮疹与疼痛", "C": "视网膜瞬间剥离", "D": "瞳孔会持续放大", "E": "眼压降至零"}, "a": "B", "e": "正确答案：沿着三叉神经分布区域出现单侧皮疹与疼痛。", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "关于泪液与泪膜的功能，下列哪项描述是错误的？", "o": {"A": "泪膜可以润滑眼表", "B": "泪液具有一定的杀菌作用", "C": "泪膜破裂时间越短代表眼睛越健康", "D": "泪膜能为角膜提供营养", "E": "泪膜的不稳定会导致干眼症状"}, "a": "C", "e": "正确答案：泪膜破裂时间越短代表眼睛越健康。", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "病毒性角结膜炎发作时，常见的临床表现不包括下列何者？", "o": {"A": "眼睛红肿", "B": "异物感与流泪", "C": "水样分泌物增多", "D": "眼压急剧升高至剧痛", "E": "结膜滤泡形成"}, "a": "D", "e": "正确答案：眼压急剧升高至剧痛。", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "角膜溃疡愈合后会留下不同程度的混浊，较薄如云雾状的称为角膜云翳，那么呈现致密瓷白色混浊的称为何者？", "o": {"A": "角膜白斑", "B": "角膜斑翳", "C": "角膜新生血管", "D": "晶状体混浊", "E": "黄斑裂孔"}, "a": "A", "e": "角膜溃疡愈合后混浊按程度分级：薄雾状为云翳，较厚但仍可透过为斑翳，最严重的致密瓷白色不透明混浊称为白斑，严重影响视力。", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "在治疗角结膜炎时，关于糖皮质激素的使用，下列哪一种情况绝对不能使用激素？", "o": {"A": "过敏性结膜炎", "B": "树枝状单纯疱疹病毒性角膜炎活动期溃疡", "C": "虹膜睫状体炎", "D": "术后抗发炎", "E": "春季角结膜炎"}, "a": "B", "e": "正确答案：树枝状单纯疱疹病毒性角膜炎活动期溃疡。", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "真菌性角膜炎在临床表现上，通常会呈现出哪种典型的溃疡特征？", "o": {"A": "清澈无暇的角膜", "B": "樱桃红斑", "C": "表面粗糙、有苔藓样或牙膏样分泌物及伪足的溃疡", "D": "瞳孔严重缩小", "E": "眼白完全变黑"}, "a": "C", "e": "真菌性角膜炎特点：亚急性起病，植物外伤史，症状较体征轻，溃疡呈牙膏状灰白，禁用激素。", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "临床上区分结膜充血与睫状充血十分重要，下列何者是睫状充血的特征？", "o": {"A": "充血靠近穹窿部最明显", "B": "颜色鲜红", "C": "滴入肾上腺素后立刻完全消退", "D": "充血越靠近角膜缘越明显，多见于深层眼病如巩膜炎或葡萄膜炎", "E": "仅有眼睛痒，不会引起视力问题"}, "a": "D", "e": "正确答案：充血越靠近角膜缘越明显，多见于深层眼病如巩膜炎或葡萄膜炎。", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "关于巩膜炎的临床表现，下列哪一项是最常见的症状？", "o": {"A": "无痛性的视力下降", "B": "夜间视力变差", "C": "伴有深部剧烈的眼痛，且常在夜间加剧", "D": "大量黄色脓性分泌物", "E": "晶状体迅速变白"}, "a": "C", "e": "正确答案：伴有深部剧烈的眼痛，且常在夜间加剧。", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "当患者眼睛出现结膜充血时，最可能代表下列哪一种情况？", "o": {"A": "视网膜动脉阻塞", "B": "视神经炎", "C": "表浅的结膜发炎或受到外界刺激", "D": "晚期白内障", "E": "老花眼"}, "a": "C", "e": "正确答案：表浅的结膜发炎或受到外界刺激。", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "关于白内障典型的临床表现，下列叙述何者正确？", "o": {"A": "会伴随剧烈的眼痛", "B": "视力会突然瞬间丧失", "C": "视力会逐渐下降，且过程不会感到疼痛", "D": "眼睛外观会明显红肿", "E": "只有小孩才会得白内障"}, "a": "C", "e": "正确答案：视力会逐渐下降，且过程不会感到疼痛。", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "针对白内障最有效的治疗方式是下列哪一种？", "o": {"A": "长期点眼药水即可痊愈", "B": "佩戴老花眼镜", "C": "口服抗生素", "D": "手术治疗，如超声乳化合并人工晶状体植入", "E": "激光矫正角膜"}, "a": "D", "e": "正确答案：手术治疗，如超声乳化合并人工晶状体植入。", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "下列哪一种症状不属于白内障的临床表现？", "o": {"A": "无痛性视力下降", "B": "视物模糊", "C": "出现剧烈头痛及眼痛", "D": "强光下感觉刺眼眩光", "E": "色彩敏锐度降低"}, "a": "C", "e": "正确答案：出现剧烈头痛及眼痛。", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "急性闭角型青光眼大发作时，最典型的临床表现为何？", "o": {"A": "视力逐渐下降且完全无痛", "B": "眼压急剧升高，伴随剧烈眼痛、头痛甚至恶心呕吐", "C": "视野中央出现黑斑", "D": "角膜非常清澈透明", "E": "瞳孔极度缩小"}, "a": "B", "e": "正确答案：眼压急剧升高，伴随剧烈眼痛、头痛甚至恶心呕吐。", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "闭角型青光眼与开角型青光眼的鉴别诊断中，最根本的区别在于何处？", "o": {"A": "视网膜是否有出血", "B": "房角是否处于关闭状态", "C": "是否有白内障发生", "D": "眼压是否低于正常值", "E": "是否有玻璃体混浊"}, "a": "B", "e": "POAG诊断依据：眼压升高+青光眼性视盘改变（C/D扩大）+特征性视野缺损，房角开放。", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "在青光眼的视野改变中，晚期患者最常出现哪一种典型视野缺损？", "o": {"A": "视野完全正常", "B": "管状视野或向心性视野缩小", "C": "只有上方视野缺损", "D": "黄斑中心暗点", "E": "闪光感"}, "a": "B", "e": "正确答案：管状视野或向心性视野缩小。", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "针对闭角型青光眼的用药原则，通常会使用哪类药物来缩小瞳孔以拉开房角？", "o": {"A": "强效散瞳剂", "B": "缩瞳药（如毛果芸香碱）", "C": "肌肉松弛剂", "D": "局部麻醉剂", "E": "止咳药"}, "a": "B", "e": "正确答案：缩瞳药（如毛果芸香碱）。", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "葡萄膜炎发作时，在前房常可见到典型的发炎体征，下列何者为是？", "o": {"A": "玻璃体大量积血", "B": "房水闪辉（房闪）及角膜后沉着物（KP）", "C": "视神经萎缩", "D": "视网膜裂孔", "E": "角膜白斑"}, "a": "B", "e": "正确答案：房水闪辉（房闪）及角膜后沉着物（KP）。", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "在治疗急性前葡萄膜炎时，为了防止虹膜后粘连等并发症，治疗原则中非常重要的一步是什么？", "o": {"A": "必须绝对禁止散瞳", "B": "应该立即将眼球摘除", "C": "必须及时使用散瞳剂（散瞳）", "D": "只能使用人工泪液", "E": "立即进行白内障手术"}, "a": "C", "e": "前葡萄膜炎治疗核心：散瞳防后粘连（阿托品/托吡卡胺）+糖皮质激素抗炎+病因治疗。", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "葡萄膜炎若控制不佳，最常引起下列哪一种并发症？", "o": {"A": "视网膜母细胞瘤", "B": "老花眼加重", "C": "继发性青光眼或并发性白内障", "D": "结膜结石", "E": "泪囊炎"}, "a": "C", "e": "正确答案：继发性青光眼或并发性白内障。", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "交感性眼炎通常发生在什么样的情况之后？", "o": {"A": "长期看手机导致近视加深后", "B": "单眼受到穿透性外伤或内眼手术后，导致双眼发生肉芽肿性葡萄膜炎", "C": "患有过敏性结膜炎之后", "D": "被化学酸性物质泼洒后", "E": "患有角膜云翳后"}, "a": "B", "e": "交感性眼炎：一眼穿通伤后对侧眼发生肉芽肿性全葡萄膜炎。潜伏期2周~2年，最危险期伤后4-6周。", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "视网膜动脉阻塞是眼科的急症，其最典型的眼底体征为何？", "o": {"A": "视网膜大量出血", "B": "黄斑部呈现樱桃红斑", "C": "视盘严重水肿", "D": "出现新生血管", "E": "视网膜破了一个大洞"}, "a": "B", "e": "正确答案：黄斑部呈现樱桃红斑。", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "视网膜动脉阻塞发生时，患者的视力下降方式及疼痛感觉通常为何？", "o": {"A": "视力逐渐下降，伴随轻微疼痛", "B": "视力突然急剧下降（甚至无光感），且通常不会感觉疼痛", "C": "视力不变，但眼睛剧烈疼痛", "D": "视网膜先出现闪光，慢慢看不见，剧痛", "E": "视力时好时坏，感觉刺痛"}, "a": "B", "e": "正确答案：视力突然急剧下降（甚至无光感），且通常不会感觉疼痛。", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "糖尿病视网膜病变的发展过程中，进入增殖期最关键的标志是什么？", "o": {"A": "出现微血管瘤", "B": "出现硬性渗出物", "C": "出现新生血管", "D": "视力开始轻微模糊", "E": "结膜开始充血"}, "a": "C", "e": "PDR标志性改变：新生血管形成（视盘新生血管NVD、视网膜新生血管NVE），可致玻璃体积血和牵拉性RD。", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "视网膜脱离在解剖学上，是指哪两层结构之间发生分离？", "o": {"A": "巩膜与脉络膜分离", "B": "角膜与晶状体分离", "C": "视网膜神经上皮层与色素上皮层之间的分离", "D": "视网膜与玻璃体完全分离", "E": "虹膜与睫状体分离"}, "a": "C", "e": "正确答案：视网膜神经上皮层与色素上皮层之间的分离。", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "视网膜色素变性在早期的典型临床表现为何？", "o": {"A": "剧烈眼痛", "B": "夜盲（在暗处视力极差）", "C": "突然丧失所有视力", "D": "结膜大量出血", "E": "看到事物呈现蓝色"}, "a": "B", "e": "视网膜色素变性（RP）为遗传性光感受器变性，典型三联征：夜盲+进行性视野缩小+骨细胞样色素沉着。", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "视网膜母细胞瘤这种恶性眼内肿瘤，最常好发于哪一个年龄层？", "o": {"A": "老年人", "B": "孕妇", "C": "青壮年男性", "D": "婴幼儿及儿童", "E": "绝经期妇女"}, "a": "D", "e": "视网膜母细胞瘤（RB）是儿童最常见的眼内恶性肿瘤，典型表现：白瞳症（猫眼反射）。治疗：化疗减容+局部治疗+眼球摘除。", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "高血压病患及早产儿也会发生视网膜病变，早产儿视网膜病变的主要危险因素除了早产外，常与下列何者有关？", "o": {"A": "母亲孕期饮食太咸", "B": "出生后长时间吸入高浓度氧气", "C": "遗传了白内障基因", "D": "接触了带状疱疹病毒", "E": "缺乏维生素A"}, "a": "B", "e": "正确答案：出生后长时间吸入高浓度氧气。", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "视神经病变通常会直接影响患者的哪一部分功能？", "o": {"A": "产生大量的泪液", "B": "导致房水无法排出", "C": "引起视力下降及视野缺损", "D": "造成晶状体混浊变硬", "E": "引发角膜白斑"}, "a": "C", "e": "正确答案：引起视力下降及视野缺损。", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "关于屈光不正的原理，近视眼在调节放松的状态下，平行光线聚焦在视网膜的哪一个位置？", "o": {"A": "视网膜之后", "B": "视网膜正上方", "C": "视网膜之前", "D": "晶状体内部", "E": "角膜表面"}, "a": "C", "e": "近视眼眼轴过长或角膜曲率过大，在调节放松时平行光线进入眼内后焦点落在视网膜前方，导致视网膜上形成模糊的弥散光圈，产生远视力下降。", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "人眼的调节作用主要是通过改变哪一个构造的形状来实现的？", "o": {"A": "角膜的曲率", "B": "瞳孔的大小", "C": "晶状体的凸度", "D": "视网膜的厚度", "E": "巩膜的硬度"}, "a": "C", "e": "正确答案：晶状体的凸度。", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "老视（俗称老花眼）的发生，最主要与下列哪一种因素有关？", "o": {"A": "用眼过度导致角膜发炎", "B": "眼轴过度拉长", "C": "年龄增长导致晶状体弹性减弱及调节力下降", "D": "泪液分泌不足", "E": "房水循环障碍"}, "a": "C", "e": "正确答案：年龄增长导致晶状体弹性减弱及调节力下降。", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "在斜视的鉴别中，麻痹性斜视与共同性斜视的一个关键鉴别点是什么？", "o": {"A": "麻痹性斜视眼球各方向运动无受限，共同性则受限", "B": "麻痹性斜视伴随眼球运动受限及复视，共同性斜视通常无眼球运动受限", "C": "两者都可以通过滴眼药水立刻治愈", "D": "共同性斜视只发生在成年人", "E": "麻痹性斜视是因为角膜受损引起"}, "a": "B", "e": "共同性斜视：眼球运动正常、无复视、第一斜视角=第二斜视角。麻痹性斜视反之。", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "遇到眼部化学烧伤（如酸碱泼洒）时，急救的最首要处理原则是什么？", "o": {"A": "马上闭上眼睛休息", "B": "先寻找酸碱中和剂再处理", "C": "争分夺秒，就地用大量清水彻低冲洗眼睛", "D": "赶快点散瞳药水", "E": "用纱布紧紧包扎眼睛"}, "a": "C", "e": "化学性眼烧伤急救首要步骤：立即用大量生理盐水/清水冲洗至少15-30分钟，翻转眼睑转动眼球彻底冲洗。不可等待！", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "在眼部化学烧伤中，为什么碱烧伤通常比酸烧伤更为严重且预后较差？", "o": {"A": "因为碱性物质温度比较高", "B": "因为酸会形成凝固层阻止渗透，而碱能溶解蛋白质和脂肪，迅速向眼部深层渗透穿透", "C": "因为碱性物质比较刺眼", "D": "因为碱不会引起疼痛，导致患者忽略", "E": "因为碱烧伤只会伤害眼睑皮肤"}, "a": "B", "e": "化学性眼烧伤急救首要步骤：立即用大量生理盐水/清水冲洗至少15-30分钟，翻转眼睑转动眼球彻底冲洗。不可等待！", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "对于眼球穿孔伤或眼外伤破裂的患者，初步处理原则中应绝对避免下列哪一行为？", "o": {"A": "给患者提供心理安抚", "B": "使用护眼罩保护受伤眼", "C": "用力挤压眼球或试图将脱出的组织塞回眼内", "D": "尽快送往医院", "E": "询问受伤原因"}, "a": "C", "e": "正确答案：用力挤压眼球或试图将脱出的组织塞回眼内。", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "若患者眼睛被树枝轻微划伤角膜并感到异物感，应该怎么处理最符合原则？", "o": {"A": "揉眼睛把异物揉出来", "B": "马上用碱性肥皂水洗眼", "C": "到医院检查是否有角膜上皮损伤及预防感染，切忌自行盲目用药或揉搓", "D": "滴入大量高浓度类固醇药水", "E": "戴上隐形眼镜保护伤口"}, "a": "C", "e": "正确答案：到医院检查是否有角膜上皮损伤及预防感染，切忌自行盲目用药或揉搓。", "author": "陳揆文", "group": "眼科出题第三组"}, {"q": "眼外伤是单眼失明的：", "o": {"A": "次要原因", "B": "最主要原因", "C": "罕见原因", "D": "与失明无关"}, "a": "B", "e": "眼外伤是单眼失明最主要的原因（青壮年第一位致盲原因）。", "author": "李庚午", "group": "眼科出题第二组"}, {"q": "电光性眼炎最常见于以下哪类人群？", "o": {"A": "办公室白领", "B": "电焊工未戴防护镜作业", "C": "长期阅读者", "D": "游泳爱好者"}, "a": "B", "e": "电光性眼炎（紫外线角膜结膜炎）潜伏期4-6小时，典型症状：剧烈眼痛、畏光、流泪。常见于电焊工未戴防护镜。", "author": "李庚午", "group": "眼科出题第二组"}, {"q": "化学性眼烧伤的急救核心步骤是：", "o": {"A": "立即涂抹抗生素眼膏", "B": "立即用大量生理盐水冲洗至少15分钟", "C": "用毛巾热敷眼部", "D": "口服止痛药后就医"}, "a": "B", "e": "化学性眼烧伤急救首要步骤：立即用大量生理盐水/清水冲洗至少15-30分钟，翻转眼睑转动眼球彻底冲洗。不可等待！", "author": "李庚午", "group": "眼科出题第二组"}, {"q": "强碱烧伤比强酸烧伤更严重的原因是：", "o": {"A": "强碱温度更高", "B": "强碱与组织蛋白形成可溶性皂化物，渗透力强，易致深层组织坏死", "C": "强酸不损伤角膜", "D": "强碱仅损伤眼睑"}, "a": "B", "e": "碱烧伤比酸烧伤更严重：强碱与组织蛋白形成可溶性皂化物→渗透力强→深层组织坏死。酸使蛋白凝固形成屏障穿透力弱。", "author": "李庚午", "group": "眼科出题第二组"}, {"q": "眼球穿通伤的急救处理中，以下哪项是正确的？", "o": {"A": "用清水冲洗伤口", "B": "滴抗生素眼药水后包扎", "C": "无菌纱布遮盖，禁止冲洗滴药，避免挤压眼球", "D": "用手按压止血"}, "a": "C", "e": "眼球穿通伤急救：无菌纱布遮盖→禁止冲洗/滴药→避免挤压眼球→禁取脱出的眼内容物→尽快转诊手术。", "author": "李庚午", "group": "眼科出题第二组"}, {"q": "交感性眼炎中，一眼穿通伤后导致另一眼发生葡萄膜炎，伤眼称为：", "o": {"A": "交感眼", "B": "诱发眼", "C": "继发眼", "D": "原发眼"}, "a": "B", "e": "交感性眼炎：一眼穿通伤后对侧眼发生肉芽肿性全葡萄膜炎。潜伏期2周~2年，最危险期伤后4-6周。", "author": "李庚午", "group": "眼科出题第二组"}, {"q": "交感性眼炎的潜伏期一般为：", "o": {"A": "1~3天", "B": "1周左右", "C": "2周~2年", "D": "5年以上"}, "a": "C", "e": "交感性眼炎：一眼穿通伤后对侧眼发生肉芽肿性全葡萄膜炎。潜伏期2周~2年，最危险期伤后4-6周。", "author": "李庚午", "group": "眼科出题第二组"}, {"q": "前房积血I级是指积血占前房的：", "o": {"A": "全部", "B": "大于2/3", "C": "1/3~2/3", "D": "小于1/3"}, "a": "D", "e": "前房积血分级：I级<1/3前房，II级1/3-2/3前房，III级>2/3前房。处理：半卧位+双眼遮盖+监测眼压。", "author": "李庚午", "group": "眼科出题第二组"}, {"q": "电光性眼炎的潜伏期通常为：", "o": {"A": "即刻出现症状", "B": "1~2小时", "C": "4~6小时", "D": "24~48小时"}, "a": "C", "e": "电光性眼炎（紫外线角膜结膜炎）潜伏期4-6小时，典型症状：剧烈眼痛、畏光、流泪。常见于电焊工未戴防护镜。", "author": "李庚午", "group": "眼科出题第二组"}, {"q": "角膜的屈光力占眼球总屈光力的：", "o": {"A": "约30%", "B": "约50%", "C": "约70%", "D": "约90%"}, "a": "C", "e": "角膜屈光力约43D（占总屈光力约2/3），晶状体约19D（约占1/3）。总屈光力约58-60D。", "author": "李庚午", "group": "眼科出题第二组"}, {"q": "角膜炎炎症进展四阶段的正确顺序是：", "o": {"A": "溃疡形成期、浸润期、愈合期、并发症期", "B": "浸润期、溃疡形成期、愈合期、并发症期", "C": "愈合期、浸润期、溃疡形成期、并发症期", "D": "并发症期、溃疡形成期、浸润期、愈合期"}, "a": "B", "e": "正确答案：浸润期、溃疡形成期、愈合期、并发症期。", "author": "李庚午", "group": "眼科出题第二组"}, {"q": "单纯疱疹病毒性角膜炎的典型角膜病变形态是：", "o": {"A": "环形溃疡", "B": "树枝状或地图状溃疡", "C": "圆形穿孔", "D": "弥漫性出血"}, "a": "B", "e": "HSK（单纯疱疹病毒性角膜炎）特征：反复发作、感冒/劳累诱因、角膜知觉减退、树枝/地图状溃疡。上皮型禁用激素。", "author": "李庚午", "group": "眼科出题第二组"}, {"q": "真菌性角膜炎确诊的金标准是：", "o": {"A": "视力检查", "B": "裂隙灯观察", "C": "角膜刮片镜检找到真菌菌丝", "D": "眼压测量"}, "a": "C", "e": "真菌性角膜炎特点：亚急性起病，植物外伤史，症状较体征轻，溃疡呈牙膏状灰白，禁用激素。", "author": "李庚午", "group": "眼科出题第二组"}, {"q": "以下哪项不是细菌性角膜炎的常见致病菌？", "o": {"A": "金黄色葡萄球菌", "B": "铜绿假单胞菌", "C": "腺病毒", "D": "肺炎链球菌"}, "a": "C", "e": "细菌性角膜炎由细菌感染引起，金黄色葡萄球菌、铜绿假单胞菌、肺炎链球菌均为常见致病菌。腺病毒属于病毒，是病毒性角结膜炎的病原体，不属于细菌。", "author": "李庚午", "group": "眼科出题第二组"}, {"q": "绿脓杆菌（铜绿假单胞菌）性角膜溃疡的典型特征是：", "o": {"A": "发展缓慢、白色分泌物", "B": "潜伏期短、发展迅猛、淡绿色分泌物", "C": "仅有畏光、无分泌物", "D": "不伴前房积脓"}, "a": "B", "e": "铜绿假单胞菌性角膜炎特点：潜伏期短、发展迅猛、淡绿色分泌物、易穿孔、前房积脓。需紧急治疗。", "author": "李庚午", "group": "眼科出题第二组"}, {"q": "麦粒肿（睑腺炎）与霰粒肿（睑板腺囊肿）的核心鉴别点是：", "o": {"A": "发病年龄不同", "B": "麦粒肿有红肿热痛等急性炎症表现，霰粒肿为无痛性硬结", "C": "发病部位不同", "D": "两者临床表现完全一样"}, "a": "B", "e": "睑腺炎（麦粒肿）是眼睑腺体急性化脓性炎症，最常见致病菌为金黄色葡萄球菌。", "author": "李庚午", "group": "眼科出题第二组"}, {"q": "急性细菌性结膜炎的典型分泌物特点为：", "o": {"A": "浆液性水样分泌物", "B": "黏丝状分泌物", "C": "黄色脓性分泌物，晨起眼睑粘连", "D": "无分泌物"}, "a": "C", "e": "正确答案：黄色脓性分泌物，晨起眼睑粘连。", "author": "李庚午", "group": "眼科出题第二组"}, {"q": "病毒性结膜炎常伴有以下哪个体征？", "o": {"A": "眼压升高", "B": "耳前淋巴结肿大", "C": "瞳孔散大", "D": "晶状体混浊"}, "a": "B", "e": "正确答案：耳前淋巴结肿大。", "author": "李庚午", "group": "眼科出题第二组"}, {"q": "过敏性结膜炎最常见、最突出的症状是：", "o": {"A": "剧烈眼痛", "B": "眼痒", "C": "视力突然丧失", "D": "眼球突出"}, "a": "B", "e": "过敏性结膜炎由IgE介导的超敏反应引起，肥大细胞脱颗粒释放组胺，作用于结膜感觉神经末梢，导致眼痒，这是最典型、最突出的症状。", "author": "李庚午", "group": "眼科出题第二组"}, {"q": "泪道冲洗检查中，从下泪点冲洗、液体从上泪点返流（下冲上返），提示：", "o": {"A": "泪道通畅", "B": "泪总管阻塞", "C": "角膜损伤", "D": "前房积血"}, "a": "B", "e": "泪道冲洗：原路返流→泪小管阻塞；下冲上返→泪总管阻塞；返流+脓→慢性泪囊炎（鼻泪管阻塞）。", "author": "李庚午", "group": "眼科出题第二组"}, {"q": "慢性泪囊炎是什么手术的绝对禁忌症？", "o": {"A": "眼睑成形术", "B": "内眼手术", "C": "角膜移植术", "D": "斜视矫正术"}, "a": "B", "e": "慢性泪囊炎导致大量脓性分泌物积聚，若行内眼手术（如白内障、青光眼手术），细菌可经手术切口进入眼内，引发眼内炎等严重并发症，故为绝对禁忌。", "author": "李庚午", "group": "眼科出题第二组"}, {"q": "以下哪项不是干眼症的常用诊断检查方法？", "o": {"A": "泪液分泌试验（Schirmer试验）", "B": "泪膜破裂时间（BUT）", "C": "角膜荧光素染色", "D": "眼压描记"}, "a": "D", "e": "干眼常用检查：泪膜破裂时间BUT（<10s异常）、Schirmer试验（<10mm/5min异常）、角膜荧光素染色。", "author": "李庚午", "group": "眼科出题第二组"}, {"q": "泪膜由外到内的三层结构依次为：", "o": {"A": "水样层、脂质层、粘蛋白层", "B": "脂质层、水样层、粘蛋白层", "C": "粘蛋白层、脂质层、水样层", "D": "脂质层、粘蛋白层、水样层"}, "a": "B", "e": "正确答案：脂质层、水样层、粘蛋白层。", "author": "李庚午", "group": "眼科出题第二组"}, {"q": "眼科病历主诉的正确书写方式是：", "o": {"A": "右眼看不见", "B": "眼睛不舒服好几天了", "C": "右眼红痛伴视力下降3天", "D": "眼睛有问题来就诊"}, "a": "C", "e": "眼科门诊病历核心内容记录顺序：主诉（就诊原因+眼别+症状+持续时间）→现病史→既往史→检查→诊断。", "author": "李庚午", "group": "眼科出题第二组"}, {"q": "左氧氟沙星属于哪一类抗生素？", "o": {"A": "氨基糖苷类", "B": "大环内酯类", "C": "喹诺酮类", "D": "青霉素类"}, "a": "C", "e": "左氧氟沙星为氟喹诺酮类广谱抗生素，抗菌谱覆盖大多数革兰阳性和阴性菌，是眼科常用的局部抗菌药物。", "author": "李庚午", "group": "眼科出题第二组"}, {"q": "阿托品眼用凝胶的主要作用是：", "o": {"A": "降低眼压", "B": "散瞳及调节功能麻痹", "C": "抗感染", "D": "润滑眼球"}, "a": "B", "e": "正确答案：散瞳及调节功能麻痹。", "author": "李庚午", "group": "眼科出题第二组"}, {"q": "开封后的滴眼液一般使用不超过：", "o": {"A": "1周", "B": "2周", "C": "4周", "D": "3个月"}, "a": "C", "e": "多剂量滴眼液开封后，防腐剂效力有限，反复接触可能造成污染。药典及临床规范规定开封后的滴眼液使用不超过4周（28天），以防感染。", "author": "李庚午", "group": "眼科出题第二组"}, {"q": "眼科检查中，荧光素染色主要用于检查：", "o": {"A": "眼压高低", "B": "角膜上皮缺损", "C": "晶状体混浊程度", "D": "视网膜血管形态"}, "a": "B", "e": "正确答案：角膜上皮缺损。", "author": "李庚午", "group": "眼科出题第二组"}, {"q": "以下哪项不是沙眼的典型体征？", "o": {"A": "上睑结膜乳头滤泡增生", "B": "角膜血管翳", "C": "前房积血", "D": "睑结膜瘢痕形成"}, "a": "C", "e": "沙眼由沙眼衣原体感染引起，典型体征为上睑结膜乳头滤泡增生、角膜血管翳及睑结膜瘢痕形成。前房积血属于外伤或其他眼病表现，与沙眼无关。", "author": "李庚午", "group": "眼科出题第二组"}, {"q": "国际标准视力表检查远视力时，被检者与视力表的距离应为", "o": {"A": "3米", "B": "5米", "C": "6米", "D": "10米"}, "a": "B", "e": "国际标准视力表（标准对数视力表）规定检查远视力时，被检者与视力表距离为5米，此距离下入眼光线近似平行，符合远视力测量的光学条件。", "author": "斋藤真梨惠", "group": "眼科出题第二组"}, {"q": "直接检眼镜检查眼底时，正确的操作顺序是", "o": {"A": "先查黄斑，再查视盘，最后查周边部", "B": "先查视盘，再查黄斑，最后查周边部", "C": "先查周边部，再查视盘，最后查黄斑", "D": "先查黄斑，再查周边部，最后查视盘"}, "a": "B", "e": "直接检眼镜检查顺序：先查视盘→再沿血管各象限→最后查黄斑。所见为正像，放大15倍。", "author": "斋藤真梨惠", "group": "眼科出题第二组"}, {"q": "裂隙灯显微镜检查最常用的照明方法是", "o": {"A": "弥散照明法", "B": "直接焦点照明法", "C": "后部反光照明法", "D": "镜面反光照明法"}, "a": "B", "e": "裂隙灯常用照明法：直接焦点（最常用）、间接（观察KP/内皮）、后部反光（透明体细微病变）、镜面反射（内皮细胞）、弥散（全貌）。", "author": "斋藤真梨惠", "group": "眼科出题第二组"}, {"q": "眼科门诊病历中，必须首先记录的核心内容是", "o": {"A": "既往史", "B": "主诉", "C": "现病史", "D": "体格检查"}, "a": "B", "e": "眼科门诊病历核心内容记录顺序：主诉（就诊原因+眼别+症状+持续时间）→现病史→既往史→检查→诊断。", "author": "斋藤真梨惠", "group": "眼科出题第二组"}, {"q": "眼科局部用药中，生物利用度最高的给药途径是", "o": {"A": "滴眼液点眼", "B": "眼膏涂眼", "C": "结膜下注射", "D": "球后注射"}, "a": "C", "e": "结膜下注射将药物直接注射于球结膜下疏松组织，可绕过角膜上皮屏障，药物浓度高、吸收快，生物利用度显著高于点眼液或眼膏等表面给药方式。", "author": "斋藤真梨惠", "group": "眼科出题第二组"}, {"q": "下列哪种药物属于眼科常用的散瞳药", "o": {"A": "毛果芸香碱", "B": "噻吗洛尔", "C": "托吡卡胺", "D": "布林佐胺"}, "a": "C", "e": "托吡卡胺是抗胆碱能药物，通过阻断M受体使瞳孔括约肌松弛，产生散瞳和调节麻痹作用，是眼科最常用的短效散瞳药。毛果芸香碱为缩瞳药，噻吗洛尔和布林佐胺为降眼压药。", "author": "斋藤真梨惠", "group": "眼科出题第二组"}, {"q": "睑腺炎（麦粒肿）最常见的致病菌是", "o": {"A": "大肠杆菌", "B": "金黄色葡萄球菌", "C": "肺炎链球菌", "D": "铜绿假单胞菌"}, "a": "B", "e": "睑腺炎（麦粒肿）是眼睑腺体急性化脓性炎症，最常见致病菌为金黄色葡萄球菌。", "author": "斋藤真梨惠", "group": "眼科出题第二组"}, {"q": "下列关于睑板腺囊肿（霰粒肿）的描述，正确的是", "o": {"A": "急性化脓性炎症", "B": "有明显的红肿热痛", "C": "睑板腺出口阻塞导致的慢性肉芽肿性炎症", "D": "必须手术治疗"}, "a": "C", "e": "霰粒肿（睑板腺囊肿）是睑板腺出口阻塞导致的慢性肉芽肿性炎症，无急性红/热/痛。", "author": "斋藤真梨惠", "group": "眼科出题第二组"}, {"q": "诊断干眼症最常用的两项检查是", "o": {"A": "泪液分泌试验和泪膜破裂时间", "B": "角膜荧光染色和泪道冲洗", "C": "眼压测量和视野检查", "D": "角膜地形图和验光"}, "a": "A", "e": "干眼常用检查：泪膜破裂时间BUT（<10s异常）、Schirmer试验（<10mm/5min异常）、角膜荧光素染色。", "author": "斋藤真梨惠", "group": "眼科出题第二组"}, {"q": "维持角膜透明性最重要的结构是", "o": {"A": "角膜上皮层", "B": "角膜前弹力层", "C": "角膜基质层", "D": "角膜内皮层"}, "a": "D", "e": "角膜透明性依赖上皮完整、基质胶原规则排列、无血管、内皮泵功能。内皮细胞层是维持透明的关键。", "author": "斋藤真梨惠", "group": "眼科出题第二组"}, {"q": "棘阿米巴角膜炎最常见的诱因是", "o": {"A": "植物性角膜外伤", "B": "长期佩戴隐形眼镜", "C": "感冒后免疫力下降", "D": "长期使用糖皮质激素"}, "a": "B", "e": "棘阿米巴角膜炎最常见诱因：长期佩戴隐形眼镜（尤其用自来水清洗镜片），特征为环形浸润、剧烈疼痛。", "author": "斋藤真梨惠", "group": "眼科出题第二组"}, {"q": "圆锥角膜最典型的角膜地形图表现是", "o": {"A": "对称的蝴蝶结形", "B": "不对称的蝴蝶结形", "C": "下方角膜明显变陡，呈\"水滴状\"", "D": "角膜曲率普遍降低"}, "a": "C", "e": "圆锥角膜特征：角膜中央变薄呈锥状前突→高度近视+不规则散光。常染色体隐性遗传。角膜地形图可见下方变陡。", "author": "斋藤真梨惠", "group": "眼科出题第二组"}, {"q": "急性前葡萄膜炎（虹睫炎）最典型的体征是", "o": {"A": "瞳孔散大", "B": "角膜后沉着物（KP）", "C": "前房积脓", "D": "眼压升高"}, "a": "B", "e": "急性前葡萄膜炎体征：睫状充血+角膜后KP+前房闪辉（Tyndall+）+瞳孔缩小+虹膜后粘连。", "author": "斋藤真梨惠", "group": "眼科出题第二组"}, {"q": "年龄相关性白内障最常见的类型是", "o": {"A": "皮质性白内障", "B": "核性白内障", "C": "后囊下性白内障", "D": "并发性白内障"}, "a": "A", "e": "年龄相关性白内障分三型：皮质性（最常见）、核性、后囊下性。", "author": "斋藤真梨惠", "group": "眼科出题第二组"}, {"q": "急性前葡萄膜炎的治疗中，散瞳的主要目的是", "o": {"A": "提高视力", "B": "缓解疼痛", "C": "防止虹膜后粘连", "D": "降低眼压"}, "a": "C", "e": "前葡萄膜炎治疗核心：散瞳防后粘连（阿托品/托吡卡胺）+糖皮质激素抗炎+病因治疗。", "author": "斋藤真梨惠", "group": "眼科出题第二组"}, {"q": "原发性开角型青光眼最主要的诊断依据是", "o": {"A": "眼压升高", "B": "视野缺损", "C": "视盘凹陷扩大", "D": "房角开放"}, "a": "C", "e": "POAG诊断依据：眼压升高+青光眼性视盘改变（C/D扩大）+特征性视野缺损，房角开放。", "author": "斋藤真梨惠", "group": "眼科出题第二组"}, {"q": "急性闭角型青光眼急性发作期的典型临床表现不包括", "o": {"A": "剧烈眼痛、头痛", "B": "恶心、呕吐", "C": "瞳孔缩小", "D": "角膜雾状水肿"}, "a": "C", "e": "急性闭角型青光眼发作时眼压急剧升高，瞳孔括约肌缺血麻痹，表现为瞳孔中度散大、固定，而非缩小。典型症状包括剧烈眼痛头痛、恶心呕吐、角膜雾状水肿。", "author": "斋藤真梨惠", "group": "眼科出题第二组"}, {"q": "下列哪种药物通过减少房水生成降低眼压", "o": {"A": "毛果芸香碱", "B": "噻吗洛尔", "C": "拉坦前列素", "D": "甘露醇"}, "a": "B", "e": "房水由睫状突非色素上皮细胞主动分泌产生。", "author": "斋藤真梨惠", "group": "眼科出题第二组"}, {"q": "近视的屈光特点是", "o": {"A": "平行光线聚焦在视网膜之前", "B": "平行光线聚焦在视网膜之后", "C": "平行光线不能聚焦成一个焦点", "D": "调节静止时平行光线聚焦在视网膜上"}, "a": "A", "e": "近视眼：调节静止时平行光线聚焦于视网膜之前，需凹透镜矫正。主要原因为眼轴过长或屈光力过强。", "author": "斋藤真梨惠", "group": "眼科出题第二组"}, {"q": "调节性内斜视最常见的病因是", "o": {"A": "高度远视", "B": "高度近视", "C": "散光", "D": "不同视"}, "a": "A", "e": "调节性内斜视最常见病因为高度远视——过度调节引起过度集合，导致内斜。", "author": "斋藤真梨惠", "group": "眼科出题第二组"}, {"q": "弱视治疗的最佳年龄是", "o": {"A": "3岁以前", "B": "3-6岁", "C": "6-12岁", "D": "12岁以后"}, "a": "B", "e": "弱视治疗最佳年龄为3-6岁（视觉发育关键期）。超过12岁治疗效果极差。早发现早治疗是关键。", "author": "斋藤真梨惠", "group": "眼科出题第二组"}, {"q": "视神经炎最典型的视野改变是", "o": {"A": "中心暗点", "B": "周边视野缩小", "C": "偏盲", "D": "生理盲点扩大"}, "a": "A", "e": "视神经炎典型表现：中青年突发视力下降+眼球转动痛+RAPD+中心暗点。", "author": "斋藤真梨惠", "group": "眼科出题第二组"}, {"q": "糖尿病视网膜病变增殖期的标志性改变是", "o": {"A": "微血管瘤", "B": "硬性渗出", "C": "棉絮斑", "D": "新生血管形成"}, "a": "D", "e": "PDR标志性改变：新生血管形成（视盘新生血管NVD、视网膜新生血管NVE），可致玻璃体积血和牵拉性RD。", "author": "斋藤真梨惠", "group": "眼科出题第二组"}, {"q": "高血压性视网膜病变Ⅳ级的典型表现是", "o": {"A": "视网膜动脉痉挛", "B": "视网膜动脉狭窄、动静脉交叉压迹", "C": "视网膜出血、渗出", "D": "视盘水肿"}, "a": "D", "e": "高血压性视网膜病变按Keith-Wagener分级：I级动脉痉挛，II级动脉狭窄及动静脉交叉征，III级出血渗出，IV级在III级基础上出现视盘水肿，是最严重的分级。", "author": "斋藤真梨惠", "group": "眼科出题第二组"}, {"q": "眼球穿通伤最严重的并发症是", "o": {"A": "前房出血", "B": "眼内炎", "C": "交感性眼炎", "D": "外伤性白内障"}, "a": "C", "e": "眼球穿通伤急救：无菌纱布遮盖→禁止冲洗/滴药→避免挤压眼球→禁取脱出的眼内容物→尽快转诊手术。", "author": "斋藤真梨惠", "group": "眼科出题第二组"}, {"q": "电光性眼炎的潜伏期一般为", "o": {"A": "1-2小时", "B": "3-8小时", "C": "12-24小时", "D": "24-48小时"}, "a": "B", "e": "电光性眼炎（紫外线角膜结膜炎）潜伏期4-6小时，典型症状：剧烈眼痛、畏光、流泪。常见于电焊工未戴防护镜。", "author": "斋藤真梨惠", "group": "眼科出题第二组"}, {"q": "眼部酸性化学伤的特点是", "o": {"A": "皂化反应，损伤向深部渗透", "B": "蛋白质凝固，损伤较局限", "C": "预后比碱性化学伤差", "D": "必须用碱性液体中和"}, "a": "B", "e": "正确答案：蛋白质凝固，损伤较局限。", "author": "斋藤真梨惠", "group": "眼科出题第二组"}, {"q": "下列哪项不是睑腺炎（麦粒肿）的典型表现？", "o": {"A": "眼睑局部红肿", "B": "疼痛明显", "C": "无痛性硬结", "D": "可形成脓点"}, "a": "C", "e": "睑腺炎（麦粒肿）是眼睑腺体急性化脓性炎症，最常见致病菌为金黄色葡萄球菌。", "author": "崔旭", "group": "眼科出题第三组"}, {"q": "睑板腺囊肿（霰粒肿）与睑腺炎的主要鉴别点是：", "o": {"A": "是否有红肿热痛", "B": "是否影响视力", "C": "是否发生在眼睑缘", "D": "是否需手术治疗"}, "a": "A", "e": "睑腺炎（麦粒肿）是眼睑腺体急性化脓性炎症，最常见致病菌为金黄色葡萄球菌。", "author": "崔旭", "group": "眼科出题第三组"}, {"q": "泪道冲洗时，若冲洗液自下泪点注入后从上泪点返流，提示：", "o": {"A": "泪道通畅", "B": "泪总管阻塞", "C": "鼻泪管狭窄", "D": "泪小管阻塞"}, "a": "D", "e": "泪道冲洗：原路返流→泪小管阻塞；下冲上返→泪总管阻塞；返流+脓→慢性泪囊炎（鼻泪管阻塞）。", "author": "崔旭", "group": "眼科出题第三组"}, {"q": "急性细菌性结膜炎的典型分泌物为：", "o": {"A": "水样分泌物", "B": "黏丝状分泌物", "C": "脓性分泌物", "D": "浆液性分泌物"}, "a": "C", "e": "细菌感染引发大量中性粒细胞浸润和组织坏死，产生典型的脓性分泌物（黄白色黏稠）。水样分泌物见于病毒性结膜炎，黏丝状见于过敏性结膜炎。", "author": "崔旭", "group": "眼科出题第三组"}, {"q": "干眼症的常见检查方法不包括：", "o": {"A": "泪液分泌试验（Schirmer试验）", "B": "泪膜破裂时间（BUT）", "C": "角膜荧光素染色", "D": "眼压测量"}, "a": "D", "e": "干眼常用检查：泪膜破裂时间BUT（<10s异常）、Schirmer试验（<10mm/5min异常）、角膜荧光素染色。", "author": "崔旭", "group": "眼科出题第三组"}, {"q": "裂隙灯检查中，用于观察角膜上皮缺损的染色方法是：", "o": {"A": "碘染色", "B": "荧光素染色", "C": "吉姆萨染色", "D": "龙胆紫染色"}, "a": "B", "e": "荧光素钠染料可渗入角膜上皮缺损区域，在裂隙灯蓝光照射下呈明亮绿色荧光，是检查角膜上皮缺损、溃疡及干眼的标准染色方法。", "author": "崔旭", "group": "眼科出题第三组"}, {"q": "下列哪项不是视力检查的内容？", "o": {"A": "远视力", "B": "近视力", "C": "眼压", "D": "光感"}, "a": "C", "e": "视力检查包括远视力、近视力、光感等视功能项目，眼压检查属于眼压计测量范畴，不属于视力检查内容。", "author": "崔旭", "group": "眼科出题第三组"}, {"q": "正常成年人眼压范围约为：", "o": {"A": "5-10 mmHg", "B": "10-21 mmHg", "C": "22-30 mmHg", "D": "30-40 mmHg"}, "a": "B", "e": "正常眼压统计学范围10~21mmHg，24h波动<8mmHg，双眼差值<5mmHg。", "author": "崔旭", "group": "眼科出题第三组"}, {"q": "远视眼的矫正镜片是：", "o": {"A": "凹透镜", "B": "凸透镜", "C": "柱面镜", "D": "棱镜"}, "a": "B", "e": "远视眼平行光线聚焦于视网膜后方，需凸透镜（正镜）使光线提前汇聚，将焦点前移至视网膜上以矫正视力。", "author": "崔旭", "group": "眼科出题第三组"}, {"q": "散光的主要临床表现是：", "o": {"A": "远近视力均差", "B": "夜盲", "C": "色盲", "D": "视野缩小"}, "a": "A", "e": "正确答案：远近视力均差。", "author": "崔旭", "group": "眼科出题第三组"}, {"q": "老视的主要原因是：", "o": {"A": "角膜曲率改变", "B": "晶状体硬化与睫状肌力减弱", "C": "眼轴变长", "D": "视网膜脱离"}, "a": "B", "e": "正确答案：晶状体硬化与睫状肌力减弱。", "author": "崔旭", "group": "眼科出题第三组"}, {"q": "弱视的治疗关键是：", "o": {"A": "手术矫正", "B": "早期发现与治疗", "C": "药物治疗", "D": "配戴角膜接触镜"}, "a": "B", "e": "弱视治疗最佳年龄为3-6岁（视觉发育关键期）。超过12岁治疗效果极差。早发现早治疗是关键。", "author": "崔旭", "group": "眼科出题第三组"}, {"q": "共同性斜视与麻痹性斜视的主要鉴别点是：", "o": {"A": "是否伴有复视", "B": "眼球运动是否受限", "C": "是否需手术", "D": "是否影响视力"}, "a": "B", "e": "共同性斜视：眼球运动正常、无复视、第一斜视角=第二斜视角。麻痹性斜视反之。", "author": "崔旭", "group": "眼科出题第三组"}, {"q": "真菌性角膜炎的典型体征是：", "o": {"A": "树枝状浸润", "B": "卫星灶与菌丝苔被", "C": "角膜内皮斑", "D": "角膜基质盘状水肿"}, "a": "B", "e": "真菌性角膜炎特点：亚急性起病，植物外伤史，症状较体征轻，溃疡呈牙膏状灰白，禁用激素。", "author": "崔旭", "group": "眼科出题第三组"}, {"q": "单纯疱疹病毒性角膜炎最常见的类型是：", "o": {"A": "上皮型", "B": "基质型", "C": "内皮型", "D": "神经营养型"}, "a": "A", "e": "HSK（单纯疱疹病毒性角膜炎）特征：反复发作、感冒/劳累诱因、角膜知觉减退、树枝/地图状溃疡。上皮型禁用激素。", "author": "崔旭", "group": "眼科出题第三组"}, {"q": "角膜的屈光力约占眼球总屈光力的：", "o": {"A": "30%", "B": "50%", "C": "70%", "D": "90%"}, "a": "C", "e": "角膜屈光力约43D，晶状体约19D，眼球总屈光力约60D，角膜约占总屈光力的70%，是眼球最主要的屈光介质。", "author": "崔旭", "group": "眼科出题第三组"}, {"q": "下列哪项不是眼科门诊病历的主诉写法？", "o": {"A": "右眼红痛伴视力下降3天", "B": "双眼干涩1年", "C": "眼压升高", "D": "左眼异物感伴流泪2周"}, "a": "C", "e": "眼科门诊病历核心内容记录顺序：主诉（就诊原因+眼别+症状+持续时间）→现病史→既往史→检查→诊断。", "author": "崔旭", "group": "眼科出题第三组"}, {"q": "眼科局部用药的优势是：", "o": {"A": "作用全身", "B": "减少副作用", "C": "需口服给药", "D": "起效慢"}, "a": "B", "e": "眼科局部用药直接作用于眼部靶组织，全身吸收量少，可显著减少全身性副作用，是其主要优势。", "author": "崔旭", "group": "眼科出题第三组"}, {"q": "妥布霉素滴眼液主要用于治疗：", "o": {"A": "病毒感染", "B": "真菌感染", "C": "细菌感染", "D": "过敏反应"}, "a": "C", "e": "妥布霉素属氨基糖苷类抗生素，对革兰阴性菌及多种革兰阳性菌有效，主要用于细菌性眼部感染的治疗。", "author": "崔旭", "group": "眼科出题第三组"}, {"q": "下列哪种药物不属于抗病毒滴眼液？", "o": {"A": "阿昔洛韦", "B": "更昔洛韦", "C": "氟康唑", "D": "干扰素"}, "a": "C", "e": "阿昔洛韦、更昔洛韦、干扰素均为抗病毒药物，氟康唑属于抗真菌药，用于真菌感染，不属于抗病毒类滴眼液。", "author": "崔旭", "group": "眼科出题第三组"}, {"q": "使用糖皮质激素类滴眼液需警惕：", "o": {"A": "眼压升高", "B": "视力下降", "C": "眼睑下垂", "D": "结膜充血"}, "a": "A", "e": "长期使用糖皮质激素滴眼液可引起激素性青光眼，导致眼压升高，严重时损害视神经，是最需警惕的并发症。", "author": "崔旭", "group": "眼科出题第三组"}, {"q": "散瞳药阿托品禁用于：", "o": {"A": "儿童", "B": "青光眼患者", "C": "老年人", "D": "近视患者"}, "a": "B", "e": "1%阿托品眼膏为强效长效散瞳睫状肌麻痹剂，用于儿童慢散验光（尤其内斜视者）。点眼后须压迫内眦防全身吸收。", "author": "崔旭", "group": "眼科出题第三组"}, {"q": "下列哪项不是抗青光眼药物？", "o": {"A": "毛果芸香碱", "B": "噻吗洛尔", "C": "拉坦前列素", "D": "阿昔洛韦"}, "a": "D", "e": "毛果芸香碱、噻吗洛尔、拉坦前列素均为降眼压抗青光眼药物，阿昔洛韦是抗病毒药，不具有降眼压作用。", "author": "崔旭", "group": "眼科出题第三组"}, {"q": "人工泪液的主要作用是：", "o": {"A": "抗感染", "B": "润滑眼表", "C": "降低眼压", "D": "抗过敏"}, "a": "B", "e": "人工泪液模拟天然泪液成分，主要通过润滑眼表、补充泪液来缓解干眼症状，不具有抗感染或降眼压作用。", "author": "崔旭", "group": "眼科出题第三组"}, {"q": "角膜异物剔除时，首选的麻醉方式是：", "o": {"A": "全身麻醉", "B": "局部浸润麻醉", "C": "表面麻醉", "D": "神经阻滞麻醉"}, "a": "C", "e": "角膜异物剔除时，只需表面麻醉药（如丙美卡因）滴眼即可充分麻醉角膜，操作简便安全，无需全身麻醉或注射麻醉。", "author": "崔旭", "group": "眼科出题第三组"}, {"q": "眼球穿通伤的急救处理错误的是：", "o": {"A": "无菌纱布遮盖", "B": "冲洗眼内组织", "C": "避免挤压眼球", "D": "转诊专科"}, "a": "B", "e": "眼球穿通伤急救：无菌纱布遮盖→禁止冲洗/滴药→避免挤压眼球→禁取脱出的眼内容物→尽快转诊手术。", "author": "崔旭", "group": "眼科出题第三组"}, {"q": "强碱眼烧伤的损伤特点是：", "o": {"A": "形成蛋白质屏障", "B": "渗透力强，易致深层损伤", "C": "愈合后不留瘢痕", "D": "不影响视力"}, "a": "B", "e": "正确答案：渗透力强，易致深层损伤。", "author": "崔旭", "group": "眼科出题第三组"}, {"q": "电光性眼炎的常见原因是：", "o": {"A": "紫外线照射", "B": "红外线照射", "C": "酸碱溅入", "D": "铁屑入眼"}, "a": "A", "e": "电光性眼炎（紫外线角膜结膜炎）潜伏期4-6小时，典型症状：剧烈眼痛、畏光、流泪。常见于电焊工未戴防护镜。", "author": "崔旭", "group": "眼科出题第三组"}, {"q": "交感性眼炎的定义是：", "o": {"A": "一眼外伤后对侧眼发生葡萄膜炎", "B": "双眼同时发生角膜炎", "C": "外伤后眼压升高", "D": "外伤后白内障"}, "a": "A", "e": "交感性眼炎：一眼穿通伤后对侧眼发生肉芽肿性全葡萄膜炎。潜伏期2周~2年，最危险期伤后4-6周。", "author": "崔旭", "group": "眼科出题第三组"}, {"q": "眼外伤相关性青光眼的可能机制不包括：", "o": {"A": "前房积血", "B": "晶状体脱位", "C": "角膜上皮缺损", "D": "房角后退"}, "a": "C", "e": "正确答案：角膜上皮缺损。", "author": "崔旭", "group": "眼科出题第三组"}, {"q": "眼压测量最常用的方法是：", "o": {"A": "裂隙灯检查", "B": "眼底镜检查", "C": "非接触式眼压计", "D": "视野检查"}, "a": "C", "e": "Goldmann压平眼压计是眼压测量的金标准。指测法正常记为Tn。", "author": "崔旭", "group": "眼科出题第三组"}, {"q": "视野检查中，生理盲点位于：", "o": {"A": "鼻侧", "B": "颞侧", "C": "上方", "D": "下方"}, "a": "B", "e": "视神经盘位于视网膜鼻侧，其对应的生理盲点投影于视野固视点颞侧约15°处，故生理盲点位于颞侧视野。", "author": "崔旭", "group": "眼科出题第三组"}, {"q": "色觉检查常用的工具是：", "o": {"A": "色盲本", "B": "裂隙灯", "C": "眼底镜", "D": "眼压计"}, "a": "A", "e": "色觉检查最常用假同色图（色盲本），通过辨认由不同颜色色点构成的数字或图案，来判断有无色觉异常及其类型。", "author": "崔旭", "group": "眼科出题第三组"}, {"q": "下列哪项是角膜上皮损伤的检查方法？", "o": {"A": "眼底检查", "B": "荧光素染色", "C": "眼压测量", "D": "色觉检查"}, "a": "B", "e": "荧光素钠可渗入角膜上皮缺损区，在裂隙灯钴蓝光下呈绿色荧光染色，是诊断角膜上皮损伤的标准检查方法。", "author": "崔旭", "group": "眼科出题第三组"}, {"q": "近视眼的主要矫正方法是：", "o": {"A": "凸透镜", "B": "凹透镜", "C": "柱面镜", "D": "棱镜"}, "a": "B", "e": "近视眼平行光线聚焦于视网膜前，需凹透镜（负镜）发散光线，将焦点后移至视网膜上以矫正近视。", "author": "崔旭", "group": "眼科出题第三组"}, {"q": "弱视的常见病因不包括：", "o": {"A": "斜视", "B": "屈光参差", "C": "白内障", "D": "近视"}, "a": "D", "e": "弱视病因包括斜视、屈光参差、高度屈光不正及形觉剥夺（如先天性白内障），单纯近视可通过镜片矫正至正常视力，不引起弱视。", "author": "崔旭", "group": "眼科出题第三组"}, {"q": "下列哪项是麻痹性斜视的特征？", "o": {"A": "第一斜视角=第二斜视角", "B": "无复视", "C": "眼球运动受限", "D": "无代偿头位"}, "a": "C", "e": "麻痹性斜视：眼球运动受限、复视、代偿头位、第二斜视角>第一斜视角。", "author": "崔旭", "group": "眼科出题第三组"}, {"q": "细菌性角膜炎的首选药物是：", "o": {"A": "抗病毒药", "B": "抗真菌药", "C": "抗生素", "D": "激素"}, "a": "C", "e": "细菌性角膜炎由细菌感染引起，治疗原则是针对病原菌选用广谱抗生素（如氟喹诺酮类）滴眼液，抗病毒药和抗真菌药无效。", "author": "崔旭", "group": "眼科出题第三组"}, {"q": "下列哪项不是角膜炎的临床表现？", "o": {"A": "眼痛", "B": "畏光", "C": "流泪", "D": "眼压升高"}, "a": "D", "e": "角膜炎典型表现为眼痛、畏光、流泪、视力下降等角膜刺激征，眼压升高是青光眼特征，不是角膜炎的临床表现。", "author": "崔旭", "group": "眼科出题第三组"}, {"q": "下列哪项是慢性泪囊炎的危险性？", "o": {"A": "诱发白内障", "B": "诱发青光眼", "C": "内眼手术禁忌", "D": "导致视网膜脱离"}, "a": "C", "e": "正确答案：内眼手术禁忌。", "author": "崔旭", "group": "眼科出题第三组"}, {"q": "眼睑翻转法主要用于检查：", "o": {"A": "角膜", "B": "结膜", "C": "虹膜", "D": "晶状体"}, "a": "B", "e": "翻转眼睑可充分暴露上下睑结膜面，便于检查结膜有无充血、乳头增生、滤泡、异物等病变，是结膜检查的基本手法。", "author": "崔旭", "group": "眼科出题第三组"}, {"q": "眼球钝挫伤后前房积血的处理不包括：", "o": {"A": "半卧位休息", "B": "应用止血药", "C": "立即手术", "D": "监测眼压"}, "a": "C", "e": "前房积血分级：I级<1/3前房，II级1/3-2/3前房，III级>2/3前房。处理：半卧位+双眼遮盖+监测眼压。", "author": "崔旭", "group": "眼科出题第三组"}, {"q": "2、视神经功能检查应选择", "o": {"A": "眼电图", "B": "视网膜电图-a波", "C": "视网膜电图-b波", "D": "图形视网膜电图", "E": "视觉诱发电位"}, "a": "E", "e": "正确答案：视觉诱发电位。", "author": "窦锡傲", "group": "眼科出题第二组"}, {"q": "3、以下不属于直接检眼镜的特点的选项是", "o": {"A": "所见眼底为正像", "B": "可用于估计眼底病变隆起的高度", "C": "可粗略判断被检者的注视点", "D": "需要散瞳后检查", "E": "用于观察眼后段的结构和病变"}, "a": "D", "e": "正确答案：需要散瞳后检查。", "author": "窦锡傲", "group": "眼科出题第二组"}, {"q": "4、下列可出现向心性视野缩小的病有", "o": {"A": "视网膜色素变性", "B": "青光眼早期", "C": "垂体瘤", "D": "视盘水肿", "E": "白内障"}, "a": "A", "e": "正确答案：视网膜色素变性。", "author": "窦锡傲", "group": "眼科出题第二组"}, {"q": "5、测量高眼压病人最准确的眼压计是", "o": {"A": "Schiotz眼压计", "B": "费卡眼压计", "C": "Goldman眼压计", "D": "非接触眼压计", "E": "眼压描计"}, "a": "C", "e": "正确答案：Goldman眼压计。", "author": "窦锡傲", "group": "眼科出题第二组"}, {"q": "夜盲症是下列哪种细胞的功能不良", "o": {"A": "视锥细胞", "B": "视杆细胞", "C": "视网膜色素上皮细胞", "D": "水平细胞", "E": "双极细胞"}, "a": "B", "e": "夜盲常见病因：视网膜色素变性（最常见）、维生素A缺乏症。", "author": "窦锡傲", "group": "眼科出题第二组"}, {"q": "2、男，58岁，右眼视力下降1月。右眼视力眼前指数，左眼视力1.0。眼底：玻璃体轻度混浊，视乳头边界不清，轻度隆起，静脉迂曲扩张，呈腊肠状，视网膜大范围片状出血，近视盘的视网膜可见多量片状黄白色渗出，黄斑中心凹亦可见出血渗出。此例病人的诊断应首先考虑为", "o": {"A": "中心性浆液性脉络膜视网膜病变", "B": "高血压视网膜病变", "C": "糖尿病性视网膜病变", "D": "视网膜中央动脉阻塞", "E": "视网膜中央静脉阻塞"}, "a": "E", "e": "视盘（视乳头）无感光细胞，为生理盲点。正常C/D≤0.3，C/D≥0.6为可疑青光眼。", "author": "窦锡傲", "group": "眼科出题第二组"}, {"q": "1、女性，41岁，因右眼分泌物增多2个月就诊，行泪道冲洗时，从下泪点注水，液体从上泪点流出并伴有:较多脓液时，这可能表明", "o": {"A": "泪小管阻塞", "B": "泪总管阻塞", "C": "鼻泪管阻塞", "D": "鼻泪管狭窄", "E": "鼻泪管阻塞合并慢性泪囊炎"}, "a": "E", "e": "泪道冲洗：原路返流→泪小管阻塞；下冲上返→泪总管阻塞；返流+脓→慢性泪囊炎（鼻泪管阻塞）。", "author": "窦锡傲", "group": "眼科出题第二组"}, {"q": "3、有“脓漏眼”之称的是", "o": {"A": "成人淋球菌性结膜炎", "B": "新生儿淋球菌性结膜炎", "C": "成人脑膜炎球菌性结膜炎", "D": "新生儿脑膜炎球菌性结膜炎", "E": "各种类型的急性结膜炎"}, "a": "B", "e": "正确答案：新生儿淋球菌性结膜炎。", "author": "窦锡傲", "group": "眼科出题第二组"}, {"q": "4、患者男，46岁。发现右眼上睑皮下硬结半月余，自觉无明显不适。检查:右眼视力正常，眼睑皮肤稍隆起，眼睑皮下可触及一黄豆大小圆形肿块，边界清楚，与皮肤无粘连，无明显压痛，局部睑结膜暗红色充血，余无异常发现。最可能的诊断是", "o": {"A": "睑板腺囊肿", "B": "内麦粒肿", "C": "外麦粒肿", "D": "眦部睑缘炎", "E": "鳞屑性睑缘炎"}, "a": "A", "e": "病程慢性、无明显疼痛、眼睑皮下边界清楚的硬结、与皮肤无粘连、睑结膜暗红色，是睑板腺囊肿（霰粒肿）的典型特征，与急性化脓性麦粒肿不同。", "author": "窦锡傲", "group": "眼科出题第二组"}, {"q": "1、单纯疱疹病毒树枝状角膜炎特点，何者不正确", "o": {"A": "畏光、流泪、视力下降", "B": "病灶以点状角膜炎起病，融合成树枝，常见于角膜周边部", "C": "睫状充血", "D": "弥漫型角膜感觉减退", "E": "可发展成地图状溃疡"}, "a": "B", "e": "正确答案：病灶以点状角膜炎起病，融合成树枝，常见于角膜周边部。", "author": "窦锡傲", "group": "眼科出题第二组"}, {"q": "2、肺炎球菌性角膜炎可见", "o": {"A": "溃疡沿角膜缘环行发展，然后向中央区浸润", "B": "病灶呈灰白色、欠光泽、干燥而略隆起，周边有伪足", "C": "椭圆形、中央基质较深，角膜边界不清，常伴前房积脓", "D": "角膜上皮出现点状缺损，可形成化脓性角膜溃疡，患眼充血，但无疼痛感", "E": "角膜中央区基质盘状水肿，角膜上皮完整"}, "a": "C", "e": "正确答案：椭圆形、中央基质较深，角膜边界不清，常伴前房积脓。", "author": "窦锡傲", "group": "眼科出题第二组"}, {"q": "3、激素类眼药水不能用于哪种角膜病", "o": {"A": "角膜斑翳", "B": "角膜基质炎", "C": "蚕蚀性角膜溃疡", "D": "细菌性角膜溃疡急性期", "E": "泡性角结膜炎"}, "a": "D", "e": "正确答案：细菌性角膜溃疡急性期。", "author": "窦锡傲", "group": "眼科出题第二组"}, {"q": "4、患者，男，25岁，主诉左眼被树枝划伤后疼痛2天，查:左眼睫状充血+++，角膜中央可见4mm直径大小溃:疡，溃疡表面干燥呈“牙膏状”，周边有明显免疫环，角膜基质水肿，前房可见1mm积脓。关于该病人的治疗哪项不对", "o": {"A": "局部应用氟康唑眼液点眼", "B": "全身应用抗真菌药", "C": "适量应用糖皮质激素", "D": "并发虹膜睫状体炎时用阿托品散瞳", "E": "保守无效时，可行角膜移植术"}, "a": "C", "e": "角膜中央厚约0.5mm，周边约1mm。基质层占全层约90%。", "author": "窦锡傲", "group": "眼科出题第二组"}, {"q": "5、圆锥角膜早期有效的诊断方法是", "o": {"A": "裂隙灯检查", "B": "眼底检查", "C": "角膜地形图检查", "D": "角膜曲率检查", "E": "验光"}, "a": "C", "e": "圆锥角膜特征：角膜中央变薄呈锥状前突→高度近视+不规则散光。常染色体隐性遗传。角膜地形图可见下方变陡。", "author": "窦锡傲", "group": "眼科出题第二组"}, {"q": "2、前葡萄膜炎晚期并发眼球萎缩是由于", "o": {"A": "瞳孔闭锁、增加虹膜张力、房角开放、房水排出过多", "B": "炎症反复发作、睫状体萎缩", "C": "炎症所致、房水分泌过多", "D": "视功能丧失", "E": "眼内容物机化浓缩"}, "a": "B", "e": "正确答案：炎症反复发作、睫状体萎缩。", "author": "窦锡傲", "group": "眼科出题第二组"}, {"q": "3、男性，70岁，左眼突然胀痛，视力下降明显，伴同侧头痛、恶心、呕吐。检查:左眼角膜水肿，虹膜前移，前房浅，晶状体混浊，体积增大，眼压高。诊断为白内障引起的青光眼大发作，目前患者的白内障处于哪一期", "o": {"A": "初发期", "B": "膨胀期", "C": "成熟期", "D": "过熟期", "E": "发作期"}, "a": "B", "e": "白内障膨胀期晶状体因吸水而体积膨大，虹膜被推向前，前房变浅，房角关闭，引起急性继发性闭角型青光眼大发作，符合题中晶状体混浊且体积增大的表现。", "author": "窦锡傲", "group": "眼科出题第二组"}, {"q": "4、急性前葡萄膜炎治疗措施中不包括", "o": {"A": "皮质类固醇", "B": "抗生素", "C": "缩瞳", "D": "非皮质类固醇抗炎药:", "E": "免疫治疗"}, "a": "C", "e": "前葡萄膜炎治疗核心：散瞳防后粘连（阿托品/托吡卡胺）+糖皮质激素抗炎+病因治疗。", "author": "窦锡傲", "group": "眼科出题第二组"}, {"q": "5、患者，男性，65岁，双眼视力渐进性下降1年，检查视力:右0.1，左眼前手动;眼压:右15mmHg，左17mmHg;散瞳后检查右眼晶状体皮质不均匀混浊，左眼晶状体白色混浊，虹膜投影阴性，眼底看不见。应诊断为", "o": {"A": "双眼老年性白内障，膨胀期", "B": "双眼老年性白内障，右眼膨胀期，左眼成熟期", "C": "双眼老年性白内障，右眼成熟期，左眼过熟期", "D": "双眼核性白内障", "E": "并发性白内障"}, "a": "B", "e": "正确答案：双眼老年性白内障，右眼膨胀期，左眼成熟期。", "author": "窦锡傲", "group": "眼科出题第二组"}, {"q": "1、关于青光眼的定义，下列哪项是正确的？", "o": {"A": "眼压高于正常值的一组疾病", "B": "以视神经凹陷性萎缩及视野缺损为共同特征的疾病", "C": "所有类型均伴有眼压升高", "D": "仅指原发性开角型青光眼", "E": "是一种可逆性致盲眼病"}, "a": "B", "e": "正确答案：以视神经凹陷性萎缩及视野缺损为共同特征的疾病。", "author": "窦锡傲", "group": "眼科出题第二组"}, {"q": "2、房水循环的正确途径是？", "o": {"A": "睫状体→后房→瞳孔→前房→小梁网→Schlemm管→集液管→静脉系统", "B": "虹膜→前房→后房→小梁网→睫状体→静脉系统", "C": "睫状体→前房→瞳孔→后房→Schlemm管→小梁网→静脉系统", "D": "脉络膜→后房→前房→小梁网→睫状体→静脉系统", "E": "睫状体→后房→小梁网→前房→Schlemm管→静脉系统"}, "a": "A", "e": "房水主要外流途径：睫状突→后房→瞳孔→前房→小梁网→Schlemm管→集液管→睫状前静脉。次要途径（10-20%）为葡萄膜巩膜途径。", "author": "窦锡傲", "group": "眼科出题第二组"}, {"q": "3、男，65岁，双眼视力下降半年，无眼痛。查体：眼压右眼28mmHg，左眼30mmHg，前房深度正常，房角开放，右眼C/D=0.7，左眼C/D=0.9，视野显示双鼻侧阶梯。最可能的诊断是？", "o": {"A": "急性闭角型青光眼", "B": "原发性开角型青光眼", "C": "慢性闭角型青光眼", "D": "正常眼压性青光眼", "E": "继发性青光眼"}, "a": "B", "e": "正常眼压统计学范围10~21mmHg，24h波动<8mmHg，双眼差值<5mmHg。", "author": "窦锡傲", "group": "眼科出题第二组"}, {"q": "4、患者，女，58岁，右眼胀痛伴同侧头痛、恶心呕吐3小时。查体：右眼视力0.1，混合充血，角膜雾状水肿，前房极浅，瞳孔散大约6mm，对光反射消失，眼压55mmHg。对侧眼前房浅。该患者首选的治疗措施是？", "o": {"A": "立即行小梁切除术", "B": "局部及全身联合使用降眼压药物，待炎症控制后行激光周边虹膜切除术", "C": "单纯使用毛果芸香碱滴眼液", "D": "口服乙酰唑胺后观察", "E": "前房穿刺放液"}, "a": "B", "e": "正确答案：局部及全身联合使用降眼压药物，待炎症控制后行激光周边虹膜切除术。", "author": "窦锡傲", "group": "眼科出题第二组"}, {"q": "1、轴性近视主要与何有关", "o": {"A": "角膜曲率过大", "B": "晶状体曲率过大", "C": "前房过深", "D": "玻璃体曲率过大", "E": "眼轴过长"}, "a": "E", "e": "轴性近视是最常见的近视类型，眼轴过长导致平行光线聚焦于视网膜前方，而非聚焦于视网膜上，从而产生近视。", "author": "窦锡傲", "group": "眼科出题第二组"}, {"q": "2、眼球光学系统的主要成分不包括", "o": {"A": "角膜", "B": "房水", "C": "瞳孔", "D": "晶状体", "E": "玻璃体"}, "a": "C", "e": "眼球屈光系统由角膜、房水、晶状体、玻璃体四种屈光介质组成。瞳孔是虹膜中央的开孔，仅调节进入眼内的光量，本身不具有屈光作用，故不属于光学系统的主要成分。", "author": "窦锡傲", "group": "眼科出题第二组"}, {"q": "3、近视度数较高常伴有多种眼底病变，但不包括", "o": {"A": "豹纹状眼底", "B": "黄斑出血", "C": "玻璃体后脱离", "D": "视网膜周边部骨细胞样色素沉着", "E": "视网膜下新生血管膜"}, "a": "D", "e": "正确答案：视网膜周边部骨细胞样色素沉着。", "author": "窦锡傲", "group": "眼科出题第二组"}, {"q": "4、患眼注视时的偏斜角大于健眼注视时的斜视角，提示", "o": {"A": "隐斜", "B": "恒定性斜视", "C": "交替性斜视", "D": "麻痹性斜视", "E": "调节性斜视"}, "a": "D", "e": "麻痹性斜视的特征是第二斜视角（患眼注视时的偏斜角）大于第一斜视角（健眼注视时的偏斜角），原因是患眼麻痹肌需要更强的神经冲动才能完成注视，导致配对肌过度收缩。", "author": "窦锡傲", "group": "眼科出题第二组"}, {"q": "5、男，50岁，以复视就诊，复视像检查:左下方复像分离最大，周边物象是右眼，最可能的诊断是", "o": {"A": "左上直肌麻痹", "B": "右上直肌麻痹", "C": "右上斜肌麻痹", "D": "右外直肌麻痹", "E": "左外直肌麻痹"}, "a": "C", "e": "正确答案：右上斜肌麻痹。", "author": "窦锡傲", "group": "眼科出题第二组"}, {"q": "1、引起视交叉病变最常见的原因为", "o": {"A": "鞍结节脑膜瘤", "B": "颅咽管瘤", "C": "前交通动脉瘤", "D": "脑垂体肿瘤", "E": "第三脑室肿瘤"}, "a": "D", "e": "脑垂体肿瘤位于蝶鞍内，紧邻视交叉下方，是引起视交叉受压最常见的原因，典型视野改变为双颞侧偏盲。", "author": "窦锡傲", "group": "眼科出题第二组"}, {"q": "2、患者男性，35岁，右眼视力下降5天，伴眼球转动疼，眼底视盘充血、水肿，视盘周围有小的出血点，视网膜静脉增粗。查右眼相对性传入性瞳孔障碍，视野中心暗点。可能的诊断是", "o": {"A": "右眼缺血性视神经病变", "B": "右眼视神经炎", "C": "右眼假性视盘水肿", "D": "Leber遗传性视神经病变", "E": "中毒性视神经病变"}, "a": "B", "e": "正确答案：右眼视神经炎。", "author": "窦锡傲", "group": "眼科出题第二组"}, {"q": "1、如果您接诊一个眼外伤的病人，首先应注意", "o": {"A": "视力情况", "B": "眼球有无破裂", "C": "眼内有无出血", "D": "有无感染", "E": "有无休克及重要脏器损伤"}, "a": "E", "e": "正确答案：有无休克及重要脏器损伤。", "author": "窦锡傲", "group": "眼科出题第二组"}, {"q": "2、酸性物质致伤原因", "o": {"A": "酸能使组织蛋白凝固坏死", "B": "使角膜上皮坏死脱落", "C": "与组织的类脂质起皂化作用", "D": "使组织溶解", "E": "使组织细胞分解坏死"}, "a": "A", "e": "正确答案：酸能使组织蛋白凝固坏死。", "author": "窦锡傲", "group": "眼科出题第二组"}, {"q": "3、男性学生，20岁，因羽毛球击伤右眼2小时入院。查体发现右眼视力:数指/30cm，前房出血，可给予以下治疗，除外是", "o": {"A": "卧床休息，取半卧位，可用镇静剂", "B": "止血剂与糖皮质激素联合应用", "C": "立即散瞳，以减轻虹膜刺激症状", "D": "注意眼压，酌情使用降压药物", "E": "经药物治疗眼压仍不能控制，应做前房冲洗术"}, "a": "C", "e": "正确答案：立即散瞳，以减轻虹膜刺激症状。", "author": "窦锡傲", "group": "眼科出题第二组"}, {"q": "4、一位搬运工人，火碱溅入左眼，自己用自来水洗过，在急诊室应首选哪项处理", "o": {"A": "结膜囊内点表面麻醉剂，翻睑钩拉开眼睑，用2000ml生理盐水连续冲洗", "B": "用绷带包扎，次日复诊", "C": "抗生素滴眼，不再复诊", "D": "维生素", "E": "每小时滴半胱氨酸一次"}, "a": "A", "e": "正确答案：结膜囊内点表面麻醉剂，翻睑钩拉开眼睑，用2000ml生理盐水连续冲洗。", "author": "窦锡傲", "group": "眼科出题第二组"}, {"q": "5、眼球钝挫伤的常见原因不包括下列哪一项", "o": {"A": "砖、石块及拳头", "B": "球类打击、跌撞", "C": "交通事故", "D": "离子辐射性损伤", "E": "爆炸的冲击波"}, "a": "D", "e": "正确答案：离子辐射性损伤。", "author": "窦锡傲", "group": "眼科出题第二组"}, {"q": "张先生前往医院在眼科进行了例行检查，他需要站在（）处进行视力测试。", "o": {"A": "3m", "B": "4m", "C": "5m", "D": "6m", "E": "7m"}, "a": "A", "e": "「王大夫」笔画=11，÷5余1→A", "author": "梁瑞博", "group": "眼科出题第一组"}, {"q": "王大夫用生理盐水为患者冲洗泪道，生理盐水从被注射进去的一侧出来，患者最可能是（）发生了堵塞。", "o": {"A": "泪小管", "B": "泪总管", "C": "鼻腔", "D": "泪道", "E": "咽部"}, "a": "D", "e": "「小红」笔画=9，÷5余4→D", "author": "梁瑞博", "group": "眼科出题第一组"}, {"q": "小红的眼睛无法分辨橙色和黄色，她最可能是（）色盲。", "o": {"A": "黑白", "B": "紫蓝", "C": "橙黄", "D": "红绿", "E": "青棕"}, "a": "B", "e": "「兰花」笔画=12，÷5余2→B", "author": "梁瑞博", "group": "眼科出题第一组"}, {"q": "兰花最近正在研究OCT的原理，OCT最多能达到（）级。", "o": {"A": "纳米", "B": "微米", "C": "毫米", "D": "厘米", "E": "分米"}, "a": "E", "e": "「罗老师」笔画=20，÷5余0→E", "author": "梁瑞博", "group": "眼科出题第一组"}, {"q": "罗老师对患者进行了裂隙灯检查，他通过调节裂隙灯的光线角度和强度，间接观察眼前节较深层的结构，这被叫做（）。", "o": {"A": "直接焦点照明法", "B": "弥散光线照明法", "C": "镜面反光照明法", "D": "后照法", "E": "间接照明法"}, "a": "E", "e": "「小李」笔画=10，÷5余0→E", "author": "梁瑞博", "group": "眼科出题第一组"}, {"q": "小李在和人爆发剧烈争吵后倒地不起，清醒后感到视力模糊，随后她被诊断为假性癫痫（癔症性癫痫）。她的眼睛最可能（）。", "o": {"A": "不受影响", "B": "一过性失明", "C": "永久失明", "D": "一过性视力下降", "E": "永久视力下降"}, "a": "E", "e": "「小李」笔画=10，÷5余0→E", "author": "梁瑞博", "group": "眼科出题第一组"}, {"q": "在病历书写中，对于药物名称的规范是很重要的。当患者说自己用过“左克”进行治疗的时候，王医生应当记录为（）。", "o": {"A": "左氧氟沙星", "B": "红霉素", "C": "阿昔洛韦", "D": "地塞米松", "E": "玻璃酸钠"}, "a": "C", "e": "「小可」笔画=8，÷5余3→C", "author": "梁瑞博", "group": "眼科出题第一组"}, {"q": "小可是一位9岁的孩子，他很快就要做阑尾炎手术了，但他近日却突发了感染性结膜炎，他应该首选（）进行治疗。", "o": {"A": "喹诺酮类滴眼液", "B": "左氧氟沙星滴眼液", "C": "妥布霉素滴眼液", "D": "玻璃酸钠", "E": "纯净清水进行清洗"}, "a": "E", "e": "「老二两」笔画=15，÷5余0→E", "author": "梁瑞博", "group": "眼科出题第一组"}, {"q": "老二两做完白内障手术后，需要用药促进愈合，他应当选用（）。", "o": {"A": "喹诺酮类滴眼液", "B": "左氧氟沙星滴眼液", "C": "妥布霉素滴眼液", "D": "玻璃酸钠", "E": "红霉素眼膏"}, "a": "C", "e": "「桃子」笔画=13，÷5余3→C", "author": "梁瑞博", "group": "眼科出题第一组"}, {"q": "桃子今年八岁，她在（）适合用阿托品凝胶进行散瞳。", "o": {"A": "1年内", "B": "2年内", "C": "3年内", "D": "4年内", "E": "5年内"}, "a": "C", "e": "「桃子」笔画=13，÷5余3→C", "author": "梁瑞博", "group": "眼科出题第一组"}, {"q": "钟先生不幸患上了眼部感染疾病，他的疾病进展迅速，整个角膜都被淡绿色分泌物包裹，请问他最可能患上了哪种疾病", "o": {"A": "结膜炎", "B": "白内障", "C": "真菌性角膜炎", "D": "病毒性角膜炎", "E": "细菌性角膜炎"}, "a": "C", "e": "「桃子」笔画=13，÷5余3→C", "author": "梁瑞博", "group": "眼科出题第一组"}, {"q": "在接受眼科治疗后，年幼的丽丽对眼科产生了浓厚的兴趣，但她记不清楚角膜有多少层了，请你告诉她正确答案：（）。", "o": {"A": "2层", "B": "3层", "C": "4层", "D": "5层", "E": "6层"}, "a": "A", "e": "「孔大夫」笔画=11，÷5余1→A", "author": "梁瑞博", "group": "眼科出题第一组"}, {"q": "孔大夫接诊了一位患有病毒性角膜炎的患者，这个患者的角膜被荧光染色之后出现了地图样溃疡，请问他最可能患有哪种疾病", "o": {"A": "单疱病毒性地图状角膜炎", "B": "单疱病毒性树枝状角膜炎", "C": "单疱病毒性盘状角膜炎", "D": "单疱病毒性坏死性角膜基质炎", "E": "单疱病毒性神经营养
