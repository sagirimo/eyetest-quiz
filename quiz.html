<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>眼科学刷题 - 期末复习</title>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #21262d;
  --text: #e6edf3;
  --text2: #8b949e;
  --accent: #6366f1;
  --accent2: #818cf8;
  --success: #22c55e;
  --danger: #ef4444;
  --warning: #f59e0b;
  --border: #30363d;
  --radius: 12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; line-height: 1.6;
  -webkit-tap-highlight-color: transparent;
}

/* ── Header ── */
.topbar{
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 8px 16px; position: sticky; top: 0; z-index: 100;
}
.topbar-inner{
  max-width: 860px; margin: 0 auto;
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.brand{font-weight:700;font-size:1.05em;color:var(--accent2);white-space:nowrap}
.brand span{color:var(--text2);font-weight:400;font-size:.75em}

/* mode toggle pill */
.pill{display:flex;background:var(--surface2);border-radius:20px;overflow:hidden;border:1px solid var(--border)}
.pill button{
  border:none;background:transparent;color:var(--text2);
  padding:5px 14px;font-size:.78em;font-weight:500;cursor:pointer;transition:.15s;white-space:nowrap
}
.pill button.on{background:var(--accent);color:#fff}
.pill button:hover:not(.on){color:var(--text)}

/* controls row */
.ctrls{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.ctrls select,.ctrls .btn{
  padding:5px 10px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text);font-size:.78em;
  cursor:pointer;font-family:inherit;transition:.15s
}
.ctrls select{min-width:90px}
.ctrls select option.optgroup{font-weight:700;color:var(--accent2);background:var(--surface)}
.btn{font-weight:500;white-space:nowrap}
.btn:hover{border-color:var(--accent);color:var(--accent2)}
.btn.on{background:var(--accent);border-color:var(--accent);color:#fff}

/* ── Progress ── */
.prog{max-width:860px;margin:0 auto;padding:6px 16px}
.prog-bar{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.prog-info{display:flex;justify-content:space-between;font-size:.72em;color:var(--text2);margin-top:3px}

/* ── Question ── */
main{max-width:860px;margin:0 auto;padding:16px}

.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px 24px;
  animation: fadeUp .25s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}}

.qmeta{font-size:.75em;color:var(--text2);margin-bottom:6px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.qmeta .star{cursor:pointer;font-size:1.1em;user-select:none}
.qmeta .grp{font-size:.7em;padding:2px 6px;border-radius:10px;background:var(--surface2);color:var(--accent2)}

.qtext{font-size:1.05em;font-weight:500;margin-bottom:16px;line-height:1.7}

/* options */
.opts{display:flex;flex-direction:column;gap:6px}
.opt{
  display:flex;align-items:flex-start;gap:12px;
  padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;
  cursor:pointer;transition:all .12s;background:var(--surface);
  -webkit-user-select:none;user-select:none
}
.opt:hover{border-color:var(--accent);background:var(--surface2)}
.opt.ok{border-color:var(--success)!important;background:rgba(34,197,94,.06)!important}
.opt.bad{border-color:var(--danger)!important;background:rgba(239,68,68,.06)!important}
.opt.dim{pointer-events:none;opacity:.65}
.opt-letter{
  width:26px;height:26px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:600;font-size:.82em;flex-shrink:0;
  background:var(--surface2);border:1px solid var(--border);transition:.12s
}
.opt.ok .opt-letter{background:var(--success);border-color:var(--success);color:#fff}
.opt.bad .opt-letter{background:var(--danger);border-color:var(--danger);color:#fff}
.opt-text{flex:1;padding-top:1px}

/* feedback box */
.fb{
  margin-top:14px;padding:14px 16px;border-radius:10px;font-size:.85em;
  display:none;line-height:1.6
}
.fb.on{display:block}
.fb.good{background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.25)}
.fb.bad{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.25)}
.fb-title{font-weight:600;margin-bottom:3px}
.fb.good .fb-title{color:var(--success)}
.fb.bad .fb-title{color:var(--danger)}
.fb-expl{margin-top:6px;color:var(--text2)}

/* actions */
.acts{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.act{
  padding:9px 18px;border-radius:10px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text);cursor:pointer;
  font-size:.85em;font-weight:500;transition:.15s;font-family:inherit
}
.act:hover{border-color:var(--accent)}
.act.go{background:var(--accent);border-color:var(--accent);color:#fff}
.act.go:hover{background:var(--accent2)}
.act:disabled{opacity:.35;pointer-events:none}

/* key hints */
kbd{
  display:inline-block;padding:1px 5px;border-radius:3px;
  background:var(--surface2);border:1px solid var(--border);
  font-size:.72em;font-family:"SF Mono","Fira Code",monospace;margin:0 1px
}

/* empty state */
.empty{text-align:center;padding:60px 20px}
.empty h2{font-size:1.3em;margin-bottom:6px}
.empty p{color:var(--text2);margin-bottom:16px}

/* toast */
.toast{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);
  padding:8px 18px;border-radius:20px;
  background:var(--surface);border:1px solid var(--border);
  z-index:300;font-size:.85em;font-weight:500;
  animation:toastIn .25s ease;pointer-events:none;opacity:0;transition:opacity .2s
}
.toast.on{opacity:1}
.toast.ok{border-color:var(--success);color:var(--success)}
.toast.ng{border-color:var(--danger);color:var(--danger)}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-8px)}}

/* dark scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* responsive */
@media(max-width:600px){
  .card{padding:14px 16px}
  .qtext{font-size:.98em}
  .opt{padding:9px 12px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">👁 眼科刷题<span>期末复习</span></div>
    <div class="pill" id="modePill">
      <button class="on" data-m="study" onclick="S.setMode('study')">📖 解析</button>
      <button data-m="speed" onclick="S.setMode('speed')">⚡ 速刷</button>
    </div>
    <div class="ctrls">
      <select id="selAuthor" onchange="S.apply()">
        <option value="all">👤 全部出题人</option>
      </select>
      <select id="selScope" onchange="S.apply()">
        <option value="all">📋 全部</option>
        <option value="unanswered">❓ 未做</option>
        <option value="wrong">❌ 错题</option>
        <option value="starred">⭐ 收藏</option>
      </select>
      <button class="btn" id="btnShuffle" onclick="S.toggleShuffle()">🔀 随机</button>
      <button class="btn" onclick="S.reset()" style="color:var(--danger)">🔄</button>
    </div>
  </div>
</div>

<div class="prog">
  <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
  <div class="prog-info"><span id="progLabel">准备中...</span><span id="progCount"></span></div>
</div>

<main id="main"></main>
<div class="toast" id="toast"></div>

<script>
// ═══════════════ DATA ═══════════════

 "author": "刘昶铄", "group": "眼科出题第一组"}, {"q": "急性前葡萄膜炎的特征性体征是", "o": {"A": "角膜后沉着物（KP）", "B": "玻璃体混浊", "C": "视网膜出血", "D": "视乳头水肿", "E": "黄斑囊样水肿"}, "a": "A", "e": "急性前葡萄膜炎体征：睫状充血+角膜后KP+前房闪辉（Tyndall+）+瞳孔缩小+虹膜后粘连。", "author": "刘昶铄", "group": "眼科出题第一组"}, {"q": "白内障最主要的临床表现是", "o": {"A": "眼痛", "B": "进行性视力下降", "C": "视野缺损", "D": "色觉异常", "E": "夜盲"}, "a": "B", "e": "正确答案：进行性视力下降。", "author": "刘昶铄", "group": "眼科出题第一组"}, {"q": "关于原发性开角型青光眼，下列描述正确的是", "o": {"A": "前房浅", "B": "房角关闭", "C": "眼压升高但房角开放", "D": "眼压正常", "E": "多见于远视眼"}, "a": "C", "e": "正确答案：眼压升高但房角开放。", "author": "刘昶铄", "group": "眼科出题第一组"}, {"q": "关于近视，下列描述正确的是", "o": {"A": "屈光力过弱", "B": "眼轴过短", "C": "平行光线聚焦于视网膜之后", "D": "凹透镜矫正", "E": "近视力差"}, "a": "D", "e": "近视是眼轴过长或屈光力过强导致平行光线聚焦于视网膜前，需用凹透镜使光线发散，将焦点后移至视网膜上进行矫正。", "author": "刘昶铄", "group": "眼科出题第一组"}, {"q": "弱视治疗的关键时期是", "o": {"A": "1岁以内", "B": "3-5岁", "C": "6-8岁", "D": "9-12岁", "E": "12岁以后"}, "a": "C", "e": "弱视治疗最佳年龄为3-6岁（视觉发育关键期）。超过12岁治疗效果极差。早发现早治疗是关键。", "author": "刘昶铄", "group": "眼科出题第一组"}, {"q": "关于糖尿病视网膜病变，下列描述错误的是", "o": {"A": "是最常见的视网膜血管病", "B": "微血管瘤是最早可见的病变", "C": "硬性渗出为特征性表现", "D": "不会引起牵拉性视网膜脱离", "E": "可导致黄斑水肿"}, "a": "D", "e": "正确答案：不会引起牵拉性视网膜脱离。", "author": "刘昶铄", "group": "眼科出题第一组"}, {"q": "最易引起视网膜脱离的周边视网膜变性是", "o": {"A": "格子样变性", "B": "囊样变性", "C": "霜样变性", "D": "铺路石样变性", "E": "视网膜劈裂"}, "a": "A", "e": "格子样变性区域视网膜变薄、玻璃体与视网膜粘连紧密，约30%可合并视网膜裂孔，是导致孔源性视网膜脱离最常见、最危险的周边变性类型。", "author": "刘昶铄", "group": "眼科出题第一组"}, {"q": "眼外伤的首选影像学检查方法是", "o": {"A": "X线平片", "B": "CT", "C": "MRI", "D": "B超", "E": "OCT"}, "a": "B", "e": "CT扫描速度快、分辨率高，可清晰显示眼眶骨折、眼内及眶内异物、眼球破裂等改变，是眼外伤首选的影像学检查方法。", "author": "刘昶铄", "group": "眼科出题第一组"}, {"q": "对酸烧伤后急救最关键的措施是", "o": {"A": "送医院就诊", "B": "滴用抗生素眼药水", "C": "大量清水彻底冲洗结膜囊", "D": "滴用糖皮质激素", "E": "滴用表面麻醉剂"}, "a": "C", "e": "正确答案：大量清水彻底冲洗结膜囊。", "author": "刘昶铄", "group": "眼科出题第一组"}, {"q": "关于睑腺炎（麦粒肿），下列描述正确的是", "o": {"A": "为睑板腺无菌性肉芽肿性炎症", "B": "一般不伴疼痛", "C": "多由腺病毒引起", "D": "多为金黄色葡萄球菌感染", "E": "好发于老年人"}, "a": "D", "e": "睑腺炎（麦粒肿）是眼睑腺体急性化脓性炎症，最常见致病菌为金黄色葡萄球菌。", "author": "刘昶铄", "group": "眼科出题第一组"}, {"q": "慢性泪囊炎最常用的检查方法是", "o": {"A": "泪道冲洗", "B": "泪膜破裂时间", "C": "泪液分泌试验", "D": "眼眶CT", "E": "泪囊造影"}, "a": "A", "e": "泪道冲洗操作简便、无创，可直接判断泪道是否通畅及阻塞部位，是诊断慢性泪囊炎最常用的基本检查方法。", "author": "刘昶铄", "group": "眼科出题第一组"}, {"q": "圆锥角膜的典型体征是", "o": {"A": "Fleischer环", "B": "Kayser-Fleischer环", "C": "角膜带状变性", "D": "角膜边缘黄色环", "E": "角膜内皮滴状赘疣"}, "a": "A", "e": "圆锥角膜特征：角膜中央变薄呈锥状前突→高度近视+不规则散光。常染色体隐性遗传。角膜地形图可见下方变陡。", "author": "刘昶铄", "group": "眼科出题第一组"}, {"q": "Vogt-小柳原田综合征的典型眼部表现是", "o": {"A": "双眼肉芽肿性全葡萄膜炎", "B": "单眼急性前葡萄膜炎", "C": "双眼视神经炎", "D": "视网膜血管炎", "E": "黄斑裂孔"}, "a": "A", "e": "VKH综合征：双眼渗出性视网膜脱离+晚霞样眼底+头痛耳鸣+皮肤白癜风/毛发变白。自身免疫性全葡萄膜炎。", "author": "刘昶铄", "group": "眼科出题第一组"}, {"q": "关于眼球贯通伤，下列处理错误的是", "o": {"A": "注射破伤风抗毒素", "B": "尽早取出眼内异物", "C": "初期缝合伤口", "D": "全身应用抗生素", "E": "严禁对眼球加压"}, "a": "B", "e": "正确答案：尽早取出眼内异物。", "author": "刘昶铄", "group": "眼科出题第一组"}, {"q": "对性传入性瞳孔障碍（RAPD），下列描述正确的是", "o": {"A": "双眼瞳孔大小不等", "B": "患侧瞳孔直接对光反射消失，间接对光反射存在", "C": "常见于白内障", "D": "双侧瞳孔散大", "E": "对光反射灵敏"}, "a": "B", "e": "RAPD（相对性瞳孔传入障碍）：患眼传入通路受损→交替光照时患侧瞳孔先收缩继而散大。提示视神经或视网膜病变。", "author": "刘昶铄", "group": "眼科出题第一组"}, {"q": "黄斑区中心凹反光消失，见于下列哪种情况", "o": {"A": "黄斑水肿", "B": "中心性浆液性脉络膜视网膜病变", "C": "年龄相关性黄斑变性", "D": "黄斑裂孔", "E": "以上都是"}, "a": "E", "e": "黄斑水肿、中心性浆液性脉络膜视网膜病变、年龄相关性黄斑变性及黄斑裂孔均可破坏中心凹正常凹陷形态，导致中心凹光反射消失，故以上情况均可出现。", "author": "刘昶铄", "group": "眼科出题第一组"}, {"q": "眼压测量最准确的方法为", "o": {"A": "非接触眼压计", "B": "Goldmann压平眼压计", "C": "Schiøtz压陷眼压计", "D": "指测法", "E": "眼反应分析仪"}, "a": "B", "e": "Goldmann压平眼压计是眼压测量的金标准。指测法正常记为Tn。", "author": "刘昶铄", "group": "眼科出题第一组"}, {"q": "3岁儿童，体检发现右眼视力差，裂隙灯检查前节正常，眼底未见异常，最可能的诊断是", "o": {"A": "屈光不正", "B": "弱视", "C": "先天性白内障", "D": "先天性青光眼", "E": "视神经发育不良"}, "a": "B", "e": "前节及眼底检查均正常排除了器质性病变，3岁儿童视觉发育期出现单眼视力差，最可能为屈光不正或斜视所致的功能性弱视。", "author": "刘昶铄", "group": "眼科出题第一组"}, {"q": "青光眼视神经损害最早的视野改变是", "o": {"A": "弓形暗点", "B": "旁中心暗点", "C": "鼻侧阶梯", "D": "管状视野", "E": "颞侧视岛"}, "a": "B", "e": "青光眼最早损害鼻侧Bjerrum区神经纤维，最早出现旁中心暗点，随病情进展演变为弓形暗点，继而出现鼻侧阶梯等改变。", "author": "刘昶铄", "group": "眼科出题第一组"}, {"q": "糖尿病视网膜病变中，关于“硬性渗出”的描述正确的是", "o": {"A": "位于视网膜内丛状层", "B": "为脂蛋白渗出的沉积", "C": "呈点状或斑片状黄色", "D": "边缘清晰", "E": "以上都是"}, "a": "E", "e": "视网膜组织学10层。视盘（视乳头）无感光细胞为生理盲点。黄斑中心凹仅含视锥细胞。视网膜内5层由视网膜中央动脉供血。", "author": "刘昶铄", "group": "眼科出题第一组"}, {"q": "孔源性视网膜脱离的术前处理中，最重要的体位是", "o": {"A": "仰卧位", "B": "侧卧位", "C": "面向下体位", "D": "半卧位", "E": "头高脚低位"}, "a": "C", "e": "面向下体位使黄斑处于最高点，利用重力使视网膜下液流向周边，防止脱离向黄斑区扩展，对保护中心视力至关重要。", "author": "刘昶铄", "group": "眼科出题第一组"}, {"q": "关于视神经炎的治疗，首选药物是", "o": {"A": "抗生素", "B": "糖皮质激素", "C": "免疫抑制剂", "D": "神经营养药", "E": "血管扩张剂"}, "a": "B", "e": "特发性（脱髓鞘性）视神经炎首选糖皮质激素冲击治疗。", "author": "刘昶铄", "group": "眼科出题第一组"}, {"q": "下列哪种角膜炎应禁用糖皮质激素", "o": {"A": "单纯疱疹病毒性角膜炎（上皮型）", "B": "细菌性角膜炎", "C": "真菌性角膜炎", "D": "暴露性角膜炎", "E": "蚕食性角膜溃疡"}, "a": "A", "e": "正确答案：单纯疱疹病毒性角膜炎（上皮型）。", "author": "刘昶铄", "group": "眼科出题第一组"}, {"q": "患者，男性，45岁，右眼被铁屑溅伤后疼痛、畏光、流泪3小时。检查：右眼视力0.1，角膜中央可见一约2mm大小穿通伤口，虹膜嵌顿，前房浅，瞳孔不圆。最恰当的处理是", "o": {"A": "抗生素眼药水滴眼", "B": "加压包扎", "C": "急诊行角膜伤口缝合术", "D": "观察等待自行愈合", "E": "取出虹膜组织"}, "a": "C", "e": "角膜中央厚约0.5mm，周边约1mm。基质层占全层约90%。", "author": "刘昶铄", "group": "眼科出题第一组"}, {"q": "患者，男性，68岁，右眼胀痛伴同侧头痛、恶心、呕吐2小时。检查：右眼视力手动/眼前，结膜混合充血，角膜水肿呈雾状混浊，前房极浅，瞳孔约6mm、固定。左眼正常。测眼压右眼60mmHg。首选的治疗是", "o": {"A": "口服乙酰唑胺", "B": "静脉滴注甘露醇", "C": "1%毛果芸香碱滴眼", "D": "立即行抗青光眼手术", "E": "综合降眼压治疗，待眼压控制后手术"}, "a": "E", "e": "正常眼压统计学范围10~21mmHg，24h波动<8mmHg，双眼差值<5mmHg。", "author": "刘昶铄", "group": "眼科出题第一组"}, {"q": "患儿，男，5岁，幼儿园体检发现视力差。检查：右眼视力0.2，左眼视力0.8，散瞳验光右眼+5.00DS，左眼+1.00DS，眼底未见异常。最可能的诊断是", "o": {"A": "共同性内斜视", "B": "屈光参差性弱视", "C": "先天性白内障", "D": "先天性青光眼", "E": "视网膜母细胞瘤"}, "a": "B", "e": "正确答案：屈光参差性弱视。", "author": "刘昶铄", "group": "眼科出题第一组"}, {"q": "患者，女性，28岁，双眼红、畏光、视力下降1周。检查：双眼视力0.3，结膜睫状充血，角膜后可见尘状KP，前房细胞（++），Tyndall征阳性，虹膜可见结节。最可能的诊断是", "o": {"A": "急性结膜炎", "B": "真菌性角膜炎", "C": "急性前葡萄膜炎", "D": "急性闭角型青光眼", "E": "眼内炎"}, "a": "C", "e": "正确答案：急性前葡萄膜炎。", "author": "刘昶铄", "group": "眼科出题第一组"}, {"q": "患者，糖尿病史15年，近期发现右眼视物模糊。眼底检查：右眼视盘边界清晰，黄斑区可见多个微血管瘤，散在的点状出血和硬性渗出。最可能的诊断是", "o": {"A": "年龄相关性黄斑变性", "B": "视网膜静脉阻塞", "C": "糖尿病视网膜病变（非增殖期）", "D": "中心性浆液性脉络膜视网膜病变", "E": "视神经炎"}, "a": "C", "e": "正确答案：糖尿病视网膜病变（非增殖期）。", "author": "刘昶铄", "group": "眼科出题第一组"}, {"q": "该患者最可能的诊断是", "o": {"A": "年龄相关性白内障（皮质性）", "B": "年龄相关性白内障（核性）", "C": "年龄相关性白内障（后囊下）", "D": "并发性白内障", "E": "代谢性白内障"}, "a": "A", "e": "正确答案：年龄相关性白内障（皮质性）。", "author": "刘昶铄", "group": "眼科出题第一组"}, {"q": "该患者白内障最常见的分期是", "o": {"A": "初发期", "B": "膨胀期", "C": "成熟期", "D": "过熟期", "E": "未成熟期"}, "a": "A", "e": "老年性皮质性白内障初发期患者数量最多，因为该期进展缓慢、症状轻微，大多数患者在此阶段被发现，是临床最常见的分期。", "author": "刘昶铄", "group": "眼科出题第一组"}, {"q": "膨胀期白内障最危险的并发症是", "o": {"A": "晶状体脱位", "B": "继发性青光眼", "C": "葡萄膜炎", "D": "视网膜脱离", "E": "角膜内皮失代偿"}, "a": "B", "e": "（42-43题共用题干） 患者，女，52岁，左眼胀痛伴同侧头痛、恶心、呕吐半天。以往有类似发作，休息后可缓解。检查：左眼视力0.8，结膜轻度睫状充血，角膜透明，前房浅，房角镜检查示房角窄，眼压45mmHg。右眼正常。", "author": "刘昶铄", "group": "眼科出题第一组"}, {"q": "为明确诊断及指导治疗，下列哪项检查最为必要", "o": {"A": "OCT", "B": "视野", "C": "房角镜检查", "D": "UBM", "E": "眼压描记"}, "a": "C", "e": "对于可疑青光眼患者，房角镜检查是区分开角型与闭角型青光眼的必要手段，直接决定治疗方案的选择，是最为关键的检查。", "author": "刘昶铄", "group": "眼科出题第一组"}, {"q": "直接检眼镜检查时，下列哪项属于正常眼底表现？", "o": {"A": "视盘C/D=0.7", "B": "黄斑区可见片状出血", "C": "视盘边界清晰、C/D=0.3", "D": "视网膜动脉搏动明显", "E": "视网膜静脉呈节段状扩张"}, "a": "C", "e": "解析：正常眼底视盘边界清晰、色泽淡红，C/D < 0.4（通常约0.3）。C/D ≥ 0.6为可疑青光眼改变。黄斑区应无出血、无渗出。视网膜动脉不出现搏动（除非眼压极高或主动脉瓣关闭不全）。视网膜静脉搏动可在部分正常人中出现属正常变异。来源：眼底检查课件及青光眼课件。 【Topic 1】第 2 题（单选）", "author": "刘霁影", "group": "眼科出题第一组"}, {"q": "结膜充血与睫状充血的鉴别要点中，滴入肾上腺素后，睫状充血的表现是：", "o": {"A": "充血消失", "B": "充血不变", "C": "充血加重", "D": "先消失后出现", "E": "转为混合充血"}, "a": "B", "e": "解析：睫状充血来源于睫状前动脉，滴入肾上腺素后充血不会消失；结膜充血来源于结膜后动脉，滴入肾上腺素后充血可消失。这是鉴别两者的关键方法。 【Topic 1】第 3 题（多选）", "author": "刘霁影", "group": "眼科出题第一组"}, {"q": "眼底检查可以观察到以下哪些结构？（多选）", "o": {"A": "视盘", "B": "黄斑", "C": "视网膜血管", "D": "晶状体", "E": "玻璃体前部"}, "a": "A", "e": "BC 解析：直接检眼镜可观察到视盘（C/D比值、盘沿）、黄斑、视网膜中央动静脉及其分支。晶状体和玻璃体前部需通过裂隙灯检查。 【Topic 1】第 4 题（判断）", "author": "刘霁影", "group": "眼科出题第一组"}, {"q": "眼科门诊病历中，右眼和左眼的缩写分别为：", "o": {"A": "RE / LE", "B": "R / L", "C": "OD / OS", "D": "DX / SX", "E": "OD / OS"}, "a": "C", "e": "解析：OD (oculus dexter) 为右眼，OS (oculus sinister) 为左眼，OU (oculus uterque) 为双眼。这是国际通用眼科病历书写规范。 【Topic 2】第 7 题（单选）", "author": "刘霁影", "group": "眼科出题第一组"}, {"q": "急性闭角型青光眼发作期首选的降眼压药物是：", "o": {"A": "0.5%噻吗洛尔滴眼液", "B": "1%毛果芸香碱滴眼液", "C": "20%甘露醇静脉滴注", "D": "布林佐胺滴眼液", "E": "曲伏前列素滴眼液"}, "a": "C", "e": "解析：急性闭角型青光眼发作期需争分夺秒降眼压，首选20%甘露醇250ml快速静脉滴注，配合局部缩瞳药（毛果芸香碱）和房水生成抑制剂。来源：青光眼课件\"急性发作期治疗\"。 【Topic 2】第 8 题（多选）", "author": "刘霁影", "group": "眼科出题第一组"}, {"q": "下列关于眼科门诊病历书写的要点，正确的有：（多选）", "o": {"A": "主诉应注明眼别和持续时间", "B": "视力检查应记录矫正视力", "C": "裂隙灯检查应描述角膜、前房、虹膜、晶状体", "D": "诊断应注明眼别", "E": "眼压测量可省略"}, "a": "A", "e": "BCD 解析：眼压测量是眼科基本检查，不可省略。特别是40岁以上患者或疑似青光眼者必须测量眼压。 【Topic 2】第 9 题（判断）", "author": "刘霁影", "group": "眼科出题第一组"}, {"q": "急性结膜炎最常见的病原体是：", "o": {"A": "病毒", "B": "细菌", "C": "真菌", "D": "衣原体", "E": "寄生虫"}, "a": "A", "e": "解析：急性结膜炎以病毒性（腺病毒）最为常见，其次为细菌性。两者鉴别要点：病毒性多为水样分泌物，耳前淋巴结肿大；细菌性多为脓性分泌物。 【Topic 3】第 12 题（单选）", "author": "刘霁影", "group": "眼科出题第一组"}, {"q": "翼状胬肉的主要病因是：", "o": {"A": "遗传因素", "B": "紫外线照射", "C": "细菌感染", "D": "过敏反应", "E": "自身免疫"}, "a": "B", "e": "解析：翼状胬肉与长期紫外线（UV）暴露密切相关，户外工作者发病率显著增高。病变为结膜下纤维血管组织增生侵入角膜。 【Topic 3】第 13 题（多选）", "author": "刘霁影", "group": "眼科出题第一组"}, {"q": "干眼症的常见临床表现包括：（多选）", "o": {"A": "眼干涩感", "B": "异物感", "C": "烧灼感", "D": "视疲劳", "E": "流泪（反射性）"}, "a": "A", "e": "BCDE 解析：干眼症的表现多样，严重干眼可因角膜刺激引起反射性泪液分泌增多（假性流泪）。诊断需结合泪膜破裂时间（BUT<10s）和Schirmer试验。 【Topic 3】第 14 题（判断）", "author": "刘霁影", "group": "眼科出题第一组"}, {"q": "细菌性角膜炎最常见的致病菌是：", "o": {"A": "金黄色葡萄球菌", "B": "铜绿假单胞菌", "C": "肺炎链球菌", "D": "淋球菌", "E": "表皮葡萄球菌"}, "a": "A", "e": "解析：金黄色葡萄球菌和表皮葡萄球菌是细菌性角膜炎最常见的致病菌。铜绿假单胞菌常见于角膜接触镜佩戴者，进展迅速，24小时内可致角膜穿孔。 【Topic 4】第 17 题（单选）", "author": "刘霁影", "group": "眼科出题第一组"}, {"q": "单纯疱疹病毒性角膜炎最典型的角膜体征是：", "o": {"A": "角膜内皮斑", "B": "树枝状角膜溃疡", "C": "角膜后弹力层膨出", "D": "钱币状角膜浸润", "E": "角膜白斑"}, "a": "B", "e": "解析：单纯疱疹病毒（HSV）性角膜炎上皮型最典型体征为树枝状角膜溃疡（dendritic ulcer），荧光素染色呈树枝状。基质型表现为盘状角膜炎。禁用糖皮质激素（上皮型）。 【Topic 4】第 18 题（多选）", "author": "刘霁影", "group": "眼科出题第一组"}, {"q": "下列关于真菌性角膜炎的描述，正确的有：（多选）", "o": {"A": "常有植物性外伤史", "B": "角膜浸润呈羽毛状边界", "C": "前房积脓常见", "D": "首选糖皮质激素治疗", "E": "角膜刮片镜检可找到菌丝"}, "a": "A", "e": "BCE 解析：真菌性角膜炎禁用糖皮质激素（可加重感染）。治疗首选5%那他霉素或两性霉素B滴眼液。植物性外伤史（如树枝、稻草划伤）是最常见的危险因素。 【Topic 4】第 19 题（判断）", "author": "刘霁影", "group": "眼科出题第一组"}, {"q": "急性前葡萄膜炎（虹膜睫状体炎）最具特征性的临床表现是：", "o": {"A": "眼压升高", "B": "角膜后KP+房水闪辉", "C": "角膜水肿", "D": "瞳孔散大", "E": "结膜下出血"}, "a": "B", "e": "解析：急性前葡萄膜炎特征性改变为角膜后沉着物（KP）+房水闪辉（Tyndall征）+瞳孔缩小（虹膜括约肌痉挛）。与急性闭角型青光眼（角膜水肿+瞳孔散大+眼压高）形成鉴别。 【Topic 5】第 22 题（单选）", "author": "刘霁影", "group": "眼科出题第一组"}, {"q": "年龄相关性白内障最常见的类型是：", "o": {"A": "核性白内障", "B": "皮质性白内障", "C": "后囊下白内障", "D": "前囊下白内障", "E": "混合型白内障"}, "a": "B", "e": "解析：年龄相关性白内障中皮质性最为常见，表现为晶状体皮质楔形混浊。核性白内障表现为晶状体核颜色加深（黄→棕→黑）。后囊下白内障虽少见但早期即可严重影响视力。 【Topic 5】第 23 题（单选）", "author": "刘霁影", "group": "眼科出题第一组"}, {"q": "白内障手术的主要适应证是：", "o": {"A": "晶状体混浊程度达到成熟期", "B": "矫正视力<0.5且影响日常生活", "C": "出现青光眼并发症", "D": "患者年龄>60岁", "E": "药物治疗无效"}, "a": "B", "e": "解析：目前白内障手术适应证为\"患者因白内障导致的视力下降已影响到日常生活和工作\"。不一定要等待\"成熟\"——过熟期反而增加手术难度和并发症风险。来源：白内障课件。 【Topic 5】第 24 题（简答）", "author": "刘霁影", "group": "眼科出题第一组"}, {"q": "青光眼最典型的视神经损害表现是：", "o": {"A": "视盘水肿", "B": "视盘凹陷性萎缩和视野缺损", "C": "视盘充血", "D": "视盘新生血管", "E": "视网膜出血"}, "a": "B", "e": "解析：青光眼的定义即\"一组以视神经凹陷性萎缩及视野缺损为共同特征的疾病\"。眼压升高是主要危险因素但不是诊断必要条件（正常眼压性青光眼）。 【Topic 6】第 27 题（单选）", "author": "刘霁影", "group": "眼科出题第一组"}, {"q": "原发性开角型青光眼的一线治疗药物是：", "o": {"A": "毛果芸香碱", "B": "噻吗洛尔", "C": "前列腺素衍生物", "D": "布林佐胺", "E": "甘露醇"}, "a": "C", "e": "解析：前列腺素衍生物（如拉坦前列素、曲伏前列素）通过增加葡萄膜巩膜途径房水外流降低眼压，降压效果最强、依从性好（每日一次），是POAG的一线用药。 【Topic 6】第 28 题（单选）", "author": "刘霁影", "group": "眼科出题第一组"}, {"q": "急性闭角型青光眼发作后三联征不包括：", "o": {"A": "色素性KP", "B": "虹膜节段性萎缩", "C": "晶状体前表面青光眼斑", "D": "前房角开放", "E": "瞳孔散大"}, "a": "D", "e": "解析：急性发作后三联征为：色素性KP + 虹膜节段性萎缩 + 青光眼斑。发作后房角关闭而非开放。三联征有助于回顾性诊断既往是否有过急性发作。 【Topic 6】第 29 题（多选）", "author": "刘霁影", "group": "眼科出题第一组"}, {"q": "下列关于青光眼降眼压药物的作用机制，正确的配对有：（多选）", "o": {"A": "毛果芸香碱 — 缩小瞳孔，开放房角", "B": "噻吗洛尔 — 减少房水生成", "C": "拉坦前列素 — 增加葡萄膜巩膜途径房水外流", "D": "布林佐胺 — 抑制碳酸酐酶，减少房水生成", "E": "甘露醇 — 增加房水外流"}, "a": "A", "e": "BCD 解析：甘露醇为高渗脱水剂，通过提高血浆渗透压使玻璃体脱水浓缩，降低眼压——不是增加房水外流。全身副作用需注意心肾功能。来源：青光眼药物总结表。 【Topic 6】第 30 题（病例分析）", "author": "刘霁影", "group": "眼科出题第一组"}, {"q": "近视眼的屈光状态是：", "o": {"A": "平行光线聚焦于视网膜前", "B": "平行光线聚焦于视网膜后", "C": "平行光线聚焦于视网膜上", "D": "无晶状体状态", "E": "散光状态"}, "a": "A", "e": "解析：近视（myopia）是因眼轴过长或屈光力过强，导致平行光线经眼的屈光系统后聚焦在视网膜前方。矫正用凹透镜（负球镜）。 【Topic 7】第 32 题（单选）", "author": "刘霁影", "group": "眼科出题第一组"}, {"q": "儿童弱视治疗的最佳年龄是：", "o": {"A": "1岁以内", "B": "3-6岁", "C": "8-10岁", "D": "12-15岁", "E": "任何年龄效果相同"}, "a": "B", "e": "解析：弱视治疗的黄金期为3-6岁（视觉发育关键期）。超过8岁治疗效果明显下降，超过12岁基本不可逆。早期筛查是预防弱视的关键。 【Topic 7】第 33 题（多选）", "author": "刘霁影", "group": "眼科出题第一组"}, {"q": "下列关于屈光不正的描述，正确的有：（多选）", "o": {"A": "近视用凹透镜矫正", "B": "远视用凸透镜矫正", "C": "老视是由于晶状体弹性下降", "D": "散光是由于角膜或晶状体表面各方向曲率不一致", "E": "青少年近视加深与近距离用眼过度有关"}, "a": "A", "e": "BCDE 解析：全部正确。老视（presbyopia）是年龄相关的晶状体调节力下降，一般为40岁后出现。散光是不规则散光，各子午线屈光力不同。 【Topic 7】第 34 题（判断）", "author": "刘霁影", "group": "眼科出题第一组"}, {"q": "糖尿病视网膜病变（DR）非增生期最早期可见的眼底改变是：", "o": {"A": "视网膜新生血管", "B": "玻璃体积血", "C": "毛细血管瘤样膨出（微血管瘤）", "D": "纤维血管膜", "E": "牵拉性视网膜脱离"}, "a": "C", "e": "解析：DR I期（轻度NPDR）的特征为\"仅有毛细血管瘤样膨出改变\"，即微血管瘤。这是DR最早的可观察眼底改变，随病程进展出现出血、渗出、棉绒斑，至增生期出现新生血管。来源：眼与全身病课件DR分期。 【Topic 8】第 37 题（单选）", "author": "刘霁影", "group": "眼科出题第一组"}, {"q": "高血压视网膜病变最常见的眼底表现是：", "o": {"A": "视盘水肿", "B": "视网膜动脉变细、动静脉交叉压迫征", "C": "视网膜新生血管", "D": "黄斑樱桃红斑", "E": "视网膜脱离"}, "a": "B", "e": "解析：高血压视网膜病变典型表现为视网膜动脉痉挛、变细，动静脉交叉处出现压迫征（铜丝样/银丝样动脉），严重者可出现视网膜出血、棉绒斑、视盘水肿。 【Topic 8】第 38 题（多选）", "author": "刘霁影", "group": "眼科出题第一组"}, {"q": "\"4-2-1\"原则用于判断重度NPDR，其含义包括：（多选）", "o": {"A": "4个象限内出血点≥20个", "B": "2个象限静脉串珠", "C": "1个象限IRMA", "D": "1个象限出现新生血管", "E": "4个象限出现新生血管"}, "a": "A", "e": "BC 解析：\"4-2-1原则\"是判断重度NPDR的标准：4个象限视网膜出血≥20个出血点；2个象限静脉串珠；1个象限视网膜内微血管异常（IRMA）。出现新生血管即为PDR（增生期）。来源：眼底课件及眼与全身病教材。 【Topic 8】第 39 题（简答）", "author": "刘霁影", "group": "眼科出题第一组"}, {"q": "眼球钝挫伤后最常见的前房积血来源于：", "o": {"A": "角膜缘血管", "B": "虹膜大环血管和睫状体血管", "C": "视网膜中央动脉", "D": "脉络膜血管", "E": "结膜血管"}, "a": "B", "e": "解析：眼球钝挫伤时外力使眼球前后径压缩、赤道部扩张，导致虹膜大环和睫状体血管破裂出血进入前房（前房积血，hyphma）。出血量大时需半卧位休息，限制活动。 【Topic 9】第 42 题（单选）", "author": "刘霁影", "group": "眼科出题第一组"}, {"q": "眼化学烧伤急救的首要措施是：", "o": {"A": "立即送医院", "B": "立即就地用大量清水反复冲洗结膜囊", "C": "滴抗生素眼药水", "D": "包扎患眼", "E": "全身应用激素"}, "a": "B", "e": "解析：化学烧伤（酸或碱烧伤）的急救黄金原则：分秒必争、就地取材、大量清水反复冲洗，至少30分钟以上，然后立即送医院进一步处理。碱烧伤比酸性烧伤更严重（碱具有皂化作用，可穿透深层组织）。来源：眼外伤课件。 【Topic 9】第 43 题（多选）", "author": "刘霁影", "group": "眼科出题第一组"}, {"q": "下列关于交感性眼炎的描述，正确的有：（多选）", "o": {"A": "是穿通伤眼或内眼手术眼后，健眼发生的肉芽肿性全葡萄膜炎", "B": "最危险的时间是伤后4-6周", "C": "一经确诊应立即摘除诱发眼", "D": "主要治疗为大剂量糖皮质激素", "E": "易感因素包括葡萄膜组织嵌顿和眼内异物存留"}, "a": "A", "e": "BDE 解析：交感性眼炎一旦发生，摘除诱发眼对交感眼的病程并无影响。摘除诱发眼的指征是伤眼严重损伤且视力无恢复可能、合并难控性青光眼、或慢性炎症反复发作伤眼已失明。来源：葡萄膜炎课件\"交感性眼炎\"。 【Topic 9】第 44 题（判断）", "author": "刘霁影", "group": "眼科出题第一组"}, {"q": "眼球壁由外向内依次分为哪三层？", "o": {"A": "角膜、虹膜、视网膜", "B": "纤维膜（角膜和巩膜）、血管膜（葡萄膜）、视网膜", "C": "结膜、巩膜、脉络膜", "D": "角膜、晶状体、玻璃体", "E": "角膜、前房、视网膜"}, "a": "B", "e": "眼球壁由外向内三层：纤维膜（角膜+巩膜）、葡萄膜/血管膜（虹膜+睫状体+脉络膜）、视网膜。", "author": "周智睿", "group": "眼科出题第一组"}, {"q": "角膜五层组织结构中，具有再生能力的是？", "o": {"A": "上皮细胞层和基质层", "B": "上皮细胞层和后弹力层", "C": "前弹力层和内皮细胞层", "D": "基质层和内皮细胞层", "E": "上皮细胞层和内皮细胞层"}, "a": "B", "e": "角膜上皮细胞层和后弹力层可再生，前弹力层和内皮细胞层损伤后不能再生。", "author": "周智睿", "group": "眼科出题第一组"}, {"q": "角膜的屈光力约占眼球总屈光力的？", "o": {"A": "1/4", "B": "1/3", "C": "1/2", "D": "2/3", "E": "3/4"}, "a": "D", "e": "角膜屈光力约43D，占眼球总屈光力的2/3。", "author": "周智睿", "group": "眼科出题第一组"}, {"q": "房水循环的主要途径（约占70%）的正确顺序是？", "o": {"A": "睫状突→前房→后房→Schlemm管→小梁网→集液管", "B": "睫状突→后房→瞳孔→前房→小梁网→Schlemm管→集液管", "C": "睫状突→玻璃体腔→前房→小梁网→集液管", "D": "睫状突→后房→前房→虹膜表面隐窝→集液管", "E": "睫状突→后房→瞳孔→前房→葡萄膜巩膜途径"}, "a": "B", "e": "房水主要外流途径：睫状突→后房→瞳孔→前房→小梁网→Schlemm管→集液管→睫状前静脉。次要途径（10-20%）为葡萄膜巩膜途径。", "author": "周智睿", "group": "眼科出题第一组"}, {"q": "关于晶状体的描述，下列哪项是正确的？", "o": {"A": "晶状体有丰富的血管和神经支配", "B": "晶状体营养主要来源于视网膜中央动脉", "C": "晶状体通过改变自身形状实现调节功能", "D": "晶状体仅提供约1/10的眼球屈光力", "E": "晶状体位于玻璃体后方"}, "a": "C", "e": "晶状体无血管、无神经，营养来自房水和玻璃体，提供约1/3屈光力。", "author": "周智睿", "group": "眼科出题第一组"}, {"q": "正常眼压的统计学范围是？", "o": {"A": "5～15mmHg", "B": "10～21mmHg", "C": "15～30mmHg", "D": "8～18mmHg", "E": "20～25mmHg"}, "a": "B", "e": "正常眼压10～21mmHg，24h内波动<8mmHg，双眼差值<5mmHg。", "author": "周智睿", "group": "眼科出题第一组"}, {"q": "世界第一位不可逆致盲眼病是？", "o": {"A": "白内障", "B": "青光眼", "C": "年龄相关性黄斑变性", "D": "糖尿病视网膜病变", "E": "角膜白斑"}, "a": "B", "e": "青光眼是世界第二位致盲眼病（仅次于白内障），但为第一位不可逆致盲眼病，致盲率约10%。", "author": "周智睿", "group": "眼科出题第一组"}, {"q": "支配瞳孔括约肌的神经是？", "o": {"A": "交感神经", "B": "动眼神经中的副交感神经纤维", "C": "三叉神经眼支", "D": "面神经", "E": "滑车神经"}, "a": "B", "e": "瞳孔括约肌由动眼神经副交感纤维支配（缩瞳），瞳孔开大肌由交感神经支配（散瞳）。", "author": "周智睿", "group": "眼科出题第一组"}, {"q": "黄斑中心凹处的感光细胞构成为？", "o": {"A": "仅有视杆细胞", "B": "仅有视锥细胞", "C": "视杆细胞和视锥细胞各半", "D": "主要含视杆细胞，少量视锥细胞", "E": "无感光细胞分布"}, "a": "B", "e": "黄斑中心凹仅有视锥细胞，是视觉最敏锐的部位，负责中心视力和色觉。", "author": "周智睿", "group": "眼科出题第一组"}, {"q": "白内障手术目前最主流的手术方式是？", "o": {"A": "白内障囊内摘除术（ICCE）", "B": "白内障囊外摘除术（ECCE）", "C": "超声乳化白内障吸除联合人工晶体植入术（Phaco+IOL）", "D": "激光周边虹膜切除术", "E": "小梁切除术"}, "a": "C", "e": "正确答案：超声乳化白内障吸除联合人工晶体植入术（Phaco+IOL）。", "author": "周智睿", "group": "眼科出题第一组"}, {"q": "原发性开角型青光眼（POAG）的房角状态是？", "o": {"A": "完全关闭", "B": "部分关闭", "C": "开放", "D": "广泛粘连", "E": "周期性关闭"}, "a": "C", "e": "POAG特征为眼压升高、房角开放、典型的青光眼性视乳头和视野损害。", "author": "周智睿", "group": "眼科出题第一组"}, {"q": "关于视神经的解剖分段，眶内段的长度约为？", "o": {"A": "约1mm", "B": "约9mm", "C": "约16mm", "D": "约25mm", "E": "约40mm"}, "a": "D", "e": "视神经分四段：眼内段1mm、眶内段25mm、管内段4-9mm、颅内段10mm。", "author": "周智睿", "group": "眼科出题第一组"}, {"q": "胚胎发育中，胚裂闭合不全可导致？", "o": {"A": "先天性白内障", "B": "先天性青光眼", "C": "虹膜/脉络膜缺损", "D": "永存原始玻璃体增生症（PHPV）", "E": "先天性睑裂狭小"}, "a": "C", "e": "胚裂于6-8周闭合，闭合不全可致虹膜缺损（钥匙孔瞳孔）或脉络膜缺损。", "author": "周智睿", "group": "眼科出题第一组"}, {"q": "前列腺素衍生物类降眼压药物的主要作用机制是？", "o": {"A": "抑制房水生成", "B": "增加葡萄膜巩膜途径房水外流", "C": "缩小瞳孔，增加房角开放", "D": "减少玻璃体容积", "E": "抑制碳酸酐酶活性"}, "a": "B", "e": "前列腺素衍生物（如拉坦前列素、曲伏前列素）增加葡萄膜巩膜途径房水外流，为POAG一线用药。", "author": "周智睿", "group": "眼科出题第一组"}, {"q": "睫状体的主要功能不包括下列哪项？", "o": {"A": "产生房水", "B": "调节晶状体曲率（睫状肌收缩）", "C": "遮光和暗房作用", "D": "维持眼压稳定", "E": "参与血-房水屏障"}, "a": "C", "e": "遮光和暗房作用是虹膜和脉络膜的功能，睫状体主要功能为产生房水和调节屈光。", "author": "周智睿", "group": "眼科出题第一组"}, {"q": "患者男性，65岁，双眼无痛性渐进性视力下降3年，夜间开车眩光明显。查体：双眼晶状体皮质呈楔形灰白色混浊，前房深度正常，眼底窥入模糊。最可能的诊断是？", "o": {"A": "核性白内障", "B": "年龄相关性皮质性白内障", "C": "后囊下性白内障", "D": "先天性白内障", "E": "并发性白内障"}, "a": "B", "e": "正确答案：年龄相关性皮质性白内障。", "author": "周智睿", "group": "眼科出题第一组"}, {"q": "接上题，患者右眼视力0.15，矫正不应，前房稍浅，晶状体皮质明显混浊伴水肿，虹膜投影征（+）。该患者右眼白内障处于哪一期？", "o": {"A": "初发期", "B": "膨胀期（未成熟期）", "C": "成熟期", "D": "过熟期", "E": "临床前期"}, "a": "B", "e": "膨胀期特点：皮质水肿、前房变浅、虹膜投影阳性、视力下降明显但仍有部分透明皮质。", "author": "周智睿", "group": "眼科出题第一组"}, {"q": "患者女性，57岁，因与家人争吵后突发右眼剧烈胀痛伴同侧头痛、恶心呕吐6小时来诊。查体：右眼视力指数/眼前，结膜混合充血，角膜雾状水肿，前房极浅（周边<1/4CT），瞳孔散大约5mm，对光反射消失，右眼眼压62mmHg，左眼18mmHg。最可能的诊断是？", "o": {"A": "急性结膜炎", "B": "急性虹膜睫状体炎", "C": "原发性急性闭角型青光眼（急性发作期）", "D": "原发性开角型青光眼", "E": "颅内高压综合征"}, "a": "C", "e": "典型急性闭角型青光眼急性发作：情绪波动诱因、剧烈眼痛伴头痛、恶心呕吐、眼压急剧升高、前房极浅、角膜水肿、瞳孔散大。", "author": "周智睿", "group": "眼科出题第一组"}, {"q": "接上题，对该患者急诊处理中应避免使用的是？", "o": {"A": "20%甘露醇快速静脉滴注", "B": "毛果芸香碱滴眼液缩瞳", "C": "碳酸酐酶抑制剂口服", "D": "散瞳药物点眼", "E": "β-受体阻滞剂滴眼液"}, "a": "D", "e": "急性闭角型青光眼应缩瞳（解除瞳孔阻滞），散瞳剂将加重房角关闭，为绝对禁忌。", "author": "周智睿", "group": "眼科出题第一组"}, {"q": "患者男性，55岁，体检发现眼压右28mmHg、左26mmHg，无自觉症状。前房深度正常，房角镜检查房角开放，眼底C/D=0.75，视野示旁中心暗点和鼻侧阶梯。最可能的诊断是？", "o": {"A": "高眼压症", "B": "原发性开角型青光眼（POAG）", "C": "慢性闭角型青光眼", "D": "正常眼压性青光眼", "E": "先天性青光眼"}, "a": "B", "e": "POAG：眼压升高+房角开放+青光眼性视乳头凹陷（C/D增大）+典型视野损害。", "author": "周智睿", "group": "眼科出题第一组"}, {"q": "下列哪种药物被推荐为原发性开角型青光眼的一线用药？", "o": {"A": "毛果芸香碱滴眼液", "B": "布林佐胺滴眼液", "C": "拉坦前列素滴眼液", "D": "溴莫尼定滴眼液", "E": "甘露醇注射液"}, "a": "C", "e": "前列腺素衍生物（如拉坦前列素）为POAG一线用药，增加葡萄膜巩膜途径房水外流。", "author": "周智睿", "group": "眼科出题第一组"}, {"q": "患者女性，32岁，右眼反复发红、畏光、眼痛、视力下降1年，再发2天。查体：右眼睫状充血，角膜后壁见灰白色细小KP，房水闪辉（+），瞳孔缩小、不规则，部分后粘连。眼压右14mmHg。最可能的诊断是？", "o": {"A": "急性结膜炎", "B": "急性闭角型青光眼", "C": "前葡萄膜炎（虹膜睫状体炎）", "D": "角膜炎", "E": "巩膜炎"}, "a": "C", "e": "典型急性前葡萄膜炎：睫状充血、KP、房水闪辉、瞳孔缩小+后粘连；眼压正常或偏低。", "author": "周智睿", "group": "眼科出题第一组"}, {"q": "Vogt-小柳-原田综合征（VKH）的眼外表现不包括？", "o": {"A": "脱发", "B": "白发", "C": "皮肤白斑（白癜风）", "D": "听力下降及耳鸣", "E": "关节畸形"}, "a": "E", "e": "VKH眼外表现：脱发、白发、皮肤白斑（白癜风）、听力下降、耳鸣、脑膜刺激征等，无关节畸形。", "author": "周智睿", "group": "眼科出题第一组"}, {"q": "关于交感性眼炎，下列叙述正确的是？", "o": {"A": "仅发生于穿通伤后24小时内", "B": "是一种化脓性全葡萄膜炎", "C": "潜伏期一般为2周至2年，最危险时期为伤后4～6周", "D": "被交感眼不会发病", "E": "应首先使用大量抗生素治疗"}, "a": "C", "e": "交感性眼炎是穿通伤后诱发眼发生的非化脓性全葡萄膜炎，潜伏期2周-2年，4-6周最危险。", "author": "周智睿", "group": "眼科出题第一组"}, {"q": "患者男性，28岁，左眼视力突然下降伴眼球转动时疼痛3天。查体：左眼视力0.1，RAPD（+），眼底视乳头充血水肿，视野示巨大中心暗点。最可能的诊断是？", "o": {"A": "缺血性视神经病变", "B": "视神经炎", "C": "视网膜中央静脉阻塞", "D": "视网膜脱离", "E": "青光眼性视神经萎缩"}, "a": "B", "e": "视神经炎典型表现：中青年、急性视力下降、眼球转动痛、RAPD阳性、中心暗点。", "author": "周智睿", "group": "眼科出题第一组"}, {"q": "视神经炎与缺血性视神经病变在临床上的重要鉴别点是？", "o": {"A": "视力下降程度", "B": "眼球转动时是否疼痛", "C": "有无视乳头水肿", "D": "RAPD是否阳性", "E": "视野缺损形态"}, "a": "B", "e": "视神经炎有眼球转动痛（炎症累及眶内段视神经鞘膜），缺血性视神经病变无疼痛。", "author": "周智睿", "group": "眼科出题第一组"}, {"q": "视网膜中央动脉阻塞的典型眼底表现是？", "o": {"A": "视网膜广泛出血", "B": "视网膜后极部灰白色水肿、黄斑樱桃红点", "C": "视网膜静脉迂曲扩张", "D": "视乳头水肿", "E": "视网膜色素沉着"}, "a": "B", "e": "视网膜中央动脉阻塞：视网膜内层缺血水肿呈灰白色，黄斑中心凹因无内层结构而透见脉络膜红色背景，形成'樱桃红点'。", "author": "周智睿", "group": "眼科出题第一组"}, {"q": "视网膜中央动脉供应视网膜的哪几层？", "o": {"A": "视网膜外5层", "B": "视网膜内5层", "C": "视网膜全层", "D": "仅神经纤维层", "E": "仅感光细胞层"}, "a": "B", "e": "视网膜中央动脉供视网膜内5层，睫状后短动脉供视网膜外5层。", "author": "周智睿", "group": "眼科出题第一组"}, {"q": "支配外直肌的脑神经是？", "o": {"A": "动眼神经（Ⅲ）", "B": "滑车神经（Ⅳ）", "C": "三叉神经（Ⅴ）", "D": "展神经（Ⅵ）", "E": "面神经（Ⅶ）"}, "a": "D", "e": "外直肌由展神经支配，上斜肌由滑车神经支配，其余眼外肌由动眼神经支配。", "author": "周智睿", "group": "眼科出题第一组"}, {"q": "患者，女，3个月，家长发现其双眼畏光、流泪、不愿睁眼。查体：双角膜直径增大（>12mm）、角膜轻度雾状混浊，眼压右32mmHg、左30mmHg。最可能的诊断是？", "o": {"A": "先天性白内障", "B": "先天性青光眼（婴幼儿型）", "C": "先天性角膜营养不良", "D": "新生儿泪囊炎", "E": "先天性无虹膜"}, "a": "B", "e": "婴幼儿型青光眼三大主征：畏光流泪、角膜增大混浊、眼压升高。", "author": "周智睿", "group": "眼科出题第一组"}, {"q": "接上题，该病的治疗原则是？", "o": {"A": "长期局部降眼压药物治疗", "B": "尽早手术治疗", "C": "观察随访，多数可自愈", "D": "配戴角膜接触镜", "E": "角膜移植术"}, "a": "B", "e": "先天性青光眼因房角发育异常，药物疗效有限，原则上尽早行房角切开术或小梁切开术。", "author": "周智睿", "group": "眼科出题第一组"}, {"q": "下列哪项不是急性闭角型青光眼与急性虹膜睫状体炎的鉴别要点？", "o": {"A": "眼压高低", "B": "瞳孔大小", "C": "前房深度", "D": "角膜后KP性质", "E": "患者年龄"}, "a": "E", "e": "两者鉴别要点包括：眼压（青高/虹正或低）、瞳孔（青散大/虹缩小）、前房（青浅/虹正常）、KP（青色索性/虹灰白色）、角膜（青雾状水肿/虹透明），年龄不是鉴别要点。", "author": "周智睿", "group": "眼科出题第一组"}, {"q": "患者女性，72岁，行右眼超声乳化白内障吸除+人工晶体植入术后第2天，术眼突发剧烈疼痛、视力骤降。查体：结膜混合充血，角膜水肿，前房积脓，红光反射消失。B超示玻璃体大量混浊。首先应考虑？", "o": {"A": "术后正常炎症反应", "B": "感染性眼内炎", "C": "角膜内皮失代偿", "D": "人工晶体脱位", "E": "急性闭角型青光眼"}, "a": "B", "e": "白内障术后急性眼内炎特征：突发剧痛、视力骤降、前房积脓、玻璃体混浊，为眼科急症。", "author": "周智睿", "group": "眼科出题第一组"}, {"q": "白内障术前常规检查中，以下哪项通常不需要？", "o": {"A": "裂隙灯检查", "B": "眼压测量和角膜内皮镜检查", "C": "IOLmaster生物测量", "D": "头颅MRI", "E": "眼底检查及眼部B超"}, "a": "D", "e": "白内障术前常规眼部检查+全身基础检查（血压、血糖、心电图、凝血功能等），头颅MRI非必需。", "author": "周智睿", "group": "眼科出题第一组"}, {"q": "皮质性白内障过熟期可能出现的并发症不包括？", "o": {"A": "晶状体溶解性青光眼", "B": "晶状体过敏性葡萄膜炎", "C": "晶状体脱位", "D": "前房积血", "E": "囊膜皱缩、核下沉"}, "a": "D", "e": "过熟期可并发晶状体溶解性青光眼、晶状体过敏性葡萄膜炎、晶状体脱位，囊膜皱缩和核下沉为过熟期本身表现。", "author": "周智睿", "group": "眼科出题第一组"}, {"q": "关于青光眼视神经损害的机制，机械学说的核心观点是？", "o": {"A": "眼压升高导致视盘供血不足", "B": "眼压作用于筛板直接压迫视神经纤维，阻碍轴浆流运输", "C": "自身免疫反应损伤视神经", "D": "氧化应激导致视神经凋亡", "E": "谷氨酸兴奋性毒性损伤"}, "a": "B", "e": "机械学说认为眼压升高使筛板向后弯曲，直接压迫视神经纤维，阻碍轴浆流运输；血管学说认为导致视盘缺血。", "author": "周智睿", "group": "眼科出题第一组"}, {"q": "下列哪种降眼压药物属于碳酸酐酶抑制剂的局部用药？", "o": {"A": "甘露醇", "B": "醋甲唑胺", "C": "布林佐胺", "D": "乙酰唑胺", "E": "噻吗洛尔"}, "a": "C", "e": "布林佐胺为局部用碳酸酐酶抑制剂，乙酰唑胺、醋甲唑胺为全身（口服）用药，甘露醇为高渗剂。", "author": "周智睿", "group": "眼科出题第一组"}, {"q": "青光眼睫状体炎综合征（青睫综合征）的临床特征不包括？", "o": {"A": "好发于中青年", "B": "眼压升高明显", "C": "角膜后见粗大羊脂状KP", "D": "反复发作引起虹膜广泛后粘连", "E": "房水闪辉轻微"}, "a": "D", "e": "青睫综合征特点：中青年、眼压显著升高、羊脂状KP、房水闪辉轻微、不引起虹膜后粘连、易复发。", "author": "周智睿", "group": "眼科出题第一组"}, {"q": "视交叉中部（鼻侧交叉纤维）受压时，出现的视野改变是？", "o": {"A": "单眼全盲", "B": "双眼颞侧偏盲", "C": "双眼鼻侧偏盲", "D": "同侧偏盲", "E": "管状视野"}, "a": "B", "e": "视交叉中部（来自双眼鼻侧视网膜的交叉纤维）受损时出现双眼颞侧偏盲，常见于垂体瘤压迫。", "author": "周智睿", "group": "眼科出题第一组"}, {"q": "年龄相关性白内障中，早期即引起明显视力下降的类型是？", "o": {"A": "皮质性白内障", "B": "核性白内障", "C": "后囊下性白内障", "D": "点状白内障", "E": "前极性白内障"}, "a": "C", "e": "后囊下性白内障因混浊位于视轴节点处，早期即可引起明显视力下降，尤其在强光下瞳孔缩小时更明显。", "author": "周智睿", "group": "眼科出题第一组"}, {"q": "角膜约占眼球总屈光力的比例是？", "o": {"A": "1/6", "B": "1/4", "C": "1/3", "D": "1/2", "E": "2/3"}, "a": "E", "e": "角膜屈光力约为 43D，约占眼球总屈光力的 2/3。", "author": "战鹏宇", "group": "眼科出题第一组"}, {"q": "房水主要由下列哪一结构产生？", "o": {"A": "虹膜色素上皮", "B": "睫状突非色素上皮", "C": "脉络膜毛细血管", "D": "小梁网", "E": "Schlemm 管"}, "a": "B", "e": "房水主要由睫状突非色素上皮主动分泌。", "author": "战鹏宇", "group": "眼科出题第一组"}, {"q": "房水主要外流途径的正确顺序是？", "o": {"A": "睫状突→前房→后房→瞳孔→小梁网→Schlemm 管", "B": "睫状突→后房→瞳孔→前房→小梁网→Schlemm 管", "C": "睫状突→玻璃体腔→前房→房角→Schlemm 管", "D": "睫状突→后房→前房→脉络膜→眼眶静脉", "E": "睫状突→虹膜表面隐窝→后房→小梁网"}, "a": "B", "e": "主要途径为睫状突产生房水，经后房、瞳孔、前房、小梁网及 Schlemm 管排出。", "author": "战鹏宇", "group": "眼科出题第一组"}, {"q": "黄斑中心凹处主要分布的感光细胞是？", "o": {"A": "视杆细胞", "B": "视锥细胞", "C": "双极细胞", "D": "神经节细胞", "E": "色素上皮细胞"}, "a": "B", "e": "黄斑中心凹仅有视锥细胞，是视觉最敏锐的部位。", "author": "战鹏宇", "group": "眼科出题第一组"}, {"q": "白内障的基本病变是？", "o": {"A": "角膜透明度降低", "B": "房水循环受阻", "C": "晶状体透明度降低或颜色改变", "D": "玻璃体液化", "E": "视网膜神经上皮脱离"}, "a": "C", "e": "白内障是晶状体透明度降低或颜色改变导致光学质量下降。", "author": "战鹏宇", "group": "眼科出题第一组"}, {"q": "青光眼最具有共同性的损害表现是？", "o": {"A": "结膜分泌物增多", "B": "晶状体混浊", "C": "视神经凹陷性萎缩及相应视野缺损", "D": "角膜溃疡", "E": "玻璃体积血"}, "a": "C", "e": "青光眼是一组以视神经凹陷性萎缩和视野缺损为共同特征的疾病。", "author": "战鹏宇", "group": "眼科出题第一组"}, {"q": "视网膜中央静脉阻塞较典型的眼底改变是？", "o": {"A": "视网膜苍白水肿伴樱桃红斑", "B": "视网膜静脉迂曲扩张伴广泛出血", "C": "视网膜裂孔伴马蹄形变性", "D": "黄斑玻璃膜疣", "E": "视盘边界清楚且苍白"}, "a": "B", "e": "视网膜静脉回流受阻时，常见静脉迂曲扩张、出血、水肿和渗出。", "author": "战鹏宇", "group": "眼科出题第一组"}, {"q": "重度非增生期糖尿病性视网膜病变常采用的判断原则是？", "o": {"A": "1、2、3 原则", "B": "2、3、4 原则", "C": "3、2、1 原则", "D": "4、2、1 原则", "E": "5、4、3 原则"}, "a": "D", "e": "重度 NPDR 的经典判断为“4、2、1”原则。", "author": "战鹏宇", "group": "眼科出题第一组"}, {"q": "湿性年龄相关性黄斑变性的关键病理改变是？", "o": {"A": "脉络膜新生血管形成", "B": "视网膜中央动脉栓塞", "C": "视网膜裂孔形成", "D": "晶状体核硬化", "E": "小梁网阻塞"}, "a": "A", "e": "湿性 AMD 的关键改变是脉络膜新生血管形成，可伴渗漏、出血和瘢痕。", "author": "战鹏宇", "group": "眼科出题第一组"}, {"q": "视网膜脱离是指？", "o": {"A": "视网膜神经上皮与色素上皮分离", "B": "玻璃体与晶状体分离", "C": "脉络膜与巩膜分离", "D": "角膜上皮与基质分离", "E": "虹膜与睫状体分离"}, "a": "A", "e": "视网膜脱离的定义是视网膜神经上皮与视网膜色素上皮之间分离。", "author": "战鹏宇", "group": "眼科出题第一组"}, {"q": "急性前葡萄膜炎最常见的瞳孔改变是？", "o": {"A": "瞳孔散大固定", "B": "瞳孔缩小", "C": "瞳孔完全正常", "D": "双眼瞳孔等大散大", "E": "瞳孔开大肌麻痹"}, "a": "B", "e": "虹膜充血、水肿及瞳孔括约肌痉挛可使瞳孔缩小，并可形成后粘连。", "author": "战鹏宇", "group": "眼科出题第一组"}, {"q": "视交叉中部受压时，最常见的视野缺损是？", "o": {"A": "同侧全盲", "B": "同侧鼻侧偏盲", "C": "双眼颞侧偏盲", "D": "双眼鼻侧偏盲", "E": "同向性偏盲"}, "a": "C", "e": "视交叉中部含双眼鼻侧视网膜交叉纤维，受压常出现双眼颞侧偏盲。", "author": "战鹏宇", "group": "眼科出题第一组"}, {"q": "患者，男，68 岁，双眼无痛性、渐进性视力下降 3 年，近来夜间眩光明显。裂隙灯检查见晶状体皮质自周边向中央出现楔形灰白色混浊。最可能的诊断是？", "o": {"A": "核性白内障", "B": "年龄相关性皮质性白内障", "C": "后囊下性白内障", "D": "外伤性白内障", "E": "先天性白内障"}, "a": "B", "e": "皮质性白内障初期常表现为由周边向中央发展的楔形、车轮样混浊。", "author": "战鹏宇", "group": "眼科出题第一组"}, {"q": "患者，女，72 岁，右眼视力明显下降。裂隙灯检查见晶状体皮质水肿、前房变浅，虹膜投影征阳性。该眼白内障最可能处于？", "o": {"A": "初发期", "B": "膨胀期", "C": "成熟期", "D": "过熟期", "E": "后发性白内障"}, "a": "B", "e": "皮质性白内障膨胀期因晶状体吸水膨胀，前房变浅，虹膜投影征可呈阳性。", "author": "战鹏宇", "group": "眼科出题第一组"}, {"q": "患者，女，56 岁，与家人争吵后突发右眼剧烈胀痛、同侧头痛、恶心呕吐。检查见混合充血、角膜雾状水肿、前房极浅、瞳孔散大固定，眼压 58 mmHg。最可能的诊断是？", "o": {"A": "急性结膜炎", "B": "急性前葡萄膜炎", "C": "原发性急性闭角型青光眼", "D": "原发性开角型青光眼", "E": "视网膜中央动脉阻塞"}, "a": "C", "e": "情绪波动诱发，伴眼压显著升高、浅前房、角膜水肿及瞳孔散大，是急性闭角型青光眼急性发作的典型表现。", "author": "战鹏宇", "group": "眼科出题第一组"}, {"q": "接上题，该患者急诊处理时应避免使用的药物是？", "o": {"A": "20% 甘露醇", "B": "布林佐胺滴眼液", "C": "毛果芸香碱滴眼液", "D": "卡替洛尔滴眼液", "E": "复方托吡卡胺滴眼液"}, "a": "E", "e": "散瞳药可能进一步加重房角关闭；急性闭角型青光眼急性发作时应避免使用。", "author": "战鹏宇", "group": "眼科出题第一组"}, {"q": "患者，男，59 岁，体检发现双眼眼压分别为 27 mmHg 和 26 mmHg，无明显不适。房角镜检查示房角开放，眼底 C/D 比值增大，视野检查见鼻侧阶梯。最可能的诊断是？", "o": {"A": "高眼压症", "B": "原发性开角型青光眼", "C": "原发性慢性闭角型青光眼", "D": "正常眼压性青光眼", "E": "青睫综合征"}, "a": "B", "e": "眼压升高、房角开放、青光眼性视盘改变及相应视野损害符合 POAG。", "author": "战鹏宇", "group": "眼科出题第一组"}, {"q": "患儿，3 个月，双眼畏光、流泪，不愿睁眼。检查见角膜直径增大并有轻度雾状混浊，眼压升高。最可能的诊断是？", "o": {"A": "先天性白内障", "B": "婴幼儿型青光眼", "C": "新生儿泪囊炎", "D": "先天性无虹膜", "E": "角膜炎"}, "a": "B", "e": "婴幼儿型青光眼典型表现为畏光流泪、角膜增大混浊及眼压升高，应尽早手术。", "author": "战鹏宇", "group": "眼科出题第一组"}, {"q": "患者，男，63 岁，患原发性开角型青光眼，同时有支气管哮喘病史。下列降眼压药物中应慎用或避免使用的是？", "o": {"A": "拉坦前列素", "B": "布林佐胺", "C": "噻吗洛尔", "D": "溴莫尼定", "E": "曲伏前列素"}, "a": "C", "e": "β 受体阻滞剂可诱发或加重哮喘，噻吗洛尔应慎用或避免使用。", "author": "战鹏宇", "group": "眼科出题第一组"}, {"q": "患者，女，31 岁，右眼红痛、畏光、流泪 2 天。检查见睫状充血，角膜后壁灰白色细小 KP，房水闪辉阳性，瞳孔缩小并有部分后粘连。最可能的诊断是？", "o": {"A": "急性结膜炎", "B": "急性前葡萄膜炎", "C": "急性闭角型青光眼", "D": "角膜异物", "E": "视神经炎"}, "a": "B", "e": "睫状充血、KP、房水闪辉、瞳孔缩小及虹膜后粘连是急性前葡萄膜炎的典型体征。", "author": "战鹏宇", "group": "眼科出题第一组"}, {"q": "接上题，局部治疗中最重要的措施是？", "o": {"A": "使用散瞳剂", "B": "持续缩瞳", "C": "长期包眼", "D": "停用所有抗炎药", "E": "仅使用人工泪液"}, "a": "A", "e": "散瞳可缓解睫状肌痉挛和疼痛，并预防或解除虹膜后粘连。", "author": "战鹏宇", "group": "眼科出题第一组"}, {"q": "患者，男，36 岁，反复单眼视物模糊。发作时眼压 42 mmHg，角膜后壁可见少量粗大 KP，房水闪辉轻微，无虹膜后粘连。最可能的诊断是？", "o": {"A": "原发性急性闭角型青光眼", "B": "青睫综合征", "C": "急性结膜炎", "D": "视网膜中央静脉阻塞", "E": "白内障膨胀期"}, "a": "B", "e": "青睫综合征多见于中青年，眼压升高明显，可见粗大 KP、轻微房水闪辉，通常无虹膜后粘连，且易复发。", "author": "战鹏宇", "group": "眼科出题第一组"}, {"q": "患者，男，27 岁，左眼视力突然下降 3 天，伴眼球转动痛。检查见 RAPD 阳性，视野示中心暗点。最可能的诊断是？", "o": {"A": "视神经炎", "B": "缺血性视神经病变", "C": "视网膜中央静脉阻塞", "D": "孔源性视网膜脱离", "E": "年龄相关性黄斑变性"}, "a": "A", "e": "中青年、急性视力下降、眼球转动痛、RAPD 阳性及中心暗点提示视神经炎。", "author": "战鹏宇", "group": "眼科出题第一组"}, {"q": "患者，男，69 岁，有高血压病史，晨起发现右眼无痛性视力下降。眼底见视盘水肿并伴出血，视野见扇形缺损。最可能的诊断是？", "o": {"A": "视神经炎", "B": "缺血性视神经病变", "C": "急性闭角型青光眼", "D": "玻璃体积血", "E": "湿性年龄相关性黄斑变性"}, "a": "B", "e": "老年人、无痛性视力下降、视盘水肿伴出血及扇形视野缺损更支持缺血性视神经病变。", "author": "战鹏宇", "group": "眼科出题第一组"}, {"q": "患者，男，71 岁，高血压病史多年，突发左眼无痛性视力严重下降 40 分钟。眼底见视网膜苍白水肿，黄斑区呈樱桃红斑。最可能的诊断是？", "o": {"A": "视网膜中央动脉阻塞", "B": "视网膜中央静脉阻塞", "C": "视网膜脱离", "D": "玻璃体积血", "E": "前葡萄膜炎"}, "a": "A", "e": "突发单眼无痛性严重视力下降及樱桃红斑是 CRAO 的典型表现，属于眼科急症。", "author": "战鹏宇", "group": "眼科出题第一组"}, {"q": "患者，女，66 岁，糖尿病、高血压病史。右眼无痛性视力下降 1 周。眼底见视盘充血水肿、静脉迂曲扩张及多发火焰状出血。最可能的诊断是？", "o": {"A": "视网膜中央静脉阻塞", "B": "视网膜中央动脉阻塞", "C": "干性年龄相关性黄斑变性", "D": "视神经炎", "E": "白内障"}, "a": "A", "e": "静脉迂曲扩张伴多发出血、水肿和渗出符合视网膜中央静脉阻塞。", "author": "战鹏宇", "group": "眼科出题第一组"}, {"q": "患者因视网膜静脉阻塞出现黄斑水肿，视力下降明显。下列较常用的一线眼部治疗是？", "o": {"A": "玻璃体腔抗 VEGF 注射", "B": "长期口服抗生素", "C": "激光周边虹膜切除术", "D": "角膜移植术", "E": "白内障囊外摘除术"}, "a": "A", "e": "RVO 合并黄斑水肿时，玻璃体腔抗 VEGF 注射是常用的一线治疗方案。", "author": "战鹏宇", "group": "眼科出题第一组"}, {"q": "患者，女，52 岁，糖尿病 8 年。眼底检查仅见少量视网膜微血管瘤，无其他明显异常。该患者糖尿病性视网膜病变分期为？", "o": {"A": "无 DR", "B": "轻度 NPDR", "C": "中度 NPDR", "D": "重度 NPDR", "E": "PDR"}, "a": "B", "e": "仅有微血管瘤样膨出属于轻度非增生期糖尿病性视网膜病变。", "author": "战鹏宇", "group": "眼科出题第一组"}, {"q": "患者，男，60 岁，糖尿病 15 年。眼底发现视盘新生血管及视网膜前出血。该患者糖尿病性视网膜病变已进入？", "o": {"A": "轻度 NPDR", "B": "中度 NPDR", "C": "重度 NPDR", "D": "PDR", "E": "无 DR"}, "a": "D", "e": "出现视网膜或视盘新生血管提示进入增生期糖尿病性视网膜病变。", "author": "战鹏宇", "group": "眼科出题第一组"}, {"q": "糖尿病患者视物变形，OCT 显示黄斑中心凹直径 1 mm 范围内视网膜增厚。最符合的诊断是？", "o": {"A": "未累及中心凹的 DME", "B": "累及中心凹的 DME", "C": "干性 AMD", "D": "视网膜中央动脉阻塞", "E": "孔源性视网膜脱离"}, "a": "B", "e": "黄斑视网膜增厚累及中心凹直径 1 mm 范围内，属于累及中心凹的糖尿病性黄斑水肿。", "author": "战鹏宇", "group": "眼科出题第一组"}, {"q": "患者，女，74 岁，近 2 个月视物变形、中心视力下降。眼底见黄斑区玻璃膜疣，并有出血和渗出；OCTA 提示脉络膜异常血流信号。最可能的诊断是？", "o": {"A": "干性年龄相关性黄斑变性", "B": "湿性年龄相关性黄斑变性", "C": "视网膜中央动脉阻塞", "D": "白内障", "E": "视神经炎"}, "a": "B", "e": "黄斑出血、渗出及脉络膜新生血管信号提示湿性 AMD。", "author": "战鹏宇", "group": "眼科出题第一组"}, {"q": "患者，男，62 岁，高度近视，突然出现闪光感和眼前黑影飘动，随后感觉右眼下方像有幕布遮挡。最可能的诊断是？", "o": {"A": "孔源性视网膜脱离", "B": "视网膜中央动脉阻塞", "C": "急性前葡萄膜炎", "D": "原发性开角型青光眼", "E": "干性 AMD"}, "a": "A", "e": "闪光感、飞蚊及幕布样视野遮挡是孔源性视网膜脱离的典型警示表现。", "author": "战鹏宇", "group": "眼科出题第一组"}, {"q": "患者，女，58 岁，糖尿病病程 20 年，眼底见纤维血管膜牵拉，视网膜呈帐篷状隆起。最可能的视网膜脱离类型是？", "o": {"A": "孔源性视网膜脱离", "B": "牵拉性视网膜脱离", "C": "渗出性视网膜脱离", "D": "脉络膜脱离", "E": "后玻璃体脱离"}, "a": "B", "e": "增生性糖尿病性视网膜病变可形成纤维增殖膜，牵拉视网膜导致牵拉性脱离。", "author": "战鹏宇", "group": "眼科出题第一组"}, {"q": "患者，男，64 岁，血压 220/120 mmHg，视力下降。眼底见视盘水肿、视网膜动脉变细、片状出血及棉绒斑。最应考虑的是？", "o": {"A": "恶性高血压性视网膜病变", "B": "视神经炎", "C": "孔源性视网膜脱离", "D": "急性前葡萄膜炎", "E": "先天性青光眼"}, "a": "A", "e": "严重高血压合并视盘水肿、出血和棉绒斑等眼底改变，符合恶性高血压性视网膜病变。", "author": "战鹏宇", "group": "眼科出题第一组"}, {"q": "早产儿，孕周 31 周，出生体重 1350 g，曾接受吸氧治疗。该患儿眼底筛查重点关注的疾病是？", "o": {"A": "先天性白内障", "B": "早产儿视网膜病变", "C": "视神经炎", "D": "原发性开角型青光眼", "E": "湿性 AMD"}, "a": "B", "e": "低孕周、低出生体重及吸氧史是早产儿视网膜病变的重要风险因素。", "author": "战鹏宇", "group": "眼科出题第一组"}, {"q": "患者，女，45 岁，有甲状腺功能异常病史，出现眼睑退缩、眼球突出和复视。最可能的眼部诊断是？", "o": {"A": "甲状腺相关眼病", "B": "急性闭角型青光眼", "C": "视网膜脱离", "D": "白内障", "E": "视网膜中央静脉阻塞"}, "a": "A", "e": "眼睑退缩、眼球突出及复视是甲状腺相关眼病的常见临床表现。", "author": "战鹏宇", "group": "眼科出题第一组"}, {"q": "患者，男，29 岁，反复口腔溃疡和外生殖器溃疡，近期出现双眼葡萄膜炎。最应考虑的全身性疾病是？", "o": {"A": "白塞病", "B": "糖尿病", "C": "高血压病", "D": "Graves 病", "E": "动脉粥样硬化"}, "a": "A", "e": "反复口腔溃疡、外生殖器溃疡及眼部炎症是白塞病的重要表现。", "author": "战鹏宇", "group": "眼科出题第一组"}, {"q": "患者，女，35 岁，双眼视力下降，伴耳鸣和头痛。眼底见双眼多灶性渗出性视网膜脱离。最可能的诊断是？", "o": {"A": "Vogt-小柳-原田综合征", "B": "视网膜中央静脉阻塞", "C": "孔源性视网膜脱离", "D": "青睫综合征", "E": "年龄相关性黄斑变性"}, "a": "A", "e": "VKH 可表现为双眼肉芽肿性全葡萄膜炎、多灶性渗出性视网膜脱离，并伴耳鸣、头痛等眼外表现。", "author": "战鹏宇", "group": "眼科出题第一组"}, {"q": "患者，男，40 岁，左眼穿通伤后 6 周，右眼出现视力下降、畏光，检查提示全葡萄膜炎。最应考虑的是？", "o": {"A": "交感性眼炎", "B": "急性结膜炎", "C": "视神经炎", "D": "CRAO", "E": "干性 AMD"}, "a": "A", "e": "一眼穿通伤后，另一眼发生非化脓性全葡萄膜炎，应考虑交感性眼炎。", "author": "战鹏宇", "group": "眼科出题第一组"}, {"q": "患者，男，25 岁，反复出现飞蚊和无痛性视力下降。眼底检查见周边视网膜静脉白鞘及片状出血，曾发生玻璃体积血。最可能的诊断是？", "o": {"A": "视网膜静脉周围炎（Eales 病）", "B": "视网膜中央动脉阻塞", "C": "先天性白内障", "D": "急性闭角型青光眼", "E": "视神经炎"}, "a": "A", "e": "Eales 病多见于青年男性，主要累及周边视网膜静脉，可反复发生玻璃体积血。", "author": "战鹏宇", "group": "眼科出题第一组"}, {"q": "以下关于相干光断层扫描（OCT）的应用中，不正确的是：", "o": {"A": "黄斑裂孔的诊断和分期\t\t\tB．黄斑水肿的治疗效果随访", "C": "脉络膜肿瘤的鉴别诊断\t\t\tD．青光眼的神经纤维层厚度定量测量及随访", "E": "脉络膜厚度的测量"}, "a": "C", "e": "OCT可用于黄斑/视神经/神经纤维层检查，但不能用于脉络膜肿瘤的鉴别诊断（需B超或ICGA）。", "author": "王雨涵", "group": "眼科出题第一组"}, {"q": "一中年患者近2年视力逐渐下降，无眼痛，眼红，无其他全身系统性疾病。如果患者诊断为青光眼，需要行房角检查，前房角内从前到后依次是", "o": {"A": "Schlemm管，小梁网和Schwalbe线，巩膜突，睫状体带，虹膜根部", "B": "Schlemm管，巩膜突和Schwalbe线，小梁网，睫状体带，虹膜根部", "C": "睫状体带，小梁网和Schlemm管，Schwalbe线，巩膜突，虹膜根部", "D": "Schwalbe线，小梁网和Schlemm管，巩膜突，睫状体带，虹膜根部", "E": "虹膜根部，睫状体带，巩膜突，小梁网和Schlemm管，Schwalbe线"}, "a": "D", "e": "前房角从前到后：Schwalbe线→小梁网+Schlemm管→巩膜突→睫状体带→虹膜根部。", "author": "王雨涵", "group": "眼科出题第一组"}, {"q": "角膜组织学上从外到内分为", "o": {"A": "前弹力层－上皮细胞层－基质层－内皮细胞层－后弹力层", "B": "上皮细胞层－基质层－前弹力层－后弹力层－内皮细胞层", "C": "上皮细胞层－前弹力层－后弹力层基质层－内皮细胞层", "D": "上皮细胞层－前弹力层－基质层－后弹力层－内皮细胞层", "E": "上皮细胞层－前弹力层－基质层－内皮细胞层－后弹力层"}, "a": "D", "e": "角膜从外到内分五层：上皮细胞层→前弹力层→基质层→后弹力层→内皮细胞层。上皮和后弹力层可再生。", "author": "王雨涵", "group": "眼科出题第一组"}, {"q": "下面哪一种感染性角膜炎即使在角膜未发生穿孔时，也发生病原体性眼内感染", "o": {"A": "细菌性角膜炎\t\t\tB. 棘阿米巴性角膜炎", "C": "单孢病毒性角膜炎\t\tD. 真菌性角膜炎", "E": "铜绿假单胞菌性角膜炎"}, "a": "D", "e": "真菌菌丝具有穿透力，可沿角膜基质板层间隙直接侵入眼内，即使角膜未穿孔也能引起真菌性眼内炎，这是真菌性角膜炎的独特病理特点。", "author": "王雨涵", "group": "眼科出题第一组"}, {"q": "在细菌性角膜炎中，最常见的细菌为", "o": {"A": "金黄色葡萄球菌\t\t\t\t\tB. 表皮葡萄球菌", "C": "铜绿假单胞菌（即绿脓杆菌）\t\tD.肺炎双球菌", "E": "白喉杆菌"}, "a": "B", "e": "细菌性角膜炎最常见的致病菌为表皮葡萄球菌。铜绿假单胞菌性角膜炎虽然不最常见但最凶险。", "author": "王雨涵", "group": "眼科出题第一组"}, {"q": "引起真菌性角膜炎最常见的原因不包括", "o": {"A": "温热潮湿的气候环境\t\tB. 植物性角膜外伤后", "C": "角膜上皮缺损\t\t\t\tD. 长期大量用糖皮质激素", "E": "佩戴角膜接触镜"}, "a": "C", "e": "角膜上皮缺损是角膜炎的临床体征，属于感染的结果而非病因，故不属于引起真菌性角膜炎的原因。引起真菌性角膜炎的常见原因包括：植物性角膜外伤（最常见）、温热潮湿的气候环境、长期大量使用糖皮质激素或广谱抗生素、佩戴角膜接触镜等。", "author": "王雨涵", "group": "眼科出题第一组"}, {"q": "白内障手术并发症不包括", "o": {"A": "视网膜新生血管\t\t\tB. 爆发性脉络膜出血", "C": "角膜水肿\t\t\t\t\tD. 感染性眼内炎\t\t\tE. 人工晶状体偏位"}, "a": "A", "e": "正确答案：视网膜新生血管\t\t\tB. 爆发性脉络膜出血。", "author": "王雨涵", "group": "眼科出题第一组"}, {"q": "患者，男性，65岁，双眼视力渐进性下降1年，检查视力：右0.1，左眼前手动；眼压：右15 mmHg，左17 mmHg；散瞳后检查右眼晶状体皮质不均匀混浊，左眼晶状体白色混浊，虹膜投影阴性，眼底看不见。应诊断为", "o": {"A": "双眼老年性白内障，未成熟期\t\tB. 双眼老年性白内障，右眼未成熟期，左眼成熟期", "C": "双眼老年性白内障，右眼未成熟期，左眼过熟期", "D": "双眼核性白内障\t\t\t\t\tE. 并发性白内障"}, "a": "B", "e": "虹膜投影（新月形阴影）：斜照法检查膨胀期白内障时，投照侧虹膜在深层混浊皮质上形成阴影。虹膜投影消失→进入成熟期。", "author": "王雨涵", "group": "眼科出题第一组"}, {"q": "患儿男性，3岁，发现左眼歪斜3个月。检查：晶状体绕核性混浊，扩瞳检查眼底无异常，全身情况尚可。询问病史家族中无此类患者，母亲妊娠无感冒及风疹感染史，但常有手足抽搐，当时检查有低血钙与高血磷。最可能的诊断为", "o": {"A": "外伤性白内障\t\tB. 先天性白内障", "C": "代谢性白内障\t\tD. 先天性风疹综合征\t\tE. 视网膜母细胞瘤"}, "a": "B", "e": "低钙血症可致绕核性白内障（代谢性白内障），常见于甲状旁腺功能减退。", "author": "王雨涵", "group": "眼科出题第一组"}, {"q": "开角型青光眼的手术机制是", "o": {"A": "减少房水产生\t\t\tB. 解除瞳孔阻滞", "C": "解除房角粘连\t\t\tD. 将房水引流到眼外", "E": "防止房角粘连"}, "a": "D", "e": "开角型青光眼房角开放但小梁网功能障碍导致房水排出受阻，小梁切除等手术通过建立新的引流通道将房水引流至眼外，从而降低眼压。", "author": "王雨涵", "group": "眼科出题第一组"}, {"q": "下列哪项不是先天性青光眼的特征", "o": {"A": "畏光、流泪\t\t\tB. 角膜增大、混浊", "C": "眼压升高\t\t\t\tD.前房浅\t\t\t\tE. 乳头C/D比扩大"}, "a": "D", "e": "婴幼儿型青光眼三联征：畏光、流泪、眼睑痉挛。体征：角膜增大（>12mm）、角膜水肿混浊、眼压升高。", "author": "王雨涵", "group": "眼科出题第一组"}, {"q": "近视度数较高常伴有多种眼底病变，但不包括", "o": {"A": "豹纹状眼底\t\tB. 黄斑出血", "C": "玻璃体后脱离\t\tD. 视网膜周边部骨细胞样色素沉着\t\tE. 视网膜下新生血管膜"}, "a": "D", "e": "骨细胞样色素沉着是视网膜色素变性的特征性改变，而非高度近视眼底病变；高度近视的眼底改变包括豹纹状眼底、黄斑出血、玻璃体后脱离及视网膜下新生血管膜等。", "author": "王雨涵", "group": "眼科出题第一组"}, {"q": "患者男性，30岁，右眼拳击伤后晶状体全脱位到玻璃体中，右眼原为正视眼，目前的屈光状态为", "o": {"A": "正视\t\t\tB. 高度近视", "C": "高度远视\t\tD. 轻度近视\t\tE. 轻度远视"}, "a": "C", "e": "正确答案：高度远视\t\tD. 轻度近视\t\tE. 轻度远视。", "author": "王雨涵", "group": "眼科出题第一组"}, {"q": "一麻痹性斜视病人的复视像检查：其左下方复视像分离最大，周边物像是左眼。应考虑哪条眼外肌麻痹", "o": {"A": "右上直肌\t\tB. 右下直肌", "C": "左上斜肌\t\tD. 左下直肌\t\tE. 右上斜肌"}, "a": "D", "e": "麻痹性斜视：眼球运动受限、复视、代偿头位、第二斜视角>第一斜视角。", "author": "王雨涵", "group": "眼科出题第一组"}, {"q": "可作为弱视的压抑疗法之一", "o": {"A": "阿托品\t\t\t\tB. 毛果芸香碱", "C": "全屈光矫正远视镜\t\tD. 类肉毒杆菌毒素A\t\tE. 低矫远视镜"}, "a": "A", "e": "正确答案：阿托品\t\t\t\tB. 毛果芸香碱。", "author": "王雨涵", "group": "眼科出题第一组"}, {"q": "男性，8岁，3岁发现斜视，5岁经散瞳验光后配戴远视眼镜并治疗弱视，戴镜后眼位偏斜度减小，但未完全屈光矫正，裸眼：33cm：+50△，5m：+45△；戴镜：33cm：+30△，5m：+25△。对这类型的斜视应采取的治疗方法是", "o": {"A": "只戴全屈光矫正远视眼镜\tB. 不戴镜，手术矫正眼位", "C": "戴过矫眼镜\t\t\t\tD. 戴低矫眼镜", "E": "戴全屈光矫正远视眼镜后，手术矫正非调节部分斜视度"}, "a": "E", "e": "视神经疾病、眼与全身病", "author": "王雨涵", "group": "眼科出题第一组"}, {"q": "患者男性，35岁，右眼视力下降5天，伴眼球转动疼，眼底视盘充血、水肿，视盘周围有小的出血点，视网膜静脉增粗。查右眼相对性传入性瞳孔障碍，视野中心暗点。可能的诊断是", "o": {"A": "右眼缺血性视神经病变\t\tB. 右眼视神经炎", "C": "右眼假性视盘水肿\t\t\tD. Leber遗传性视神经病变\t\t\tE. 中毒性视神经病变"}, "a": "B", "e": "年轻男性急性单眼视力下降伴眼球转动痛、视盘充血水肿、RAPD阳性及中心暗点，符合视神经炎（球内型）的典型临床表现。", "author": "王雨涵", "group": "眼科出题第一组"}, {"q": "患者男性，55岁，高血压病史15年，右眼无痛性急剧视力障碍，眼底检查视乳头充血、水肿，无黄斑樱桃红点。下方弓形视野缺损，与生理盲点相连。请问最可能的诊断是什么", "o": {"A": "缺血性视神经病变\t\tB. 视网膜中央动脉阻塞", "C": "视网膜中央静脉阻塞\t\tD. 视盘炎\t\tE. 视神经炎"}, "a": "A", "e": "黄斑樱桃红斑是CRAO的特征性表现——因脉络膜供血保留红色，与周围苍白水肿的视网膜形成对比。", "author": "王雨涵", "group": "眼科出题第一组"}, {"q": "患者中年男性，双眼视力下降，右眼视力0.8，左眼视力0.4，不能矫正，眼压正常，眼底右眼视盘色泽尚可，左眼视盘色苍白，视野双眼侧偏盲，先颞上象限视野缺损，随后出现颞下象限视野缺损，请问最可能的诊断是什么", "o": {"A": "鞍结节脑膜瘤\t\tB. 颅咽管瘤", "C": "第三脑室肿瘤\t\tD. 脑垂体腺瘤\t\tE. 空蝶鞍综合征"}, "a": "D", "e": "正常眼压统计学范围10~21mmHg，24h波动<8mmHg，双眼差值<5mmHg。", "author": "王雨涵", "group": "眼科出题第一组"}, {"q": "如果您接诊一个眼外伤的病人，首先应注意", "o": {"A": "视力情况\t\t\tB. 眼球有无破裂", "C": "眼内有无出血\t\tD. 有无感染\t\t\tE. 有无休克及重要脏器损伤"}, "a": "E", "e": "眼外伤常为全身多发伤的一部分，休克或重要脏器损伤危及生命，应遵循生命优先原则，首先排除全身危及生命的情况，再处理眼部损伤。", "author": "王雨涵", "group": "眼科出题第一组"}, {"q": "男性，32岁，右眼被钝器击伤1小时。检查：右眼视力：20cm指数，结膜下出血，角膜有一5mm伤口达角膜缘，虹膜嵌顿，玻璃体积血，眼底看不清。伤口的处理正确的是", "o": {"A": "还纳虹膜后无须缝合角膜伤口\t\tB. 用抗生素溶液冲洗虹膜后，缝合角膜伤口不必处理虹膜", "C": "包扎右眼，伤口不需处理\t\t\tD. 探查有无巩膜伤口，如有则剪除虹膜和睫状体，缝合角膜伤口", "E": "探查有无巩膜伤口，如有则用抗生素溶液冲洗虹膜和睫状体后，使之还纳并缝合角膜伤口"}, "a": "E", "e": "正确答案：探查有无巩膜伤口，如有则用抗生素溶液冲洗虹膜和睫状体后，使之还纳并缝合角膜伤口。", "author": "王雨涵", "group": "眼科出题第一组"}, {"q": "眼内异物诊断的重要依据是", "o": {"A": "发现角膜有全层瘢痕\t\tB. 角膜有上皮擦伤", "C": "角膜后弹力层破裂\t\t\tD. 角膜内纹状水肿\t\tE. 角膜溃疡"}, "a": "A", "e": "正确答案：发现角膜有全层瘢痕\t\tB. 角膜有上皮擦伤。", "author": "王雨涵", "group": "眼科出题第一组"}, {"q": "男性，28岁，右眼被石灰烧伤。如果在现场采用清水冲洗伤眼，应至少冲洗", "o": {"A": "10分钟\t\tB. 20分钟", "C": "30分钟\t\tD. 50分钟\t\tE. 60分钟"}, "a": "C", "e": "正确答案：30分钟\t\tD. 50分钟\t\tE. 60分钟。", "author": "王雨涵", "group": "眼科出题第一组"}, {"q": "男性，38岁，工作时铁屑溅入左眼，当即感左眼剧痛、畏光、流泪。检查：左眼视力0.02，结膜混合性充血，角膜中央可见一约2mm×2mm的灰白色浸润灶，前房可见约1mm的积脓，瞳孔约2mm，对光反射迟钝。最可能的诊断是", "o": {"A": "角膜异物\t\t\tB. 细菌性角膜炎", "C": "真菌性角膜炎\t\tD. 虹膜睫状体炎\t\tE. 急性结膜炎"}, "a": "C", "e": "角膜中央厚约0.5mm，周边约1mm。基质层占全层约90%。", "author": "王雨涵", "group": "眼科出题第一组"}, {"q": "下列哪项不是白内障的常见症状？", "o": {"A": "渐进性视力下降", "B": "眩光", "C": "眼压升高", "D": "单眼复视", "E": "色觉改变"}, "a": "C", "e": "眼压升高是青光眼的特征，白内障本身不引起眼压升高；白内障的常见症状为渐进性视力下降、眩光、单眼复视及色觉改变。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "下列哪项是年龄相关性白内障最常见的类型？", "o": {"A": "核性白内障", "B": "皮质性白内障", "C": "后囊下性白内障", "D": "先天性白内障", "E": "外伤性白内障"}, "a": "B", "e": "年龄相关性白内障分三型：皮质性（最常见）、核性、后囊下性。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "关于晶状体的描述，错误的是：", "o": {"A": "双凸面", "B": "有弹性", "C": "富含血管", "D": "无神经", "E": "营养来自房水"}, "a": "C", "e": "晶状体是眼内无血管的透明结构，其营养完全依赖房水供给，同时具有双凸面外形、弹性及无神经分布的特征，故'富含血管'的描述错误。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "皮质性白内障初发期的典型混浊形态是：", "o": {"A": "楔形或车轮样混浊", "B": "核部混浊", "C": "后囊下混浊", "D": "全晶状体混浊", "E": "点状混浊"}, "a": "A", "e": "初发期：晶状体周边皮质楔形、车轮样混浊，向中央发展。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "白内障术后最常见的屈光状态是：", "o": {"A": "高度远视", "B": "高度近视", "C": "轻度远视漂移", "D": "轻度近视漂移", "E": "散光增加"}, "a": "D", "e": "正确答案：轻度近视漂移。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "下列哪项与白内障发病无关？", "o": {"A": "紫外线照射", "B": "糖尿病", "C": "高血压", "D": "长期使用糖皮质激素", "E": "外伤"}, "a": "C", "e": "白内障的公认危险因素包括紫外线照射、糖尿病、长期使用糖皮质激素及外伤，高血压本身不直接导致晶状体混浊，与白内障发病无关。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "关于后囊下性白内障，正确的是：", "o": {"A": "多见于年轻人", "B": "早期即影响视力", "C": "与长期使用糖皮质激素有关", "D": "混浊位于晶状体后囊下", "E": "以上均正确"}, "a": "E", "e": "后囊下性白内障：晶状体后囊下皮质混浊，早期即明显影响视力（强光下尤甚，因瞳孔缩小）。常见于糖尿病、长期使用激素者和高度近视。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "白内障术后发生后发性白内障的主要原因是：", "o": {"A": "晶状体皮质残留", "B": "晶状体囊膜混浊", "C": "人工晶体位置异常", "D": "角膜内皮失代偿", "E": "黄斑囊样水肿"}, "a": "B", "e": "后发性白内障是白内障术后最常见的并发症，因残留晶状体上皮细胞增殖迁移所致。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "葡萄膜的组成不包括：", "o": {"A": "虹膜", "B": "睫状体", "C": "脉络膜", "D": "巩膜", "E": "以上均包括"}, "a": "D", "e": "葡萄膜由虹膜、睫状体和脉络膜三部分组成，巩膜属于眼球外层纤维膜，不属于葡萄膜范畴。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "Vogt-小柳-原田综合征的典型眼底改变是：", "o": {"A": "晚霞样眼底", "B": "视网膜动脉阻塞", "C": "黄斑裂孔", "D": "视网膜色素变性", "E": "视盘水肿"}, "a": "A", "e": "VKH综合征：双眼渗出性视网膜脱离+晚霞样眼底+头痛耳鸣+皮肤白癜风/毛发变白。自身免疫性全葡萄膜炎。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "关于葡萄膜炎的激素治疗，错误的是：", "o": {"A": "前葡萄膜炎局部点眼为主", "B": "后葡萄膜炎需全身用药", "C": "激素减量应缓慢", "D": "激素治疗无效时可加用免疫抑制剂", "E": "激素冲击治疗适用于所有葡萄膜炎"}, "a": "E", "e": "正确答案：激素冲击治疗适用于所有葡萄膜炎。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "患者，男，40岁，左眼被铁片击伤后3周，右眼出现视力下降、畏光。查体：右眼睫状充血，KP（+），房水闪辉（+）。最可能的诊断是：", "o": {"A": "右眼外伤性葡萄膜炎", "B": "交感性眼炎", "C": "Behçet病", "D": "Fuchs综合征", "E": "强直性脊柱炎"}, "a": "B", "e": "一眼穿孔伤后数周内对侧眼出现肉芽肿性葡萄膜炎（KP阳性、房水闪辉），是交感性眼炎的典型表现，由免疫介导的双眼葡萄膜炎。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "关于葡萄膜炎的并发症，错误的是：", "o": {"A": "并发性白内障", "B": "继发性青光眼", "C": "黄斑水肿", "D": "视网膜脱离", "E": "角膜新生血管"}, "a": "E", "e": "正确答案：角膜新生血管。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "治疗中间葡萄膜炎引起的黄斑水肿，首选：", "o": {"A": "糖皮质激素口服", "B": "免疫抑制剂", "C": "抗VEGF注射", "D": "激光光凝", "E": "玻璃体切除"}, "a": "A", "e": "黄斑水肿OCT表现：外丛状层和内核层出现低反射囊腔（囊样水肿）。FFA呈花瓣样高荧光。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "关于葡萄膜炎的预后，错误的是：", "o": {"A": "前葡萄膜炎预后较好", "B": "后葡萄膜炎易致盲", "C": "全葡萄膜炎预后差", "D": "肉芽肿性炎症预后好", "E": "及时治疗可改善预后"}, "a": "D", "e": "正确答案：肉芽肿性炎症预后好。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "患者，女，65岁，右眼视力0.4，晶状体皮质楔形混浊，眼底可见。患者主诉夜间开车眩光严重。下一步最合理的建议是：", "o": {"A": "配戴防眩光眼镜", "B": "右眼白内障手术", "C": "左眼白内障手术", "D": "双眼同时手术", "E": "定期观察"}, "a": "B", "e": "眼科门诊病历核心内容记录顺序：主诉（就诊原因+眼别+症状+持续时间）→现病史→既往史→检查→诊断。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "患者，男，55岁，双眼慢性葡萄膜炎，长期使用地塞米松点眼，近期眼压升高至32 mmHg，房角开放。最可能的原因是：", "o": {"A": "原发性开角型青光眼", "B": "激素性青光眼", "C": "闭角型青光眼", "D": "新生血管性青光眼", "E": "先天性青光眼"}, "a": "B", "e": "正确答案：激素性青光眼。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "青光眼最典型的临床表现是：", "o": {"A": "眼压升高", "B": "反复发作的眼部胀痛", "C": "视盘盘沿损伤和视野缺损", "D": "虹视", "E": "雾视"}, "a": "C", "e": "正确答案：视盘盘沿损伤和视野缺损。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "急性闭角型青光眼急性发作期的首选治疗是：", "o": {"A": "小梁切除术", "B": "高渗剂+缩瞳剂+碳酸酐酶抑制剂", "C": "激光虹膜周切", "D": "玻璃体切除", "E": "前房穿刺"}, "a": "B", "e": "急救：甘露醇iv快速脱水+局部β阻滞剂/碳酸酐酶抑制剂缩瞳+前房穿刺。眼压控制后行激光虹膜周切术。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "下列哪种药物通过增加葡萄膜巩膜途径外流房水？", "o": {"A": "毛果芸香碱", "B": "噻吗洛尔", "C": "曲伏前列素", "D": "布林佐胺", "E": "溴莫尼定"}, "a": "C", "e": "房水主要外流途径：睫状突→后房→瞳孔→前房→小梁网→Schlemm管→集液管→睫状前静脉。次要途径（10-20%）为葡萄膜巩膜途径。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "先天性青光眼的典型三联征不包括：", "o": {"A": "畏光", "B": "流泪", "C": "角膜增大", "D": "虹膜结节", "E": "眼压升高"}, "a": "D", "e": "急性闭角型青光眼发作后三联征：角膜后色素性KP、虹膜节段性萎缩、晶状体前表面青光眼斑。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "患者，女，55岁，右眼急性闭角型青光眼发作后经治疗眼压恢复正常，但角膜后可见色素性KP，虹膜节段性萎缩，晶状体前囊下混浊。这三联征称为：", "o": {"A": "青光眼三联征", "B": "急性发作后三联征", "C": "Fuchs三联征", "D": "虹膜萎缩三联征", "E": "白内障三联征"}, "a": "B", "e": "正常眼压统计学范围10~21mmHg，24h波动<8mmHg，双眼差值<5mmHg。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "患者，女，60岁，左眼视力下降半年，眼压35 mmHg，房角开放，视盘苍白，视野呈管状。该患者视野表现提示：", "o": {"A": "早期青光眼", "B": "中期青光眼", "C": "晚期青光眼", "D": "正常视野", "E": "非青光眼性视野损害"}, "a": "C", "e": "青光眼视野损害由周边逐步向中心发展，晚期仅残留中心管状视野；结合高眼压、视盘苍白，管状视野提示晚期青光眼。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "患者，男，50岁，右眼新生血管性青光眼，既往有糖尿病史10年。眼底检查见视网膜大面积无灌注区。首选治疗是：", "o": {"A": "小梁切除术", "B": "抗VEGF注射+全视网膜激光", "C": "睫状体光凝术", "D": "房角切开术", "E": "青光眼引流阀植入"}, "a": "B", "e": "新生血管形成是PDR的标志，VEGF升高是关键驱动因素。治疗：全视网膜光凝（PRP）+抗VEGF。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "急性闭角型青光眼急性发作时，下列哪种药物禁用？", "o": {"A": "毛果芸香碱", "B": "噻吗洛尔", "C": "阿托品", "D": "甘露醇", "E": "醋甲唑胺"}, "a": "C", "e": "急性闭角型青光眼禁用散瞳药（阿托品、复方托吡卡胺），因散瞳可加重房角关闭、升高眼压。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "视神经炎最常见的视野缺损是：", "o": {"A": "双颞侧偏盲", "B": "中心暗点", "C": "管状视野", "D": "鼻侧阶梯", "E": "弓形暗点"}, "a": "B", "e": "视神经炎典型表现：中青年突发视力下降+眼球转动痛+RAPD+中心暗点。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "视交叉中部病变可导致：", "o": {"A": "同侧盲", "B": "双颞侧偏盲", "C": "同向性偏盲", "D": "鼻侧偏盲", "E": "上方偏盲"}, "a": "B", "e": "视交叉中部有来自双眼鼻侧视网膜的交叉纤维，此处病变（如垂体瘤压迫）损伤交叉纤维，导致双眼颞侧视野缺损，即双颞侧偏盲。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "关于视神经的血液供应，正确的是：", "o": {"A": "眼内段由视网膜中央动脉供应", "B": "眶内段由眼动脉分支供应", "C": "管内段由颈内动脉分支供应", "D": "颅内段由大脑前动脉供应", "E": "A和B均正确"}, "a": "E", "e": "正确答案：A和B均正确。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "患者，女，28岁，右眼视力急剧下降3天，伴眼球转动痛。查体：右眼视力0.1，RAPD（+），眼底视盘边界清，色正常。最可能的诊断是：", "o": {"A": "前部缺血性视神经病变", "B": "球后视神经炎", "C": "视盘炎", "D": "压迫性视神经病变", "E": "Leber遗传性视神经病变"}, "a": "B", "e": "RAPD（相对性瞳孔传入障碍）：患眼传入通路受损→交替光照时患侧瞳孔先收缩继而散大。提示视神经或视网膜病变。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "患者，女，34岁，双眼视神经炎激素冲击治疗后视力恢复，3个月后出现双下肢麻木、无力，MRI示脑室周围白质多发脱髓鞘斑块。最可能的诊断是：", "o": {"A": "视神经脊髓炎", "B": "多发性硬化", "C": "Leber遗传性视神经病变", "D": "缺血性视神经病变", "E": "急性播散性脑脊髓炎"}, "a": "B", "e": "特发性（脱髓鞘性）视神经炎首选糖皮质激素冲击治疗。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "患者，女，38岁，左眼视力下降1周，伴眼眶痛。查体：左眼RAPD（+），眼底正常。MRI示左视神经强化。首选治疗是：", "o": {"A": "抗生素", "B": "甲泼尼龙冲击", "C": "抗病毒药物", "D": "神经营养药物", "E": "观察随访"}, "a": "B", "e": "RAPD（相对性瞳孔传入障碍）：患眼传入通路受损→交替光照时患侧瞳孔先收缩继而散大。提示视神经或视网膜病变。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "视神经炎与缺血性视神经病变的鉴别中，前者常见：", "o": {"A": "老年人", "B": "转动痛", "C": "扇形视野缺损", "D": "眼底出血", "E": "眼压升高"}, "a": "B", "e": "视神经炎（中青年、眼球转动痛、中心暗点）vs 缺血性视神经病变（老年、不痛、扇形缺损、视盘出血）。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "视网膜中央动脉阻塞的典型表现为：", "o": {"A": "无痛性视力下降", "B": "突然视力丧失如“关灯”", "C": "视物变形", "D": "飞蚊症", "E": "闪光感"}, "a": "B", "e": "CRAO典型表现：视网膜苍白水肿+黄斑樱桃红斑。属眼科急诊，抢救黄金窗口90-120分钟。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "孔源性视网膜脱离的首要治疗原则是：", "o": {"A": "抗VEGF注射", "B": "封闭裂孔", "C": "糖皮质激素", "D": "激光光凝", "E": "抗生素"}, "a": "B", "e": "孔源性视网膜脱离是由视网膜裂孔引起液体积聚于视网膜下，治疗关键是封闭裂孔以阻止液体继续流入，是所有手术方式的核心原则。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "患者，女，55岁，糖尿病史10年，右眼视力下降3天。查体：右眼视力0.2，眼底见视网膜静脉迂曲扩张，火焰状出血，黄斑区囊样水肿。最可能的诊断是：", "o": {"A": "视网膜中央动脉阻塞", "B": "视网膜中央静脉阻塞", "C": "糖尿病视网膜病变非增殖期", "D": "视网膜静脉周围炎", "E": "老年性黄斑变性"}, "a": "B", "e": "正确答案：视网膜中央静脉阻塞。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "患者，男，25岁，反复玻璃体积血3次，无明显外伤史。查体：双眼周边视网膜血管白鞘、无灌注区。最可能的诊断是：", "o": {"A": "糖尿病视网膜病变", "B": "视网膜静脉周围炎（Eales病）", "C": "高血压视网膜病变", "D": "视网膜中央静脉阻塞", "E": "Coats病"}, "a": "B", "e": "正确答案：视网膜静脉周围炎（Eales病）。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "患者，男，28岁，右眼无痛性视力下降2周。查体：右眼视力0.3，下方球形视网膜隆起，随体位变化。B超示视网膜脱离。最可能的类型是：", "o": {"A": "孔源性视网膜脱离", "B": "牵拉性视网膜脱离", "C": "渗出性视网膜脱离", "D": "漏斗状视网膜脱离", "E": "陈旧性视网膜脱离"}, "a": "C", "e": "正确答案：渗出性视网膜脱离。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "关于年龄相关性黄斑变性，正确的是：", "o": {"A": "干性型以脉络膜新生血管为特征", "B": "湿性型以玻璃膜疣为特征", "C": "抗VEGF治疗对干性型有效", "D": "吸烟是危险因素", "E": "多见于青少年"}, "a": "D", "e": "AMD是老年人中心视力丧失主要原因。干性以玻璃膜疣/萎缩为主；湿性以CNV为特征需抗VEGF治疗。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "关于糖尿病视网膜病变，正确的是：", "o": {"A": "微动脉瘤是最早的眼底改变", "B": "硬性渗出为脂质沉积", "C": "棉绒斑为神经纤维层梗死", "D": "增殖期可见新生血管", "E": "以上均正确"}, "a": "E", "e": "视网膜组织学10层。视盘（视乳头）无感光细胞为生理盲点。黄斑中心凹仅含视锥细胞。视网膜内5层由视网膜中央动脉供血。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "患者，女，65岁，糖尿病史15年，眼底检查见双眼视网膜4个象限均有20个以上出血点，2个象限静脉串珠，1个象限视网膜内微血管异常（IRMA），未见新生血管。根据中国DR分期，该患者属于：", "o": {"A": "轻度NPDR", "B": "中度NPDR", "C": "重度NPDR", "D": "增生早期（IV期）", "E": "纤维增生期（V期）"}, "a": "C", "e": "新生血管形成是PDR的标志，VEGF升高是关键驱动因素。治疗：全视网膜光凝（PRP）+抗VEGF。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "糖尿病性视网膜病变最常见的早期眼底改变是：", "o": {"A": "新生血管", "B": "微血管瘤", "C": "黄斑水肿", "D": "玻璃体积血", "E": "视网膜脱离"}, "a": "B", "e": "微血管瘤是糖尿病视网膜病变最早出现的眼底体征，由视网膜毛细血管壁局部膨出所致，表现为后极部散在小红点。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "甲状腺相关眼病最常见的眼睑体征是：", "o": {"A": "眼睑下垂", "B": "眼睑退缩", "C": "眼睑痉挛", "D": "眼睑内翻", "E": "眼睑外翻"}, "a": "B", "e": "甲状腺相关眼病（TAO）最常见表现为眼睑退缩+眼球突出。CT可见眼外肌梭形肥大（下直肌最常受累），肌腱不受累（不同于炎性假瘤）。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "白血病眼底病变中，Roth斑的典型特征是：", "o": {"A": "视网膜出血伴白芯", "B": "黄斑樱桃红斑", "C": "视盘水肿", "D": "视网膜新生血管", "E": "玻璃膜疣"}, "a": "A", "e": "正确答案：视网膜出血伴白芯。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "患者，男，52岁，糖尿病史8年，因“右眼视力下降1个月”就诊。查体：右眼视力0.6，眼底见少量微血管瘤及点状出血，未见新生血管及黄斑水肿。该患者目前最可能的DR分期是：", "o": {"A": "轻度NPDR", "B": "中度NPDR", "C": "重度NPDR", "D": "增生早期", "E": "增生晚期"}, "a": "A", "e": "黄斑水肿OCT表现：外丛状层和内核层出现低反射囊腔（囊样水肿）。FFA呈花瓣样高荧光。", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "患者，女，55岁，糖尿病史12年，眼底检查见视盘及视网膜新生血管形成，少量玻璃体积血。该患者的DR分期是：", "o": {"A": "重度NPDR", "B": "增生早期（IV期）", "C": "纤维增生期（V期）", "D": "增生晚期（VI期）", "E": "中度NPDR"}, "a": "B", "e": "病例分析题（共2道，第一题8分，第二题7分）", "author": "谭饮骏", "group": "眼科出题第一组"}, {"q": "角膜是眼球壁前部透明的膜，在其5层组织学结构中，受到损伤后不可再生、由瘢痕组织修复从而会留下永久性混浊（斑翳）的是哪一层？", "o": {"A": "上皮层", "B": "前弹力层", "C": "基质层", "D": "后弹力层", "E": "内皮层"}, "a": "C", "e": "角膜中上皮细胞层和后弹力层可再生；前弹力层和内皮细胞层损伤后不能再生。基质层损伤后由瘢痕修复。", "author": "陈栐洁", "group": "眼科出题第一组"}, {"q": "眼球内的房水不仅能维持正常的眼压，还具有营养角膜和晶状体的功能。正常生理状态下，房水产生的部位是？", "o": {"A": "虹膜表面的隐窝", "B": "睫状突上皮", "C": "脉络膜毛细血管", "D": "视网膜色素上皮", "E": "小梁网"}, "a": "B", "e": "房水由睫状突非色素上皮细胞主动分泌产生。", "author": "陈栐洁", "group": "眼科出题第一组"}, {"q": "在我国临床上广泛使用的《标准对数视力表》（由缪天荣教授设计），其规定的标准检查距离通常为？", "o": {"A": "3 米", "B": "4 米", "C": "5 米", "D": "6 米", "E": "10 米"}, "a": "C", "e": "国际标准视力表检查距离为5米。先查裸眼视力再查矫正视力，先右后左。", "author": "陈栐洁", "group": "眼科出题第一组"}, {"q": "正常人在自然光线环境下，双眼瞳孔呈正圆形且等大。其正常的生理直径范围通常在？", "o": {"A": "1.0 ~ 2.0 mm", "B": "2.5 ~ 4.0 mm", "C": "5.0 ~ 6.0 mm", "D": "6.0 ~ 8.0 mm", "E": "8.0 ~ 10.0 mm"}, "a": "B", "e": "正常人瞳孔在自然光线下直径约2.5~4.0mm，呈正圆形、双侧等大。", "author": "陈栐洁", "group": "眼科出题第一组"}, {"q": "临床上为了全面、简便地筛查眼底黄斑区（中央视网膜）的视觉功能，特别是检查有无视物变形、暗点等，首选的简易工具是？", "o": {"A": "裂隙灯显微镜", "B": "视野计（Perimetry）", "C": "检眼镜（Ophthalmoscope）", "D": "Amsler 方格表（阿姆斯勒方格表）", "E": "视网膜电图（ERG）"}, "a": "D", "e": "正确答案：Amsler 方格表（阿姆斯勒方格表）。", "author": "陈栐洁", "group": "眼科出题第一组"}, {"q": "某开角型青光眼患者同时患有严重的支气管哮喘与心动过缓。在选用局部降眼压滴眼液时，下列哪种药物是该患者的绝对禁忌证？", "o": {"A": "毛果芸香碱滴眼液", "B": "布林佐胺滴眼液", "C": "噻吗洛尔滴眼液", "D": "拉坦前列素滴眼液", "E": "酒石酸溴莫尼定滴眼液"}, "a": "C", "e": "正确答案：噻吗洛尔滴眼液。", "author": "陈栐洁", "group": "眼科出题第一组"}, {"q": "原发性急性闭角型青光眼急性发作时，眼压急剧升高，首选的拟胆碱类局部滴眼药是？", "o": {"A": "肾上腺素", "B": "阿托品", "C": "环戊通", "D": "毛果芸香碱（匹罗卡品）", "E": "托吡卡胺"}, "a": "D", "e": "正确答案：毛果芸香碱（匹罗卡品）。", "author": "陈栐洁", "group": "眼科出题第一组"}, {"q": "在儿眼科日常诊疗中，对于首次就诊、伴有内斜视的儿童行屈光不正检查（验光）前，通常常规使用的强效慢速散瞳剂是？", "o": {"A": "0.5% 复方托吡卡胺滴眼液", "B": "1% 盐酸环喷托酯滴眼液", "C": "1% 阿托品眼膏", "D": "0.5% 托吡卡胺滴眼液", "E": "盐酸去氧肾上腺素滴眼液"}, "a": "C", "e": "正确答案：1% 阿托品眼膏。", "author": "陈栐洁", "group": "眼科出题第一组"}, {"q": "沙眼是一种常见的传染性结膜炎。历史上，我国科学家汤飞凡、张晓楼在世界上首次成功分离出的沙眼病原体是？", "o": {"A": "沙眼支原体", "B": "沙眼衣原体", "C": "腺病毒 8 型", "D": "金黄色葡萄球菌", "E": "单纯疱疹病毒"}, "a": "B", "e": "沙眼由沙眼衣原体A、B、C血清型引起。我国汤飞凡、张晓楼1955年世界首次分离成功。", "author": "陈栐洁", "group": "眼科出题第一组"}, {"q": "一名 12 岁男童，每逢春夏季节双眼便奇痒难忍，伴有少量黏丝状分泌物。检查见双眼上睑结膜充血，且密布硬而扁平、大小不等的“铺路石样”乳头。该患者最可能的诊断是？", "o": {"A": "急性细菌性结膜炎", "B": "流行性角结膜炎", "C": "沙眼", "D": "春季角结膜炎", "E": "翼状胬肉"}, "a": "D", "e": "正确答案：春季角结膜炎。", "author": "陈栐洁", "group": "眼科出题第一组"}, {"q": "眼表疾病（OSD）是指由多种原因引起的、导致眼表组织结构和功能障碍的疾病。下列眼部组织发生病变时，不属于严格意义上眼表疾病范畴的是？", "o": {"A": "睑缘炎", "B": "干眼症", "C": "虹膜炎", "D": "结膜炎", "E": "角膜上皮缺陷"}, "a": "C", "e": "眼表包括角膜、结膜、睑缘、泪膜。虹膜炎属于眼内葡萄膜疾病，不属于严格意义的眼表疾病。", "author": "陈栐洁", "group": "眼科出题第一组"}, {"q": "真菌性角膜炎是一种致盲率极高的化脓性角膜炎。在临床问诊中，最常见且具有特征性的既往发病危险因素是？", "o": {"A": "长期佩戴框架眼镜", "B": "农作物或植物擦伤史", "C": "游泳池游泳史", "D": "既往有高血压病史", "E": "经常面对电脑屏幕"}, "a": "B", "e": "真菌性角膜炎最常见诱因：植物性角膜外伤（农作物/树枝划伤）。温暖潮湿气候+角膜上皮缺损+滥用激素。", "author": "陈栐洁", "group": "眼科出题第一组"}, {"q": "单纯疱疹病毒性角膜炎（HSK）是发病率最高的角膜盲原因之一。其浅层（上皮型）在裂隙灯荧光素染色下，最典型的特征性溃疡表现是？", "o": {"A": "圆形或椭圆形花边状溃疡", "B": "基质层盘状水肿", "C": "树枝状或地图状溃疡", "D": "边缘性角膜基质融解", "E": "角膜后羊脂状KP"}, "a": "C", "e": "HSK（单纯疱疹病毒性角膜炎）特征：反复发作、感冒/劳累诱因、角膜知觉减退、树枝/地图状溃疡。上皮型禁用激素。", "author": "陈栐洁", "group": "眼科出题第一组"}, {"q": "在临床上，通常认为角膜横径小于多少可诊断为病理性小角膜？", "o": {"A": "13 mm", "B": "12 mm", "C": "11 mm", "D": "10 mm", "E": "9 mm"}, "a": "D", "e": "正常成人角膜横径约11.5-12mm，<10mm为病理性小角膜。", "author": "陈栐洁", "group": "眼科出题第一组"}, {"q": "前葡萄膜炎（主要是虹膜睫状体炎）在我国发病率较高，且多与全身自身免疫性疾病相关。其中，最常伴有的强直性脊柱炎患者，其体检中哪项人类白细胞抗原（HLA）常呈阳性？", "o": {"A": "HLA-B27", "B": "HLA-B51", "C": "HLA-DR4", "D": "HLA-A29", "E": "HLA-B7"}, "a": "A", "e": "强直性脊柱炎伴前葡萄膜炎患者HLA-B27阳性率高达约90%。", "author": "陈栐洁", "group": "眼科出题第一组"}, {"q": "全葡萄膜炎中有一种非常特殊的类型，患者多为青壮年，双眼急性发病，除眼部弥漫性肉芽肿性炎症（如多发性渗出性视网膜脱离）外，常伴有头痛、耳鸣、听力下降以及后期皮肤白癜风、毛发变白。该疾病被称为？", "o": {"A": "强直性脊柱炎伴葡萄膜炎", "B": "白塞病（Behcet病）", "C": "Vogt-小柳-原田综合征（VKH病）", "D": "交感性眼炎", "E": "Fuch 异色性虹膜睫状体炎"}, "a": "C", "e": "肉芽肿性葡萄膜炎包括VKH、交感性眼炎、结核性等。特征：羊脂状KP、Busacca结节。", "author": "陈栐洁", "group": "眼科出题第一组"}, {"q": "根据晶状体混浊开始出现的部位，年龄相关性白内障在临床上最常见、分期最典型的类型是？", "o": {"A": "核性白内障", "B": "皮质性白内障", "C": "后囊下白内障", "D": "先天性白内障", "E": "外伤性白内障"}, "a": "B", "e": "年龄相关性白内障分三型：皮质性（最常见）、核性、后囊下性。", "author": "陈栐洁", "group": "眼科出题第一组"}, {"q": "目前临床上治疗白内障最为主流、手术切口小（通常小于3mm）、不需缝合、术后视力恢复极快的手术方式是？", "o": {"A": "白内障囊内摘除术（ICCE）", "B": "白内障常规囊外摘除术（ECCE）", "C": "白内障超声乳化吸除联合人工晶状体植入术（Phaco + IOL）", "D": "飞秒激光辅助的角膜屈光术", "E": "晶状体玻璃体切割术"}, "a": "C", "e": "正确答案：白内障超声乳化吸除联合人工晶状体植入术（Phaco + IOL）。", "author": "陈栐洁", "group": "眼科出题第一组"}, {"q": "葡萄膜炎（色素膜炎）可因长期的眼内慢性炎症引发继发性白内障。根据眼科规范，为了避免手术诱发眼内炎症爆发，通常要求在眼部慢性炎症完全缓解、控制稳定至少多久后，方可考虑行白内障摘除手术？", "o": {"A": "2 周", "B": "1 个月", "C": "3 个月", "D": "6 个月", "E": "1 年"}, "a": "C", "e": "葡萄膜炎继发白内障手术前须等待炎症完全静止至少3个月，因眼内手术可激发炎症复发，过早手术易导致术后炎症爆发及并发症。", "author": "陈栐洁", "group": "眼科出题第一组"}, {"q": "原发性开角型青光眼（POAG）早期症状隐匿，被称为“视力的小偷”。其导致眼压升高、房水流出受阻的最核心病理生理部位在？", "o": {"A": "瞳孔区（发生瞳孔阻滞）", "B": "睫状体冠部", "C": "小梁网及 Schlemm 管", "D": "脉络膜上腔", "E": "玻璃体腔"}, "a": "C", "e": "正确答案：小梁网及 Schlemm 管。", "author": "陈栐洁", "group": "眼科出题第一组"}, {"q": "高眼压症（Ocular Hypertension）在临床随访中非常多见。关于高眼压症，下列哪项描述是正确的？", "o": {"A": "眼压高于正常，且伴有青光眼性视野缺损", "B": "眼压高于正常，但视盘凹陷及视野均完全正常", "C": "眼压在正常范围内，但出现了典型的视野缺损", "D": "必须立即联合三种以上降眼压药进行手术或药物治疗", "E": "会伴有角膜雾状水肿和急性剧烈头痛"}, "a": "B", "e": "高眼压症：眼压>21mmHg但视盘和视野完全正常，需定期随访而不必立即用药。", "author": "陈栐洁", "group": "眼科出题第一组"}, {"q": "视网膜中央动脉阻塞（CRAO）最特异、最具诊断地标性的眼底体征是？", "o": {"A": "视网膜全周大片火焰状出血", "B": "视盘充血水肿、边界不清", "C": "黄斑中心凹可见“樱桃红”点", "D": "视网膜可见多量硬性渗出", "E": "视网膜后极部可见大量新生血管"}, "a": "C", "e": "CRAO典型表现：视网膜苍白水肿+黄斑樱桃红斑。属眼科急诊，抢救黄金窗口90-120分钟。", "author": "陈栐洁", "group": "眼科出题第一组"}, {"q": "视网膜中央静脉阻塞（CRVO）眼底常呈现大片大面积的出血，被称为“暴风雨状”。在其各种类型中，缺血型CRVO在发病数月后，最严重且易导致失明和剧烈剧痛的并发症是？", "o": {"A": "外伤性白内障", "B": "新生血管性青光眼（NVG）", "C": "黄斑裂孔", "D": "视神经乳头炎", "E": "渗出性脉络膜脱离"}, "a": "B", "e": "CRVO典型表现：视网膜静脉迂曲扩张+广泛火焰状出血（暴风雨样）。缺血型易继发新生血管性青光眼。", "author": "陈栐洁", "group": "眼科出题第一组"}, {"q": "糖尿病视网膜病变（DR）是糖尿病最严重的微血管并发症。在国际临床分级标准中，如果非增殖性糖尿病视网膜病变（NPDR）出现了严重的“4-2-1”现象，这提示该患者处于？", "o": {"A": "轻度非增殖期", "B": "中度非增殖期", "C": "重度非增殖期（极增殖前期）", "D": "增殖期", "E": "糖尿病视网膜病变晚期"}, "a": "C", "e": "重度NPDR的4-2-1原则：4个象限严重出血+2个象限静脉串珠+1个象限IRMA。满足一条可诊断。", "author": "陈栐洁", "group": "眼科出题第一组"}, {"q": "调节静止状态下，平行光线经眼球的屈光系统屈折后，其焦点刚好聚焦在视网膜之后。这种屈光状态在临床上被称为？", "o": {"A": "近视", "B": "远视", "C": "正视", "D": "散光", "E": "老视"}, "a": "B", "e": "眼球屈光介质包括：角膜、房水、晶状体、玻璃体。视网膜不是屈光介质（是感光组织）。", "author": "陈栐洁", "group": "眼科出题第一组"}, {"q": "儿童弱视（Amblyopia）越早发现、越早治疗效果越好。通常情况下，人类视觉发育的敏感期和弱视治疗的黄金期是在几岁之前？", "o": {"A": "3 岁之前", "B": "6 岁之前", "C": "12 岁之前", "D": "14 岁之前", "E": "18 岁之前"}, "a": "B", "e": "弱视治疗最佳年龄为3-6岁（视觉发育关键期）。超过12岁治疗效果极差。早发现早治疗是关键。", "author": "陈栐洁", "group": "眼科出题第一组"}, {"q": "一名 15 岁的中学生，经规范的医院散瞳验光后诊断为“单纯性近视眼”。为了让他能够看清远处的目标，临床上应为其配戴何种类型的透镜进行矫正？", "o": {"A": "凸透镜", "B": "凹透镜", "C": "柱镜", "D": "三棱镜", "E": "双焦镜"}, "a": "B", "e": "儿童/青少年验光前须散瞳（睫状肌麻痹）以消除调节对屈光度的影响，获得真实的屈光状态。", "author": "陈栐洁", "group": "眼科出题第一组"}, {"q": "眼部化学伤（如在实验室、工厂不慎发生强酸、强碱溅入眼内）是一类极为紧急的眼外伤。其急救治疗中最关键、最决定预后的首要措施是？", "o": {"A": "迅速送往最近的三甲大医院眼科急诊", "B": "寻找酸碱中和剂（如弱酸或弱碱）进行中和", "C": "争分夺秒，就地大量清水进行彻底冲洗", "D": "局部点抗生素眼药水预防感染", "E": "口服大剂量糖皮质激素抗炎"}, "a": "C", "e": "正确答案：争分夺秒，就地大量清水进行彻底冲洗。", "author": "陈栐洁", "group": "眼科出题第一组"}, {"q": "前房积血是眼球钝挫伤后常见的体征。对于前房积血的患者，在静卧休养时，医护人员通常指导其采取半卧位（头高位）。这一体位的核心医学目的是？", "o": {"A": "减轻患者由于头痛引起的恶心呕吐", "B": "预防后部视网膜发生视网膜脱离", "C": "利用重力让积血沉积在前房下方，避免遮挡瞳孔并防止堵塞上方房角", "D": "促进眼睑和结膜的水肿消退", "E": "有利于眼底视神经的血液供应"}, "a": "C", "e": "前房积血分级：I级<1/3前房，II级1/3-2/3前房，III级>2/3前房。处理：半卧位+双眼遮盖+监测眼压。", "author": "陈栐洁", "group": "眼科出题第一组"}, {"q": "某患者眼球被拳头猛烈击伤，随后出现看东西双影（复视）、患眼眼球下移、且向上看时运动受限。这种情况最可能发生了眼眶的什么损伤？", "o": {"A": "眶上缘骨折", "B": "眶外侧壁硬性骨折", "C": "眼眶击出性骨折（眶底骨折）", "D": "颅底骨折", "E": "额骨骨折"}, "a": "C", "e": "正确答案：眼眶击出性骨折（眶底骨折）。", "author": "陈栐洁", "group": "眼科出题第一组"}, {"q": "【单选题】患者主诉“看直线变弯、中心暗影”，远视力仅轻度下降。为了最直接评价黄斑区结构并判断是否存在黄斑水肿或黄斑前膜，首选检查是：", "o": {"A": "眼压测量", "B": "光学相干断层扫描（OCT）", "C": "Schirmer试验", "D": "眼球突出度测量", "E": "角膜内皮计数"}, "a": "B", "e": "解析：变视和中心暗影提示黄斑受累。OCT可显示黄斑各层结构、囊样水肿、视网膜前膜及神经上皮脱离，是结构判断的关键检查。", "author": "李明准", "group": "眼科出题第一组"}, {"q": "【单选题】关于视神经和瞳孔光反射通路，下列哪项最符合临床定位意义？", "o": {"A": "视神经损害只影响近反射，不影响直接光反射", "B": "相对性传入性瞳孔障碍提示传入通路受损，常见于视神经或严重视网膜病变", "C": "视交叉病变一定表现为单眼全盲", "D": "视束以后病变不会造成视野缺损", "E": "瞳孔散大固定即可诊断视神经炎"}, "a": "B", "e": "解析：RAPD是传入通路不对称损害的重要体征。视交叉中部病变常为双颞侧偏盲，视束及更后部病变可出现同向偏盲。", "author": "李明准", "group": "眼科出题第一组"}, {"q": "【单选题】准备给老年患者散瞳查眼底前，发现前房浅、周边前房深度可疑。为了降低诱发急性闭角型青光眼的风险，最应先补充的评估是：", "o": {"A": "泪膜破裂时间", "B": "房角情况及眼压评估", "C": "角膜荧光素染色", "D": "色觉检查", "E": "眼眶CT"}, "a": "B", "e": "解析：浅前房提示窄房角风险，散瞳可诱发瞳孔阻滞和急性闭角发作。散瞳前应评估房角和眼压，必要时避免散瞳或先处理风险。", "author": "李明准", "group": "眼科出题第一组"}, {"q": "【多选题】裂隙灯检查红眼患者时，下列哪些体征提示不能简单按普通结膜炎处理？", "o": {"A": "角膜上皮缺损或浸润灶", "B": "前房闪辉、细胞或前房积脓", "C": "角膜后沉着物", "D": "睫状充血明显", "E": "单纯轻度眼痒且视力正常"}, "a": "A", "e": "、B、C、D 解析：角膜病变、前房炎症、KP和睫状充血提示角膜炎、葡萄膜炎或急性青光眼等严重眼病。单纯眼痒且视力正常更支持轻症眼表或过敏性疾病。", "author": "李明准", "group": "眼科出题第一组"}, {"q": "【单选题】眼科门诊病历中，“主诉”最规范的写法是：", "o": {"A": "右眼红痛伴视物模糊2天", "B": "角膜炎可能性大", "C": "病人很着急，要求开药", "D": "右眼不舒服", "E": "需进一步检查后再说"}, "a": "A", "e": "解析：主诉应概括主要症状、部位和持续时间，避免直接写诊断、处理意见或过于笼统的描述。", "author": "李明准", "group": "眼科出题第一组"}, {"q": "【单选题】关于糖皮质激素滴眼液的使用原则，下列哪项最正确？", "o": {"A": "所有红眼均可先用激素快速退红", "B": "单纯疱疹病毒性上皮性角膜炎活动期可作为首选单药", "C": "用药前应尽量明确诊断，并警惕感染加重、眼压升高和角膜上皮愈合延迟", "D": "激素滴眼液不会影响眼压，因此无需随访", "E": "真菌性角膜炎确诊后应立即长期大剂量激素治疗"}, "a": "C", "e": "解析：眼用激素有明确适应证，但可掩盖或加重感染、升高眼压、延迟角膜上皮修复。感染性角膜病尤其需要谨慎。", "author": "李明准", "group": "眼科出题第一组"}, {"q": "【单选题】青光眼患者拟使用噻吗洛尔滴眼液控制眼压。病史中最需要主动询问的是：", "o": {"A": "是否曾行阑尾切除术", "B": "是否有支气管哮喘、慢阻肺或明显心动过缓", "C": "是否有近视眼镜度数变化", "D": "是否有季节性过敏性鼻炎", "E": "是否有轻度干眼"}, "a": "B", "e": "解析：局部β受体阻滞剂可产生全身吸收，哮喘、慢阻肺、窦性心动过缓和房室传导阻滞患者需慎用或禁用。", "author": "李明准", "group": "眼科出题第一组"}, {"q": "【单选题】下列哪项最支持过敏性结膜炎而不是细菌性结膜炎？", "o": {"A": "双眼明显眼痒、季节性发作，乳头增生", "B": "单眼剧痛伴角膜灰白浸润", "C": "大量黄绿色黏脓性分泌物", "D": "前房积脓", "E": "眼压显著升高"}, "a": "A", "e": "解析：眼痒是过敏性结膜炎最典型症状，常双眼发作并与季节或过敏原相关。角膜浸润、前房积脓和高眼压均提示更严重疾病。", "author": "李明准", "group": "眼科出题第一组"}, {"q": "【单选题】干眼症患者长期异物感、烧灼感，裂隙灯见泪河低、角膜点状染色。基础治疗中最合理的是：", "o": {"A": "长期自行使用高浓度激素滴眼液", "B": "人工泪液、减少诱因、睑板腺功能管理和环境调整", "C": "立即玻璃体切除", "D": "常规全身抗凝治疗", "E": "每日多次散瞳"}, "a": "B", "e": "解析：干眼治疗强调补充泪液、改善用眼和环境、热敷及睑板腺管理。激素仅在特定炎症状态下短期谨慎使用。", "author": "李明准", "group": "眼科出题第一组"}, {"q": "【单选题】病毒性结膜炎的门诊宣教中，最重要的是：", "o": {"A": "与家人共用滴眼液可提高依从性", "B": "勤洗手，避免揉眼和共用毛巾、洗脸用品", "C": "必须长期口服抗真菌药", "D": "只要眼红就长期使用激素", "E": "立即行白内障手术"}, "a": "B", "e": "解析：腺病毒性结膜炎传染性强，卫生隔离和避免交叉污染是关键。", "author": "李明准", "group": "眼科出题第一组"}, {"q": "【单选题】长期佩戴隐形眼镜者出现眼痛、畏光、流泪、视力下降，角膜中央灰白浸润并荧光素染色阳性。最应首先警惕的是：", "o": {"A": "单纯老视", "B": "感染性角膜炎，尤其细菌性角膜炎", "C": "玻璃体后脱离", "D": "视网膜色素变性", "E": "生理性飞蚊症"}, "a": "B", "e": "解析：隐形眼镜相关角膜感染可进展迅速，中央浸润伴上皮缺损会威胁视力，需要尽快停戴、病原学评估和抗感染治疗。", "author": "李明准", "group": "眼科出题第一组"}, {"q": "【单选题】树枝状角膜上皮病灶伴末端膨大、荧光素染色阳性，最典型见于：", "o": {"A": "单纯疱疹病毒性上皮性角膜炎", "B": "年龄相关性白内障", "C": "急性闭角型青光眼", "D": "过敏性结膜炎", "E": "视网膜中央动脉阻塞"}, "a": "A", "e": "解析：树枝状上皮病灶是HSV上皮性角膜炎的重要特征，治疗以抗病毒为主，活动期应避免随意使用激素。", "author": "李明准", "group": "眼科出题第一组"}, {"q": "【单选题】农作物划伤后发生角膜溃疡，病灶边界不清、表面干燥粗糙、可见卫星灶，并出现前房积脓。最应考虑：", "o": {"A": "真菌性角膜炎", "B": "单纯屈光不正", "C": "结膜下出血", "D": "视神经炎", "E": "黄斑裂孔"}, "a": "A", "e": "解析：植物性外伤后角膜溃疡、干燥粗糙、卫星灶和前房积脓高度提示真菌性角膜炎。", "author": "李明准", "group": "眼科出题第一组"}, {"q": "【多选题】感染性角膜炎的初步处理原则包括：", "o": {"A": "立即停戴隐形眼镜", "B": "评估病灶大小、深度、位置及是否累及中央区", "C": "中央、大、深或进展快的溃疡应考虑角膜刮片和培养", "D": "在未排除感染前自行长期使用激素", "E": "根据病原可能性尽早给予针对性抗感染治疗并密切随访"}, "a": "A", "e": "、B、C、E 解析：感染性角膜炎需尽快控制病原并保护角膜完整性。激素可能加重感染，需在专科判断下使用。", "author": "李明准", "group": "眼科出题第一组"}, {"q": "【单选题】急性前葡萄膜炎最有诊断价值的裂隙灯表现是：", "o": {"A": "大量黏脓性分泌物", "B": "前房闪辉和细胞，可伴角膜后沉着物", "C": "单纯结膜滤泡", "D": "眼睑皮肤鳞屑", "E": "玻璃体完全透明且无炎症"}, "a": "B", "e": "解析：前房细胞、闪辉和KP是前葡萄膜炎的核心体征，常伴睫状充血、眼痛、畏光和瞳孔缩小。", "author": "李明准", "group": "眼科出题第一组"}, {"q": "【单选题】急性前葡萄膜炎治疗中使用睫状肌麻痹/散瞳药的主要目的不包括：", "o": {"A": "减轻睫状肌痉挛和疼痛", "B": "预防或解除虹膜后粘连", "C": "稳定血-房水屏障的炎症反应", "D": "直接清除晶状体混浊", "E": "与抗炎治疗配合改善症状"}, "a": "D", "e": "解析：散瞳和睫状肌麻痹可止痛并防止后粘连，但不能逆转白内障。炎症控制主要依赖抗炎治疗。", "author": "李明准", "group": "眼科出题第一组"}, {"q": "【单选题】年龄相关性白内障最典型的主诉是：", "o": {"A": "突发剧烈眼痛伴恶心呕吐", "B": "缓慢、无痛性视力下降，可伴眩光和对比敏感度下降", "C": "眼痒伴水样分泌物", "D": "眼球突出伴复视", "E": "夜间突发闪光感和黑幕遮挡"}, "a": "B", "e": "解析：白内障本质是晶状体透明性下降，通常表现为进行性、无痛性视功能下降。", "author": "李明准", "group": "眼科出题第一组"}, {"q": "【单选题】关于房水循环，下列哪一路径最正确？", "o": {"A": "睫状体产生，后房经瞳孔入前房，经小梁网和Schlemm管外流", "B": "视网膜产生，经玻璃体直接流入脉络膜", "C": "晶状体产生，经虹膜实质吸收", "D": "角膜产生，经泪小点排出", "E": "视神经产生，经中央静脉排出"}, "a": "A", "e": "解析：房水由睫状体产生，经后房、瞳孔、前房，主要通过小梁网-Schlemm管通路外流；该通路阻力与眼压密切相关。", "author": "李明准", "group": "眼科出题第一组"}, {"q": "【单选题】原发性开角型青光眼早期最危险的特点是：", "o": {"A": "多数患者早期剧痛明显，容易主动就诊", "B": "早期可无明显自觉症状，但已有视盘和视野损害", "C": "必定伴大量脓性分泌物", "D": "必定出现角膜穿孔", "E": "只要眼压低于21 mmHg即可完全排除"}, "a": "B", "e": "解析：开角型青光眼常隐匿进展，中心视力可长期保留。正常眼压不能完全排除青光眼，需要结合视盘、RNFL和视野。", "author": "李明准", "group": "眼科出题第一组"}, {"q": "【单选题】急性闭角型青光眼急性发作最典型的组合是：", "o": {"A": "眼痒、清水样分泌物、视力正常", "B": "剧烈眼痛、头痛恶心呕吐、虹视、角膜水肿、前房浅、眼压显著升高", "C": "无痛性眼前黑影飘动多年", "D": "眼睑肿块缓慢增大无压痛", "E": "近距离阅读困难但眼压正常"}, "a": "B", "e": "解析：急性闭角发作是眼科急症，常由房角突然关闭导致眼压急剧升高，伴角膜水肿、瞳孔中等散大和全身症状。", "author": "李明准", "group": "眼科出题第一组"}, {"q": "【多选题】青光眼性视神经损害的判断依据可包括：", "o": {"A": "杯盘比增大或双眼明显不对称", "B": "视盘盘沿变窄、切迹或视网膜神经纤维层缺损", "C": "与青光眼相符的视野缺损", "D": "眼压升高或眼压波动大", "E": "仅凭一次正常裸眼视力即可排除"}, "a": "A", "e": "、B、C、D 解析：青光眼诊断需综合结构、功能和危险因素。中心视力正常不能排除早中期青光眼。", "author": "李明准", "group": "眼科出题第一组"}, {"q": "【单选题】近视眼的光学特点及矫正方式最正确的是：", "o": {"A": "平行光聚焦在视网膜后，用凸透镜矫正", "B": "平行光聚焦在视网膜前，用凹透镜矫正", "C": "平行光聚焦在视网膜上，用三棱镜矫正", "D": "主要由晶状体完全混浊引起，用人工泪液矫正", "E": "只发生在老年人，用散瞳药矫正"}, "a": "B", "e": "解析：近视多因眼轴相对过长或屈光力过强，远处平行光聚焦于视网膜前，需用凹透镜使焦点后移。", "author": "李明准", "group": "眼科出题第一组"}, {"q": "【单选题】老视的主要机制是：", "o": {"A": "角膜上皮感染", "B": "年龄增长后晶状体弹性下降、调节幅度降低", "C": "视网膜中央动脉阻塞", "D": "玻璃体积血", "E": "眼压急剧升高"}, "a": "B", "e": "解析：老视是调节功能随年龄下降的表现，近距离阅读困难明显，通常需近用加光矫正。", "author": "李明准", "group": "眼科出题第一组"}, {"q": "【单选题】儿童远视或内斜视患者验光时，常需要睫状肌麻痹验光的主要原因是：", "o": {"A": "儿童调节力强，容易掩盖真实远视度数", "B": "儿童不能进行任何视力检查", "C": "麻痹睫状肌可治疗所有弱视", "D": "散瞳后可立即排除青光眼", "E": "只有散瞳才能发现结膜炎"}, "a": "A", "e": "解析：儿童调节强，可造成假性近视或低估远视。睫状肌麻痹验光有助于获得更真实的屈光状态，指导弱视和斜视治疗。", "author": "李明准", "group": "眼科出题第一组"}, {"q": "【单选题】糖尿病患者眼底出现新生血管、玻璃体积血或牵拉性视网膜脱离，提示病变已进入：", "o": {"A": "无糖尿病视网膜病变", "B": "轻度非增殖期", "C": "中度非增殖期", "D": "增殖期糖尿病视网膜病变", "E": "单纯老视"}, "a": "D", "e": "解析：新生血管是增殖期DR的标志，可导致玻璃体积血和牵拉性视网膜脱离，是严重致盲风险。", "author": "李明准", "group": "眼科出题第一组"}, {"q": "【单选题】突发无痛性单眼严重视力下降，眼底见视网膜弥漫苍白、水肿，黄斑樱桃红点。最可能诊断是：", "o": {"A": "视网膜中央动脉阻塞", "B": "过敏性结膜炎", "C": "干眼症", "D": "年龄相关性白内障", "E": "霰粒肿"}, "a": "A", "e": "解析：CRAO表现为突发无痛性重度视力下降、视网膜苍白和黄斑樱桃红点，是眼科急症，并提示全身血管事件风险。", "author": "李明准", "group": "眼科出题第一组"}, {"q": "【单选题】年轻患者急性单眼视力下降、色觉下降、眼球转动痛，查相对性传入性瞳孔障碍。最应考虑：", "o": {"A": "视神经炎", "B": "细菌性结膜炎", "C": "霰粒肿", "D": "老视", "E": "翼状胬肉"}, "a": "A", "e": "解析：视神经炎常见于中青年，表现为急性或亚急性视力下降、色觉异常、RAPD和眼球转动痛。", "author": "李明准", "group": "眼科出题第一组"}, {"q": "【多选题】下列哪些症状或体征应警惕孔源性视网膜脱离？", "o": {"A": "闪光感", "B": "飞蚊突然增多", "C": "固定黑影或幕样遮挡", "D": "周边视网膜裂孔或格子样变性", "E": "单纯眼痒且无视力改变"}, "a": "A", "e": "、B、C、D 解析：闪光、飞蚊增多和黑幕感是玻璃体牵拉、裂孔和视网膜脱离的重要线索，高度近视者尤其需警惕。", "author": "李明准", "group": "眼科出题第一组"}, {"q": "【单选题】强碱溅入眼内后，现场或急诊首要处理是：", "o": {"A": "立即、持续、大量冲洗眼部，不因等待检查而延误", "B": "先包扎24小时观察", "C": "立即滴用散瞳药后回家", "D": "等疼痛缓解后再冲洗", "E": "直接行白内障手术"}, "a": "A", "e": "解析：化学伤尤其碱伤可迅速深入组织，最重要的第一步是立即大量冲洗并清除残留化学物质。", "author": "李明准", "group": "眼科出题第一组"}, {"q": "【单选题】怀疑眼球开放伤时，下列处理最恰当的是：", "o": {"A": "用力按压眼球以判断是否漏液", "B": "使用硬眼罩保护、禁压眼球、禁揉眼，尽快专科处理", "C": "立即冲洗并按摩眼球", "D": "让患者自行点麻药后回家观察", "E": "先行非无菌角膜刮片"}, "a": "B", "e": "解析：开放伤需避免任何增加眼内容物脱出的操作，保护眼球、禁食、抗感染和尽快手术评估是关键。", "author": "李明准", "group": "眼科出题第一组"}, {"q": "【单选题】眼球钝挫伤后前房积血，早期最需要密切监测的是：", "o": {"A": "眼压和再出血风险", "B": "指甲颜色", "C": "鼻腔通气", "D": "牙齿咬合", "E": "听力阈值"}, "a": "A", "e": "解析：前房积血可阻塞房角导致眼压升高，并有再出血风险。应限制活动、抬高头位、复查眼压和前房积血吸收情况。", "author": "李明准", "group": "眼科出题第一组"}, {"q": "单侧眼“盲”的定义为（）", "o": {"A": "视野半径＜20度", "B": "视野半径＜15度", "C": "视野半径＜10度", "D": "视野半径＜5度", "E": "视野全部丧失"}, "a": "C", "e": "正确答案：视野半径＜10度。", "author": "张智翔", "group": "眼科出题第二组"}, {"q": "视野的向心性缩小可见于下列疾病，除了（）", "o": {"A": "晚期青光眼", "B": "视神经炎", "C": "视网膜色素变性", "D": "垂体瘤", "E": "周边部视网膜脉络膜炎"}, "a": "D", "e": "垂体瘤压迫视交叉中部，典型表现为双颞侧偏盲，而非视野向心性缩小；后者见于晚期青光眼、视网膜色素变性、视神经炎及周边视网膜脉络膜炎。", "author": "张智翔", "group": "眼科出题第二组"}, {"q": "使用裂隙镜检查角膜上皮水肿、 角膜云翳、角膜后沉着物、晶状体空泡等时，适合使用哪种方法（）", "o": {"A": "后部反光照明法", "B": "间接照明法", "C": "弥散光照明法", "D": "直接焦点照明法", "E": "角膜缘分光照明法"}, "a": "A", "e": "正确答案：后部反光照明法。", "author": "张智翔", "group": "眼科出题第二组"}, {"q": "下列有关瞳孔反射不正确的是（）", "o": {"A": "瞳孔反射可以评估眼部和中枢神经系统的损害", "B": "瞳孔反射包括直接光反射、间接光反射和集合反射等", "C": "直接光反射正常的瞳孔，在强光刺激下持续缩小，关闭光照后逐渐恢复", "D": "间接光反射实验中，双侧瞳孔同时缩小是正常的", "E": "集合反射是指注视近物时双眼会聚及瞳孔调节的生理反射，包括辐辏反射和调节反射"}, "a": "C", "e": "正确答案：直接光反射正常的瞳孔，在强光刺激下持续缩小，关闭光照后逐渐恢复。", "author": "张智翔", "group": "眼科出题第二组"}, {"q": "一过性视力丧失常见于下列疾病，除了（）", "o": {"A": "体位性低血压", "B": "一过性脑缺血发作", "C": "视神经炎", "D": "偏头痛", "E": "视网膜动脉痉挛"}, "a": "C", "e": "一过性视力丧失（24h内恢复）常见原因：一过性脑缺血发作（TIA）、视网膜动脉痉挛、偏头痛、体位性低血压。视网膜中央动脉阻塞通常持续超过24h。", "author": "张智翔", "group": "眼科出题第二组"}, {"q": "视力下降伴有疼痛的可见于下列哪个疾病（）", "o": {"A": "慢性闭角型青光眼", "B": "玻璃体混浊", "C": "糖尿病视网膜病变", "D": "视神经炎", "E": "巩膜炎"}, "a": "E", "e": "巩膜炎的典型特征是眼部深在性剧痛伴视力下降，疼痛为其突出表现；其余选项（玻璃体混浊、糖尿病视网膜病变等）通常为无痛性视力下降。", "author": "张智翔", "group": "眼科出题第二组"}, {"q": "泪道冲洗试验中，鼻泪管狭窄的表现是（）", "o": {"A": "顺利进入鼻咽", "B": "冲洗液完全从注入原路反流", "C": "冲洗液自上泪小点注入后由下泪小点反流", "D": "冲洗液有阻力，部分自该泪小点反流，部分流入鼻腔", "E": "冲洗液反流同时伴有黏性或脓性分泌物"}, "a": "D", "e": "泪道冲洗：原路返流→泪小管阻塞；下冲上返→泪总管阻塞；返流+脓→慢性泪囊炎（鼻泪管阻塞）。", "author": "张智翔", "group": "眼科出题第二组"}, {"q": "患者，女，30岁，主诉“双眼红、异物感、晨起眼睑粘连3天”，发病前有感冒患者接触史；体格检查示双眼视力0.8，睑结膜弥漫充血，可见乳头增生，下穹隆有大量黄白色黏脓性分泌物，角膜透明无浸润，前房清，眼压正常，左耳前可及一黄豆大小肿大淋巴结，轻度压痛。该患者最可能是什么疾病（）", "o": {"A": "角膜炎", "B": "色素膜炎", "C": "干眼症", "D": "结膜下出血", "E": "结膜炎"}, "a": "E", "e": "角膜透明性依赖上皮完整、基质胶原规则排列、无血管、内皮泵功能。内皮细胞层是维持透明的关键。", "author": "张智翔", "group": "眼科出题第二组"}, {"q": "患者，男，22岁，主诉“双眼奇痒、眼红、烧灼感1周”，既往有季节性过敏性鼻炎病史，曾自行使用滴眼液，具体不详，未缓解；体格检查示双眼视力1.0，双眼上睑结膜可见铺路石样巨大乳头，结膜轻度充血，少量水样或黏丝状分泌物，角膜透明，前房清，眼压正常。关于该患者的治疗，下列错误的是（）", "o": {"A": "可以使用抗组胺药或肥大细胞稳定剂滴眼液", "B": "尽早大剂量应用糖皮质激素滴眼液，避免延误病情", "C": "急性期需频繁滴眼，病情控制后减少频次", "D": "明确过敏原后，日常尽量避免接触过敏原", "E": "指导患者正确滴药方法，强调遵医嘱用药的重要性"}, "a": "B", "e": "角膜透明性依赖上皮完整、基质胶原规则排列、无血管、内皮泵功能。内皮细胞层是维持透明的关键。", "author": "张智翔", "group": "眼科出题第二组"}, {"q": "以下哪个不是角膜炎的病理阶段（）", "o": {"A": "浸润期", "B": "溃疡形成期", "C": "坏死期", "D": "愈合期", "E": "并发症期"}, "a": "C", "e": "角膜炎病理过程四阶段：浸润期→溃疡形成期→愈合期→并发症期。角膜云翳/斑翳/白斑是愈合期后遗症。", "author": "张智翔", "group": "眼科出题第二组"}, {"q": "患者，女，32岁，因“右眼红痛、畏光、流泪伴视力下降3天”就诊。体格检查示右眼视力0.1（矫正不提高），睫状充血（+++），角膜中央偏下方见直径约3mm×4mm的黄白色浸润灶，边界不清，荧光素钠染色阳性；左眼（-）。追问得知患者长期佩戴软性隐形眼镜，常用自来水冲洗镜片，近1月来连续过夜佩戴。该患者最有可能的诊断是（）", "o": {"A": "细菌性角膜炎", "B": "病毒性角膜炎", "C": "真菌性角膜炎", "D": "棘阿米巴角膜炎", "E": "急性闭角型青光眼"}, "a": "A", "e": "角膜中央厚约0.5mm，周边约1mm。基质层占全层约90%。", "author": "张智翔", "group": "眼科出题第二组"}, {"q": "患者，男，45岁，主诉“右眼视物模糊伴眼红、眼胀5天”。体格检查示右眼视力0.3，角膜上皮完整无缺损，中央区角膜基质呈盘状混浊水肿，边界清楚，角膜后可见羊脂状KP，前房闪辉（+），眼压轻度升高（22 mmH。g），角膜感觉正常，无新生血管；左眼（-）。追问得知发病前1周有唇疱疹史。该患者最有可能的诊断是（）", "o": {"A": "单疱病毒性树枝状角膜炎", "B": "单疱病毒性地图状角膜炎", "C": "单疱病毒性神经营养性角膜炎", "D": "单疱病毒性盘状角膜炎", "E": "单疱病毒性坏死性角膜基质炎"}, "a": "D", "e": "角膜感觉神经丰富，由三叉神经眼支支配。", "author": "张智翔", "group": "眼科出题第二组"}, {"q": "患者，女，58岁，主诉“右眼红痛、畏光、视力下降1周”， 体格检查示右眼视力0.1，角膜中央大片上皮缺损，缺损形态呈不规则地图状，边缘可见灰白色隆起，荧光素钠染色呈地图样着染，角膜基质轻度水肿，角膜后可见少量羊脂状KP，前房闪辉（+），眼压正常，左眼（-）。关于该患者的治疗哪项是错误的（）", "o": {"A": "可以使用阿昔洛韦滴眼液", "B": "可以使用抗生素滴眼液", "C": "可以服用维生素B2、C等", "D": "可以使用糖皮质激素类药物", "E": "不需要使用抗真菌药物"}, "a": "B", "e": "角膜中央厚约0.5mm，周边约1mm。基质层占全层约90%。", "author": "张智翔", "group": "眼科出题第二组"}, {"q": "葡萄膜炎是发生于下列部位的炎症，除了（）部位", "o": {"A": "虹膜", "B": "睫状体", "C": "脉络膜", "D": "视网膜", "E": "角膜"}, "a": "E", "e": "葡萄膜由虹膜、睫状体和脉络膜组成，炎症可波及邻近视网膜，但角膜属眼球外层，不属于葡萄膜，不是葡萄膜炎的发生部位。", "author": "张智翔", "group": "眼科出题第二组"}, {"q": "关于中间葡萄膜炎，下列不正确的是（）", "o": {"A": "双眼发病、起病隐匿", "B": "往往不导致周边虹膜前粘连", "C": "可出现特征性的雪堤样改变", "D": "多数患者的临床分型为良性型", "E": "可并发白内障或视网膜黄斑病变"}, "a": "B", "e": "正确答案：往往不导致周边虹膜前粘连。", "author": "张智翔", "group": "眼科出题第二组"}, {"q": "根据病因对白内障进行分类，不包括以下哪个（）", "o": {"A": "先天性", "B": "外伤性", "C": "代谢性", "D": "皮质性", "E": "年龄相关性"}, "a": "D", "e": "白内障按病因分类包括先天性、外伤性、代谢性、年龄相关性等；皮质性是按晶状体混浊部位（形态学）进行的分类，属于形态分类而非病因分类。", "author": "张智翔", "group": "眼科出题第二组"}, {"q": "皮质性白内障在成熟期的特征为（）", "o": {"A": "囊膜皱缩", "B": "楔形、车轮样混浊", "C": "晶体全混", "D": "皮质液化外溢", "E": "管状视野"}, "a": "C", "e": "成熟期：晶状体全混浊，虹膜投影消失，视力严重下降。", "author": "张智翔", "group": "眼科出题第二组"}, {"q": "青光眼在眼科辅助检查中可能出现下列异常，除了（）", "o": {"A": "杯盘比=0.35", "B": "双眼杯盘比之差=0.25", "C": "管状视野", "D": "眼压=23mmHg", "E": "视野出现旁中心暗点"}, "a": "A", "e": "正确答案：杯盘比=0.35。", "author": "张智翔", "group": "眼科出题第二组"}, {"q": "下列哪些药物均可用于青光眼的治疗（）", "o": {"A": "甘露醇、毛果芸香碱、苯海拉明", "B": "异山梨醇、溴莫尼定、卡替洛尔", "C": "倍他洛尔、6542、贝美前列素", "D": "溴莫尼定、沙丁胺醇、布林佐胺", "E": "卡替洛尔、哌唑嗪、阿米替林"}, "a": "B", "e": "正确答案：异山梨醇、溴莫尼定、卡替洛尔。", "author": "张智翔", "group": "眼科出题第二组"}, {"q": "急性闭角型青光眼在急性发作期可出现的症状不包括（）", "o": {"A": "剧烈眼胀痛伴同侧头痛", "B": "视力下降，眼压骤升", "C": "色素性KP、虹膜节段性萎缩", "D": "视力完全丧失，无光感，伴视乳头萎缩", "E": "恶心、呕吐、发热、便秘、腹泻"}, "a": "D", "e": "正确答案：视力完全丧失，无光感，伴视乳头萎缩。", "author": "张智翔", "group": "眼科出题第二组"}, {"q": "以下哪项不符合原发性开角型青光眼的表现（）", "o": {"A": "病因和发病机制尚未完全明确", "B": "发病隐匿，进展缓慢", "C": "完全失明前先出现夜间视力差、夜盲和行动不便", "D": "晚期有瞳孔散大", "E": "其青光眼性视神经乳头和视野损害不典型"}, "a": "E", "e": "正确答案：其青光眼性视神经乳头和视野损害不典型。", "author": "张智翔", "group": "眼科出题第二组"}, {"q": "以下哪个不是眼的屈光系统的组成（）", "o": {"A": "角膜", "B": "巩膜", "C": "房水", "D": "晶状体", "E": "玻璃体"}, "a": "B", "e": "眼球屈光介质包括：角膜、房水、晶状体、玻璃体。视网膜不是屈光介质（是感光组织）。", "author": "张智翔", "group": "眼科出题第二组"}, {"q": "下列关于近视，正确的是（）", "o": {"A": "近视仅分为轴性近视和屈光性近视", "B": "-3.50D属于轻度近视", "C": "人自出生起即为正视眼，不会出现生理性近视", "D": "可出现多种眼底病变，如弧形斑、豹纹状眼底等", "E": "光学矫正使用凸透镜"}, "a": "D", "e": "正确答案：可出现多种眼底病变，如弧形斑、豹纹状眼底等。", "author": "张智翔", "group": "眼科出题第二组"}, {"q": "男，60岁，25年前体检查出糖尿病，拒绝使用药物治疗，采取生活方式干预，未定期复查，自觉控制良好，近3个月视力逐渐下降，1小时前出现视物变形，就诊于眼科。眼底镜观察到4个象限内30个出血点，可见视网膜新生血管，出现纤维膜。该患者的糖尿病视网膜病变处于（）期", "o": {"A": "II期", "B": "III期", "C": "IV期", "D": "V期", "E": "VI期"}, "a": "D", "e": "新生血管形成是PDR的标志，VEGF升高是关键驱动因素。治疗：全视网膜光凝（PRP）+抗VEGF。", "author": "张智翔", "group": "眼科出题第二组"}, {"q": "Roth斑又称中心白点网膜出血，与视网膜血管的堵塞、破裂和出血有关，可见于下列患者，除了（）", "o": {"A": "女，20岁，近2天持续低热，伴有乏力，心脏听诊可闻及杂音，2周前曾在牙科诊所拔牙", "B": "男，40岁，晚上观看比赛时突发左侧头痛、眼痛、视力下降，伴有恶心、呕吐", "C": "男，60岁，长期乏力、头晕、活动后气短，伴手脚麻木，食欲减退，上腹胀痛，自述有20年“胃炎”病史，尿素呼气试验阴性", "D": "男，70岁，30年前确诊为糖尿病，用药后感觉良好，自行停药，进几个月自觉视力逐渐减退", "E": "男，16岁，近期反复发热，皮肤瘀斑，骨痛，牙龈易出血"}, "a": "B", "e": "正确答案：男，40岁，晚上观看比赛时突发左侧头痛、眼痛、视力下降，伴有恶心、呕吐。", "author": "张智翔", "group": "眼科出题第二组"}, {"q": "以下哪个疾病会出现典型的甲状腺相关眼病（）", "o": {"A": "亚急性甲状腺炎", "B": "桥本氏甲状腺炎", "C": "毒性弥漫性甲状腺肿", "D": "单纯性甲状腺肿", "E": "甲状腺滤泡状癌"}, "a": "C", "e": "正确答案：毒性弥漫性甲状腺肿。", "author": "张智翔", "group": "眼科出题第二组"}, {"q": "下列关于视神经炎正确的是（）", "o": {"A": "青中年多见，不致盲", "B": "单眼突发无痛性急剧视力下降", "C": "半暗环境，手电筒快速交替照射双眼，患侧瞳孔先轻微散大，继而收缩", "D": "可出现中心暗点
